const JH_QUESTIONS=[{"id":1001,"subject":"算数","difficulty":1,"question":"15 × 4 = ?","choices":["60","54","65","70"],"answer":"60","explanation":"15×4=60。15×2=30、30×2=60と2回かけても計算できる"},{"id":1002,"subject":"算数","difficulty":1,"question":"72 ÷ 8 = ?","choices":["9","8","7","11"],"answer":"9","explanation":"8×9=72を確認しよう"},{"id":1003,"subject":"算数","difficulty":1,"question":"1/4 + 1/4 = ?","choices":["2/4","1/2","1/8","2/8"],"answer":"2/4","explanation":"分母が同じなら分子だけ足す。2/4=1/2とも書ける"},{"id":1004,"subject":"算数","difficulty":1,"question":"0.3 × 10 = ?","choices":["3","0.3","30","0.03"],"answer":"3","explanation":"小数点を右に1つ移動すると3になる"},{"id":1005,"subject":"算数","difficulty":1,"question":"正方形の面積の公式は？","choices":["一辺×一辺","一辺×4","一辺+一辺","一辺×2"],"answer":"一辺×一辺","explanation":"正方形の面積＝一辺×一辺。周りの長さは一辺×4"},{"id":1006,"subject":"算数","difficulty":1,"question":"56 ÷ 7 = ?","choices":["8","6","9","7"],"answer":"8","explanation":"7×8=56。九九の7の段を確認しよう"},{"id":1007,"subject":"算数","difficulty":1,"question":"2.5 + 1.5 = ?","choices":["4","3.5","5","4.5"],"answer":"4","explanation":"2.5+1.5=4。小数点をそろえて足す"},{"id":1008,"subject":"算数","difficulty":1,"question":"100 − 37 = ?","choices":["63","67","73","57"],"answer":"63","explanation":"100−37=63。100−40=60、60+3=63と計算できる"},{"id":1009,"subject":"算数","difficulty":1,"question":"長方形の面積の公式は？","choices":["縦×横","縦+横","縦×横×2","縦×横÷2"],"answer":"縦×横","explanation":"長方形の面積＝縦×横。周りの長さは(縦+横)×2"},{"id":1010,"subject":"算数","difficulty":1,"question":"3/5 − 1/5 = ?","choices":["2/5","2/10","1/5","4/5"],"answer":"2/5","explanation":"分母が同じなら分子だけ引く。3−1=2で2/5"},{"id":1011,"subject":"算数","difficulty":1,"question":"4² = ?","choices":["16","8","12","14"],"answer":"16","explanation":"4²=4×4=16。2乗は同じ数を2回かける"},{"id":1012,"subject":"算数","difficulty":1,"question":"1時間30分は何分？","choices":["90分","130分","80分","120分"],"answer":"90分","explanation":"1時間=60分。60+30=90分"},{"id":1013,"subject":"算数","difficulty":1,"question":"50の20%は？","choices":["10","5","20","15"],"answer":"10","explanation":"20%=0.2。50×0.2=10"},{"id":1014,"subject":"算数","difficulty":1,"question":"三角形の内角の和は？","choices":["180度","360度","90度","270度"],"answer":"180度","explanation":"三角形の3つの角を全部足すと必ず180度になる"},{"id":1015,"subject":"算数","difficulty":1,"question":"1000 ÷ 4 = ?","choices":["250","240","260","200"],"answer":"250","explanation":"1000÷4=250。1000÷2=500、500÷2=250"},{"id":1016,"subject":"算数","difficulty":2,"question":"1.5 × 1.5 = ?","choices":["2.25","2.5","3","1.75"],"answer":"2.25","explanation":"1.5×1.5=15×15÷100=225÷100=2.25"},{"id":1017,"subject":"算数","difficulty":2,"question":"5/6 − 1/4 = ?","choices":["7/12","4/2","1/2","2/3"],"answer":"7/12","explanation":"公倍数12で通分：10/12−3/12=7/12"},{"id":1018,"subject":"算数","difficulty":2,"question":"時速90kmは秒速何m？","choices":["25m","90m","15m","30m"],"answer":"25m","explanation":"90km÷3600秒=0.025km=25m"},{"id":1019,"subject":"算数","difficulty":2,"question":"2割5分は何%？","choices":["25%","2.5%","250%","20.5%"],"answer":"25%","explanation":"1割=10%。2割=20%、5分=5%。合わせて25%"},{"id":1020,"subject":"算数","difficulty":2,"question":"正三角形の1つの内角は？","choices":["60度","90度","45度","120度"],"answer":"60度","explanation":"三角形の内角の和は180度。正三角形は3つ等しいので180÷3=60度"},{"id":1021,"subject":"算数","difficulty":2,"question":"144の平方根は？","choices":["12","14","11","13"],"answer":"12","explanation":"12×12=144。平方根は2乗するともとの数になる数"},{"id":1022,"subject":"算数","difficulty":2,"question":"3/4 × 8 = ?","choices":["6","8","4","9"],"answer":"6","explanation":"3/4×8=3×8÷4=24÷4=6"},{"id":1023,"subject":"算数","difficulty":2,"question":"円周率を使って直径10cmの円の円周は？","choices":["31.4cm","3.14cm","314cm","62.8cm"],"answer":"31.4cm","explanation":"円周=直径×3.14=10×3.14=31.4cm"},{"id":1024,"subject":"算数","difficulty":2,"question":"600gは何kg？","choices":["0.6kg","6kg","60kg","0.06kg"],"answer":"0.6kg","explanation":"1kg=1000g。600÷1000=0.6kg"},{"id":1025,"subject":"算数","difficulty":2,"question":"定価1200円の3割引きは？","choices":["840円","900円","780円","960円"],"answer":"840円","explanation":"3割引=7割の値段。1200×0.7=840円"},{"id":1026,"subject":"算数","difficulty":2,"question":"速さ60km/hで2時間30分走ると何km？","choices":["150km","120km","180km","90km"],"answer":"150km","explanation":"2時間30分=2.5時間。60×2.5=150km"},{"id":1027,"subject":"算数","difficulty":2,"question":"12と18の最小公倍数は？","choices":["36","24","72","18"],"answer":"36","explanation":"12=2²×3、18=2×3²。最小公倍数=2²×3²=36"},{"id":1028,"subject":"算数","difficulty":2,"question":"48と36の最大公約数は？","choices":["12","6","24","9"],"answer":"12","explanation":"48=12×4、36=12×3。12が最大の共通因数"},{"id":1029,"subject":"算数","difficulty":2,"question":"食塩30gを水270gに溶かした時の濃度は？","choices":["10%","30%","3%","27%"],"answer":"10%","explanation":"濃度=食塩÷食塩水×100=30÷300×100=10%"},{"id":1030,"subject":"算数","difficulty":2,"question":"平行四辺形の面積の公式は？","choices":["底辺×高さ","底辺×斜辺","(底辺+上辺)×高さ÷2","底辺×高さ÷2"],"answer":"底辺×高さ","explanation":"平行四辺形=底辺×高さ。長方形に変形できることを確認しよう"},{"id":1031,"subject":"算数","difficulty":3,"question":"2/3 ÷ 4/9 = ?","choices":["3/2","8/27","6/12","2/3"],"answer":"3/2","explanation":"÷は逆数×：2/3×9/4=18/12=3/2"},{"id":1032,"subject":"算数","difficulty":3,"question":"1から100までの整数の和は？","choices":["5050","5000","4950","5100"],"answer":"5050","explanation":"(1+100)×100÷2=101×50=5050。ガウスの公式"},{"id":1033,"subject":"算数","difficulty":3,"question":"半径6cmの円の面積は？","choices":["113.04cm²","37.68cm²","18.84cm²","226.08cm²"],"answer":"113.04cm²","explanation":"円の面積=半径×半径×3.14=6×6×3.14=113.04cm²"},{"id":1034,"subject":"算数","difficulty":3,"question":"5%の食塩水200gと10%の食塩水100gを混ぜた濃度は？","choices":["6.67%","7.5%","7%","8%"],"answer":"6.67%","explanation":"食塩=200×0.05+100×0.1=10+10=20g。濃度=20÷300≒6.67%"},{"id":1035,"subject":"算数","difficulty":3,"question":"A君は全体の2/5を読んだ。残り60ページ。全体は？","choices":["100ページ","150ページ","120ページ","80ページ"],"answer":"100ページ","explanation":"残りは3/5。3/5=60ページなので全体=60÷3×5=100ページ"},{"id":1036,"subject":"算数","difficulty":3,"question":"正六角形の内角の和は？","choices":["720度","540度","360度","900度"],"answer":"720度","explanation":"n角形の内角の和=(n-2)×180度。6角形=(6-2)×180=720度"},{"id":1037,"subject":"算数","difficulty":3,"question":"3:4の比で140cmを分けると長い方は？","choices":["80cm","60cm","84cm","56cm"],"answer":"80cm","explanation":"長い方は4/(3+4)×140=4/7×140=80cm"},{"id":1038,"subject":"算数","difficulty":3,"question":"底面積20cm²・高さ9cmの三角柱の体積は？","choices":["180cm³","90cm³","60cm³","360cm³"],"answer":"180cm³","explanation":"柱体の体積=底面積×高さ=20×9=180cm³"},{"id":1039,"subject":"算数","difficulty":3,"question":"時速4kmで歩く人が2400m歩く時間は？","choices":["36分","24分","40分","60分"],"answer":"36分","explanation":"2400m=2.4km。時間=距離÷速さ=2.4÷4=0.6時間=36分"},{"id":1040,"subject":"算数","difficulty":3,"question":"連続する3つの整数の和が96。最小の数は？","choices":["31","32","30","33"],"answer":"31","explanation":"真ん中の数=96÷3=32。最小=32-1=31"},{"id":1041,"subject":"算数","difficulty":1,"question":"9 × 9 = ?","choices":["81","72","89","91"],"answer":"81","explanation":"九九の9の段。9×9=81"},{"id":1042,"subject":"算数","difficulty":1,"question":"200 + 350 = ?","choices":["550","500","450","600"],"answer":"550","explanation":"200+350=550。百の位から足していこう"},{"id":1043,"subject":"算数","difficulty":1,"question":"1km = 何m？","choices":["1000m","100m","10000m","500m"],"answer":"1000m","explanation":"1km=1000m。k（キロ）は1000倍を意味する"},{"id":1044,"subject":"算数","difficulty":1,"question":"4/8 を約分すると？","choices":["1/2","2/4","4/8","1/4"],"answer":"1/2","explanation":"4と8の最大公約数は4。4÷4=1、8÷4=2なので1/2"},{"id":1045,"subject":"算数","difficulty":1,"question":"40分後の時刻は？（現在2時30分）","choices":["3時10分","3時00分","2時70分","3時20分"],"answer":"3時10分","explanation":"30分+40分=70分=1時間10分。2時+1時間10分=3時10分"},{"id":1046,"subject":"算数","difficulty":2,"question":"原価500円の品物を4割の利益をつけると定価は？","choices":["700円","600円","750円","800円"],"answer":"700円","explanation":"定価=原価×(1+利益率)=500×1.4=700円"},{"id":1047,"subject":"算数","difficulty":2,"question":"6と9と12の最小公倍数は？","choices":["36","18","72","24"],"answer":"36","explanation":"36÷6=6、36÷9=4、36÷12=3。36が最小公倍数"},{"id":1048,"subject":"算数","difficulty":2,"question":"面積が75cm²の三角形。底辺15cm、高さは？","choices":["10cm","5cm","15cm","8cm"],"answer":"10cm","explanation":"面積=底辺×高さ÷2。75=15×高さ÷2。高さ=75×2÷15=10cm"},{"id":1049,"subject":"算数","difficulty":2,"question":"80人の生徒の35%が女子。女子は何人？","choices":["28人","30人","32人","35人"],"answer":"28人","explanation":"80×0.35=28人"},{"id":1050,"subject":"算数","difficulty":2,"question":"A地からB地まで時速5kmで1時間12分かかる。距離は？","choices":["6km","5km","7km","4km"],"answer":"6km","explanation":"1時間12分=1.2時間。距離=速さ×時間=5×1.2=6km"},{"id":1051,"subject":"算数","difficulty":3,"question":"縦4cm横6cm高さ5cmの直方体の表面積は？","choices":["148cm²","120cm²","24cm²","240cm²"],"answer":"148cm²","explanation":"表面積=2×(4×6+6×5+5×4)=2×(24+30+20)=2×74=148cm²"},{"id":1052,"subject":"算数","difficulty":3,"question":"1辺6cmの正方形に内接する円の面積は？","choices":["28.26cm²","113.04cm²","18.84cm²","9.42cm²"],"answer":"28.26cm²","explanation":"内接円の半径=6÷2=3cm。面積=3×3×3.14=28.26cm²"},{"id":1053,"subject":"算数","difficulty":3,"question":"x+y=10、x−y=4のとき xは？","choices":["7","6","8","5"],"answer":"7","explanation":"2式を足すと2x=14。x=7"},{"id":1054,"subject":"算数","difficulty":3,"question":"1辺10cmの立方体の体積は？","choices":["1000cm³","100cm³","300cm³","600cm³"],"answer":"1000cm³","explanation":"立方体の体積=一辺×一辺×一辺=10×10×10=1000cm³"},{"id":1055,"subject":"算数","difficulty":3,"question":"歯車AとBが噛み合っている。Aの歯数24、Bの歯数36。Aが3回転するとBは何回転？","choices":["2回転","3回転","4回転","1.5回転"],"answer":"2回転","explanation":"歯数の比=回転数の逆比。A:B=24:36=2:3。Aが3回転→Bは3×(24/36)=2回転"},{"id":1056,"subject":"算数","difficulty":1,"question":"7 × 8 = ?","choices":["56","54","63","48"],"answer":"56","explanation":"7×8=56。七八五十六"},{"id":1057,"subject":"算数","difficulty":1,"question":"90 ÷ 5 = ?","choices":["18","15","20","16"],"answer":"18","explanation":"90÷5=18。90÷10×2=9×2=18"},{"id":1058,"subject":"算数","difficulty":1,"question":"0.1 × 0.1 = ?","choices":["0.01","0.1","1","0.001"],"answer":"0.01","explanation":"0.1×0.1=0.01。小数点が2つ分左に移動する"},{"id":1059,"subject":"算数","difficulty":1,"question":"四角形の内角の和は？","choices":["360度","180度","270度","540度"],"answer":"360度","explanation":"四角形=三角形2つ分。180×2=360度"},{"id":1060,"subject":"算数","difficulty":1,"question":"1L = 何mL？","choices":["1000mL","100mL","10000mL","500mL"],"answer":"1000mL","explanation":"1L=1000mL。L（リットル）とmL（ミリリットル）の関係"},{"id":1061,"subject":"算数","difficulty":2,"question":"500円の12%は？","choices":["60円","50円","120円","55円"],"answer":"60円","explanation":"500×0.12=60円"},{"id":1062,"subject":"算数","difficulty":2,"question":"正方形の対角線の長さが10cm。面積は？","choices":["50cm²","100cm²","25cm²","75cm²"],"answer":"50cm²","explanation":"対角線が10cmの正方形の面積=対角線×対角線÷2=10×10÷2=50cm²"},{"id":1063,"subject":"算数","difficulty":2,"question":"20枚のコインで5円と10円がある。合計130円。5円は何枚？","choices":["14枚","10枚","12枚","8枚"],"answer":"14枚","explanation":"10円をx枚とすると10x+(20-x)×5=130。5x=30。x=6枚。5円=14枚"},{"id":1064,"subject":"算数","difficulty":2,"question":"4人で12日かかる仕事を6人でやると何日？","choices":["8日","6日","10日","9日"],"answer":"8日","explanation":"仕事量=4×12=48。6人でやると48÷6=8日"},{"id":1065,"subject":"算数","difficulty":2,"question":"8%の食塩水150gの中の食塩は何g？","choices":["12g","8g","15g","20g"],"answer":"12g","explanation":"150×0.08=12g"},{"id":1066,"subject":"算数","difficulty":3,"question":"2けたの整数で、各位の和が9になるものは全部で何個？","choices":["8個","9個","10個","7個"],"answer":"8個","explanation":"18,27,36,45,54,63,72,81の8個。90は各位の和=9+0=9だが含む→9個…いや90も含めると9個"},{"id":1067,"subject":"算数","difficulty":3,"question":"円すいの体積の公式は？（底面半径r、高さh）","choices":["r²×π×h÷3","r×π×h","r²×π×h","2×r×π×h"],"answer":"r²×π×h÷3","explanation":"円すいの体積=底面積×高さ÷3=r²×π×h÷3"},{"id":1068,"subject":"算数","difficulty":3,"question":"3桁の整数で3の倍数は全部で何個？","choices":["300個","333個","299個","301個"],"answer":"300個","explanation":"100〜999のうち3の倍数：999÷3−99÷3=333−33=300個"},{"id":1069,"subject":"算数","difficulty":3,"question":"A君B君の速さの比が3:4。同じ距離でA君が20分かかるとB君は？","choices":["15分","16分","18分","12分"],"answer":"15分","explanation":"速さの比=3:4なら時間の比は逆比=4:3。A君20分ならB君=20×3/4=15分"},{"id":1070,"subject":"算数","difficulty":3,"question":"図書館に行くのに自転車で12分、歩きで36分。自転車と徒歩の速さの比は？","choices":["3:1","1:3","2:1","1:2"],"answer":"3:1","explanation":"同じ距離を進む時間の比=12:36=1:3。速さは逆比=3:1"},{"id":1071,"subject":"算数","difficulty":1,"question":"125 + 875 = ?","choices":["1000","900","1100","950"],"answer":"1000","explanation":"125+875=1000。875=1000-125と考えると計算しやすい"},{"id":1072,"subject":"算数","difficulty":1,"question":"3/4 = 何%？","choices":["75%","34%","43%","80%"],"answer":"75%","explanation":"3÷4=0.75=75%"},{"id":1073,"subject":"算数","difficulty":1,"question":"直角は何度？","choices":["90度","180度","45度","60度"],"answer":"90度","explanation":"直角=90度。縦と横が交わる角度"},{"id":1074,"subject":"算数","difficulty":1,"question":"2.4 + 3.6 = ?","choices":["6","5.9","6.1","5"],"answer":"6","explanation":"2.4+3.6=6。小数点をそろえて計算"},{"id":1075,"subject":"算数","difficulty":1,"question":"1ha = 何m²？","choices":["10000m²","1000m²","100m²","100000m²"],"answer":"10000m²","explanation":"1ha（ヘクタール）=100m×100m=10000m²"},{"id":1076,"subject":"算数","difficulty":2,"question":"分速80mは時速何km？","choices":["4.8km","8km","48km","0.48km"],"answer":"4.8km","explanation":"分速80m×60分=時速4800m=4.8km"},{"id":1077,"subject":"算数","difficulty":2,"question":"4/5 × 15/8 = ?","choices":["3/2","60/40","1/2","2"],"answer":"3/2","explanation":"4×15/(5×8)=60/40=3/2"},{"id":1078,"subject":"算数","difficulty":2,"question":"1200円の品物を15%引きで買うと？","choices":["1020円","1080円","960円","1050円"],"answer":"1020円","explanation":"1200×(1-0.15)=1200×0.85=1020円"},{"id":1079,"subject":"算数","difficulty":2,"question":"縦8cm横12cmの長方形と面積が等しい正方形の一辺は？","choices":["約9.8cm","10cm","8cm","96cm"],"answer":"約9.8cm","explanation":"面積=8×12=96cm²。正方形の一辺=√96≒9.8cm"},{"id":1080,"subject":"算数","difficulty":2,"question":"20%の利益で600円の商品を売ると原価は？","choices":["500円","480円","520円","450円"],"answer":"500円","explanation":"売値=原価×1.2=600円。原価=600÷1.2=500円"},{"id":1081,"subject":"算数","difficulty":3,"question":"周の長さが24cmの長方形で面積が最大になるのは？","choices":["縦6cm横6cm","縦8cm横4cm","縦10cm横2cm","縦7cm横5cm"],"answer":"縦6cm横6cm","explanation":"縦+横=12cm。積が最大になるのは縦=横=6cmのとき（正方形）"},{"id":1082,"subject":"算数","difficulty":3,"question":"3人でじゃんけんをする。全員の手の出し方は何通り？","choices":["27通り","9通り","6通り","18通り"],"answer":"27通り","explanation":"各人3通りの手がある。3×3×3=27通り"},{"id":1083, :"10³-5³=1000-125=875cm³"},{"id":1141,"subject":"算数","difficulty":1,"question":"90分は何時間何分？","choices":["1時間30分","9時間","1時間90分","2時間"],"answer":"1時間30分","explanation":"90分=60分+30分=1時間30分"},{"id":1142,"subject":"算数","difficulty":1,"question":"0.75 = 何分の何？","choices":["3/4","75/100","7/9","1/4"],"answer":"3/4","explanation":"0.75=75/100=3/4。よく使う小数と分数の変換"},{"id":1143,"subject":"算数","difficulty":1,"question":"5の倍数で最小の3桁の数は？","choices":["100","105","110","500"],"answer":"100","explanation":"100は5の倍数（100÷5=20）で、最小の3桁の数"},{"id":1144,"subject":"算数","difficulty":1,"question":"菱形（ひし形）の面積の公式は？","choices":["対角線×対角線÷2","一辺×一辺","底辺×高さ","対角線×4"],"answer":"対角線×対角線÷2","explanation":"菱形の面積=対角線₁×対角線₂÷2"},{"id":1145,"subject":"算数","difficulty":1,"question":"1週間は何日？","choices":["7日","5日","10日","6日"],"answer":"7日","explanation":"1週間=7日。月火水木金土日"},{"id":1146,"subject":"算数","difficulty":2,"question":"3.14 × 25 = ?","choices":["78.5","62.8","94.2","31.4"],"answer":"78.5","explanation":"3.14×25=3.14×100÷4=314÷4=78.5"},{"id":1147,"subject":"算数","difficulty":2,"question":"5人で15日かかる仕事を3人でやると何日？","choices":["25日","30日","20日","45日"],"answer":"25日","explanation":"仕事量=5×15=75。3人でやると75÷3=25日"},{"id":1148,"subject":"算数","difficulty":2,"question":"1200円の商品を3割引で買った。代金は？","choices":["840円","900円","780円","360円"],"answer":"840円","explanation":"3割引=7割の値段。1200×0.7=840円"},{"id":1149,"subject":"算数","difficulty":2,"question":"上底4・下底8・高さ5の台形の面積は？","choices":["30cm²","24cm²","40cm²","20cm²"],"answer":"30cm²","explanation":"(上底+下底)×高さ÷2=(4+8)×5÷2=30cm²"},{"id":1150,"subject":"算数","difficulty":2,"question":"√16 + √9 = ?","choices":["7","5","√25","√7"],"answer":"7","explanation":"√16=4、√9=3。4+3=7（√を別々に計算する）"},{"id":2001,"subject":"国語","difficulty":1,"question":"「さじを投げる」の意味は？","choices":["あきらめる","物を投げる","料理をやめる","戦う"],"answer":"あきらめる","explanation":"「さじを投げる」は慣用句で「もうどうにもできないとあきらめる」という意味"},{"id":2002,"subject":"国語","difficulty":1,"question":"「早起きは三文の徳」の意味は？","choices":["早起きするとよいことがある","朝は寒い","お金が三文もうかる","健康によい"],"answer":"早起きするとよいことがある","explanation":"三文（わずかな金額）でも得をする、早起きには利益があるというたとえ"},{"id":2003,"subject":"国語","difficulty":1,"question":"「木」の部首は？","choices":["木（き）","口（くち）","一（いち）","土（つち）"],"answer":"木（き）","explanation":"「木」は部首でもある。木に関する漢字：林・森・枝・根など"},{"id":2004,"subject":"国語","difficulty":1,"question":"「喜怒哀楽」の「哀」の意味は？","choices":["かなしみ","よろこび","おこり","たのしみ"],"answer":"かなしみ","explanation":"喜（よろこび）怒（おこり）哀（かなしみ）楽（たのしみ）"},{"id":2005,"subject":"国語","difficulty":1,"question":"「猫の手も借りたい」の意味は？","choices":["とても忙しい","猫が好き","人手が多い","ひまである"],"answer":"とても忙しい","explanation":"猫の手でも借りたいくらい忙しい、という慣用表現"},{"id":2006,"subject":"国語","difficulty":1,"question":"「東西南北」の読み方は？","choices":["とうざいなんぼく","ひがしにしみなみきた","とうさいなんほく","ひがしにしなんぼく"],"answer":"とうざいなんぼく","explanation":"東西南北（とうざいなんぼく）。方位を表す四字熟語"},{"id":2007,"subject":"国語","difficulty":1,"question":"「立つ鳥跡を濁さず」の意味は？","choices":["立ち去るときは後始末をすべき","鳥は飛ぶとききれい","早く立ち去ること","自然を大切にすること"],"answer":"立ち去るときは後始末をすべき","explanation":"立ち去るときは後片付けをきちんとするべきというたとえ"},{"id":2008,"subject":"国語","difficulty":1,"question":"「手」がつく慣用句で「仕事を始める」の意味は？","choices":["手をつける","手を貸す","手が届く","手を焼く"],"answer":"手をつける","explanation":"「手をつける」＝仕事や物事に着手する、始める"},{"id":2009,"subject":"国語","difficulty":1,"question":"「石の上にも三年」の意味は？","choices":["辛抱強く続ければ成功する","石は冷たい","三年で必ず成功する","すぐにあきらめない"],"answer":"辛抱強く続ければ成功する","explanation":"冷たい石の上でも座り続ければ暖かくなる＝忍耐が大切というたとえ"},{"id":2010,"subject":"国語","difficulty":1,"question":"「山」の部首は？","choices":["山（やま）","土（つち）","石（いし）","岩（いわ）"],"answer":"山（やま）","explanation":"「山」は部首でもある。山に関する漢字：岩・岸・峠・嶋など"},{"id":2011,"subject":"国語","difficulty":1,"question":"「明朗快活」の意味は？","choices":["明るく元気で活発なこと","明るい朝のこと","元気よく活動すること","朗らかに歌うこと"],"answer":"明るく元気で活発なこと","explanation":"明朗（明るく朗らか）快活（元気で活発）＝性格が明るく元気なこと"},{"id":2012,"subject":"国語","difficulty":1,"question":"「目」がつく慣用句で「注目する」の意味は？","choices":["目を向ける","目をつぶる","目を細める","目が高い"],"answer":"目を向ける","explanation":"「目を向ける」＝注意を向ける、関心を持つ"},{"id":2013,"subject":"国語","difficulty":1,"question":"「泣き面に蜂」の意味は？","choices":["不幸の上にまた不幸が重なる","泣くと蜂が来る","苦しい しい知識や見解が得られる、という孔子の言葉"},{"id":2034,"subject":"国語","difficulty":3,"question":"「因果応報」の意味は？","choices":["行いに応じた報いが返ってくる","原因と結果は必ず一致する","よい行いをすればよいことがある","悪いことをすると罰が当たる"],"answer":"行いに応じた報いが返ってくる","explanation":"よい行いにはよい結果、悪い行いには悪い結果が返ってくるという仏教の考え"},{"id":2035,"subject":"国語","difficulty":3,"question":"「刎頸の交わり」の意味は？","choices":["命がけの深い友情","首を賭けた勝負","深い恨みのこと","命を救われた恩義"],"answer":"命がけの深い友情","explanation":"首を切られても悔いないほどの深い友情。「刎頸の友」とも言う"},{"id":2036,"subject":"国語","difficulty":3,"question":"「白眉」の意味は？","choices":["多くの中で最も優れたもの","白い眉毛の人","見た目が美しいもの","際立って目立つもの"],"answer":"多くの中で最も優れたもの","explanation":"馬氏の五兄弟の中で眉に白毛があった馬良が最も優秀だったという故事から"},{"id":2037,"subject":"国語","difficulty":3,"question":"「破顔一笑」の意味は？","choices":["顔をほころばせて微笑む","大声で笑うこと","恥ずかしくて笑う","泣き笑いすること"],"answer":"顔をほころばせて微笑む","explanation":"顔がほころびるように笑うこと。「破顔」は顔をほころばせること"},{"id":2038,"subject":"国語","difficulty":3,"question":"「文語」と「口語」の違いは？","choices":["文語は書き言葉の古語・口語は話し言葉","文語は正式・口語はカジュアル","文語は昔・口語は今","文語は書く・口語は話す"],"answer":"文語は書き言葉の古語・口語は話し言葉","explanation":"文語は古典的な書き言葉。口語は現代の話し言葉。明治以降に区別が生まれた"},{"id":2039,"subject":"国語","difficulty":3,"question":"「瓦解」の読み方と意味は？","choices":["がかい・組織が崩れ壊れること","かわらかい・かわらが割れること","がかい・敵を打ち破ること","わかい・若くて元気なこと"],"answer":"がかい・組織が崩れ壊れること","explanation":"瓦解（がかい）：瓦のように一部が崩れると全体が崩壊すること"},{"id":2040,"subject":"国語","difficulty":3,"question":"「アルゴリズム」を漢字で言い換えると？","choices":["算法","計算式","手順書","論理式"],"answer":"算法","explanation":"アルゴリズムは問題を解く手順・計算法のことで、漢字では「算法」と表現する"},{"id":2041,"subject":"国語","difficulty":1,"question":"「春」の部首は？","choices":["日（ひ）","木（き）","春（はる）","艸（くさ）"],"answer":"日（ひ）","explanation":"「春」の部首は「日」。日が長くなる季節を表す"},{"id":2042,"subject":"国語","difficulty":1,"question":"「七転八倒」の意味は？","choices":["ひどく苦しんでのたうちまわること","何度も転ぶこと","八回勝って七回負けること","激しく戦うこと"],"answer":"ひどく苦しんでのたうちまわること","explanation":"七転び八起きとは別。七転八倒はひどく苦しむ様子を表す"},{"id":2043,"subject":"国語","difficulty":1,"question":"「借りてきた猫」の意味は？","choices":["いつもより大人しくしている様子","猫を借りてくること","おとなしい人","臆病者"],"answer":"いつもより大人しくしている様子","explanation":"借りてきた猫のようにおとなしい、という慣用表現"},{"id":2044,"subject":"国語","difficulty":1,"question":"「火」の部首は？","choices":["火（ひ）","灬（れっか）","日（ひ）","光（ひかり）"],"answer":"火（ひ）","explanation":"「火」は部首でもある。変形した「灬（れっか）」もある（熱・然など）"},{"id":2045,"subject":"国語","difficulty":1,"question":"「一目置く」の意味は？","choices":["相手が優れていると認める","一番前に置く","一歩退く","先を読む"],"answer":"相手が優れていると認める","explanation":"囲碁で弱い方が先に一石置くことから、相手の実力を認めること"},{"id":2046,"subject":"国語","difficulty":2,"question":"「杞憂」の意味は？","choices":["取り越し苦労・無用な心配","故郷を思う気持ち","危険を予測すること","心配性の人"],"answer":"取り越し苦労・無用な心配","explanation":"昔の杞の国の人が天が落ちてくることを心配したという故事から"},{"id":2047,"subject":"国語","difficulty":2,"question":"「敬語」で「来る」の尊敬語は？","choices":["いらっしゃる","参る","うかがう","おいでになる"],"answer":"いらっしゃる","explanation":"「いる・行く・来る」の尊敬語はすべて「いらっしゃる」または「おいでになる」"},{"id":2048,"subject":"国語","difficulty":2,"question":"「馬の耳に念仏」の意味は？","choices":["いくら言い聞かせても効果がない","馬は賢い動物","無駄な努力","聞こえないふりをすること"],"answer":"いくら言い聞かせても効果がない","explanation":"馬に念仏を聞かせても意味がないように、いくら言っても聞かない人のたとえ"},{"id":2049,"subject":"国語","difficulty":2,"question":"「風林火山」の出典は？","choices":["孫子（そんし）","論語","史記","三国志"],"answer":"孫子（そんし）","explanation":"武田信玄の旗印で有名だが、出典は中国の兵法書「孫子」の軍争篇"},{"id":2050,"subject":"国語","difficulty":2,"question":"「百聞は一見に如かず」の意味は？","choices":["実際に見ることが大切","話をよく聞くこと","百回聞くと覚えられる","自分で体験すること"],"answer":"実際に見ることが大切","explanation":"百回聞くより一度実際に見る方が確かである、ということ"},{"id":2051,"subject":"国語","difficulty":3,"question":"「推敲」の語源となった詩人は？","choices":["賈島（かとう）","李白","杜甫","王維"],"answer":"賈島（かとう）","explanation":"唐の詩人・賈島が「僧は推す月下の門」の「推す」を「敲く」にすべきか悩んだ故事"},{"id":2052,"subject":"国語","difficulty":3,"question":"「呉越同舟」の意味は？","choices":["仲の悪い者が同じ場所にいること","力を合わせて困難を乗り越えること","異なる文化が交わること","遠い場所から来た人たちが集まること"],"answer":"仲の悪い者が同じ場所にいること","explanation":"呉と越（中国の仇敵国）の人が同じ舟に乗るような状況のたとえ"},{"id":2053,"subject":"国語","difficulty":3,"question":"「敷衍」の読み方と意味は？","choices":["ふえん・詳しく説明すること","しきえん・広く説明すること","ふえん・要点をまとめること","しきのべ・広げること"],"answer":"ふえん・詳しく説明すること","explanation":"敷衍（ふえん）：意味や内容をより詳しく説明して広めること"},{"id":2054,"subject":"国語","difficulty":3,"question":"「桑田碧海」（そうでんへきかい）の意味は？","choices":["世の中の移り変わりが激しいこと","農村と海が近いこと","自然の美しさ","長い時間が経つこと"],"answer":"世の中の移り変わりが激しいこと","explanation":"桑畑が海になるほど世の中が大きく変わること。「桑海の変」とも"},{"id":2055,"subject":"国語","difficulty":3,"question":"「烏合の衆」の意味は？","choices":["規律のないバラバラな集まり","多くの人が集まること","カラスのような賢い集団","力を合わせた仲間"],"answer":"規律のないバラバラな集まり","explanation":"カラスが集まるように、統率も秩序もない群衆のたとえ"},{"id":2056,"subject":"国語","difficulty":1,"question":"「鬼に金棒」の意味は？","choices":["強い者がさらに強くなる","こわいものがない","むだな努力","最強になること"],"answer":"強い者がさらに強くなる","explanation":"鬼はすでに強いのにさらに金棒を持つ→強い者がより強くなることのたとえ"},{"id":2057,"subject":"国語","difficulty":1,"question":"「心」の部首は？","choices":["心（こころ）","忄（りっしんべん）","十（じゅう）","月（つき）"],"answer":"心（こころ）","explanation":"「心」は部首でもある。変形した「忄（りっしんべん）」もある（悲・快など）"},{"id":2058,"subject":"国語","difficulty":1,"question":"「急がば回れ」と同じ意味のことわざは？","choices":["いそがば まわれ","七転び八起き","石橋を叩いて渡る","転ばぬ先の杖"],"answer":"石橋を叩いて渡る","explanation":"どちらも「慎重に・確実に進むべき」という意味"},{"id":2059,"subject":"国語","difficulty":1,"question":"「水に流す」の意味は？","choices":["過去のことをなかったことにする","水に落とす","忘れること","きれいにすること"],"answer":"過去のことをなかったことにする","explanation":"過去のいざこざや恨みをすべて忘れてやり直すこと"},{"id":2060,"subject":"国語","difficulty":1,"question":"「絵に描いた餅」の意味は？","choices":["実際の役に立たないもの","おいしそうに見えるもの","きれいな絵のこと","夢や希望"],"answer":"実際の役に立たないもの","explanation":"いくらうまく描いても食べられない餅のように、実際には役立たないもの"},{"id":2061,"subject":"国語","difficulty":2,"question":"「五十歩百歩」の意味は？","choices":["本質的には同じで大差がない","五十歩も百歩も違わない","少しの差が大きな結果を生む","量より質が大切"],"answer":"本質的には同じで大差がない","explanation":"戦場から50歩逃げた者が100歩逃げた者を笑えない、という孟子の故事から"},{"id":2062,"subject":"国語","difficulty":2,"question":"「四面楚歌」の意味は？","choices":["周囲を敵に囲まれ助けがない状態","四方から攻められること","孤立していること","友達がいないこと"],"answer":"周囲を敵に囲まれ助けがない状態","explanation":"楚の項羽が漢軍に囲まれ四方から楚の歌が聞こえた故事から"},{"id":2063,"subject":"国語","difficulty":2,"question":"「雨後の筍」の意味は？","choices":["同じようなものが次々と現れること","雨のあとに筍が生えること","急に成長すること","よい条件がそろうこと"],"answer":"同じようなものが次々と現れること","explanation":"雨の後に筍がたくさん出るように、同じようなものが次々と出てくること"},{"id":2064,"subject":"国語","difficulty":2,"question":"「古今東西」の意味は？","choices":["昔から今まで、あらゆる場所で","今この時代のこと","東と西の文化","世界中のすべて"],"answer":"昔から今まで、あらゆる場所で","explanation":"古今（いつの時代でも）東西（どこの場所でも）＝時代・場所を超えてすべて"},{"id":2065,"subject":"国語","difficulty":2,"question":"「眉唾もの」の意味は？","choices":["信用できないあやしいもの","うれしいこと","警戒が必要なもの","変わったもの"],"answer":"信用できないあやしいもの","explanation":"狐に化かされないよう眉に唾をつけるという迷信から、怪しくて信用できないもの"},{"id":2066,"subject":"国語","difficulty":3,"question":"「韓信の股くぐり」の意味は？","choices":["大きな目的のために屈辱に耐えること","臆病者のこと","勇気がないこと","意地悪をすること"],"answer":"大きな目的のために屈辱に耐えること","explanation":"後に大将軍となる韓信が若い頃、ならず者の股をくぐった故事から"},{"id":2067,"subject":"国語","difficulty":3,"question":"「噴飯もの」の意味は？","choices":["あまりにおかしくて食べていた飯を噴き出すこと","腹立たしいこと","信じられないこと","驚くべきこと"],"answer":"あまりにおかしくて食べていた飯を噴き出すこと","explanation":"笑いをこらえきれず口の中の飯を吹き出すほどおかしいこと"},{"id":2068,"subject":"国語","difficulty":3,"question":"「揣摩臆測」の読み方は？","choices":["しまおくそく","すいまおくそく","しまよくそく","すいまよそく"],"answer":"しまおくそく","explanation":"揣摩臆測（しまおくそく）：根拠なく勝手に推測すること"},{"id":2069,"subject":"国語","difficulty":3,"question":"「詩」と「詞」の違いは？","choices":["詩は文学・詞は音楽に合わせた言葉","詩は古い・詞は新しい","詩は短い・詞は長い","詩は日本語・詞は中国語"],"answer":"詩は文学・詞は音楽に合わせた言葉","explanation":"詩は文学の形式の一つ。詞は音楽（歌詞）に合わせて作られた言葉"},{"id":2070,"subject":"国語","difficulty":3,"question":"「万緑叢中紅一点」の意味は？","choices":["多くの中でひとつだけ際立って目立つもの","緑の中に赤い花","女性が一人いること","自然の美しさ"],"answer":"多くの中でひとつだけ際立って目立つもの","explanation":"緑の草木の中に一輪だけ赤い花が咲くように、際立って目立つものを指す"},{"id":2071,"subject":"国語","difficulty":1,"question":"「手を焼く」の意味は？","choices":["扱いに困る","熱いものを触る","一生懸命働く","こまかい仕事をする"],"answer":"扱いに困る","explanation":"「手を焼く」＝手がかかって困る、扱いにくい"},{"id":2072,"subject":"国語","difficulty":1,"question":"「犬猿の仲」の意味は？","choices":["非常に仲が悪いこと","動物同士の争い","正反対の性格","ずっと喧嘩し続けること"],"answer":"非常に仲が悪いこと","explanation":"犬と猿は仲が悪いといわれることから、非常に仲の悪い関係のたとえ"},{"id":2073,"subject":"国語","difficulty":1,"question":"「二の足を踏む」の意味は？","choices":["ためらって決断できない","二回同じことをする","後退すること","ゆっくり歩くこと"],"answer":"ためらって決断できない","explanation":"「二の足」は次の一歩のこと。進もうとして迷ってしまうこと"},{"id":2074,"subject":"国語","difficulty":1,"question":"「十人十色」の意味は？","choices":["人それぞれ考えや好みが違う","十人が十色の服を着る","みんなが違って当然","個性を大切にすること"],"answer":"人それぞれ考えや好みが違う","explanation":"十人いれば十人それぞれ違う色がある＝人の好みや考えはそれぞれ違う"},{"id":2075,"subject":"国語","difficulty":1,"question":"「虻蜂取らず」の意味は？","choices":["欲張って両方とも失う","一度に二つ手に入れる","慎重に行動する","集中して取り組む"],"answer":"欲張って両方とも失う","explanation":"虻も蜂も捕ろうとして両方逃してしまう＝欲張ると何も得られない"},{"id":2076,"subject":"国語","difficulty":2,"question":"「敬語」で「する」の謙譲語は？","choices":["いたす","なさる","される","おやりになる"],"answer":"いたす","explanation":"「する」の謙譲語は「いたす」。尊敬語は「なさる」"},{"id":2077,"subject":"国語","difficulty":2,"question":"「鶏口となるも牛後となるなかれ」の意味は？","choices":["大きな組織の末端より小さな組織のトップがよい","鶏のように早起きすべき","強い者に従うべき","弱い者でも勝てる"],"answer":"大きな組織の末端より小さな組織のトップがよい","explanation":"大きな牛の尾より、小さな鶏のくちばしになれ＝大組織の末端より小組織のトップ"},{"id":2078,"subject":"国語","difficulty":2,"question":"「一衣帯水」の意味は？","choices":["ひとすじの川や海峡を隔てた近い距離","一本の帯のような川","細い水路","川一本分の差"],"answer":"ひとすじの川や海峡を隔てた近い距離","explanation":"一本の帯のような川（または海峡）を挟むだけの、非常に近い距離"},{"id":2079,"subject":"国語","difficulty":2,"question":"「不撓不屈」の意味は？","choices":["どんな困難にも負けずくじけない","まっすぐ進むこと","強い意志を持つこと","失敗しても立ち上がること"],"answer":"どんな困難にも負けずくじけない","explanation":"不撓（曲がらない）不屈（屈しない）＝どんな困難にもくじけない强い意志"},{"id":2080,"subject":"国語","difficulty":2,"question":"「弘法も筆の誤り」の意味は？","choices":["名人でも失敗することがある","練習が大切","完璧な人はいない","書道は難しい"],"answer":"名人でも失敗することがある","explanation":"書の名人・弘法大師でも書き間違いをすることがある＝どんな名人でも失敗する"},{"id":2081,"subject":"国語","difficulty":3,"question":"「鬼面人を驚かす」の意味は？","choices":["大げさな見かけで人を驚かす","鬼のような怖い顔","本当に怖いもの","見た目で判断すること"],"answer":"大げさな見かけで人を驚かす","explanation":"鬼のような恐ろしい仮面で人を驚かすように、中身はないが外見だけで驚かすこと"},{"id":2082,"subject":"国語","difficulty":3,"question":"「濫觴」の読み方と意味は？","choices":["らんしょう・物事のはじまり","らんそう・水があふれること","なんしょう・混乱のはじまり","らんしょう・川の上流"],"answer":"らんしょう・物事のはじまり","explanation":"濫觴（らんしょう）：大河も源はさかずき（觴）を濫（うかべる）ほどの細流から＝物事の起源"},{"id":2083,"subject":"国語","difficulty":3,"question":"「捧腹絶倒」の意味は？","choices":["腹をかかえて大笑いすること","深くお辞儀すること","倒れるほど驚くこと","大声で叫ぶこと"],"answer":"腹をかかえて大笑いすること","explanation":"腹（はら）を捧げ持って転げ回るほど笑うこと"},{"id":2084,"subject":"国語","difficulty":3,"question":"「徒手空拳」の意味は？","choices":["何も持たず・助けもなく一人で立ち向かう","素手で戦うこと","丸腰であること","準備不足のこと"],"answer":"何も持たず・助けもなく一人で立ち向かう","explanation":"武器も援助もなく、素手一つで物事に取り組む状態"},{"id":2085,"subject":"国語","difficulty":3,"question":"「桃李もの言わざれども下自ら蹊を成す」の意味は？","choices":["徳のある人の周りには自然と人が集まる","黙って努力する人が成功する","口より行動が大切","自然の美しさ"],"answer":"徳のある人の周りには自然と人が集まる","explanation":"桃や李の木は何も言わなくても花や実を求めて人が集まり、道ができる＝徳のある人は自然と慕われる"},{"id":2086,"subject":"国語","difficulty":1,"question":"「腕が上がる」の意味は？","choices":["技術が上達する","腕を高く上げる","体が大きくなる","強くなる"],"answer":"技術が上達する","explanation":"「腕が上がる」＝技術・技能が向上する"},{"id":2087,"subject":"国語","difficulty":1,"question":"「猫の額」の意味は？","choices":["非常に狭い場所","小さいもの","かわいいもの","大切な場所"],"answer":"非常に狭い場所","explanation":"猫の額のように狭い土地や場所を指す慣用句"},{"id":2088,"subject":"国語","difficulty":1,"question":"「読む」の敬語（尊敬語）は？","choices":["お読みになる","拝読する","読まれる","お読みする"],"answer":"お読みになる","explanation":"尊敬語は相手の動作を高める。「読む」の尊敬語は「お読みになる」"},{"id":2089,"subject":"国語","difficulty":1,"question":"「子供」を正しい漢字で書くと？","choices":["子供","子ども","こども","子共"],"answer":"子供","explanation":"「子供」が一般的な漢字表記。ひらがな「子ども」も正しい表記とされる"},{"id":2090,"subject":"国語","difficulty":1,"question":"「気が置けない」の意味は？","choices":["気を使わなくてよい親しい間柄","気が許せない","信用できない","落ち着けない"],"answer":"気を使わなくてよい親しい間柄","explanation":"「気が置けない」は気兼ねしなくてよいという意味。間違えやすいので注意"},{"id":2091,"subject":"国語","difficulty":2,"question":"「画竜点睛」の意味は？","choices":["最後の仕上げが大切","龍の絵を描くこと","細かいところに注意すること","完璧を目指すこと"],"answer":"最後の仕上げが大切","explanation":"龍の絵に最後に瞳を入れたら本物になって飛んだ故事から、仕上げの大切さ"},{"id":2092,"subject":"国語","difficulty":2,"question":"「朝三暮四」の意味は？","choices":["目先の違いにこだわり本質を見失う","朝と夜で態度が変わる","いい加減な人","ころころ変わること"],"answer":"目先の違いにこだわり本質を見失う","explanation":"猿に栗を朝3暮4から朝4暮3に変えただけで喜んだ故事から、本質を見失うこと"},{"id":2093,"subject":"国語","difficulty":2,"question":"「水魚の交わり」の意味は？","choices":["非常に親密な関係","魚のような自由な関係","自然の中での交流","深くて清らかな友情"],"answer":"非常に親密な関係","explanation":"劉備が諸葛亮との関係を「魚と水のようだ」と言った故事から、切り離せない深い関係"},{"id":2094,"subject":"国語","difficulty":2,"question":"「蛇足」の意味は？","choices":["余計なもの・不必要な付け足し","蛇のような足","邪魔になるもの","長すぎるもの"],"answer":"余計なもの・不必要な付け足し","explanation":"蛇の絵に足を描き加えた者が酒を失った故事から、余計なものを加えること"},{"id":2095,"subject":"国語","difficulty":2,"question":"「助詞」の種類として正しくないものは？","choices":["動詞","格助詞","接続助詞","終助詞"],"answer":"動詞","explanation":"助詞の種類は格助詞・接続助詞・副助詞・終助詞など。動詞は助詞ではない"},{"id":2096,"subject":"国語","difficulty":3,"question":"「意馬心猿」の意味は？","choices":["煩悩や欲望が乱れて制御できない状態","自由奔放な気持ち","動物のような本能","楽しくて仕方ない状態"],"answer":"煩悩や欲望が乱れて制御できない状態","explanation":"馬が暴れ猿が騒ぐように、心の中の欲望や煩悩が乱れて落ち着かない状態"},{"id":2097,"subject":"国語","difficulty":3,"question":"「一将功成りて万骨枯る」の意味は？","choices":["一人の成功の陰に多くの犠牲がある","一人の将軍で戦争に勝てる","成功するには犠牲が必要","将軍は特別な存在"],"answer":"一人の成功の陰に多くの犠牲がある","explanation":"一人の将軍が手柄を立てる陰に、無数の兵士が命を落としているという意味"},{"id":2098,"subject":"国語","difficulty":3,"question":"「螳螂の斧」の意味は？","choices":["自分の力をわきまえず強者に立ち向かう無謀さ","小さくても勇気がある","正義のために戦う","無駄な努力"],"answer":"自分の力をわきまえず強者に立ち向かう無謀さ","explanation":"カマキリが車に向かって斧（前足）を振り上げた故事から、力の差を考えない無謀さ"},{"id":2099,"subject":"国語","difficulty":3,"question":"「流れに棹さす」の正しい意味は？","choices":["物事が順調に進む方向に乗る","流れに逆らう","流れを止める","時流に反すること"],"answer":"物事が順調に進む方向に乗る","explanation":"棹で川の流れを利用して進む＝よい流れに乗って物事をうまく進めること。逆の意味に誤用されやすい"},{"id":2100,"subject":"国語","difficulty":3,"question":"「傍若無人」の意味は？","choices":["人前でも遠慮なく勝手に振る舞うこと","周りに人がいないこと","自由に行動すること","孤独であること"],"answer":"人前でも遠慮なく勝手に振る舞うこと","explanation":"傍（そば）に人が無いかのように振る舞う＝周囲を気にせず勝手に行動すること"},{"id":2101,"subject":"国語","difficulty":1,"question":"「目から鱗が落ちる」の意味は？","choices":["急に物事の真実がわかる","視界が開ける","魚の鱗が落ちる","目が良くなる"],"answer":"急に物事の真実がわかる","explanation":"それまで気づかなかったことが急にわかること。聖書が語源"},{"id":2102,"subject":"国語","difficulty":1,"question":"「馬耳東風」の意味は？","choices":["人の意見や批評を気にしないこと","東から風が吹く春","馬が東へ走ること","自由に生きること"],"answer":"人の意見や批評を気にしないこと","explanation":"馬の耳に東風（春風）が吹いても気にしないように、何を言われても聞き流すこと"},{"id":2103,"subject":"国語","difficulty":1,"question":"「水魚の交わり」と同じ意味に近いのは？","choices":["刎頸の友","犬猿の仲","付和雷同","呉越同舟"],"answer":"刎頸の友","explanation":"水魚の交わり・刎頸の友：どちらも非常に深い友情・親密な関係"},{"id":2104,"subject":"国語","difficulty":1,"question":"「走る」の謙譲語は？","choices":["走る（謙譲語なし）","お走りする","走らせていただく","駆ける"],"answer":"走る（謙譲語なし）","explanation":"「走る」には一般的な謙譲語がない。「参る」（行く・来るの謙譲語）などとは異なる"},{"id":2105,"subject":"国語","difficulty":1,"question":"「船頭多くして船山に上る」の意味は？","choices":["指図する人が多くて物事がうまくいかない","多くの人で協力すれば大変なことも達成できる","経験が大切","リーダーが必要"],"answer":"指図する人が多くて物事がうまくいかない","explanation":"指図する人（船頭）が多すぎると、船が山に上るような的外れな結果になるたとえ"},{"id":2106,"subject":"国語","difficulty":1,"question":"「足が棒になる」の意味は？","choices":["歩き疲れて足がひどく疲労する","足が動かなくなる","ひどく疲れる","長距離を歩く"],"answer":"歩き疲れて足がひどく疲労する","explanation":"棒のように硬くなるほど歩き疲れること。慣用句"},{"id":2107,"subject":"国語","difficulty":1,"question":"「人のふり見て我がふり直せ」の意味は？","choices":["他人の行動を見て自分を改める","人の真似をする","流行を追う","他人の失敗から学ぶ"],"answer":"他人の行動を見て自分を改める","explanation":"他人の良い行動・悪い行動を見て、自分の行いを振り返り改めること"},{"id":2108,"subject":"国語","difficulty":1,"question":"「山椒は小粒でもぴりりと辛い」の意味は？","choices":["小さくても優れた力を持つ","見かけで判断してはいけない","小さい者でも侮れない","努力が大切"],"answer":"小さくても優れた力を持つ","explanation":"山椒の実は小さくても強い辛みがある。小柄でも優れた才能・力を持つ人のたとえ"},{"id":2109,"subject":"国語","difficulty":1,"question":"「能ある鷹は爪を隠す」の意味は？","choices":["実力ある人は普段それをひけらかさない","謙虚に生きる","強さを隠して戦う","本当の力は見えない"],"answer":"実力ある人は普段それをひけらかさない","explanation":"本当に実力のある人は普段は力を見せびらかさない"},{"id":2110,"subject":"国語","difficulty":1,"question":"「口が軽い」の意味は？","choices":["秘密を守れずしゃべってしまう","話すのが上手","よく食べる","おしゃべり"],"answer":"秘密を守れずしゃべってしまう","explanation":"「口が軽い」＝秘密や他人の話をすぐ話してしまう、無責任によく話す"},{"id":2111,"subject":"国語","difficulty":2,"question":"「怒髪天を衝く」の意味は？","choices":["激しく怒ること","髪の毛が逆立つほど驚く","感動で泣く","力が漲る"],"answer":"激しく怒ること","explanation":"怒りで髪の毛が天を突くほど逆立つ→非常に激しく怒ること"},{"id":2112,"subject":"国語","difficulty":2,"question":"「同工異曲」の意味は？","choices":["見かけは違うが中身は同じ","同じ技術で異なるものを作る","外は同じで内容が違う","同じようで微妙に違う"],"answer":"見かけは違うが中身は同じ","explanation":"曲が異なるが演奏の技量が同じように、外見は違うが内容・本質は同じこと"},{"id":2113,"subject":"国語","difficulty":2,"question":"「枕を高くして眠る」の意味は？","choices":["安心して眠れること","贅沢な生活","ゆっくり休む","心配がない"],"answer":"安心して眠れること","explanation":"心配事がなく安心して眠れる状態。「高枕」とも言う"},{"id":2114,"subject":"国語","difficulty":2,"question":"「一を聞いて十を知る」の意味は？","choices":["少しの情報から多くを理解する","一から十まで教わる","基礎が大切","聞く力が大切"],"answer":"少しの情報から多くを理解する","explanation":"少しのことを聞いただけで全体を理解する非常に賢い人のたとえ"},{"id":2115,"subject":"国語","difficulty":2,"question":"「百折不撓」の意味は？","choices":["何度失敗してもくじけない","百回努力すること","失敗から学ぶ","粘り強く取り組む"],"answer":"何度失敗してもくじけない","explanation":"百回折れても（挫折しても）くじけない強い意志。不撓不屈と同じ意味"},{"id":2116,"subject":"国語","difficulty":2,"question":"「頭隠して尻隠さず」の意味は？","choices":["悪事や欠点の一部を隠してもばれること","完全に隠れること","中途半端な努力","嘘をつくこと"],"answer":"悪事や欠点の一部を隠してもばれること","explanation":"頭を隠しても尻が出ている＝一部を隠しても全体は見えており、隠しきれないたとえ"},{"id":2117,"subject":"国語","difficulty":2,"question":"「縁の下の力持ち」の意味は？","choices":["人目につかない場所で努力・支える人","力持ちの人","裏で支配する人","隠れた実力者"],"answer":"人目につかない場所で努力・支える人","explanation":"床下で建物を支えるように、目立たない場所で他者を支え尽力する人"},{"id":2118,"subject":"国語","difficulty":2,"question":"「杓子定規」の意味は？","choices":["何でも一つの基準に当てはめる融通のなさ","正確に計る","几帳面なこと","規則を守ること"],"answer":"何でも一つの基準に当てはめる融通のなさ","explanation":"杓子（しゃもじ）の柄を定規代わりにするように、一つの基準を何にでも当てはめる融通のなさ"},{"id":2119,"subject":"国語","difficulty":2,"question":"「春秋に富む」の意味は？","choices":["若くて将来が長い","季節が豊か","経験が豊富","時間がたっぷりある"],"answer":"若くて将来が長い","explanation":"春と秋（年月）がたくさんある＝若く将来の可能性が多い"},{"id":2120,"subject":"国語","difficulty":2,"question":"「勇猛果敢」の意味は？","choices":["勇ましく大胆に行動すること","怖いもの知らず","無謀なこと","積極的に行動すること"],"answer":"勇ましく大胆に行動すること","explanation":"勇猛（勇ましく強い）果敢（思い切りよく大胆）＝勇ましく決断力があること"},{"id":2121,"subject":"国語","difficulty":3,"question":"「管鮑の交わり」の意味は？","choices":["利益を超えた深い友情","互いに助け合う関係","古くからの友人","信頼できる仲間"],"answer":"利益を超えた深い友情","explanation":"中国の管仲と鮑叔牙の友情の故事から。利益を超えた深い友情のたとえ"},{"id":2122,"subject":"国語","difficulty":3,"question":"「鶏鳴狗盗」の意味は？","choices":["つまらない技でも役立つことがある","鶏のように早起きする","小さな技術者","卑しい手段"],"answer":"つまらない技でも役立つことがある","explanation":"鶏の鳴き真似・犬のように盗む者でも孟嘗君の危機を救った故事から"},{"id":2123,"subject":"国語","difficulty":3,"question":"「一期一会」の意味は？","choices":["生涯に一度の出会いとして大切にする","一回の出会い","ただ一度の機会","運命的な出会い"],"answer":"生涯に一度の出会いとして大切にする","explanation":"茶道の言葉。今のこの出会いは一生に一度のものとして心を込めること"},{"id":2124,"subject":"国語","difficulty":3,"question":"「薔薇」の読み方は？","choices":["ばら","そうび","ばらか","さら"],"answer":"ばら","explanation":"薔薇（ばら）は難読漢字の代表。音読みは「しょうび」とも読む"},{"id":2125,"subject":"国語","difficulty":3,"question":"「矍鑠」の意味は？","choices":["老人が元気で若々しいこと","急いで行動すること","驚いて慌てること","目が輝くこと"],"answer":"老人が元気で若々しいこと","explanation":"矍鑠（かくしゃく）：高齢でも気力・体力が衰えず元気なようす"},{"id":2126,"subject":"国語","difficulty":1,"question":"「腹を割って話す」の意味は？","choices":["本音で率直に話す","大声で話す","長時間話す","重要なことを話す"],"answer":"本音で率直に話す","explanation":"腹（心の中）を割って見せるように、本音・本心を率直に話すこと"},{"id":2127,"subject":"国語","difficulty":1,"question":"「のれんに腕押し」の意味は？","choices":["手ごたえや効果がない","努力しても無駄","強い者には勝てない","柔軟に対処する"],"answer":"手ごたえや効果がない","explanation":"のれんに腕で押してもふわりとなびくだけで手ごたえがないたとえ"},{"id":2128,"subject":"国語","difficulty":1,"question":"「後の祭り」の意味は？","choices":["手遅れで役に立たない","お祭りの後","終わったことを後悔する","遅すぎること"],"answer":"手遅れで役に立たない","explanation":"祭りが終わったあとに山車を出しても意味がない→時機を逸して手遅れになること"},{"id":2129,"subject":"国語","difficulty":1,"question":"「背水の陣」の意味は？","choices":["もう後がない覚悟で全力を尽くす","水辺に陣を張る","逃げ場のない状況","最後の手段"],"answer":"もう後がない覚悟で全力を尽くす","explanation":"川を背にして陣を張り退路を絶った韓信の故事から、必死の覚悟で取り組む状況"},{"id":2130,"subject":"国語","difficulty":1,"question":"「うなぎの寝床」の意味は？","choices":["間口が狭くて奥行きが長い土地・建物","狭くて暗い場所","住みにくい場所","細長い形"],"answer":"間口が狭くて奥行きが長い土地・建物","explanation":"うなぎが寝るような細長い空間＝間口が狭く奥行きが深い土地や建物"},{"id":2131,"subject":"国語","difficulty":2,"question":"「磨斧作針」の意味は？","choices":["根気強く努力すれば必ず成功する","無駄な努力をする","強い意志を持つ","長い時間をかける"],"answer":"根気強く努力すれば必ず成功する","explanation":"斧を磨いて針を作るという根気強い努力から、継続した努力が成功を生むたとえ"},{"id":2132,"subject":"国語","difficulty":2,"question":"「臥竜鳳雛」の意味は？","choices":["まだ世に出ていない優れた人物","眠れる獅子","隠れた才能","将来有望な若者"],"answer":"まだ世に出ていない優れた人物","explanation":"臥竜（伏せた龍）・鳳雛（鳳凰のひな）＝まだ才能を発揮していない英雄・才人"},{"id":2133,"subject":"国語","difficulty":2,"question":"「二律背反」の意味は？","choices":["二つの命題が互いに矛盾して両立しない","相反する二つの考え","どちらも正しい","どちらも間違い"],"answer":"二つの命題が互いに矛盾して両立しない","explanation":"アンチノミーとも言う。二つの主張が互いに矛盾し、どちらも正しくも間違いとも言えない状態"},{"id":2134,"subject":"国語","difficulty":2,"question":"「泰然自若」の意味は？","choices":["落ち着いて動じないこと","大きな自信を持つ","悠然としている","堂々としている"],"answer":"落ち着いて動じないこと","explanation":"泰然（ゆったりと落ち着いた様子）自若（平常心を保つ）＝どんな場面でも落ち着いていること"},{"id":2135,"subject":"国語","difficulty":2,"question":"「権謀術数」の意味は？","choices":["人を欺くさまざまな策略","賢い計画","権力を使う方法","複雑な計算"],"answer":"人を欺くさまざまな策略","explanation":"権謀（その場しのぎの策略）術数（種々の策略）＝人を巧みに操る様々な策略"},{"id":2136,"subject":"国語","difficulty":3,"question":"「邯鄲の夢」の意味は？","choices":["人生のはかなさ","長い夢","努力の大切さ","失敗の教訓"],"answer":"人生のはかなさ","explanation":"邯鄲で一炊の夢を見る間に栄華の一生を体験した故事から、人生の短さ・はかなさ"},{"id":2137,"subject":"国語","difficulty":3,"question":"「百家争鳴」の意味は？","choices":["多くの学者が自由に意見を述べること","大勢が口論すること","様々な意見が飛び交うこと","議論が盛んなこと"],"answer":"多くの学者が自由に意見を述べること","explanation":"百家（多くの学派）争鳴（競って鳴く）＝多くの学者・思想家が自由に意見を述べ合うこと"},{"id":2138,"subject":"国語","difficulty":3,"question":"「寸鉄人を刺す」の意味は？","choices":["短い言葉が人の急所をつく","鋭い刃物","厳しい批評","わずかなことで傷つける"],"answer":"短い言葉が人の急所をつく","explanation":"小さな武器（寸鉄）でも人を刺せるように、短い言葉が人の核心・急所をつくこと"},{"id":2139,"subject":"国語","difficulty":3,"question":"「瓢箪から駒」の意味は？","choices":["意外なところから意外なものが出てくる","嘘から本当になる","偶然の幸運","不可能が可能になる"],"answer":"意外なところから意外なものが出てくる","explanation":"瓢箪（小さな容器）から馬が出るはずがないように、意外なところから意外なものが生じること"},{"id":2140,"subject":"国語","difficulty":3,"question":"「孟母三遷」の意味は？","choices":["子供の教育のために環境が大切","母の愛","引越しを繰り返す","住む場所が人を変える"],"answer":"子供の教育のために環境が大切","explanation":"孟子の母が息子の教育のために3度引越した故事から、子供の教育に環境が大切であること"},{"id":2141,"subject":"国語","difficulty":1,"question":"「猫に小判」の意味は？","choices":["価値がわからない相手に貴重なものを与えても無意味","宝の持ち腐れ","もったいない","無駄遣い"],"answer":"価値がわからない相手に貴重なものを与えても無意味","explanation":"猫に小判（お金）を与えても価値がわからない＝価値を理解できない相手への贈り物は無意味"},{"id":2142,"subject":"国語","difficulty":1,"question":"「風前の灯」の意味は？","choices":["非常に危うい状態","消えそうなこと","かろうじて続いている","頼りない"],"answer":"非常に危うい状態","explanation":"風の前の灯火はいつ消えるかわからない＝命や物事が非常に危うい状態"},{"id":2143,"subject":"国語","difficulty":1,"question":"「虎穴に入らずんば虎子を得ず」の意味は？","choices":["危険を冒さなければ大きな成果は得られない","勇気が大切","慎重に行動すること","強い者には近づかない"],"answer":"危険を冒さなければ大きな成果は得られない","explanation":"虎の穴に入る危険を冒さなければ虎の子は取れない＝リスクなしに成果は得られない"},{"id":2144,"subject":"国語","difficulty":1,"question":"「肝に銘じる」の意味は？","choices":["心に深く刻んで忘れない","固く決意する","強く感動する","深く反省する"],"answer":"心に深く刻んで忘れない","explanation":"肝（心の深いところ）に銘じる（刻む）＝しっかり心に刻んで絶対に忘れない"},{"id":2145,"subject":"国語","difficulty":1,"question":"「花より団子」の意味は？","choices":["風流より実利を好む","花は食べられない","見た目より中身","実用的なものがよい"],"answer":"風流より実利を好む","explanation":"花見より団子（食べ物）の方が好き＝風流・美しさより実際の利益・実用を好むたとえ"},{"id":2146,"subject":"国語","difficulty":2,"question":"「文章の主語」とは何か？","choices":["述語が表す動作・状態の主体","文の終わりにある言葉","修飾する言葉","接続する言葉"],"answer":"述語が表す動作・状態の主体","explanation":"主語は「何が（何は）」に当たる文の成分。述語（どうする・どんな）の主体を表す"},{"id":2147,"subject":"国語","difficulty":2,"question":"「形容詞」と「形容動詞」の違いは？","choices":["形容詞は語尾が「い」・形容動詞は「だ・な」で終わる","形容詞は名詞を修飾・形容動詞は動詞を修飾","どちらも同じ","形容詞は和語・形容動詞は漢語"],"answer":"形容詞は語尾が「い」・形容動詞は「だ・な」で終わる","explanation":"形容詞：「美しい・高い」など語尾が「い」。形容動詞：「静かだ・きれいな」など"},{"id":2148,"subject":"国語","difficulty":2,"question":"「逆接」の接続詞はどれ？","choices":["しかし","また","そして","なぜなら"],"answer":"しかし","explanation":"逆接の接続詞：しかし・でも・ところが・けれども。前の内容と反対のことを続ける"},{"id":2149,"subject":"国語","difficulty":2,"question":"「比喩（ひゆ）」の種類でないものは？","choices":["体言止め","直喩","隠喩","擬人法"],"answer":"体言止め","explanation":"比喩の種類：直喩（〜のように）・隠喩（〜は〜だ）・擬人法（物を人に見立てる）。体言止めは別の表現技法"},{"id":2150,"subject":"国語","difficulty":2,"question":"「呼応の副詞」の例として正しいのは？","choices":["決して〜ない","とても〜","すぐに〜","ゆっくり〜"],"answer":"決して〜ない","explanation":"呼応の副詞は特定の語（打ち消し等）と必ず呼応する。「決して〜ない」「まるで〜ようだ」など"},{"id":3001,"subject":"社会","difficulty":1,"question":"北海道の道庁所在地は？","choices":["札幌市","函館市","旭川市","釧路市"],"answer":"札幌市","explanation":"北海道の道庁所在地は札幌市。北海道は日本最大の都道府県"},{"id":3002,"subject":"社会","difficulty":1,"question":"日本の国旗の色は？","choices":["白と赤","赤と白と青","白と青","赤と白"],"answer":"白と赤","explanation":"日本の国旗（日の丸）は白地に赤い円。「白地に赤く日の丸染めて」"},{"id":3003,"subject":"社会","difficulty":1,"question":"日本一広い都道府県は？","choices":["北海道","岩手県","福島県","長野県"],"answer":"北海道","explanation":"北海道は約83,000km²で日本最大。2位は岩手県"},{"id":3004,"subject":"社会","difficulty":1,"question":"日本で一番人口が多い都市は？","choices":["東京23区（特別区）","横浜市","大阪市","名古屋市"],"answer":"東京23区（特別区）","explanation":"東京23区は人口約1000万人。次いで横浜市、大阪市"},{"id":3005,"subject":"社会","difficulty":1,"question":"日本の国会は何院制？","choices":["二院制（衆議院と参議院）","一院制","三院制","四院制"],"answer":"二院制（衆議院と参議院）","explanation":"日本の国会は衆議院と参議院の二院制。衆議院が優越する規定がある"},{"id":3006,"subject":"社会","difficulty":1,"question":"日本アルプスと呼ばれる山脈はいくつ？","choices":["3つ（飛騨・木曽・赤石）","2つ","4つ","1つ"],"answer":"3つ（飛騨・木曽・赤石）","explanation":"飛騨山脈（北アルプス）・木曽山脈（中央アルプス）・赤石山脈（南アルプス）の3つ"},{"id":3007,"subject":"社会","difficulty":1,"question":"りんごの生産量が日本一の都道府県は？","choices":["青森県","長野県","岩手県","山形県"],"answer":"青森県","explanation":"青森県が約6割を生産。ふじ・王林などのブランドが有名"},{"id":3008,"subject":"社会","difficulty":1,"question":"日本で最も南にある都道府県は？","choices":["沖縄県","鹿児島県","宮崎県","高知県"],"answer":"沖縄県","explanation":"沖縄県は北緯24〜27度。最南端の波照間島は北緯24度。"},{"id":3009,"subject":"社会","difficulty":1,"question":"日本の内閣総理大臣は誰が選ぶ？","choices":["国会議員（国会）","国民の直接選挙","天皇","最高裁判所"],"answer":"国会議員（国会）","explanation":"内閣総理大臣は国会の議決で指名される。衆議院で過半数を持つ党の党首が選ばれることが多い"},{"id":3010,"subject":"社会","difficulty":1,"question":"税金のうち「消費税」はどの税金？","choices":["国税かつ間接税","地方税かつ直接税","国税かつ直接税","地方税かつ間接税"],"answer":"国税かつ間接税","explanation":"消費税は国税。消費者が負担し事業者が納付する間接税"},{"id":3011,"subject":"社会","difficulty":1,"question":"日本で最も西にある県は？","choices":["沖縄県","長崎県","鹿児島県","山口県"],"answer":"沖縄県","explanation":"日本最西端は沖縄県・与那国島（東経122度）"},{"id":3012,"subject":"社会","difficulty":1,"question":"「やませ」はどの方向から吹く風？","choices":["北東","南西","北西","南東"],"answer":"北東","explanation":"やませは北東から吹く冷たい風。夏に東北地方の太平洋側に吹き、冷害の原因になる"},{"id":3013,"subject":"社会","difficulty":1,"question":"世界最大の大陸は？","choices":["ユーラシア大陸","アフリカ大陸","北アメリカ大陸","南アメリカ大陸"],"answer":"ユーラシア大陸","explanation":"ユーラシア大陸はアジアとヨーロッパを合わせた世界最大の大陸"},{"id":3014,"subject":"社会","difficulty":1,"question":"日本国憲法が施行された年は？","choices":["1947年","1945年","1946年","1948年"],"answer":"1947年","explanation":"1946年11月3日公布、1947年5月3日施行。5月3日は憲法記念日"},{"id":3015,"subject":"社会","difficulty":1,"question":"稲作が日本に伝わった時代は？","choices":["弥生時代","縄文時代","古墳時代","飛鳥時代"],"answer":"弥生時代","explanation":"弥生時代（約2300年前）に大陸から稲作が伝わった。縄文時代は狩猟・採集が中心"},{"id":3016,"subject":"社会","difficulty":2,"question":"日本三大急流はどれ？","choices":["富士川・最上川・球磨川","信濃川・利根川・石狩川","天竜川・木曽川・長良川","吉野川・四万十川・仁淀川"],"answer":"富士川・最上川・球磨川","explanation":"日本三大急流は富士川（静岡）・最上川（山形）・球磨川（熊本）"},{"id":3017,"subject":"社会","difficulty":2,"question":"室町幕府を開いたのはだれ？","choices":["足利尊氏","足利義満","後醍醐天皇","新田義貞"],"answer":"足利尊氏","explanation":"1336年、足利尊氏が京都に室町幕府を開いた。3代・義満の時に全国統一"},{"id":3018,"subject":"社会","difficulty":2,"question":"明治維新の始まりとされる年は？","choices":["1868年","1853年","1871年","1889年"],"answer":"1868年","explanation":"1868年（慶応4年/明治元年）、明治天皇が王政復古の大号令を出した"},{"id":3019,"subject":"社会","difficulty":2,"question":"日本の三権分立で「行政」を担うのは？","choices":["内閣","国会","裁判所","天皇"],"answer":"内閣","explanation":"三権分立：立法（国会）・行政（内閣）・司法（裁判所）。互いに独立して監視する"},{"id":3020,"subject":"社会","difficulty":2,"question":"九州地方に含まれない県は？","choices":["山口県","福岡県","大分県","宮崎県"],"answer":"山口県","explanation":"山口県は中国地方。九州地方は福岡・佐賀・長崎・熊本・大分・宮崎・鹿児島の7県＋沖縄"},{"id":3021,"subject":"社会","difficulty":2,"question":"「四大公害病」に含まれないのは？","choices":["スモン病","水俣病","イタイイタイ病","四日市ぜんそく"],"answer":"スモン病","explanation":"四大公害病は水俣病・新潟水俣病・イタイイタイ病・四日市ぜんそく。スモンは公害病ではない"},{"id":3022,"subject":"社会","difficulty":2,"question":"「南蛮貿易」で日本に初めて鉄砲を持ち込んだのは？","choices":["ポルトガル人","スペイン人","オランダ人","イギリス人"],"answer":"ポルトガル人","explanation":"1543年、種子島にポルトガル人が漂着し鉄砲を伝えた（種子島銃）"},{"id":3023,"subject":"社会","difficulty":2,"question":"日本国憲法の三大原則は？","choices":["国民主権・基本的人権の尊重・平和主義","自由・平等・博愛","民主主義・資本主義・平和主義","主権・人権・民主主義"],"answer":"国民主権・基本的人権の尊重・平和主義","explanation":"日本国憲法の三大原則：国民主権・基本的人権の尊重・平和主義（戦争放棄）"},{"id":3024,"subject":"社会","difficulty":2,"question":"「シラス台地」があるのはどこ？","choices":["鹿児島県・宮崎県","青森県・岩手県","北海道","高知県・愛媛県"],"answer":"鹿児島県・宮崎県","explanation":"シラス台地は鹿児島・宮崎に広がる火山灰土の台地。水はけよく稲作に不向き、畑作や畜産が盛ん"},{"id":3025,"subject":"社会","difficulty":2,"question":"「フォッサマグナ」とは何？","choices":["日本列島を東西に分ける大きな溝","日本最大の断層","富士山の火口","日本海溝の別名"],"answer":"日本列島を東西に分ける大きな溝","explanation":"フォッサマグナ（大きな溝）は糸魚川〜静岡構造線を西縁とする地溝帯で、東日本と西日本を分ける"},{"id":3026,"subject":"社会","difficulty":2,"question":"「地租改正」（明治6年）で税を払うようになったのは？","choices":["土地の所有者が地価の3%を現金で","農民が収穫高の割合を米で","国民全員が一定額を","地主だけが土地面積に応じて"],"answer":"土地の所有者が地価の3%を現金で","explanation":"地租改正：土地の価格（地価）の3%を現金で納税。江戸時代の年貢（収穫物）から変わった"},{"id":3027,"subject":"社会","difficulty":2,"question":"「版籍奉還」（1869年）とは？","choices":["大名が土地と人民を天皇に返したこと","藩を廃止して県を設置したこと","士農工商の身分制度を廃止したこと","武士の特権を廃止したこと"],"answer":"大名が土地と人民を天皇に返したこと","explanation":"1869年、大名が藩の土地（版）と人民（籍）を天皇に返還した。翌年の廃藩置県につながる"},{"id":3028,"subject":"社会","difficulty":2,"question":"「琉球処分」とは？","choices":["琉球王国を廃止して沖縄県とした","沖縄を外国に売った","琉球との戦争","沖縄の基地問題"],"answer":"琉球王国を廃止して沖縄県とした","explanation":"1879年、明治政府が琉球王国を廃止し沖縄県を設置した"},{"id":3029,"subject":"社会","difficulty":2,"question":"「農地改革」（1946年）の目的は？","choices":["地主から農地を買い上げ小作農に安く売る","農業の機械化を進める","農産物の輸出を増やす","食料不足を解消する"],"answer":"地主から農地を買い上げ小作農に安く売る","explanation":"GHQの指導で実施。大地主の土地を政府が買い上げ、小作農に安価で売り自作農を増やした"},{"id":3030,"subject":"社会","difficulty":2,"question":"日本で最も面積が小さい都道府県は？","choices":["香川県","大阪府","東京都","神奈川県"],"answer":"香川県","explanation":"香川県は約1877km²で日本最小。うどんの産地として有名"},{"id":3031,"subject":"社会","difficulty":3,"question":"「富岡製糸場」はどこにある？","choices":["群馬県","長野県","埼玉県","栃木県"],"answer":"群馬県","explanation":"富岡製糸場は群馬県富岡市。1872年設立の官営工場で世界遺産に登録されている"},{"id":3032,"subject":"社会","difficulty":3,"question":"「廃藩置県」は何年？","choices":["1871年","1868年","1873年","1869年"],"answer":"1871年","explanation":"1871年、明治政府が藩を廃止して府・県を設置。地方支配を中央集権化した"},{"id":3033,"subject":"社会","difficulty":3,"question":"「ポーツマス条約」で日本が得たものは？","choices":["南樺太と遼東半島の租借権","朝鮮半島全土","満州全土","台湾と澎湖諸島"],"answer":"南樺太と遼東半島の租借権","explanation":"1905年、日露戦争後のポーツマス条約で南樺太・関東州租借権・東清鉄道南部の利権を得た"},{"id":3034,"subject":"社会","difficulty":3,"question":"「五・一五事件」（1932年）で暗殺されたのは？","choices":["犬養毅首相","浜口雄幸首相","原敬首相","齋藤実首相"],"answer":"犬養毅首相","explanation":"1932年5月15日、海軍青年将校らが首相官邸を襲撃し犬養毅首相を暗殺した"},{"id":3035,"subject":"社会","difficulty":3,"question":"「国際連盟」から日本が脱退した年は？","choices":["1933年","1931年","1937年","1939年"],"answer":"1933年","explanation":"満州事変への批判を受け、1933年に日本は国際連盟を脱退。同年ドイツも脱退"},{"id":3036,"subject":"社会","difficulty":3,"question":"「サンフランシスコ平和条約」が締結された年は？","choices":["1951年","1945年","1952年","1956年"],"answer":"1951年","explanation":"1951年9月調印、1952年4月発効。日本は主権を回復し独立国となった"},{"id":3037,"subject":"社会","difficulty":3,"question":"「田中角栄」内閣が実現したのは？","choices":["日中国交正常化","日韓基本条約","日米安保条約改定","沖縄返還"],"answer":"日中国交正常化","explanation":"1972年、田中角栄首相が訪中し日中共同声明を発表。日中国交正常化を実現した"},{"id":3038,"subject":"社会","difficulty":3,"question":"「消費税」が初めて導入されたのはいつ？","choices":["1989年（3%）","1997年（5%）","1979年","1991年"],"answer":"1989年（3%）","explanation":"1989年（平成元年）、竹下登内閣のもとで消費税3%が導入された"},{"id":3039,"subject":"社会","difficulty":3,"question":"「非核三原則」の内容は？","choices":["持たず・作らず・持ち込ませず","作らず・売らず・使わず","持たず・使わず・作らず","輸入せず・輸出せず・使わず"],"answer":"持たず・作らず・持ち込ませず","explanation":"佐藤栄作首相が表明した核兵器に関する三原則。1971年に国会で決議された"},{"id":3040,"subject":"社会","difficulty":3,"question":"「石油危機（オイルショック）」が起きた年は？","choices":["1973年","1968年","1979年のみ","1971年"],"answer":"1973年","explanation":"1973年の第四次中東戦争をきっかけにOAPECが石油禁輸・値上げを実施。日本経済に大打撃"},{"id":3041,"subject":"社会","difficulty":1,"question":"日本の最高法規（一番上の法律）は？","choices":["日本国憲法","民法","刑法","国会法"],"answer":"日本国憲法","explanation":"日本国憲法は最高法規。他のすべての法律は憲法に反してはならない"},{"id":3042,"subject":"社会","difficulty":1,"question":"世界最長の川は？","choices":["ナイル川","アマゾン川","ミシシッピ川","長江"],"answer":"ナイル川","explanation":"ナイル川（約6650km）がアフリカを流れる世界最長の川"},{"id":3043,"subject":"社会","difficulty":1,"question":"日本で一番深い湖は？","choices":["田沢湖","支笏湖","洞爺湖","摩周湖"],"answer":"田沢湖","explanation":"田沢湖（秋田県）は最大水深423mで日本一深い湖"},{"id":3044,"subject":"社会","difficulty":1,"question":"「元号」を現在使っているのはどの国？","choices":["日本だけ","日本と中国","日本と韓国","アジア全体"],"answer":"日本だけ","explanation":"元号を現在も使用しているのは世界で日本だけ。令和は2019年から"},{"id":3045,"subject":"社会","difficulty":1,"question":"日本の選挙権（投票できる年齢）は？","choices":["18歳以上","20歳以上","25歳以上","16歳以上"],"answer":"18歳以上","explanation":"2016年に改正され18歳以上に引き下げられた。被選挙権は衆議院25歳以上、参議院30歳以上"},{"id":3046,"subject":"社会","difficulty":2,"question":"「条例」を制定できるのは？","choices":["地方公共団体（都道府県・市区町村）","国会","内閣","各省庁"],"answer":"地方公共団体（都道府県・市区町村）","explanation":"条例は地方公共団体が地域の実情に応じて制定する法。国の法律の範囲内で制定できる"},{"id":3047,"subject":"社会","difficulty":2,"question":"日本の食料自給率（カロリーベース）はおよそ？","choices":["約38%","約60%","約80%","約20%"],"answer":"約38%","explanation":"日本の食料自給率はカロリーベースで約38%（2023年度）。先進国の中では低い水準"},{"id":3048,"subject":"社会","difficulty":2,"question":"「地中海性気候」の特徴は？","choices":["夏乾燥・冬雨","夏雨・冬乾燥","一年中雨が多い","一年中乾燥している"],"answer":"夏乾燥・冬雨","explanation":"地中海性気候は夏に乾燥し冬に雨が多い。ぶどう・オリーブの栽培に適している"},{"id":3049,"subject":"社会","difficulty":2,"question":"「太平洋戦争」が始まったのはいつ？","choices":["1941年12月8日","1939年9月1日","1937年7月7日","1945年8月15日"],"answer":"1941年12月8日","explanation":"1941年12月8日、日本軍がハワイの真珠湾を奇襲攻撃。太平洋戦争が始まった"},{"id":3050,"subject":"社会","difficulty":2,"question":"「グレートバリアリーフ」はどこにある？","choices":["オーストラリア","ブラジル","フィリピン","インドネシア"],"answer":"オーストラリア","explanation":"グレートバリアリーフはオーストラリア北東部の世界最大のサンゴ礁。世界遺産"},{"id":3051,"subject":"社会","difficulty":3,"question":"「大政奉還」（1867年）を行ったのは？","choices":["徳川慶喜","徳川家茂","徳川慶頼","徳川斉昭"],"answer":"徳川慶喜","explanation":"1867年10月、15代将軍・徳川慶喜が政権を朝廷に返上。江戸幕府の終焉"},{"id":3052,"subject":"社会","difficulty":3,"question":"「神聖ローマ帝国」を滅ぼしたのは？","choices":["ナポレオン（フランス）","プロイセン","オーストリア","ロシア"],"answer":"ナポレオン（フランス）","explanation":"1806年、ナポレオンがライン同盟を結成し神聖ローマ皇帝に退位を迫り帝国は消滅"},{"id":3053,"subject":"社会","difficulty":3,"question":"「プラザ合意」（1985年）の内容は？","choices":["ドル高是正のため各国が協調介入することを合意","石油価格の安定","貿易摩擦の解消","為替の自由化"],"answer":"ドル高是正のため各国が協調介入することを合意","explanation":"1985年、先進5か国がドル安に誘導することで合意。日本では急激な円高が進んだ"},{"id":3054,"subject":"社会","difficulty":3,"question":"「日米和親条約」（1854年）で開港した港は？","choices":["下田と箱館（函館）","横浜と神戸","長崎と新潟","大阪と江戸"],"answer":"下田と箱館（函館）","explanation":"ペリー来航後に締結。下田（静岡）と箱館（北海道）を開港し、鎖国が終わった"},{"id":3055,"subject":"社会","difficulty":3,"question":"「金融ビッグバン」とは？","choices":["1990年代後半の日本の金融自由化改革","バブル経済の崩壊","銀行の大規模合併","外国資本の参入規制"],"answer":"1990年代後半の日本の金融自由化改革","explanation":"橋本龍太郎内閣が1996年に提唱した金融制度の大規模な規制緩和・自由化政策"},{"id":3056,"subject":"社会","difficulty":1,"question":"日本列島に属する島の数はおよそ？","choices":["約14000島","約1000島","約5000島","約100000島"],"answer":"約14000島","explanation":"日本の島の数は約14000（国土交通省）。有人島は約420島"},{"id":3057,"subject":"社会","difficulty":1,"question":"「衆議院」の任期は？","choices":["4年","6年","3年","5年"],"answer":"4年","explanation":"衆議院議員の任期は4年。ただし解散があれば任期前に選挙になる。参議院は6年"},{"id":3058,"subject":"社会","difficulty":1,"question":"日本の国花は？","choices":["桜と菊","桜のみ","菊のみ","梅"],"answer":"桜と菊","explanation":"法律上の規定はないが、桜（国民の花）と菊（皇室の紋章）が国花とされる"},{"id":3059,"subject":"社会","difficulty":1,"question":"世界最大の砂漠は？","choices":["サハラ砂漠","アラビア砂漠","ゴビ砂漠","タクラマカン砂漠"],"answer":"サハラ砂漠","explanation":"サハラ砂漠はアフリカ北部に広がる約900万km²の世界最大の砂漠"},{"id":3060,"subject":"社会","difficulty":1,"question":"日本の「三権分立」で「立法」を担うのは？","choices":["国会","内閣","裁判所","天皇"],"answer":"国会","explanation":"三権分立：立法（国会）・行政（内閣）・司法（裁判所）"},{"id":3061,"subject":"社会","difficulty":2,"question":"「NATO（北大西洋条約機構）」の本部がある都市は？","choices":["ブリュッセル","ニューヨーク","ロンドン","パリ"],"answer":"ブリュッセル","explanation":"NATOの本部はベルギーのブリュッセル。1949年創設の西側諸国の軍事同盟"},{"id":3062,"subject":"社会","difficulty":2,"question":"「ザ・グレート・ウォール（万里の長城）」を最初に大規模に建設したのは？","choices":["秦の始皇帝","漢の武帝","唐の太宗","明の永楽帝"],"answer":"秦の始皇帝","explanation":"紀元前3世紀、始皇帝が北方民族対策として既存の城壁をつないで万里の長城を建設"},{"id":3063,"subject":"社会","difficulty":2,"question":"日本の「政令指定都市」は何市あるか？（2024年現在）","choices":["20市","10市","15市","25市"],"answer":"20市","explanation":"2024年現在、20の政令指定都市がある。人口50万人以上が目安"},{"id":3064,"subject":"社会","difficulty":2,"question":"「インダス文明」が栄えた場所は？","choices":["現在のパキスタン・インド西部","現在の中国","現在のイラク","現在のエジプト"],"answer":"現在のパキスタン・インド西部","explanation":"インダス文明は紀元前2600〜1800年頃。モヘンジョダロ・ハラッパなどの遺跡が有名"},{"id":3065,"subject":"社会","difficulty":2,"question":"「バスコ・ダ・ガマ」が達成したのは？","choices":["ヨーロッパからインドへの航路開拓","アメリカ大陸の発見","世界一周","オーストラリアの発見"],"answer":"ヨーロッパからインドへの航路開拓","explanation":"1498年、ポルトガルのバスコ・ダ・ガマがアフリカ南端を回りインドに到達した"},{"id":3066,"subject":"社会","difficulty":3,"question":"「徴兵令」が出されたのはいつ？","choices":["1873年","1868年","1871年","1876年"],"answer":"1873年","explanation":"1873年（明治6年）、山縣有朋が中心となって徴兵令を実施。満20歳の男子に兵役義務"},{"id":3067,"subject":"社会","difficulty":3,"question":"「シベリア出兵」（1918年）の目的は？","choices":["ロシア革命への干渉とシベリア利権確保","日露戦争の領土回収","ソ連との同盟","石油資源の確保"],"answer":"ロシア革命への干渉とシベリア利権確保","explanation":"1918年、日本・米英などがロシア革命（ボリシェビキ）に干渉するためシベリアに出兵"},{"id":3068,"subject":"社会","difficulty":3,"question":"「東京オリンピック」が最初に開催されたのはいつ？","choices":["1964年","1940年","1968年","1972年"],"answer":"1964年","explanation":"1964年10月に東京オリンピック開催。日本初の五輪で新幹線・首都高開通と同時期"},{"id":3069,"subject":"社会","difficulty":3,"question":"「1ドル360円の固定相場制」が終わったのはいつ？","choices":["1971年（ニクソンショック）","1985年（プラザ合意）","1973年","1979年"],"answer":"1971年（ニクソンショック）","explanation":"1971年、ニクソン米大統領がドルと金の交換停止を宣言。固定相場制が崩壊"},{"id":3070,"subject":"社会","difficulty":3,"question":"「自衛隊」が創設されたのはいつ？","choices":["1954年","1950年","1945年","1960年"],"answer":"1954年","explanation":"1954年（昭和29年）、防衛庁・自衛隊が発足。朝鮮戦争後のGHQの要求で1950年に警察予備隊が発足したのが前身"},{"id":3071,"subject":"社会","difficulty":1,"question":"「G7（主要7か国）」に含まれない国は？","choices":["中国","日本","ドイツ","カナダ"],"answer":"中国","explanation":"G7は日本・アメリカ・イギリス・フランス・ドイツ・イタリア・カナダの7か国"},{"id":3072,"subject":"社会","difficulty":1,"question":"「緯度0度」の線は？","choices":["赤道","本初子午線","北緯23.5度","南緯23.5度"],"answer":"赤道","explanation":"赤道は地球を南北に二等分する緯度0度の線。経度0度は本初子午線（ロンドン郊外を通る）"},{"id":3073,"subject":"社会","difficulty":1,"question":"「ユニセフ（UNICEF）」は何のための機関？","choices":["子供の支援","貿易促進","環境保護","平和維持"],"answer":"子供の支援","explanation":"ユニセフは国連児童基金。世界の子供たちの健康・教育・保護などを支援する国連機関"},{"id":3074,"subject":"社会","difficulty":1,"question":"「参議院」議員の任期は？","choices":["6年","4年","3年","8年"],"answer":"6年","explanation":"参議院議員の任期は6年で3年ごとに半数が改選される。衆議院（4年）より長い"},{"id":3075,"subject":"社会","difficulty":1,"question":"「世界遺産」を登録するのは？","choices":["ユネスコ（UNESCO）","ユニセフ","国連安保理","WHO"],"answer":"ユネスコ（UNESCO）","explanation":"ユネスコ（国連教育科学文化機関）が世界遺産を登録・管理している"},{"id":3076,"subject":"社会","difficulty":2,"question":"「阿蘇山」がある都道府県は？","choices":["熊本県","大分県","鹿児島県","宮崎県"],"answer":"熊本県","explanation":"阿蘇山は熊本県にある世界最大級のカルデラ（火山の噴火でできた巨大なくぼ地）を持つ活火山"},{"id":3077,"subject":"社会","difficulty":2,"question":"「豊臣秀吉」が行った政策でないものは？","choices":["参勤交代","太閤検地","刀狩り","朝鮮出兵"],"answer":"参勤交代","explanation":"参勤交代は徳川家光が制度化。太閤検地・刀狩り・朝鮮出兵（文禄・慶長の役）は秀吉の政策"},{"id":3078,"subject":"社会","difficulty":2,"question":"「インカ帝国」はどこにあった？","choices":["南アメリカ（ペルー中心）","メキシコ","中央アメリカ","ブラジル"],"answer":"南アメリカ（ペルー中心）","explanation":"インカ帝国は15〜16世紀に南米アンデス山脈沿いに栄えた。スペインに滅ぼされた"},{"id":3079,"subject":"社会","difficulty":2,"question":"「米騒動」が起きた年は？","choices":["1918年","1905年","1923年","1931年"],"answer":"1918年","explanation":"1918年、米価高騰に怒った民衆が米屋などを襲う米騒動が全国に拡大。寺内内閣が総辞職"},{"id":3080,"subject":"社会","difficulty":2,"question":"「リアス式海岸」がある地域として正しいのは？","choices":["三陸海岸（岩手・宮城）","太平洋ベルト","関東平野沿岸","大阪湾"],"answer":"三陸海岸（岩手・宮城）","explanation":"リアス式海岸は山が沈降して海に沈んだ複雑な入り江の海岸。三陸・若狭湾・志摩半島など"},{"id":3081,"subject":"社会","difficulty":3,"question":"「吉田茂」が貢献した条約は？","choices":["サンフランシスコ平和条約","日韓基本条約","日中平和友好条約","日米和親条約"],"answer":"サンフランシスコ平和条約","explanation":"1951年、吉田茂首相がサンフランシスコ平和条約に署名。日本の独立回復を実現"},{"id":3082,"subject":"社会","difficulty":3,"question":"「沖縄返還」はいつ？","choices":["1972年","1969年","1975年","1968年"],"answer":"1972年","explanation":"1972年5月、沖縄が日本に返還された。佐藤栄作首相がアメリカと交渉を続けた成果"},{"id":3083,"subject":"社会","difficulty":3,"question":"「朝鮮戦争」はいつ始まった？","choices":["1950年","1948年","1953年","1945年"],"answer":"1950年","explanation":"1950年6月、北朝鮮が38度線を越えて南を攻撃。1953年に休戦協定。現在も終戦していない"},{"id":3084,"subject":"社会","difficulty":3,"question":"「バブル経済」が崩壊したのはいつごろ？","choices":["1991年ごろ","1985年ごろ","2000年ごろ","1979年ごろ"],"answer":"1991年ごろ","explanation":"1980年代後半に土地・株の価格が異常に高騰。1991年頃から崩壊が始まり、長期不況へ"},{"id":3085,"subject":"社会","difficulty":3,"question":"「国際連合（UN）」が設立されたのはいつ？","choices":["1945年","1919年","1950年","1948年"],"answer":"1945年","explanation":"1945年10月、第二次世界大戦後の平和維持を目的に国際連合が設立。本部はニューヨーク"},{"id":3086,"subject":"社会","difficulty":1,"question":"東北地方は何県？","choices":["6県（青森・岩手・宮城・秋田・山形・福島）","5県","7県","4県"],"answer":"6県（青森・岩手・宮城・秋田・山形・福島）","explanation":"東北地方は青森・岩手・宮城・秋田・山形・福島の6県"},{"id":3087,"subject":"社会","difficulty":1,"question":"関東地方は何都県？","choices":["1都6県（東京・神奈川・埼玉・千葉・茨城・栃木・群馬）","1都5県","2都6県","1都7県"],"answer":"1都6県（東京・神奈川・埼玉・千葉・茨城・栃木・群馬）","explanation":"関東地方は東京都と神奈川・埼玉・千葉・茨城・栃木・群馬の6県"},{"id":3088,"subject":"社会","difficulty":1,"question":"「天皇」の地位は日本国憲法で何と定められている？","choices":["日本国の象徴","国家元首","国民の代表","最高権力者"],"answer":"日本国の象徴","explanation":"憲法第1条「天皇は、日本国の象徴であり日本国民統合の象徴である」"},{"id":3089,"subject":"社会","difficulty":1,"question":"「環境省」が設置されたのはいつ？","choices":["2001年","1971年","1984年","1992年"],"answer":"2001年","explanation":"2001年の中央省庁再編時に環境庁が環境省に昇格。1971年に環境庁設置"},{"id":3090,"subject":"社会","difficulty":1,"question":"「ヒートアイランド現象」が起きやすい場所は？","choices":["大都市","海岸沿い","山間部","農村地帯"],"answer":"大都市","explanation":"大都市でアスファルトや建物の熱、エアコンの排熱などで気温が上がるヒートアイランド現象"},{"id":3091,"subject":"社会","difficulty":2,"question":"「比例代表制」とは？","choices":["政党の得票数に比例して議席を配分する選挙制度","一番多く得票した候補が当選する制度","地域ごとに代表を選ぶ制度","2回投票する選挙制度"],"answer":"政党の得票数に比例して議席を配分する選挙制度","explanation":"比例代表制は政党への投票数に応じて議席を配分する。民意を反映しやすい"},{"id":3092,"subject":"社会","difficulty":2,"question":"「京都議定書」（1997年）の内容は？","choices":["先進国に温室効果ガスの削減を義務付け","核兵器の禁止","貿易の自由化","生物多様性の保護"],"answer":"先進国に温室効果ガスの削減を義務付け","explanation":"1997年、京都で採択。先進国が1990年比で温室効果ガスを削減する義務を負った"},{"id":3093,"subject":"社会","difficulty":2,"question":"「冷戦」はいつ終わったか？","choices":["1989〜1991年（ベルリンの壁崩壊〜ソ連解体）","1975年（ベトナム戦争終結）","1985年（ゴルバチョフ就任）","1979年"],"answer":"1989〜1991年（ベルリンの壁崩壊〜ソ連解体）","explanation":"1989年ベルリンの壁崩壊、1991年ソ連解体により冷戦が終結した"},{"id":3094,"subject":"社会","difficulty":2,"question":"「産業革命」が最初に起きた国は？","choices":["イギリス","フランス","ドイツ","アメリカ"],"answer":"イギリス","explanation":"18世紀後半、イギリスで蒸気機関の発明などにより産業革命が始まった"},{"id":3095,"subject":"社会","difficulty":2,"question":"「PKO（国連平和維持活動）」に日本が初めて参加したのはいつ？","choices":["1992年（カンボジア）","1988年","2001年","1979年"],"answer":"1992年（カンボジア）","explanation":"1992年、PKO協力法が成立しカンボジアに自衛隊を派遣。日本のPKO参加の始まり"},{"id":3096,"subject":"社会","difficulty":3,"question":"「地方交付税交付金」の目的は？","choices":["地方間の財政格差を是正するため","地方の道路建設のため","農村振興のため","地方の教育費のため"],"answer":"地方間の財政格差を是正するため","explanation":"税収の少ない地方公共団体に国が交付する。財政力格差を埋め一定水準のサービスを保障"},{"id":3097,"subject":"社会","difficulty":3,"question":"「マグナカルタ」（1215年）はどこの文書？","choices":["イギリス（イングランド）","フランス","ローマ","スペイン"],"answer":"イギリス（イングランド）","explanation":"1215年、イングランドの貴族がジョン王に署名させた文書。権利の制限・法の支配の原則を示す"},{"id":3098,"subject":"社会","difficulty":3,"question":"「享保の改革」を行ったのは？","choices":["徳川吉宗","徳川綱吉","松平定信","水野忠邦"],"answer":"徳川吉宗","explanation":"8代将軍・吉宗が行った財政改革。目安箱設置・公事方御定書の制定などが知られる"},{"id":3099,"subject":"社会","difficulty":3,"question":"「寛政の改革」を行ったのは？","choices":["松平定信","徳川吉宗","田沼意次","水野忠邦"],"answer":"松平定信","explanation":"老中・松平定信が1787〜93年に実施。農村復興・風紀取締りを行ったが厳しすぎると批判された"},{"id":3100,"subject":"社会","difficulty":3,"question":"「天保の改革」を行ったのは？","choices":["水野忠邦","松平定信","徳川吉宗","田沼意次"],"answer":"水野忠邦","explanation":"老中・水野忠邦が1841〜43年に実施。株仲間解散・奢侈禁止令などを行ったが失敗に終わった"},{"id":3101,"subject":"社会","difficulty":1,"question":"日本の「三権分立」で「司法」を担うのは？","choices":["裁判所","国会","内閣","天皇"],"answer":"裁判所","explanation":"三権分立：立法（国会）行政（内閣）司法（裁判所）。互いに監視し合うことで権力の集中を防ぐ"},{"id":3102,"subject":"社会","difficulty":1,"question":"日本の国土面積は約何万km²？","choices":["約38万km²","約10万km²","約100万km²","約3万km²"],"answer":"約38万km²","explanation":"日本の面積は約37.8万km²。世界で61位程度の大きさ"},{"id":3103,"subject":"社会","difficulty":1,"question":"奈良時代の都は？","choices":["平城京","平安京","難波宮","藤原京"],"answer":"平城京","explanation":"710年、元明天皇が平城京（現在の奈良市）に遷都。794年の平安京遷都まで続いた"},{"id":3104,"subject":"社会","difficulty":1,"question":"「地球儀」で赤道の上と下をそれぞれ何という？","choices":["北半球と南半球","東半球と西半球","上半球と下半球","前半球と後半球"],"answer":"北半球と南半球","explanation":"赤道より北が北半球、南が南半球。日本は北半球にある"},{"id":3105,"subject":"社会","difficulty":1,"question":"「領海」とは何？","choices":["海岸から12海里以内の海","沿岸200海里以内の海","自国の船しか入れない海","国旗を掲げる権利のある海"],"answer":"海岸から12海里以内の海","explanation":"領海は基線から12海里（約22km）以内の海。外国船は無害通航権がある"},{"id":3106,"subject":"社会","difficulty":1,"question":"「縄文時代」の人々の生活は？","choices":["狩猟・採集・漁","稲作中心","農業と牧畜","商業中心"],"answer":"狩猟・採集・漁","explanation":"縄文時代は狩猟・採集・漁が主な生業。弓矢・土器を使い竪穴住居に住んでいた"},{"id":3107,"subject":"社会","difficulty":1,"question":"「温帯」の特徴は？","choices":["四季があり温暖","一年中暑い","一年中寒い","雨が多くない"],"answer":"四季があり温暖","explanation":"温帯は熱帯と寒帯の間。四季があり比較的温暖。日本・ヨーロッパの多くが温帯"},{"id":3108,"subject":"社会","difficulty":1,"question":"「東経135度」の経線が通る都市は？","choices":["明石市（兵庫県）","東京","大阪","京都"],"answer":"明石市（兵庫県）","explanation":"東経135度は日本の標準時子午線。明石市を通る。日本標準時はUTC+9"},{"id":3109,"subject":"社会","difficulty":1,"question":"飛鳥時代に活躍した「聖徳太子」の別名は？","choices":["厩戸皇子","大海人皇子","中大兄皇子","天武天皇"],"answer":"厩戸皇子","explanation":"聖徳太子の本名は厩戸皇子（うまやどのおうじ）。推古天皇の摂政として活躍"},{"id":3110,"subject":"社会","difficulty":1,"question":"「選挙の四原則」に含まれないのは？","choices":["代理選挙","普通選挙","平等選挙","秘密選挙"],"answer":"代理選挙","explanation":"選挙の四原則：普通・平等・直接・秘密選挙。代理選挙はない"},{"id":3111,"subject":"社会","difficulty":2,"question":"「御成敗式目」を制定したのは？","choices":["北条泰時","源頼朝","足利尊氏","北条時宗"],"answer":"北条泰時","explanation":"1232年、北条泰時が武家初の成文法「御成敗式目（貞永式目）」を制定"},{"id":3112,"subject":"社会","difficulty":2,"question":"「文禄・慶長の役」とは何？","choices":["豊臣秀吉による朝鮮出兵","織田信長の戦い","江戸幕府の外交","明との貿易"],"answer":"豊臣秀吉による朝鮮出兵","explanation":"1592年（文禄）・1597年（慶長）、豊臣秀吉が朝鮮に出兵。どちらも撤退に終わった"},{"id":3113,"subject":"社会","difficulty":2,"question":"「紡績業（ぼうせきぎょう）」とは？","choices":["綿花・羊毛などの繊維を糸に紡ぐ産業","布を織る産業","衣服を作る産業","染色する産業"],"answer":"綿花・羊毛などの繊維を糸に紡ぐ産業","explanation":"紡績業は繊維原料を糸にする工業。明治時代の日本の主要産業だった"},{"id":3114,"subject":"社会","difficulty":2,"question":"「福祉国家」の概念が生まれたのはどこ？","choices":["イギリス・スウェーデンなど北欧","アメリカ","フランス","ドイツ"],"answer":"イギリス・スウェーデンなど北欧","explanation":"20世紀に北欧を中心に発展。国家が国民の生活を揺りかごから墓場まで保障する考え"},{"id":3115,"subject":"社会","difficulty":2,"question":"「日清戦争」の講和条約は？","choices":["下関条約","ポーツマス条約","ヴェルサイユ条約","天津条約"],"answer":"下関条約","explanation":"1895年の下関条約で、日本は台湾・澎湖諸島・遼東半島（後に三国干渉で返還）を獲得"},{"id":3116,"subject":"社会","difficulty":2,"question":"「排他的経済水域（EEZ）」は沿岸から何海里？","choices":["200海里","12海里","50海里","100海里"],"answer":"200海里","explanation":"EEZは基線から200海里以内。水産資源・鉱物資源の権利を持つ。日本のEEZは世界6位"},{"id":3117,"subject":"社会","difficulty":2,"question":"「国民の三大義務」に含まれないのは？","choices":["納税・勤労・教育を受けさせる義務","選挙に行く義務","子女に教育を受けさせる義務","納税の義務"],"answer":"選挙に行く義務","explanation":"国民の三大義務：納税・勤労・子女に教育を受けさせる義務。選挙は権利であって義務ではない"},{"id":3118,"subject":"社会","difficulty":2,"question":"「南南問題」とは？","choices":["発展途上国間の経済格差","南北問題に付随する問題","南半球全体の問題","農業問題"],"answer":"発展途上国間の経済格差","explanation":"資源輸出国など比較的豊かな発展途上国と最貧国との間の経済格差問題"},{"id":3119,"subject":"社会","difficulty":2,"question":"「天保の大飢饉」はいつ？","choices":["1830年代","1780年代","1870年代","1700年代"],"answer":"1830年代","explanation":"1833〜1839年頃の天保の大飢饉。冷害・洪水で餓死者が多数。大塩平八郎の乱のきっかけ"},{"id":3120,"subject":"社会","difficulty":2,"question":"「国際司法裁判所」はどこにある？","choices":["オランダ・ハーグ","アメリカ・ニューヨーク","スイス・ジュネーブ","ベルギー・ブリュッセル"],"answer":"オランダ・ハーグ","explanation":"国際司法裁判所（ICJ）はオランダのハーグにある。国家間の法的紛争を解決する機関"},{"id":3121,"subject":"社会","difficulty":3,"question":"「岩倉使節団」（1871年）の目的は？","choices":["条約改正の交渉と欧米の制度・文化の調査","貿易の拡大","軍事同盟の締結","留学生の送り出し"],"answer":"条約改正の交渉と欧米の制度・文化の調査","explanation":"岩倉具視を大使に欧米12か国を訪問。条約改正は失敗したが近代化に大きな影響"},{"id":3122,"subject":"社会","difficulty":3,"question":"「ワシントン会議」（1921〜22年）で決まったことは？","choices":["海軍軍備の制限と太平洋の現状維持","陸軍の縮小","国際連盟の設立","植民地の独立"],"answer":"海軍軍備の制限と太平洋の現状維持","explanation":"米英日仏伊の海軍比率を決定（5:5:3:1.67:1.67）し、四カ国条約・九カ国条約も締結"},{"id":3123,"subject":"社会","difficulty":3,"question":"「血盟団事件」（1932年）とは？","choices":["井上日召率いる右翼団体が政財界人を暗殺","陸軍将校によるクーデター未遂","海軍将校による首相暗殺","共産主義者の蜂起"],"answer":"井上日召率いる右翼団体が政財界人を暗殺","explanation":"1932年、血盟団が元蔵相・井上準之助と三井合名理事長・団琢磨を暗殺"},{"id":3124,"subject":"社会","difficulty":3,"question":"「ブレトンウッズ体制」とは？","choices":["ドル本位制による固定為替相場制","金本位制","自由変動相場制","石油本位制"],"answer":"ドル本位制による固定為替相場制","explanation":"1944年、IMF・世界銀行設立を決定。ドルと金を1オンス=35ドルで結びつけた固定相場制"},{"id":3125,"subject":"社会","difficulty":3,"question":"「東西ドイツが統一」されたのはいつ？","choices":["1990年","1989年","1991年","1985年"],"answer":"1990年","explanation":"1989年にベルリンの壁崩壊、1990年10月に東西ドイツが正式に統一された"},{"id":3126,"subject":"社会","difficulty":1,"question":"「参議院」の定数は？","choices":["248人","465人","100人","300人"],"answer":"248人","explanation":"参議院の定数は248人（2022年改正）。衆議院は465人"},{"id":3127,"subject":"社会","difficulty":1,"question":"日本の「面積が最小」の都道府県は？","choices":["香川県","大阪府","東京都","神奈川県"],"answer":"香川県","explanation":"香川県は約1877km²で日本最小の都道府県"},{"id":3128,"subject":"社会","difficulty":1,"question":"「ユーロ」を使用している地域は？","choices":["EU加盟国の多く（ユーロ圏）","EUすべての国","ヨーロッパ全体","G7全国"],"answer":"EU加盟国の多く（ユーロ圏）","explanation":"EU加盟国でもスウェーデン・デンマーク・ポーランド等はユーロを使用していない"},{"id":3129,"subject":"社会","difficulty":1,"question":"「アマゾン川」が流れる国は？","choices":["ブラジル（主に）","アルゼンチン","ペルーのみ","コロンビアのみ"],"answer":"ブラジル（主に）","explanation":"アマゾン川の大部分はブラジルを流れる。ペルー・コロンビアにも源流がある"},{"id":3130,"subject":"社会","difficulty":1,"question":"「大陸棚」とは何？","choices":["水深200m以浅の緩やかな海底","深海の平原","海岸の崖","海底火山"],"answer":"水深200m以浅の緩やかな海底","explanation":"大陸棚は大陸周辺の水深200m以浅の比較的平坦な海底。水産資源・海底資源が豊富"},{"id":3131,"subject":"社会","difficulty":2,"question":"「大正デモクラシー」の時代に活躍した思想家は？","choices":["吉野作造","福沢諭吉","中江兆民","西郷隆盛"],"answer":"吉野作造","explanation":"吉野作造が「民本主義」を提唱。大正デモクラシー（大正期の民主主義運動）の理論的支柱"},{"id":3132,"subject":"社会","difficulty":2,"question":"「護憲運動」とは？","choices":["憲法に基づく政治（政党政治）を守る運動","憲法改正に反対する運動","天皇制を守る運動","軍備拡張に反対する運動"],"answer":"憲法に基づく政治（政党政治）を守る運動","explanation":"1912年の第一次・1924年の第二次護憲運動。元老・軍閥・官僚による藩閥政治に反対した"},{"id":3133,"subject":"社会","difficulty":2,"question":"「関税自主権」を完全に回復した年は？","choices":["1911年","1894年","1899年","1902年"],"answer":"1911年","explanation":"1911年、日米通商航海条約改正で関税自主権を完全回復。1894年の陸奥宗光による治外法権撤廃に続く外交成果"},{"id":3134,"subject":"社会","difficulty":2,"question":"「農業基本法」（1961年）の目的は？","choices":["農業の近代化・農家所得の向上","食料の輸入拡大","農地の保護","農村の過疎化防止"],"answer":"農業の近代化・農家所得の向上","explanation":"農業の生産性向上・農業従事者の所得を他産業と均衡させることを目的とした"},{"id":3135,"subject":"社会","difficulty":2,"question":"「モンスーン（季節風）」が吹く理由は？","choices":["大陸と海の温度差による気圧差","地球の自転","偏西風の影響","山脈の存在"],"answer":"大陸と海の温度差による気圧差","explanation":"夏は大陸が高温低気圧→海から大陸へ風（南東・南西の湿った風）。冬は逆方向"},{"id":3136,"subject":"社会","difficulty":3,"question":"「日米安全保障条約」が改定されたのはいつ？","choices":["1960年","1951年","1970年","1945年"],"answer":"1960年","explanation":"1960年、岸信介内閣が日米安保条約を改定（新安保条約）。安保闘争が激化した"},{"id":3137,"subject":"社会","difficulty":3,"question":"「ニクソン訪中」（1972年）の意義は？","choices":["米中関係正常化の第一歩","中国のUN加盟","台湾との断交","ベトナム戦争終結"],"answer":"米中関係正常化の第一歩","explanation":"1972年2月、ニクソン大統領が訪中し毛沢東と会談。冷戦構造に大きな変化をもたらした"},{"id":3138,"subject":"社会","difficulty":3,"question":"「アパルトヘイト」が廃止されたのはいつ・どこ？","choices":["1991年・南アフリカ","1980年・ジンバブエ","2000年・ナミビア","1975年・モザンビーク"],"answer":"1991年・南アフリカ","explanation":"南アフリカの人種隔離政策（アパルトヘイト）は1991年に廃止。1994年マンデラが大統領に"},{"id":3139,"subject":"社会","difficulty":3,"question":"「北方領土」に含まれる島は？","choices":["択捉島・国後島・色丹島・歯舞群島","樺太・択捉島・国後島","千島列島全体","沖縄"],"answer":"択捉島・国後島・色丹島・歯舞群島","explanation":"北方領土4島：択捉島（最大）・国後島・色丹島・歯舞群島。現在もロシアが占拠"},{"id":3140,"subject":"社会","difficulty":3,"question":"「国際連合安全保障理事会」の常任理事国は？","choices":["米英仏中露の5か国","G7全国","G20","欧米諸国"],"answer":"米英仏中露の5か国","explanation":"常任理事国：アメリカ・イギリス・フランス・中国・ロシアの5か国。拒否権を持つ"},{"id":3141,"subject":"社会","difficulty":1,"question":"「太平洋」「大西洋」「インド洋」で最大の海洋は？","choices":["太平洋","大西洋","インド洋","北極海"],"answer":"太平洋","explanation":"太平洋は地球の表面積の約3分の1を占める最大の海洋"},{"id":3142,"subject":"社会","difficulty":1,"question":"「平安時代」はいつからいつまで？","choices":["794〜1185年ごろ","710〜794年","1185〜1333年","538〜710年"],"answer":"794〜1185年ごろ","explanation":"794年の平安京遷都から1185年の鎌倉幕府成立（源平合戦終結）まで"},{"id":3143,"subject":"社会","difficulty":1,"question":"「農林水産省」の役割は？","choices":["農業・林業・水産業・食料を担当","工業・製造業を担当","環境保護を担当","輸出入を管理"],"answer":"農業・林業・水産業・食料を担当","explanation":"農林水産省は農業・林業・水産業の振興と食料の安定供給を担当する省庁"},{"id":3144,"subject":"社会","difficulty":1,"question":"日本の「標準語」の基礎は？","choices":["東京の山の手言葉","京都弁","大阪弁","江戸の下町言葉"],"answer":"東京の山の手言葉","explanation":"明治以降、東京山の手（武家・知識人の言葉）を基礎に標準語が形成された"},{"id":3145,"subject":"社会","difficulty":1,"question":"「ASEAN（東南アジア諸国連合）」の加盟国数は？","choices":["10か国","5か国","7か国","12か国"],"answer":"10か国","explanation":"ASEANはタイ・マレーシア・インドネシア・フィリピン・シンガポール・ブルネイ・ベトナム・ラオス・ミャンマー・カンボジアの10か国"},{"id":3146,"subject":"社会","difficulty":2,"question":"「地方自治の本旨」とは？","choices":["団体自治と住民自治","地方が独立すること","地方議会の設置","首長の直接選挙"],"answer":"団体自治と住民自治","explanation":"団体自治（地方が国から独立して自律的に行政）と住民自治（住民が自ら地域を治める）の2つが本旨"},{"id":3147,"subject":"社会","difficulty":2,"question":"「カルスト地形」とは？","choices":["石灰岩が雨水で溶食されてできた地形","火山活動でできた地形","川の侵食でできた地形","氷河でできた地形"],"answer":"石灰岩が雨水で溶食されてできた地形","explanation":"カルスト地形は石灰岩が雨水（弱酸性）に溶けてできる。鍾乳洞・ドリーネなど。山口・秋吉台が有名"},{"id":3148,"subject":"社会","difficulty":2,"question":"「OPEC（石油輸出国機構）」の本部は？","choices":["オーストリア・ウィーン","サウジアラビア","アラブ首長国連邦","クウェート"],"answer":"オーストリア・ウィーン","explanation":"OPECの本部はオーストリアのウィーン。1960年設立。産油国が協調して石油価格・生産量を管理"},{"id":3149,"subject":"社会","difficulty":2,"question":"「源氏物語」を書いたのは？","choices":["紫式部","清少納言","和泉式部","小野小町"],"answer":"紫式部","explanation":"平安時代の紫式部が書いた世界最古の長編小説とも言われる。全54帖"},{"id":3150,"subject":"社会","difficulty":2,"question":"「ルネサンス」はどこから始まった？","choices":["イタリア（フィレンツェなど）","フランス","イギリス","ドイツ"],"answer":"イタリア（フィレンツェなど）","explanation":"14〜16世紀のルネサンスはイタリアから始まった。ダ・ヴィンチ・ミケランジェロなどが活躍"},{"id":4001,"subject":"理科","difficulty":1,"question":"植物が光合成で作るものは？","choices":["デンプンと酸素","二酸化炭素と水","窒素と酸素","水と酸素"],"answer":"デンプンと酸素","explanation":"光合成：光＋水＋CO2→デンプン（養分）＋酸素。酸素は気孔から放出される"},{"id":4002,"subject":"理科","difficulty":1,"question":"磁石のN極とS極を近づけると？","choices":["引き合う","反発する","くっつかない","どちらでもない"],"answer":"引き合う","explanation":"異なる極（N-S）は引き合い、同じ極（N-N、S-S）は反発する"},{"id":4003,"subject":"理科","difficulty":1,"question":"水を電気分解すると何ができる？","choices":["水素と酸素","水素と窒素","酸素と炭素","水素と塩素"],"answer":"水素と酸素","explanation":"水（H₂O）を電気分解すると水素（H₂）が陰極、酸素（O₂）が陽極に発生する"},{"id":4004,"subject":"理科","difficulty":1,"question":"血液を全身に送り出す器官は？","choices":["心臓","肺","腎臓","肝臓"],"answer":"心臓","explanation":"心臓はポンプのように収縮して血液を全身に送り出す。1日約10万回動く"},{"id":4005,"subject":"理科","difficulty":1,"question":"春の大三角を形成する星座に含まれないのは？","choices":["さそり座","うしかい座","おとめ座","しし座"],"answer":"さそり座","explanation":"春の大三角：アルクトゥルス（うしかい座）・スピカ（おとめ座）・デネボラ（しし座）"},{"id":4006,"subject":"理科","difficulty":1,"question":"地震の大きさを表す単位は？","choices":["マグニチュード","デシベル","ヘルツ","ルーメン"],"answer":"マグニチュード","explanation":"マグニチュードは地震のエネルギーの大きさ。1増えるとエネルギーは約32倍になる"},{"id":4007,"subject":"理科","difficulty":1,"question":"塩酸（HCl）をリトマス紙につけると？","choices":["青いリトマス紙が赤くなる","赤いリトマス紙が青くなる","変化しない","両方青くなる"],"answer":"青いリトマス紙が赤くなる","explanation":"酸性の液体は青いリトマスを赤くする。塩酸は酸性"},{"id":4008,"subject":"理科","difficulty":1,"question":"人間の体の中で一番大きな臓器は？","choices":["肝臓","心臓","肺","胃"],"answer":"肝臓","explanation":"肝臓は約1〜1.5kgで体内最大の臓器。解毒・タンパク質合成・胆汁分泌などの働きがある"},{"id":4009,"subject":"理科","difficulty":1,"question":"風が吹く原因は？","choices":["気圧の差","気温の差","湿度の差","高度の差"],"answer":"気圧の差","explanation":"気圧の高いところから低いところへ空気が移動する。これが風。気温の差が気圧差を生む"},{"id":4010,"subject":"理科","difficulty":1,"question":"カエルは何類？","choices":["両生類","は虫類","魚類","哺乳類"],"answer":"両生類","explanation":"カエルは両生類。子供はえらで水中、大人は肺と皮膚で呼吸し陸上でも生活できる"},{"id":4011,"subject":"理科","difficulty":1,"question":"音の速さは光の速さより？","choices":["はるかに遅い","同じくらい","やや遅い","はるかに速い"],"answer":"はるかに遅い","explanation":"音速は約340m/秒。光速は約30万km/秒。光は音の約90万倍速い"},{"id":4012,"subject":"理科","difficulty":1,"question":"花粉を運ぶ役割をする昆虫は？","choices":["ミツバチ","カマキリ","セミ","ゴキブリ"],"answer":"ミツバチ","explanation":"ミツバチなどが花の蜜を集める際に花粉を運び、受粉を助ける"},{"id":4013,"subject":"理科","difficulty":1,"question":"岩石を大きく3種類に分けると？","choices":["火成岩・堆積岩・変成岩","溶岩・砂岩・大理石","花崗岩・石灰岩・玄武岩","火山岩・化石岩・変化岩"],"answer":"火成岩・堆積岩・変成岩","explanation":"岩石の三分類：火成岩（マグマが固まった）・堆積岩（積み重なった）・変成岩（変化した）"},{"id":4014,"subject":"理科","difficulty":1,"question":"血液の中で酸素を運ぶ成分は？","choices":["赤血球","白血球","血小板","血しょう"],"answer":"赤血球","explanation":"赤血球のヘモグロビンが酸素と結合して全身に運ぶ。鉄分が必要"},{"id":4015,"subject":"理科","difficulty":1,"question":"「夏至」はいつごろ？","choices":["6月21日ごろ","3月21日ごろ","9月23日ごろ","12月22日ごろ"],"answer":"6月21日ごろ","explanation":"夏至は一年で最も昼が長い日（約14〜15時間）。冬至（12月22日ごろ）は逆に最も短い"},{"id":4016,"subject":"理科","difficulty":2,"question":"対流が起きる条件は？","choices":["下が熱く上が冷たい","上が熱く下が冷たい","温度が均一","圧力が均一"],"answer":"下が熱く上が冷たい","explanation":"温められた流体は軽くなり上昇、冷えた流体は重くなり下降。これが対流"},{"id":4017,"subject":"理科","difficulty":2,"question":"ヒトの細胞の数はおよそ？","choices":["約37兆個","約1兆個","約100億個","約100兆個"],"answer":"約37兆個","explanation":"人体は約37兆個の細胞からできている（最新の研究）。細胞の種類は約200種類"},{"id":4018,"subject":"理科","difficulty":2,"question":"太陽系の惑星で最大の惑星は？","choices":["木星","土星","天王星","海王星"],"answer":"木星","explanation":"木星は太陽系最大の惑星。地球の約11倍の大きさ。大赤斑という巨大な台風がある"},{"id":4019,"subject":"理科","difficulty":2,"question":"「仕事（物理）」の単位は？","choices":["ジュール（J）","ワット（W）","ニュートン（N）","パスカル（Pa）"],"answer":"ジュール（J）","explanation":"仕事=力×距離。単位はジュール（J）。1J=1N×1m"},{"id":4020,"subject":"理科","difficulty":2,"question":"体温計で使われる金属は？（水銀を除く最近の場合）","choices":["ガリウム合金","アルミニウム","鉄","銅"],"answer":"ガリウム合金","explanation":"水銀の代わりにガリウム・インジウム・スズの合金が使われる。融点が低く安全"},{"id":4021,"subject":"理科","difficulty":2,"question":"「慣性の法則」とは？","choices":["外力がなければ物体は等速直線運動を続ける","力を加えると加速する","作用には反作用がある","重力は質量に比例する"],"answer":"外力がなければ物体は等速直線運動を続ける","explanation":"ニュートンの運動第1法則。外から力が加わらなければ物体は止まるか同じ速さで動き続ける"},{"id":4022,"subject":"理科","difficulty":2,"question":"光の三原色は？","choices":["赤・緑・青","赤・黄・青","赤・橙・青","赤・緑・紫"],"answer":"赤・緑・青","explanation":"光の三原色（RGB）は赤・緑・青。すべて混ぜると白になる。絵の具の三原色とは異なる"},{"id":4023,"subject":"理科","difficulty":2,"question":"「光合成」が行われる細胞内の場所は？","choices":["葉緑体","細胞核","ミトコンドリア","細胞膜"],"answer":"葉緑体","explanation":"葉緑体は植物細胞にある緑色の器官。クロロフィルで光エネルギーを吸収し光合成を行う"},{"id":4024,"subject":"理科","difficulty":2,"question":"pH7より小さいと？","choices":["酸性","アルカリ性","中性","塩基性"],"answer":"酸性","explanation":"pHは0〜14の値。7が中性、7より小さいと酸性、7より大きいとアルカリ性（塩基性）"},{"id":4025,"subject":"理科","difficulty":2,"question":"化石燃料に含まれないものは？","choices":["木材","石炭","石油","天然ガス"],"answer":"木材","explanation":"化石燃料は石炭・石油・天然ガス。大昔の生物の死骸が変化してできた。木材は再生可能エネルギー"},{"id":4026,"subject":"理科","difficulty":2,"question":"「浮力」は何に等しい？","choices":["物体が押しのけた液体の重さ","物体の重さ","物体の体積","液体の密度"],"answer":"物体が押しのけた液体の重さ","explanation":"アルキメデスの原理：浮力＝押しのけた液体の重さ（重力）"},{"id":4027,"subject":"理科","difficulty":2,"question":"「ドップラー効果」とは？","choices":["音源が近づくと音が高く聞こえること","音が遠くまで届くこと","音が壁に反射すること","音の大きさが変わること"],"answer":"音源が近づくと音が高く聞こえること","explanation":"救急車が近づくとサイレンが高く聞こえ、遠ざかると低く聞こえる現象"},{"id":4028,"subject":"理科","difficulty":2,"question":"地球の内部構造で一番外側の層は？","choices":["地殻","マントル","外核","内核"],"answer":"地殻","explanation":"地球の構造：地殻（外側）→マントル→外核（液体）→内核（固体）の順"},{"id":4029,"subject":"理科","difficulty":2,"question":"「DNA」が存在する場所は？","choices":["細胞の核","細胞膜","葉緑体のみ","ミトコンドリアのみ"],"answer":"細胞の核","explanation":"DNAは細胞核の染色体の中に存在。遺伝情報を伝える物質"},{"id":4030,"subject":"理科","difficulty":2,"question":"「熱の伝わり方」の3種類は？","choices":["伝導・対流・放射","伝導・拡散・対流","放射・拡散・蒸発","伝導・放射・蒸発"],"answer":"伝導・対流・放射","explanation":"熱伝導（物質を伝わる）・対流（流体の動き）・放射（電磁波として空間を伝わる）"},{"id":4031,"subject":"理科","difficulty":3,"question":"「メンデルの法則」で「分離の法則」とは？","choices":["対立形質を決める遺伝子は配偶子形成時に分離する","遺伝子が独立して遺伝する","優性形質が必ず現れる","突然変異が起きる法則"],"answer":"対立形質を決める遺伝子は配偶子形成時に分離する","explanation":"対をなす遺伝子（対立遺伝子）は生殖細胞を作る時に分離し、別々の配偶子に入る"},{"id":4032,"subject":"理科","difficulty":3,"question":"「絶対零度」は何℃？","choices":["-273℃","0℃","-100℃","-459℃"],"answer":"-273℃","explanation":"絶対零度は-273.15℃（0K）。物質を構成する粒子の熱運動が理論上停止する温度"},{"id":4033,"subject":"理科","difficulty":3,"question":"「酸化」とは何か？","choices":["酸素と結合すること・水素を失うこと","酸素を失うこと","水素と結合すること","炭素が増えること"],"answer":"酸化と結合すること・水素を失うこと","explanation":"酸化：酸素と結合するか水素を失う反応。鉄のさびは酸化鉄"},{"id":4034,"subject":"理科","difficulty":3,"question":"「核融合」と「核分裂」の違いは？","choices":["核融合は軽い原子核が合体・核分裂は重い原子核が分裂","核融合が爆弾・核分裂が発電","核融合が安全・核分裂が危険","どちらも同じ反応"],"answer":"核融合は軽い原子核が合体・核分裂は重い原子核が分裂","explanation":"核融合は水素などの軽い原子核が合体してエネルギーを放出（太陽・水素爆弾）。核分裂はウランなどが分裂（原子炉・原子爆弾）"},{"id":4035,"subject":"理科","difficulty":3,"question":"「オゾン層」が吸収するのは？","choices":["紫外線","赤外線","可視光線","X線"],"answer":"紫外線","explanation":"成層圏のオゾン層が太陽からの有害な紫外線を吸収。フロンガスによるオゾン層破壊が問題"},{"id":4036,"subject":"理科","difficulty":3,"question":"「プレートテクトニクス」とは？","choices":["地球の表面が十数枚の板（プレート）に分かれ動いているという理論","火山の噴火メカニズム","地震の発生原理","大陸の形成過程"],"answer":"地球の表面が十数枚の板（プレート）に分かれ動いているという理論","explanation":"地球の表面は十数枚のプレートに分かれており、それぞれが移動している。地震・火山の原因"},{"id":4037,"subject":"理科","difficulty":3,"question":"「相対性理論」を提唱したのは？","choices":["アインシュタイン","ニュートン","ガリレオ","ダーウィン"],"answer":"アインシュタイン","explanation":"アルベルト・アインシュタインが1905年（特殊相対性理論）と1915年（一般相対性理論）を発表"},{"id":4038,"subject":"理科","difficulty":3,"question":"「万有引力の法則」を発見したのは？","choices":["ニュートン","アインシュタイン","ガリレオ","コペルニクス"],"answer":"ニュートン","explanation":"アイザック・ニュートンがリンゴが落ちるのを見て万有引力を発見したとされる（実話ではない説も）"},{"id":4039,"subject":"理科","difficulty":3,"question":"「細胞分裂」の種類のうち、生殖細胞を作るものは？","choices":["減数分裂","体細胞分裂","無糸分裂","有糸分裂"],"answer":"減数分裂","explanation":"減数分裂：染色体数が半分になる分裂。精子・卵などの生殖細胞を作る時に起こる"},{"id":4040,"subject":"理科","difficulty":3,"question":"「超新星爆発」とは？","choices":["大質量の星が一生の最後に起こす大爆発","太陽のような星の誕生","銀河同士の衝突","ブラックホールの発生"],"answer":"大質量の星が一生の最後に起こす大爆発","explanation":"太陽の8倍以上の質量の星が核融合燃料を使い果たし重力崩壊で起こす大爆発"},{"id":4041,"subject":"理科","difficulty":1,"question":"心臓は1分間に何回くらい動く？","choices":["60〜80回","100〜120回","20〜30回","150〜200回"],"answer":"60〜80回","explanation":"安静時の心拍数は成人で60〜80回/分。運動すると増える。子供の方がやや多い"},{"id":4042,"subject":"理科","difficulty":1,"question":"「はい（肺）」の働きは？","choices":["酸素を取り込み二酸化炭素を出す","血液をろ過する","消化を助ける","体温を調節する"],"answer":"酸素を取り込み二酸化炭素を出す","explanation":"肺は呼吸器官。肺胞でガス交換を行い、酸素を血液に渡し二酸化炭素を受け取る"},{"id":4043,"subject":"理科","difficulty":1,"question":"虹の色の数は？","choices":["7色","5色","6色","8色"],"answer":"7色","explanation":"虹は外側から赤・橙・黄・緑・青・藍・紫の7色。雨粒が光を分解するプリズム効果"},{"id":4044,"subject":"理科","difficulty":1,"question":"体の中で最も硬い組織は？","choices":["歯のエナメル質","骨","爪","軟骨"],"answer":"歯のエナメル質","explanation":"歯のエナメル質は体内で最も硬い組織。ハイドロキシアパタイトという結晶でできている"},{"id":4045,"subject":"理科","difficulty":1,"question":"「冬眠」する動物はどれ？","choices":["クマ","ライオン","象","キリン"],"answer":"クマ","explanation":"クマ・カエル・ヘビ・コウモリなどが冬眠する。体温・心拍・呼吸数が大幅に下がる"},{"id":4046,"subject":"理科","difficulty":2,"question":"「蒸散」が盛んに行われる場所は？","choices":["葉の裏（気孔）","茎","根","果実"],"answer":"葉の裏（気孔）","explanation":"蒸散は主に葉の裏の気孔から行われる。気孔は葉の裏に多く、二酸化炭素の取り込みも行う"},{"id":4047,"subject":"理科","difficulty":2,"question":"「血圧」が高い状態が続くと起きやすいのは？","choices":["脳卒中・心臓病","骨粗しょう症","糖尿病","貧血"],"answer":"脳卒中・心臓病","explanation":"高血圧が続くと血管が傷つき、脳卒中（脳出血・脳梗塞）や心筋梗塞のリスクが高まる"},{"id":4048,"subject":"理科","
