all as）","時（as she entered）","理由（as you know）","様態（do as I say）"],"answer":"比較の基準（as tall as）","explanation":"比較のas〜asはasを接続詞とする場合もあるが、ここでは副詞。接続詞としては時・理由・様態・譲歩などに使う"},{"id":7041,"subject":"英文法","difficulty":1,"question":"「現在完了形」が使えない場合はどれ？","choices":["yesterday（過去を表す副詞と共に）","already","yet","ever"],"answer":"yesterday（過去を表す副詞と共に）","explanation":"現在完了はyesterday/last year/ago/whenなど過去の一時点を示す語と使えない"},{"id":7042,"subject":"英文法","difficulty":1,"question":"「There is/are」構文の主語は？","choices":["Thereの後に来る名詞","There","文末の場所を表す語","文全体"],"answer":"Thereの後に来る名詞","explanation":"There is a book on the desk.：bookが主語。Thereは形式上の主語（誘導副詞）"},{"id":7043,"subject":"英文法","difficulty":1,"question":"「比較級＋and＋比較級」の意味は？","choices":["ますます〜","〜か〜か","〜ほど〜","〜でも〜でもない"],"answer":"ますます〜","explanation":"比較級＋and＋比較級：ますます〜。more and more important（ますます重要な）"},{"id":7044,"subject":"英文法","difficulty":1,"question":"「worth」の後に来る形は？","choices":["動名詞（-ing）","不定詞（to V）","原形","過去分詞"],"answer":"動名詞（-ing）","explanation":"be worth -ing：〜する価値がある。This book is worth reading.（この本は読む価値がある）"},{"id":7045,"subject":"英文法","difficulty":1,"question":"「感嘆文」How/Whatの使い分けは？","choices":["How＋形容詞/副詞、What＋（a/an）＋名詞","Howは名詞・Whatは形容詞","どちらも同じ","Howは驚き・Whatは喜び"],"answer":"How＋形容詞/副詞、What＋（a/an）＋名詞","explanation":"How beautiful she is! / What a beautiful girl she is! 名詞があればWhat"},{"id":7046,"subject":"英文法","difficulty":2,"question":"「否定の副詞が文頭に来る倒置」の例として正しいのは？","choices":["Never have I seen such a thing.","Rarely I have seen...","Not I have seen...","Never I have seen..."],"answer":"Never have I seen such a thing.","explanation":"否定の副詞語句が文頭に来ると「助動詞/be動詞＋S」の倒置が起きる"},{"id":7047,"subject":"英文法","difficulty":2,"question":"「not A but B」の意味は？","choices":["AではなくB","AもBも","AかB","AおよびB"],"answer":"AではなくB","explanation":"not A but B：AではなくB。Not he but she is responsible.（彼ではなく彼女に責任がある）"},{"id":7048,"subject":"英文法","difficulty":2,"question":"「be動詞＋to不定詞」（be to 構文）の意味でないのは？","choices":["願望（〜したい）","予定（〜することになっている）","義務（〜すべき）","可能（〜できる）"],"answer":"願望（〜したい）","explanation":"be to構文の意味：予定・義務・可能・運命・意図。願望はwant/wish/hopeを使う"},{"id":7049,"subject":"英文法","difficulty":2,"question":"「進行形にできない動詞」の例として正しいのは？","choices":["know（状態動詞）","run（動作動詞）","write（動作動詞）","eat（動作動詞）"],"answer":"know（状態動詞）","explanation":"状態動詞（know/like/believe/haveなど）は通常進行形にしない。動作動詞は進行形にできる"},{"id":7050,"subject":"英文法","difficulty":2,"question":"「関係副詞where」の先行詞は？","choices":["場所を表す名詞","人","物","時"],"answer":"場所を表す名詞","explanation":"whereの先行詞は場所（place/houseなど）。whenは時、whyは理由（reason）、howは方法"},{"id":7051,"subject":"英文法","difficulty":3,"question":"「談話標識（discourse marker）」の例として正しいのは？","choices":["however/furthermore/in other words","although/because/if","who/which/that","when/where/why"],"answer":"however/furthermore/in other words","explanation":"談話標識は文と文・段落と段落をつなぐ語句。however（逆接）・furthermore（追加）・in other words（言い換え）"},{"id":7052,"subject":"英文法","difficulty":3,"question":"「仮定法を使わない条件文」の例は？","choices":["If water boils at 100°C, it turns to steam.（真理・事実）","If I were rich, I would travel.","If I had known, I would have told you.","If she should come, tell me."],"answer":"If water boils at 100°C, it turns to steam.（真理・事実）","explanation":"直説法の条件文：一般的な事実・真理を表す。If A, B.（AならばB。常に）"},{"id":7053,"subject":"英文法","difficulty":3,"question":"「強調のdo/does/did」はどんな場合に使う？","choices":["動詞を強調したいとき","疑問文","否定文","受動態"],"answer":"動詞を強調したいとき","explanation":"I do believe you.（本当に信じている）、She did come.（確かに来た）。動詞を強調"},{"id":7054,"subject":"英文法","difficulty":3,"question":"「名詞構文」とは？","choices":["動詞や形容詞を名詞化して表現した構文","名詞だけの文","主語が名詞の文","名詞句を使った表現"],"answer":"動詞や形容詞を名詞化して表現した構文","explanation":"the arrival of (= arrive)、the importance of (= important)のように動詞・形容詞を名詞化"},{"id":7055,"subject":"英文法","difficulty":3,"question":"「同格のthat」を使う名詞の例は？","choices":["fact/idea/news/belief（抽象名詞）","man/woman","book/table","run/jump"],"answer":"fact/idea/news/belief（抽象名詞）","explanation":"the fact that S V：〜という事実（that節がfactと同格）。抽象名詞の内容を説明する"},{"id":7056,"subject":"英文法","difficulty":1,"question":"「either A or B」の動詞はどちらに合わせる？","choices":["Bの数・人称に合わせる","Aに合わせる","両方複数にする","常に単数"],"answer":"Bの数・人称に合わせる","explanation":"Either he or they are wrong.（theyに合わせてare）。Neither A nor BもBに合わせる"},{"id":7057,"subject":"英文法","difficulty":1,"question":"「間接話法」への書き換えで変わるのは？","choices":["時制・人称代名詞・時・場所の表現","語順のみ","時制のみ","代名詞のみ"],"answer":"時制・人称代名詞・時・場所の表現","explanation":"直接話法→間接話法：時制のバックシフト・I→he/she・now→then・here→thereなど"},{"id":7058,"subject":"英文法","difficulty":1,"question":"「最上級の強調」に使う語は？","choices":["by far/much（by far the best）","very","more","quite"],"answer":"by far/much（by far the best）","explanation":"最上級の強調はby far/much/the very。very bestのveryは最上級前のみ使える"},{"id":7059,"subject":"英文法","difficulty":1,"question":"「lest S should V」の意味は？","choices":["〜しないように（否定の目的）","〜するために","〜するとき","〜にもかかわらず"],"answer":"〜しないように（否定の目的）","explanation":"lest S (should) V：〜しないように（= so that S won't/may not V）。否定の意味を含む目的節"},{"id":7060,"subject":"英文法","difficulty":1,"question":"「疑問詞＋to不定詞」の使い方は？","choices":["名詞句として主語・目的語・補語になる","形容詞的に使う","副詞的に使う","動詞を修飾する"],"answer":"名詞句として主語・目的語・補語になる","explanation":"what to do（何をすべきか）・how to swim（泳ぎ方）などは名詞句として機能する"},{"id":7061,"subject":"英文法","difficulty":2,"question":"「原形不定詞」を取る動詞・表現は？","choices":["使役動詞(make/let/have)・知覚動詞","want/expect/allow","advise/encourage","hope/wish"],"answer":"使役動詞(make/let/have)・知覚動詞","explanation":"make him go（原形）。ただしhave him goingもある。知覚動詞：see him run/running"},{"id":7062,"subject":"英文法","difficulty":2,"question":"「複合関係詞whatever」の意味は？","choices":["〜するものは何でも・どんな〜でも","疑問詞","否定","強調"],"answer":"〜するものは何でも・どんな〜でも","explanation":"whatever S V：〜するものは何でも（名詞節）/ どんな〜でも（副詞節・譲歩）"},{"id":7063,"subject":"英文法","difficulty":2,"question":"「it の特殊用法」でないのは？","choices":["it = 特定の名詞を受ける代名詞","形式主語it","形式目的語it","強調構文のit"],"answer":"it = 特定の名詞を受ける代名詞","explanation":"形式主語（It is difficult to...）・形式目的語（find it easy to...）・強調構文（It is X that...）が特殊用法"},{"id":7064,"subject":"英文法","difficulty":2,"question":"「過去完了形」の主な用法は？","choices":["過去のある時点より前の出来事・大過去","未来の完了","現在より前","仮定法"],"answer":"過去のある時点より前の出来事・大過去","explanation":"過去完了（had＋Vpp）：過去の基準時点より前の完了・継続・経験・結果を表す"},{"id":7065,"subject":"英文法","difficulty":2,"question":"「助動詞＋have＋過去分詞」で「〜したはずだ」は？","choices":["must have Vpp","should have Vpp","could have Vpp","might have Vpp"],"answer":"must have Vpp","explanation":"must have Vpp：〜したはずだ（過去の推量・確信）。He must have left already.（もう出発したはずだ）"},{"id":7066,"subject":"英文法","difficulty":3,"question":"「修辞疑問文（rhetorical question）」とは？","choices":["答えを求めない問いかけ（強調・説得に使う）","間接疑問文","付加疑問文","反語"],"answer":"答えを求めない問いかけ（強調・説得に使う）","explanation":"Who doesn't want to be happy?（幸せになりたくない人がいるか→誰でも幸せになりたい）"},{"id":7067,"subject":"英文法","difficulty":3,"question":"「目的語に不定詞のみとる動詞」の例は？","choices":["decide/hope/refuse（decide to go）","enjoy/finish/avoid（enjoy swimming）","mind/practice","suggest/recommend"],"answer":"decide/hope/refuse（decide to go）","explanation":"不定詞のみ：decide/plan/hope/want/refuse/expect/manage。動名詞のみ：enjoy/finish/avoid/mind"},{"id":7068,"subject":"英文法","difficulty":3,"question":"「自由間接話法（free indirect speech）」とは？","choices":["地の文の中に登場人物の思考・感情が混入する文体","直接話法の一種","間接話法の略式","内的独白"],"answer":"地の文の中に登場人物の思考・感情が混入する文体","explanation":"三人称で書かれた地の文に、登場人物の視点・声が「」なしで入り込む小説技法"},{"id":7069,"subject":"英文法","difficulty":3,"question":"「形式目的語it」の例は？","choices":["I found it difficult to understand him.","It is raining.","It is Tom who did it.","Give it to me."],"answer":"I found it difficult to understand him.","explanation":"find/make/think/consider＋it＋形容詞＋to不定詞/that節。itが形式目的語"},{"id":7070,"subject":"英文法","difficulty":3,"question":"「素材・材料」を表すmadeの使い分けは？","choices":["be made of（素材が見える）/ be made from（素材が変化して見えない）","どちらも同じ","be made of（食品）/ be made from（製品）","be made by（人）/ be made of（素材）"],"answer":"be made of（素材が見える）/ be made from（素材が変化して見えない）","explanation":"The table is made of wood.（木が見える）/ Wine is made from grapes.（ぶどうの形が残らない）"},{"id":7071,"subject":"英文法","difficulty":1,"question":"「enough」の語順は？","choices":["形容詞の後・名詞の前（old enough / enough time）","常に名詞の前","常に形容詞の後","動詞の後のみ"],"answer":"形容詞の後・名詞の前（old enough / enough time）","explanation":"enough：形容詞・副詞の後に置く（old enough）、名詞の前に置く（enough money）"},{"id":7072,"subject":"英文法","difficulty":1,"question":"「〜するのがやっとだ」を表す表現は？","choices":["can hardly/barely/scarcely do","can easily do","can certainly do","can always do"],"answer":"can hardly/barely/scarcely do","explanation":"I can hardly wait.（待ちきれない）。hardly/barely/scarcely＝ほとんど〜ない（準否定語）"},{"id":7073,"subject":"英文法","difficulty":1,"question":"「while」の主な意味でないのは？","choices":["〜の前に（before）","〜の間（時間）","〜だが（逆接・対比）","〜しながら（同時動作）"],"answer":"〜の前に（before）","explanation":"whileの意味：①〜の間②〜だが（対比・逆接）③〜しながら。〜の前はbefore"},{"id":7074,"subject":"英文法","difficulty":1,"question":"「rather than」の意味は？","choices":["〜よりむしろ","〜と同様に","〜にもかかわらず","〜の代わりに"],"answer":"〜よりむしろ","explanation":"rather than：〜よりむしろ。I prefer tea rather than coffee.（コーヒーよりむしろ紅茶が好き）"},{"id":7075,"subject":"英文法","difficulty":1,"question":"「need」の否定形「needn't」の意味は？","choices":["〜する必要がない","〜してはいけない","〜できない","〜すべきでない"],"answer":"〜する必要がない","explanation":"needn't（= don't need to）：〜する必要がない。mustn'tは〜してはいけない（禁止）と区別"},{"id":7076,"subject":"英文法","difficulty":2,"question":"「前置詞＋関係代名詞」の例として正しいのは？","choices":["the room in which he lived","the room which he lived in","the room that he lived in","どれも正しい"],"answer":"どれも正しい","explanation":"どれも正しい。前置詞＋which（正式）、which＋前置詞（口語）、that＋前置詞（口語）がすべて可能"},{"id":7077,"subject":"英文法","difficulty":2,"question":"「名詞構文（部分否定）」の例は？","choices":["not always（必ずしも〜ではない）","never（決して〜ない）","not at all（全く〜ない）","nothing（何も〜ない）"],"answer":"not always（必ずしも〜ではない）","explanation":"部分否定：not always/not necessarily/not altogether/not entirely。全部否定はnever/nothing"},{"id":7078,"subject":"英文法","difficulty":2,"question":"「群前置詞（complex preposition）」の例は？","choices":["in spite of/in terms of/with regard to","of/in/at","although/because","who/which/that"],"answer":"in spite of/in terms of/with regard to","explanation":"群前置詞：2語以上で1つの前置詞として機能。in spite of（〜にもかかわらず）など"},{"id":7079,"subject":"英文法","difficulty":2,"question":"「強調構文It is...that」で強調できないものは？","choices":["述語動詞そのもの（Sheran.のran）","主語","目的語","副詞（句）"],"answer":"述語動詞そのもの（Sheran.のran）","explanation":"強調構文は主語・目的語・副詞句を強調できるが、述語動詞そのものは強調できない（強調のdoを使う）"},{"id":7080,"subject":"英文法","difficulty":2,"question":"「受動態にできない動詞」の例は？","choices":["resemble/have/suit（状態を表す他動詞）","write","see","break"],"answer":"resemble/have/suit（状態を表す他動詞）","explanation":"resembleやhave（所有）などの状態動詞は通常受動態にしない。He resembles his father.（×His father is resembled by him.）"},{"id":7081,"subject":"英文法","difficulty":3,"question":"「二重否定」の例と意味は？","choices":["not uncommon = quite common（否定の否定で肯定・婉曲）","not anything = something","not nobody = everybody","not never = always"],"answer":"not uncommon = quite common（否定の否定で肯定・婉曲）","explanation":"not uncommon（珍しくない≒かなり一般的）。二重否定は肯定になるが、直接肯定より婉曲な表現"},{"id":7082,"subject":"英文法","difficulty":3,"question":"「代不定詞（pro-form of to-infinitive）」の例は？","choices":["I'd love to.（to以下省略）","I would like to go.","to go is fun","going is fun"],"answer":"I'd love to.（to以下省略）","explanation":"Would you like to come? — I'd love to.（to goのgoを省略）。代不定詞は反復を避けるtoの使用"},{"id":7083,"subject":"英文法","difficulty":3,"question":"「分裂文のwh-cleft」の例は？","choices":["What I need is money.","It is money that I need.","Money is what I need.","I need money."],"answer":"What I need is money.","explanation":"wh-cleft（pseudo-cleft）：What S V is/was〜。What I need is money.（私が必要なのはお金だ）"},{"id":7084,"subject":"英文法","difficulty":3,"question":"「後置修飾の優先順位」で正しいのは？","choices":["不定詞＞前置詞句＞関係節（いずれも名詞の直後）","前置詞句＞関係節＞不定詞","関係節＞前置詞句＞不定詞","順序は自由"],"answer":"不定詞＞前置詞句＞関係節（いずれも名詞の直後）","explanation":"後置修飾の順序は厳密ではないが、不定詞・前置詞句・関係節が名詞の直後に置かれる"},{"id":7085,"subject":"英文法","difficulty":3,"question":"「接触節（contact clause）」とは？","choices":["関係代名詞を省略した関係節","挿入節","独立節","従属節"],"answer":"関係代名詞を省略した関係節","explanation":"the book (that) I read（thatを省略）。目的格の関係代名詞は省略できる（接触節）"},{"id":7086,"subject":"英文法","difficulty":1,"question":"「so+助動詞+S」の意味は？","choices":["〜もそうだ（同意）","〜もそうでない","〜だけでなく","〜もまた"],"answer":"〜もそうだ（同意）","explanation":"She is happy. — So am I.（私もそうだ）。否定の同意はNor/Neither am I."},{"id":7087,"subject":"英文法","difficulty":1,"question":"「助動詞＋have＋過去分詞」で「〜したかもしれない」は？","choices":["might have Vpp","must have Vpp","should have Vpp","would have Vpp"],"answer":"might have Vpp","explanation":"might have Vpp：〜したかもしれない（過去の可能性）。He might have left already."},{"id":7088,"subject":"英文法","difficulty":1,"question":"「let alone」の意味は？","choices":["〜はもちろん・〜はおろか","〜だけでなく","〜にもかかわらず","〜の代わりに"],"answer":"〜はもちろん・〜はおろか","explanation":"let alone：〜はおろか（否定文で）。He can't walk, let alone run.（走るどころか歩けない）"},{"id":7089,"subject":"英文法","difficulty":1,"question":"「関係副詞when」の先行詞は？","choices":["時を表す名詞","場所を表す名詞","理由を表す名詞","方法を表す名詞"],"answer":"時を表す名詞","explanation":"whenの先行詞はtime/day/year/momentなど時を表す名詞。whereは場所、whyはreason"},{"id":7090,"subject":"英文法","difficulty":1,"question":"「疑問詞whoの格」について正しいのは？","choices":["主格はwho・目的格はwhom","主格はwhom・目的格はwho","どちらも同じ","文脈による"],"answer":"主格はwho・目的格はwhom","explanation":"Who did it?（主格）/ Whom did you see?（目的格・正式）。口語ではwhoを目的格にも使う"},{"id":7091,"subject":"英文法","difficulty":2,"question":"「〜せずにはいられない」を表す表現は？","choices":["cannot help -ing / cannot but V","must V","should V","be able to V"],"answer":"cannot help -ing / cannot but V","explanation":"I cannot help laughing.（= I cannot but laugh.）：笑わずにいられない"},{"id":7092,"subject":"英文法","difficulty":2,"question":"「形式主語構文」でitが受けられないのは？","choices":["動名詞が直接主語になる場合","不定詞が主語","that節が主語","whether節が主語"],"answer":"動名詞が直接主語になる場合","explanation":"Eating vegetables is important.（動名詞は直接主語になれる）。It is important eating...とは通常しない"},{"id":7093,"subject":"英文法","difficulty":2,"question":"「〜するように頼む」ask to/ask Oto の違いは？","choices":["ask to V（自分が〜するつもり）/ ask O to V（Oに〜するよう頼む）","どちらも同じ","ask to V（過去）/ ask O to V（現在）","ask to V（丁寧）/ ask O to V（普通）"],"answer":"ask to V（自分が〜するつもり）/ ask O to V（Oに〜するよう頼む）","explanation":"I asked to leave.（自分が去ることを求めた）/ I asked him to leave.（彼に去るよう頼んだ）"},{"id":7094,"subject":"英文法","difficulty":2,"question":"「provided that / providing that」の意味は？","choices":["〜という条件で","〜にもかかわらず","〜の結果として","〜のために"],"answer":"〜という条件で","explanation":"provided/providing (that)：〜という条件で（= if）。Provided that you agree, we can proceed."},{"id":7095,"subject":"英文法","difficulty":2,"question":"「倍数表現」の正しい形は？","choices":["twice as 形容詞 as / three times as 形容詞 as","two times more than","as twice as","double than"],"answer":"twice as 形容詞 as / three times as 形容詞 as","explanation":"This is twice as large as that.（これはあれの2倍大きい）。2倍=twice、3倍以上=数詞＋times"},{"id":7096,"subject":"英文法","difficulty":3,"question":"「生成文法（Generative Grammar）」を提唱したのは？","choices":["チョムスキー","ソシュール","サピア","ウォーフ"],"answer":"チョムスキー","explanation":"ノーム・チョムスキーが1957年「統語構造」で提唱。人間には生得的な言語能力があるという理論"},{"id":7097,"subject":"英文法","difficulty":3,"question":"「語用論（pragmatics）」が扱うのは？","choices":["文脈における言語の使用・意味","音の体系","語の形成","文の構造"],"answer":"文脈における言語の使用・意味","explanation":"語用論：文脈・状況における言語使用の意味（含意・発話行為など）を研究する言語学の分野"},{"id":7098,"subject":"英文法","difficulty":3,"question":"「音素（phoneme）」とは？","choices":["意味の違いを生む最小の音の単位","音節","形態素","語"],"answer":"意味の違いを生む最小の音の単位","explanation":"音素：/p/と/b/のように意味の区別に関わる最小の音の単位。例：pin/bin（/p/と/b/が異なる音素）"},{"id":7099,"subject":"英文法","difficulty":3,"question":"「形態素（morpheme）」の例は？","choices":["un- / -ness / -ing（最小の意味を持つ単位）","音節","文","語用論"],"answer":"un- / -ness / -ing（最小の意味を持つ単位）","explanation":"形態素：意味を持つ最小単位。unhappy = un（否定）＋happy（幸せ）の2形態素"},{"id":7100,"subject":"英文法","difficulty":3,"question":"「直示（deixis）」とは？","choices":["文脈・状況に依存する言語表現（this/here/now等）","否定表現","比較表現","受動態"],"answer":"文脈・状況に依存する言語表現（this/here/now等）","explanation":"直示：this（これ）・here（ここ）・now（今）・I（私）など、文脈や発話状況がないと解釈できない語"},{"id":7101,"subject":"英文法","difficulty":1,"question":"「a number of」と「the number of」の違いは？","choices":["a number of＝いくつかの（複数扱い）・the number of＝〜の数（単数扱い）","同じ","a number ofが単数・the number ofが複数","どちらも複数扱い"],"answer":"a number of＝いくつかの（複数扱い）・the number of＝〜の数（単数扱い）","explanation":"a number of students are（複数）/ the number of students is（単数）"},{"id":7102,"subject":"英文法","difficulty":1,"question":"「接続詞のas」の用法として正しいのは？","choices":["時・理由・様態・比較・譲歩（〜するにつれて等）","場所","目的","結果のみ"],"answer":"時・理由・様態・比較・譲歩（〜するにつれて等）","explanation":"asは多義語：as he grew（時）/ as it is cheap（理由）/ do as I say（様態）/ as 比較など"},{"id":7103,"subject":"英文法","difficulty":1,"question":"「感情動詞の分詞」ingとedの使い分けは？","choices":["ingは感情を起こさせる・edは感情を感じている","ingが人・edが物","どちらも同じ","文脈次第"],"answer":"ingは感情を起こさせる・edは感情を感じている","explanation":"interesting film（映画が面白い）/ interested in the film（映画に興味がある）"},{"id":7104,"subject":"英文法","difficulty":1,"question":"「比較級を用いた同等表現」で「Aは以前ほど速くない」は？","choices":["A is not as fast as before","A is slower than before","A is less fast","A was faster"],"answer":"A is not as fast as before","explanation":"as〜as の否定：not as fast as before（= not so fast as before）"},{"id":7105,"subject":"英文法","difficulty":1,"question":"「未来を表す現在進行形」はどんな時に使う？","choices":["確実に予定されている近未来","遠い未来","習慣","仮定"],"answer":"確実に予定されている近未来","explanation":"I am leaving tomorrow.（明日出発する）。確実な予定・計画に使う。willより具体的"},{"id":7106,"subject":"英文法","difficulty":1,"question":"「進行形にできる動詞」はどれ？","choices":["think（考える：動作として）","know","believe","resemble"],"answer":"think（考える：動作として）","explanation":"I'm thinking about it.（今考えています）。動作として使う場合は進行形可。状態としては不可"},{"id":7107,"subject":"英文法","difficulty":1,"question":"「省略」が起こる代表的な構文は？","choices":["接続詞節内でS+be動詞を省略（When young＝When he was young）","関係節","名詞節","副詞節のみ"],"answer":"接続詞節内でS+be動詞を省略（When young＝When he was young）","explanation":"When (he was) young... / If (it is) possible... など"},{"id":7108,"subject":"英文法","difficulty":1,"question":"「付帯状況のwith」の語順は？","choices":["with＋O＋分詞/形容詞/副詞/前置詞句","with＋分詞＋O","with＋O＋動詞原形","with＋S＋V"],"answer":"with＋O＋分詞/形容詞/副詞/前置詞句","explanation":"with his eyes closed（目を閉じて）/ with his hands in his pockets（ポケットに手を入れて）"},{"id":7109,"subject":"英文法","difficulty":1,"question":"「It seems that〜」を書き換えると？","choices":["S seems to V（不定詞）","S seems V","S seem that","S is seeming that"],"answer":"S seems to V（不定詞）","explanation":"It seems that he is rich. = He seems to be rich.（現在）/ to have been rich.（過去）"},{"id":7110,"subject":"英文法","difficulty":1,"question":"「使役動詞haveの用法」でhave+O+過去分詞の意味は？","choices":["Oを〜してもらう・〜される","Oに〜させる（強制）","Oが〜している","Oを〜に連れていく"],"answer":"Oを〜してもらう・〜される","explanation":"I had my hair cut.（髪を切ってもらった）。受動的な意味も含む"},{"id":7111,"subject":"英文法","difficulty":2,"question":"「総称表現」で「犬は忠実だ」を英語で言う場合のどれが正しい？","choices":["Dogs are loyal. / A dog is loyal. / The dog is loyal.（全部可）","Only Dogs are loyal.","Dog is loyal.","A dogs is loyal."],"answer":"Dogs are loyal. / A dog is loyal. / The dog is loyal.（全部可）","explanation":"総称表現：Dogs（複数）/ A dog（不定冠詞）/ The dog（定冠詞）のどれも使える"},{"id":7112,"subject":"英文法","difficulty":2,"question":"「仮定法現在」が使われる表現は？","choices":["It is important that S (should) V（原形）","If S were〜","If S had Vpp〜","S wish S had Vpp"],"answer":"It is important that S (should) V（原形）","explanation":"It is important/necessary/essential that S (should) V（原形）。アメリカ英語でshouldを省略する傾向"},{"id":7113,"subject":"英文法","difficulty":2,"question":"「for fear that」の意味は？","choices":["〜するといけないので","〜するために","〜にもかかわらず","〜した後で"],"answer":"〜するといけないので","explanation":"for fear (that) S should V：〜するといけないので（= lest S should V）"},{"id":7114,"subject":"英文法","difficulty":2,"question":"「whether〜or not」と「if」の違いは？","choices":["whetherは主語・目的語・前置詞の目的語になれる・ifは主に目的語のみ","全く同じ","ifが格式的・whetherが口語的","どちらも同じ制限"],"answer":"whetherは主語・目的語・前置詞の目的語になれる・ifは主に目的語のみ","explanation":"Whether she comes is uncertain.（主語） → ifは使えない"},{"id":7115,"subject":"英文法","difficulty":2,"question":"「比較構文」で「AよりもむしろB」は？","choices":["A less than B / B rather than A / not so much A as B","A more than B","A instead of B","B before A"],"answer":"A less than B / B rather than A / not so much A as B","explanation":"複数の言い方がある。She is B rather than A.（BというよりA） = not so much A as B"},{"id":7116,"subject":"英文法","difficulty":2,"question":"「原形不定詞を取る知覚動詞」の例は？","choices":["see/hear/feel/watch + O + V原形","want/need + O + V原形","allow/permit + O + V原形","advise/encourage + O + V原形"],"answer":"see/hear/feel/watch + O + V原形","explanation":"I saw him run.（走るのを見た）。runningも可（途中の動作）。受動態ではto runに変わる"},{"id":7117,"subject":"英文法","difficulty":2,"question":"「独立不定詞（慣用表現）」の例は？","choices":["to be honest / to tell the truth / needless to say","to say that","to do this","to go there"],"answer":"to be honest / to tell the truth / needless to say","explanation":"独立不定詞は文全体を修飾する慣用句。to begin with（まず）/ so to speak（いわば）も同類"},{"id":7118,"subject":"英文法","difficulty":2,"question":"「can't have Vpp」の意味は？","choices":["〜したはずがない（過去の否定的推量）","〜したかもしれない","〜すべきだった","〜できたはずだ"],"answer":"〜したはずがない（過去の否定的推量）","explanation":"can't/couldn't have Vpp：〜したはずがない。She can't have said that.（彼女がそれを言ったはずがない）"},{"id":7119,"subject":"英文法","difficulty":2,"question":"「whoever/whatever/whichever」の共通の用法は？","choices":["譲歩の副詞節（〜であろうとも）と名詞節の両方","副詞節のみ","名詞節のみ","形容詞節のみ"],"answer":"譲歩の副詞節（〜であろうとも）と名詞節の両方","explanation":"Whoever comes is welcome.（名詞節）/ Whoever comes, I'll be ready.（副詞節）"},{"id":7120,"subject":"英文法","difficulty":2,"question":"「強調のfor（強調構文ではない）」の例は？","choices":["I haven't seen him for years.（何年も）","see him for","for good（永遠に）","for a while"],"answer":"I haven't seen him for years.（何年も）","explanation":"for years（何年も）・for ages（長い間）・for a long time：継続の期間を強調する表現"},{"id":7121,"subject":"英文法","difficulty":3,"question":"「反事実条件文（counterfactual）」の特徴は？","choices":["現実と反することを仮定する文（仮定法過去・仮定法過去完了）","現実の条件を述べる文","将来の条件を述べる文","一般的な真理を述べる文"],"answer":"現実と反することを仮定する文（仮定法過去・仮定法過去完了）","explanation":"If I were a bird（現在の反事実）/ If I had studied（過去の反事実）"},{"id":7122,"subject":"英文法","difficulty":3,"question":"「照応（anaphora）」とは何か？","choices":["先に出た表現を後で代名詞等で受けること","同じ語句の繰り返し","逆接の表現","引用の方法"],"answer":"先に出た表現を後で代名詞等で受けること","explanation":"I met John. He was kind.（Heがanaphora）。結束性（cohesion）の一形態"},{"id":7123,"subject":"英文法","difficulty":3,"question":"「認知言語学」の中心概念「スキーマ」とは？","choices":["経験から形成された抽象的な知識の枠組み","文法規則の体系","語彙の意味体系","音韻体系"],"answer":"経験から形成された抽象的な知識の枠組み","explanation":"スキーマ（schema）：経験から抽象化した知識の枠組み。言語理解の基盤となる背景知識"},{"id":7124,"subject":"英文法","difficulty":3,"question":"「言語の恣意性（arbitrariness）」とは？","choices":["語の形式と意味に必然的な関係がないこと","言語が変化すること","言語が社会によって異なること","語順が自由なこと"],"answer":"語の形式と意味に必然的な関係がないこと","explanation":"ソシュールの原則。「dog」という音が犬を表すのに必然的な理由はない（オノマトペを除く）"},{"id":7125,"subject":"英文法","difficulty":3,"question":"「等位接続詞（coordinating conjunction）」はどれ？","choices":["and / but / or / nor / for / yet / so（FANBOYS）","although","because","when"],"answer":"and / but / or / nor / for / yet / so（FANBOYS）","explanation":"等位接続詞（FANBOYS）：For/And/Nor/But/Or/Yet/So。文法的に対等な要素を結ぶ"},{"id":7126,"subject":"英文法","difficulty":1,"question":"「could have Vpp」の意味は？","choices":["〜できたはずなのにしなかった","〜したかもしれない","〜すべきだった","〜に違いない"],"answer":"〜できたはずなのにしなかった","explanation":"could have Vpp：〜できたはずなのにしなかった（過去の能力）/ 〜したかもしれない（推量）"},{"id":7127,"subject":"英文法","difficulty":1,"question":"「仮定法のwere to」の意味は？","choices":["（現在・未来）もし〜するなら（実現性低い）","過去の反事実","強調の表現","疑問文"],"answer":"（現在・未来）もし〜するなら（実現性低い）","explanation":"If S were to V：（現在・未来）万が一〜するとしたら（仮定の実現性が低い・ありえない事態）"},{"id":7128,"subject":"英文法","difficulty":1,"question":"「否定の強調」で「little/few」の意味は？","choices":["ほとんど〜ない（準否定語）","全く〜ない","時々〜ない","普通に少ない"],"answer":"ほとんど〜ない（準否定語）","explanation":"little（不可算）・few（可算）＝ほとんど〜ない。a little / a few（少しある）との違いに注意"},{"id":7129,"subject":"英文法","difficulty":1,"question":"「Let alone」の文法的特徴は？","choices":["否定文の後で「〜はもちろん」","肯定文でも使える","疑問文専用","命令文専用"],"answer":"否定文の後で「〜はもちろん」","explanation":"He can't walk, let alone run.（走るどころか歩けない）。否定文の後で否定を強調する"},{"id":7130,"subject":"英文法","difficulty":1,"question":"「形容詞の限定用法と叙述用法」の違いは？","choices":["限定用法は名詞を直接修飾・叙述用法はbe動詞等の後に来る","同じ","限定用法のみある形容詞がある","叙述用法のみある形容詞がある"],"answer":"限定用法は名詞を直接修飾・叙述用法はbe動詞等の後に来る","explanation":"限定用法のみ：main/mere/utter。叙述用法のみ：alive/asleep/afraid/ashamed等"},{"id":7131,"subject":"英文法","difficulty":2,"question":"「義務・当然」を表すmustとhave toの違いは？","choices":["must＝話者の主観的義務・have to＝外部からの義務","同じ","mustが強い・have toが弱い","mustが口語・have toが文語"],"answer":"must＝話者の主観的義務・have to＝外部からの義務","explanation":"You must stop smoking.（私が言う）/ You have to stop.（法律等で決まっている）"},{"id":7132,"subject":"英文法","difficulty":2,"question":"「完了不定詞（to have Vpp）」の意味は？","choices":["述語動詞より前の時点を表す","未来の動作","仮定の状況","願望"],"answer":"述語動詞より前の時点を表す","explanation":"He seems to have been rich.（かつて裕福だったようだ）/ He is said to have left.（去ったと言われている）"},{"id":7133,"subject":"英文法","difficulty":2,"question":"「接続詞のthough/although/even though」の意味は？","choices":["〜にもかかわらず（譲歩）","〜のために","〜の結果として","〜という条件で"],"answer":"〜にもかかわらず（譲歩）","explanation":"though/although/even though：〜にもかかわらず。even thoughが最も強調的。even ifは仮定"},{"id":7134,"subject":"英文法","difficulty":2,"question":"「共通語句の省略（ellipsis）」の例は？","choices":["She can swim and (she can) dive.","She can and he swim.","She swim and dive.","She can swim dive."],"answer":"She can swim and (she can) dive.","explanation":"等位接続詞で繋がれた節の共通部分を省略する。She can swim and (she can) dive."},{"id":7135,"subject":"英文法","difficulty":2,"question":"「間投詞（interjection）」の例は？","choices":["Oh! / Wow! / Ouch! / Hmm...","who/what/where","and/but/or","if/when/because"],"answer":"Oh! / Wow! / Ouch! / Hmm...","explanation":"間投詞は感情・反応を表す語。文法的な働きをしない独立語"},{"id":7136,"subject":"英文法","difficulty":2,"question":"「法助動詞（modal auxiliary）」の特徴は？","choices":["三人称単数でsがつかない・後ろは動詞原形","三人称でsがつく","過去形を持つ（全て）","否定形がない"],"answer":"三人称単数でsがつかない・後ろは動詞原形","explanation":"can/will/shall/may/must等。He cans（×）/ He can（○）。後ろは必ず動詞原形"},{"id":7137,"subject":"英文法","difficulty":2,"question":"「前置詞inとat」の使い分け（場所）は？","choices":["in＝広い空間・at＝特定の地点","in＝建物・at＝屋外","どちらも同じ","in＝小さい場所・at＝大きい場所"],"answer":"in＝広い空間・at＝特定の地点","explanation":"in Tokyo（東京の中）/ at the station（駅という地点）。atは地点、inは空間内"},{"id":7138,"subject":"英文法","difficulty":2,"question":"「目的語と補語の区別」でどちらが正しい？","choices":["She made him happy（happyは補語）","She made him a genius（a geniusは目的語）","どちらも目的語","どちらも補語"],"answer":"She made him happy（happyは補語）","explanation":"made him happy：O=him、C=happy（SVOC）/ made him a cake：O=him、O=cake（SVOO）"},{"id":7139,"subject":"英文法","difficulty":2,"question":"「否定倒置」でNot only〜の後は？","choices":["倒置（助動詞/be動詞＋S）","通常の語順","命令文","疑問文と同じ"],"answer":"倒置（助動詞/be動詞＋S）","explanation":"Not only did he come, but he also brought gifts.（倒置＋but alsoで続く）"},{"id":7140,"subject":"英文法","difficulty":2,"question":"「関係代名詞のwhat」の用法は？","choices":["先行詞を含む関係代名詞（the thing(s) which/that）","疑問詞","接続詞","形容詞"],"answer":"先行詞を含む関係代名詞（the thing(s) which/that）","explanation":"What surprised me was his answer.（私を驚かせたのは彼の答えだった）"},{"id":7141,"subject":"英文法","difficulty":3,"question":"「アスペクト（aspect）」とは？","choices":["動作の時間的な展開の仕方（完了・進行等）","動作の時間的位置（過去・現在・未来）","話者の判断・態度","受身か能動か"],"answer":"動作の時間的な展開の仕方（完了・進行等）","explanation":"テンス（時制）が時の位置を表すのに対し、アスペクトは動作の始まり・継続・完了等を表す"},{"id":7142,"subject":"英文法","difficulty":3,"question":"「焦点（focus）」と「前提（presupposition）」の違いは？","choices":["焦点は新情報・前提は既知情報","どちらも同じ","焦点は古い情報","前提は新情報"],"answer":"焦点は新情報・前提は既知情報","explanation":"「John killed Mary.」→ Maryは殺されたことが前提。誰が殺したかが焦点（新情報）"},{"id":7143,"subject":"英文法","difficulty":3,"question":"「語の内部構造」を研究する分野は？","choices":["形態論（morphology）","音韻論","意味論","統語論"],"answer":"形態論（morphology）","explanation":"形態論：形態素（morpheme）の組み合わせによる語の構造を研究する言語学の分野"},{"id":7144,"subject":"英文法","difficulty":3,"question":"「言語相対論（サピア・ウォーフ仮説）」とは？","choices":["使用する言語が思考・認知に影響する","言語は普遍的","言語は文化と無関係","全ての言語は同じ構造"],"answer":"使用する言語が思考・認知に影響する","explanation":"強い仮説（言語が思考を決定）は否定されたが、弱い仮説（言語が思考に影響）は支持されている"},{"id":7145,"subject":"英文法","difficulty":3,"question":"「句動詞（phrasal verb）」の特徴は？","choices":["動詞＋副詞/前置詞で独自の意味を持つ","単語のみで意味が決まる","分離できない","必ず目的語が必要"],"answer":"動詞＋副詞/前置詞で独自の意味を持つ","explanation":"give up（諦める）/ look into（調査する）/ come across（偶然出会う）等"},{"id":7146,"subject":"英文法","difficulty":1,"question":"「to不定詞の意味上の主語」はどう表す？","choices":["for＋O＋to V（一般的）/ of＋O＋to V（人の性質の形容詞）","with＋O＋to V","by＋O＋to V","of＋O＋の常に"],"answer":"for＋O＋to V（一般的）/ of＋O＋to V（人の性質の形容詞）","explanation":"It is easy for him to do.（一般）/ It is kind of you to help.（kindは人の性質）"},{"id":7147,"subject":"英文法","difficulty":1,"question":"「受動態が使えない動詞」は？","choices":["lack/resemble/become等の状態動詞","write/read","see/hear","give/send"],"answer":"lack/resemble/become等の状態動詞","explanation":"He lacks confidence.（×Confidence is lacked by him.）。状態動詞は受動態にしない"},{"id":7148,"subject":"英文法","difficulty":1,"question":"「so + 形容詞 + that」の意味は？","choices":["非常に〜なので...","〜のために","〜にもかかわらず","〜という条件で"],"answer":"非常に〜なので...","explanation":"so + 形容詞/副詞 + that：非常に〜なので...（= such + 名詞 + that）"},{"id":7149,"subject":"英文法","difficulty":1,"question":"「neither A nor B」の動詞はどちらに合わせる？","choices":["Bに合わせる","Aに合わせる","常に複数","常に単数"],"answer":"Bに合わせる","explanation":"Neither she nor I am going.（I am）/ Neither I nor she is going.（she is）→Bに合わせる"},{"id":7150,"subject":"英文法","difficulty":1,"question":"「名詞の前後どちらに来る形容詞」の例は？","choices":["前置のみ：mere/main / 後置あり：something old","前置のみが基本","後置のみが基本","どちらでも同じ"],"answer":"前置のみ：mere/main / 後置あり：something old","explanation":"something old（-thingには後置）/ all available seats（後置）/ the president elect（後置）"},{"id":7151,"subject":"英文法","difficulty":2,"question":"「助動詞の過去形の用法」について正しいのは？","choices":["過去形でも現在・未来の意味になることがある（丁寧・仮定）","必ず過去を表す","時制と完全に対応","could=canの過去形のみ"],"answer":"過去形でも現在・未来の意味になることがある（丁寧・仮定）","explanation":"Could you help me?（丁寧）/ If I could fly（仮定法）。過去の意味以外にも使う"},{"id":7152,"subject":"英文法","difficulty":2,"question":"「数量詞（determiner）」の例は？","choices":["some/any/many/few/all/both/each/every","because/although","who/which","very/quite"],"answer":"some/any/many/few/all/both/each/every","explanation":"数量詞は名詞の量・数を限定する語。冠詞（a/the）も広義のdeterminer"},{"id":7153,"subject":"英文法","difficulty":2,"question":"「比較級の強調」に使える語は？","choices":["much/far/even/still/a lot（だいぶ〜）","very","so","the"],"answer":"much/far/even/still/a lot（だいぶ〜）","explanation":"much better / far worse / even harder。very＋比較級は基本的に不可（×very better）"},{"id":7154,"subject":"英文法","difficulty":2,"question":"「副詞の位置」のルールで「頻度副詞（always/often）」は？","choices":["be動詞の後・一般動詞の前","文末","文頭のみ","どこでも同じ"],"answer":"be動詞の後・一般動詞の前","explanation":"He is always late.（be動詞の後）/ He always comes late.（一般動詞の前）"},{"id":7155,"subject":"英文法","difficulty":2,"question":"「群動詞（phrasal verb）の分離」は可能か？","choices":["他動詞句は分離可能（turn the TV off / turn off the TV）","常に分離できない","常に分離する","代名詞の場合のみ分離"],"answer":"他動詞句は分離可能（turn the TV off / turn off the TV）","explanation":"代名詞の場合は必ず分離：turn it off（○）/ turn off it（×）"},{"id":7156,"subject":"英文法","difficulty":3,"question":"「言語習得のU字型発達」とは？","choices":["正しく使っていた形を過剰一般化で誤る→再び正確になる","常に上達する","後退するのみ","U字の意味がない"],"answer":"正しく使っていた形を過剰一般化で誤る→再び正確になる","explanation":"例：went→goed（過剰一般化）→went（再び正確）。過剰一般化による一時的後退"},{"id":7157,"subject":"英文法","difficulty":3,"question":"「言語の二重分節性（double articulation）」とは？","choices":["音素レベルと形態素レベルの2段階で意味が組み立てられる","二言語を話す","二つの文法体系","語と文の二段階"],"answer":"音素レベルと形態素レベルの2段階で意味が組み立てられる","explanation":"マルチネが提唱。意味を持つ最小単位（形態素）と意味を持たない最小単位（音素）の二段階"},{"id":7158,"subject":"英文法","difficulty":3,"question":"「含意（entailment）」と「前提（presupposition）」の違いは？","choices":["含意は文が真なら成立・前提は文の真偽にかかわらず成立","同じ","含意が強い","前提が強い"],"answer":"含意は文が真なら成立・前提は文の真偽にかかわらず成立","explanation":"John stopped smoking（前提：以前は吸っていた）。文を否定しても前提は残る"},{"id":7159,"subject":"英文法","difficulty":3,"question":"「談話のグライスの協調原理」の4つの格率は？","choices":["量・質・関連性・様態","時間・場所・人物・目的","主語・述語・目的語・補語","音・語・句・文"],"answer":"量・質・関連性・様態","explanation":"Grice：量（必要なだけ）・質（真実）・関連性（話題に関連）・様態（明瞭に）の4格率"},{"id":7160,"subject":"英文法","difficulty":3,"question":"「発話行為理論（speech act theory）」のオースティンの3分類は？","choices":["発語行為・発語内行為・発語媒介行為","主語・述語・補語","直接・間接・埋め込み","宣言・疑問・命令"],"answer":"発語行為・発語内行為・発語媒介行為","explanation":"オースティン：発語行為（言葉を発すること）・発語内行為（命令・約束等）・発語媒介行為（影響）"},{"id":7161,"subject":"英文法","difficulty":1,"question":"「thereの存在文」で動詞の数はどちらに合わせる？","choices":["後ろの名詞（主語）に合わせる","Thereに合わせて常に単数","常に複数","文頭の語に合わせる"],"answer":"後ろの名詞（主語）に合わせる","explanation":"There is a book.（単数）/ There are two books.（複数）。Thereは形式上の主語"},{"id":7162,"subject":"英文法","difficulty":1,"question":"「every/each/either/neither」の後の動詞は？","choices":["単数扱い","複数扱い","文脈次第","常にbe動詞"],"answer":"単数扱い","explanation":"Every student is responsible.（単数）/ Each of them is...（単数）。配布的な意味で個別に扱う"},{"id":7163,"subject":"英文法","difficulty":1,"question":"「much/many/a lot of」の使い分けは？","choices":["much＝不可算名詞・many＝可算名詞複数・a lot of＝両方","どれも同じ","much＝複数・many＝単数","a lot ofのみ両方"],"answer":"much＝不可算名詞・many＝可算名詞複数・a lot of＝両方","explanation":"much time / many books / a lot of time・a lot of books"},{"id":7164,"subject":"英文法","difficulty":1,"question":"「the + 形容詞」で複数を表す例は？","choices":["the poor（貧しい人々）/ the young（若者）","the poor man","a poor","poor"],"answer":"the poor（貧しい人々）/ the young（若者）","explanation":"the rich（お金持ち）/ the dead（死者）/ the elderly（高齢者）。集合的に人々を指す"},{"id":7165,"subject":"英文法","difficulty":1,"question":"「副詞のenough」の位置は？","choices":["形容詞・副詞の後","前","前後どちらでも","動詞の前"],"answer":"形容詞・副詞の後","explanation":"fast enough（十分速い）/ good enough（十分よい）。形容詞の前にはa lot/soなど"},{"id":7166,"subject":"英文法","difficulty":2,"question":"「仮定法過去完了」の形は？","choices":["If S had Vpp, S would have Vpp","If S were, S would V","If S Vpp, S would V","If S had V, S would Vpp"],"answer":"If S had Vpp, S would have Vpp","explanation":"If I had studied, I would have passed.（勉強していたら合格できた）"},{"id":7167,"subject":"英文法","difficulty":2,"question":"「形式目的語itを取る動詞」の例は？","choices":["find/make/think/consider it + 形容詞 + to V","see/hear","give/send","tell/show"],"answer":"find/make/think/consider it + 形容詞 + to V","explanation":"I found it difficult to solve.（itが形式目的語、to solveが真の目的語）"},{"id":7168,"subject":"英文法","difficulty":2,"question":"「同格のofの用法」の例は？","choices":["the city of Tokyo（東京という都市）","give a gift of","think of","because of"],"answer":"the city of Tokyo（東京という都市）","explanation":"the city of Tokyo / the title of president / the word of advice。ofの前後が同格関係"},{"id":7169,"subject":"英文法","difficulty":2,"question":"「as well as」を使った場合の動詞の数は？","choices":["前の名詞に合わせる（括弧的）","後ろの名詞に合わせる","常に複数","常に単数"],"answer":"前の名詞に合わせる（括弧的）","explanation":"He as well as they is responsible.（heに合わせてis）。as well asは括弧的用法"},{"id":7170,"subject":"英文法","difficulty":2,"question":"「感嘆文のwhat」のパターンは？","choices":["What + (a/an) + 形容詞 + 名詞 + S + V!","What + 形容詞 + S + V!","What + S + V!","What + 動詞！"],"answer":"What + (a/an) + 形容詞 + 名詞 + S + V!","explanation":"What a beautiful day it is! / What nonsense he talks! 名詞を中心に構成"},{"id":7171,"subject":"英文法","difficulty":3,"question":"「インクルーシブ・エクスクルーシブ区別（inclusive/exclusive we）」とは？","choices":["聞き手を含む「私たち」か含まない「私たち」かの区別（英語にはない）","英語の文法用語","代名詞の格","数の区別"],"answer":"聞き手を含む「私たち」か含まない「私たち」かの区別（英語にはない）","explanation":"英語のweには区別がないが、日本語・多くの言語にある。言語の普遍性と多様性を示す例"},{"id":7172,"subject":"英文法","difficulty":3,"question":"「語順類型論」でSOV型の言語の例は？","choices":["日本語・韓国語・トルコ語","英語","中国語","フランス語"],"answer":"日本語・韓国語・トルコ語","explanation":"語順類型：SOV（日・韓・トルコ）/ SVO（英・中・仏）/ VSO（アラビア語）等"},{"id":7173,"subject":"英文法","difficulty":3,"question":"「プロドロップ（pro-drop）言語」の特徴は？","choices":["主語の代名詞を省略できる（日・スペイン語等）","目的語を省略できる","動詞を省略できる","冠詞がない"],"answer":"主語の代名詞を省略できる（日・スペイン語等）","explanation":"日本語：「行きます」（Iを省略）。英語はnon-pro-drop（Iを省略できない）"},{"id":7174,"subject":"英文法","difficulty":3,"question":"「言語の創造性（productivity/creativity）」とは？","choices":["有限の語彙・規則で無限の文を生成できる能力","新語を作る能力","詩を作る能力","翻訳能力"],"answer":"有限の語彙・規則で無限の文を生成できる能力","explanation":"チョムスキーが強調した言語の特性。以前に聞いたことのない文を生成・理解できる"},{"id":7175,"subject":"英文法","difficulty":3,"question":"「形態素の分類」で「接辞（affix）」の種類は？","choices":["接頭辞（prefix）・接尾辞（suffix）・接中辞（infix）","語根（root）・語幹（stem）","自由形態素・拘束形態素","コアとシェル"],"answer":"接頭辞（prefix）・接尾辞（suffix）・接中辞（infix）","explanation":"un-(prefix) / -ness(suffix) / -bloody- in abso-bloody-lutely(infix・英俚語)"},{"id":7176,"subject":"英文法","difficulty":1,"question":"「現在形が未来を表す」のはどんな場合？","choices":["確実な予定・時刻表・時・条件の副詞節の中","常に現在を表す","過去のみ","仮定の場合"],"answer":"確実な予定・時刻表・時・条件の副詞節の中","explanation":"The train leaves at 8.（時刻表）/ If he comes（条件節）。副詞節の中では現在形が未来を表す"},{"id":7177,"subject":"英文法","difficulty":1,"question":"「間接目的語と直接目的語」の順番は？","choices":["V＋間接O（人）＋直接O（物）/ V＋直接O＋to/for＋間接O","常に物が先","常に人が後","to/forは常に不要"],"answer":"V＋間接O（人）＋直接O（物）/ V＋直接O＋to/for＋間接O","explanation":"Give me the book. / Give the book to me.（toを使う動詞：give/send/show/tell等）"},{"id":7178,"subject":"英文法","difficulty":1,"question":"「関係代名詞thatが好まれる」場合は？","choices":["先行詞がthe first/only/最上級・先行詞が人＋物の場合","先行詞が人","非制限用法","前置詞の後"],"answer":"先行詞がthe first/only/最上級・先行詞が人＋物の場合","explanation":"the best book that / the first man that / the people and places that（人＋物）"},{"id":7179,"subject":"英文法","difficulty":1,"question":"「動名詞のみをとる動詞」の例は？","choices":["enjoy/finish/avoid/mind/deny/give up","hope/want/decide","force/allow/expect","try/remember/forget（用法で意味が変わる）"],"answer":"enjoy/finish/avoid/mind/deny/give up","explanation":"enjoy swimming（○）/ enjoy to swim（×）。try to V（しようとする）/ try Ving（試しにやってみる）は両方あり"},{"id":7180,"subject":"英文法","difficulty":1,"question":"「to不定詞のみをとる動詞」の例は？","choices":["want/hope/decide/plan/refuse/expect","enjoy/finish/avoid","mind/practice","suggest/recommend"],"answer":"want/hope/decide/plan/refuse/expect","explanation":"want to go（○）/ want going（×）。decide to V / refuse to V も同様"},{"id":7181,"subject":"英文法","difficulty":2,"question":"「強調のdo倒置」の例は？","choices":["Little did I know...（Littleが文頭→倒置）","I did know...（強調のdo）","Do you know...（疑問）","I know...（平叙）"],"answer":"Little did I know...（Littleが文頭→倒置）","explanation":"Little did I know that...（〜とは少しも知らなかった）。否定の副詞＋倒置のパターン"},{"id":7182,"subject":"英文法","difficulty":2,"question":"「譲歩節のas」（倒置）の例は？","choices":["Young as he is（若いが）＝Though he is young","As he is young","Young he is","As young"],"answer":"Young as he is（若いが）＝Though he is young","explanation":"形容詞/副詞/名詞＋as＋S＋V：〜だが（譲歩）。Try as he might（どれほど頑張っても）も同形"},{"id":7183,"subject":"英文法","difficulty":2,"question":"「接続詞のunless」の意味は？","choices":["〜でない限り（= if not）","〜だから","〜にもかかわらず","〜した後で"],"answer":"〜でない限り（= if not）","explanation":"Unless it rains（雨が降らない限り）= If it doesn't rain。仮定法では通常使わない"},{"id":7184,"subject":"英文法","difficulty":2,"question":"「強調構文と分裂文の見分け方」は？","choices":["It is/was ... that〜のthat以降がなくても文が成立する","thatが必ずある","強調されるのは主語のみ","常にIt isで始まる"],"answer":"It is/was ... that〜のthat以降がなくても文が成立する","explanation":"It was John that broke the window. → John broke the window.（thatなしで成立）"},{"id":7185,"subject":"英文法","difficulty":2,"question":"「not so much A as B」の意味は？","choices":["AというよりもむしろB","AとBは同等","AもBもない","AでもなくBでもない"],"answer":"AというよりもむしろB","explanation":"not so much A as B = less A than B = B rather than A。She is not so much a teacher as a friend."},{"id":7186,"subject":"英文法","difficulty":3,"question":"「テキストの結束性（cohesion）」の手段は？","choices":["照応・省略・接続・語彙的結束","句読点","語順","時制のみ"],"answer":"照応・省略・接続・語彙的結束","explanation":"ハリデー＆ハサン：照応（he/she等）・省略・接続（however等）・語彙的結束（同義語等）"},{"id":7187,"subject":"英文法","difficulty":3,"question":"「語用論的含意（Gricean implicature）」の例は？","choices":["Can you pass the salt?＝塩を取ってという依頼","疑問文","命令文","感嘆文"],"answer":"Can you pass the salt?＝塩を取ってという依頼","explanation":"文字通りの意味（能力の質問）を超えた含意（依頼）。グライスの関連性格率から生まれる"},{"id":7188,"subject":"英文法","difficulty":3,"question":"「文の情報構造（topic-comment）」とは？","choices":["topicは文の主題・commentはその述べ方（旧情報→新情報の流れ）","主語と述語","主動詞と助動詞","名詞句と動詞句"],"answer":"topicは文の主題・commentはその述べ方（旧情報→新情報の流れ）","explanation":"自然な文は旧情報（topic）から新情報（comment）の流れで構成される"},{"id":7189,"subject":"英文法","difficulty":3,"question":"「統語的曖昧性（syntactic ambiguity）」の例は？","choices":["I saw the man with a telescope（私が望遠鏡で／望遠鏡を持つ男）","単語が多義","音が同じ","スペルが違う"],"answer":"I saw the man with a telescope（私が望遠鏡で／望遠鏡を持つ男）","explanation":"構造的な曖昧性。前置詞句の係り先によって意味が変わる。Visiting relatives can be boring.も同様"},{"id":7190,"subject":"英文法","difficulty":3,"question":"「文体論（stylistics）」が研究するのは？","choices":["言語使用の文体的特徴（文学・修辞等）","文法規則","語彙の意味","音の体系"],"answer":"言語使用の文体的特徴（文学・修辞等）","explanation":"文体論：文学テキスト等の言語的特徴（語彙選択・文構造・修辞等）を言語学的に分析する"},{"id":7191,"subject":"英文法","difficulty":1,"question":"「副詞節の時制」で未来を表す場合は？","choices":["現在形（When he comes, I'll tell him.）","will＋V","would＋V","had＋Vpp"],"answer":"現在形（When he comes, I'll tell him.）","explanation":"時・条件・譲歩の副詞節では未来でも現在形。If it rains / When she arrives / Though he tries"},{"id":7192,"subject":"英文法","difficulty":1,"question":"「〜するのは時間の問題だ」の表現は？","choices":["It is only a matter of time before S V","Time before S V","S will happen soon","It takes time"],"answer":"It is only a matter of time before S V","explanation":"It is (only) a matter of time before S V：〜するのは時間の問題だ"},{"id":7193,"subject":"英文法","difficulty":1,"question":"「〜してもよい（許可）」を表す助動詞は？","choices":["can/may/could/might（丁寧さの順に）","must/should","will/shall","need/dare"],"answer":"can/may/could/might（丁寧さの順に）","explanation":"Can I go?（カジュアル）/ May I go?（丁寧）/ Could I...?（より丁寧）/ Might I...?（最も丁寧・古風）"},{"id":7194,"subject":"英文法","difficulty":1,"question":"「that節を目的語にとる動詞」の例は？","choices":["think/believe/know/say/find/feel","enjoy/finish/avoid","want/hope","make/let/have"],"answer":"think/believe/know/say/find/feel","explanation":"I think that she is right. / I believe that...。thatはしばしば省略される"},{"id":7195,"subject":"英文法","difficulty":1,"question":"「再帰代名詞（myself/yourself等）」の用法は？","choices":["再帰用法（主語と同じ対象）・強調用法（〜自身）","所有格として","主語として","目的語として常に必要"],"answer":"再帰用法（主語と同じ対象）・強調用法（〜自身）","explanation":"He hurt himself.（再帰）/ He himself did it.（強調）/ by oneself（一人で）"},{"id":7196,"subject":"英文法","difficulty":2,"question":"「it is no use doing」の意味は？","choices":["〜しても無駄だ","〜する価値がある","〜する必要がある","〜するのは簡単だ"],"answer":"〜しても無駄だ","explanation":"It is no use crying.（泣いても無駄だ）= It is useless to cry. / There is no point in crying."},{"id":7197,"subject":"英文法","difficulty":2,"question":"「〜する価値がある」の表現は？","choices":["be worth doing / be worthwhile to do / It is worth doing","be useful","be necessary","be possible"],"answer":"be worth doing / be worthwhile to do / It is worth doing","explanation":"This book is worth reading.（= It is worth reading this book.）"},{"id":7199,"subject":"英文法","difficulty":2,"question":"「should の婉曲用法」の例は？","choices":["I should think so.（〜と思います：婉曲）","You should go.（義務）","He should come.（推量）","Should you go?（疑問）"],"answer":"I should think so.（〜と思います：婉曲）","explanation":"I should like to...（〜したいと思います）。婉曲・控えめな表現として使うshould"},{"id":7200,"subject":"英文法","difficulty":2,"question":"「名詞節を導く接続詞that」の省略は？","choices":["目的語のthatは省略可・主語・補語のthatは省略不可","常に省略可","常に省略不可","主語のみ省略可"],"answer":"目的語のthatは省略可・主語・補語のthatは省略不可","explanation":"I know (that) he's right.（目的語のthat省略可）/ That he's right is clear.（主語のthat省略不可）"},{"id":7206,"subject":"英文法","difficulty":2,"question":"「比較の強調」に使える表現は？","choices":["much / far / even / still / a lot + 比較級","very + 比較級","more + 比較級","the + 比較級"],"answer":"much / far / even / still / a lot + 比較級","explanation":"much better / far more interesting / even worse。×very betterは誤り"},{"id":7207,"subject":"英文法","difficulty":2,"question":"「現在完了形と一緒に使えない副詞」は？","choices":["yesterday / last year / ago / when（過去の特定時点）","already / yet / ever / never","just / recently","since / for"],"answer":"yesterday / last year / ago / when（過去の特定時点）","explanation":"I have seen him yesterday.（×）→ I saw him yesterday.（○）"},{"id":7208,"subject":"英文法","difficulty":2,"question":"「It is + 形容詞 + for + O + to V」に使う形容詞の例は？","choices":["easy / difficult / important / possible（行為の性質）","kind / wise / foolish（ofを使う）","both","形容詞は使えない"],"answer":"easy / difficult / important / possible（行為の性質）","explanation":"It is easy for him to do it.（彼がするのは簡単だ）。行為の難易・重要性を表す形容詞"},{"id":7209,"subject":"英文法","difficulty":2,"question":"「believe in」と「believe」の意味の違いは？","choices":["believe in：存在・価値を信じる / believe：言葉を信じる","どちらも同じ","believe inが否定的","believe inが確信が強い"],"answer":"believe in：存在・価値を信じる / believe：言葉を信じる","explanation":"believe in God（神の存在を信じる）/ believe him（彼の言葉を信じる）"},{"id":7210,"subject":"英文法","difficulty":2,"question":"「as well as」の動詞一致は？","choices":["前の名詞（主語）に合わせる","後の名詞に合わせる","常に複数","常に単数"],"answer":"前の名詞（主語）に合わせる","explanation":"Tom as well as his friends is coming.（Tomに合わせてis）。not only A but also B とは異なる"},{"id":7211,"subject":"英文法","difficulty":3,"question":"「機能語」と「内容語」の違いは？","choices":["機能語は文法的役割、内容語は語彙的意味を担う","同じもの","機能語が意味が豊富","内容語が文法的"],"answer":"機能語は文法的役割、内容語は語彙的意味を担う","explanation":"機能語：前置詞・接続詞・助動詞・冠詞など。内容語：名詞・動詞・形容詞・副詞"},{"id":7212,"subject":"英文法","difficulty":3,"question":"「語用論的含意の取り消し可能性（cancellability）」とは？","choices":["含意は文脈によって取り消せる（会話の含意の特徴）","文字通りの意味","含意は取り消せない","論理的推論"],"answer":"含意は文脈によって取り消せる（会話の含意の特徴）","explanation":"She has some money—in fact all of it.（someの含意「全部ではない」が取り消された）"},{"id":7213,"subject":"英文法","difficulty":3,"question":"「第一言語習得の臨界期仮説」とは？","choices":["ある年齢（思春期）以降は母語話者水準の習得が困難","生まれながらの能力","環境の重要性","教育の重要性"],"answer":"ある年齢（思春期）以降は母語話者水準の習得が困難","explanation":"レネバーグが提唱。臨界期を過ぎた後の言語習得は困難になるという仮説"},{"id":7214,"subject":"英文法","difficulty":3,"question":"「音節（syllable）」の必須要素は？","choices":["核（nucleus・主に母音）","頭子音","末子音","すべてが必須"],"answer":"核（nucleus・主に母音）","explanation":"音節構造：頭子音（onset）＋核（nucleus）＋末子音（coda）。核（母音）が必須要素"},{"id":7215,"subject":"英文法","difficulty":3,"question":"「形態論（morphology）」が扱う最小単位は？","choices":["形態素（morpheme）—意味を持つ最小単位","音素（phoneme）","文（sentence）","段落（paragraph）"],"answer":"形態素（morpheme）—意味を持つ最小単位","explanation":"morphology：語の内部構造・形成を研究。接頭辞・接尾辞・語根など"},{"id":7216,"subject":"英文法","difficulty":1,"question":"「関係副詞where / when / why / how」の使い分けは？","choices":["先行詞が場所/時/理由/方法に対応","先行詞が人/物に対応","すべてwhereで代用可","先行詞のタイプに関係ない"],"answer":"先行詞が場所/時/理由/方法に対応","explanation":"the place where / the time when / the reason why / the way（+ how省略可）"},{"id":7217,"subject":"英文法","difficulty":1,"question":"「助動詞could」の用法は？","choices":["過去の能力・丁寧な依頼・仮定・可能性","未来のみ","現在のみ","命令のみ"],"answer":"過去の能力・丁寧な依頼・仮定・可能性","explanation":"Could you help me?（丁寧）/ He could swim.（過去の能力）/ It could be true.（可能性）"},{"id":7218,"subject":"英文法","difficulty":1,"question":"「進行形が使えない状態動詞」の追加例は？","choices":["belong / contain / resemble / consist / prefer","run / eat / write","think（進行形可）","work / study"],"answer":"belong / contain / resemble / consist / prefer","explanation":"belong to / contain / resemble / consist of / prefer は状態動詞で進行形不可"},{"id":7219,"subject":"英文法","difficulty":1,"question":"「冠詞の省略」が必要な場合は？","choices":["固有名詞・不可算名詞（一般的意味）・複数形（一般的意味）","常に冠詞が必要","不定冠詞のみ省略可","定冠詞のみ省略可"],"answer":"固有名詞・不可算名詞（一般的意味）・複数形（一般的意味）","explanation":"Water is essential.（一般的真理）/ Dogs are loyal.（犬一般）/ Japan（固有名詞）"},{"id":7220,"subject":"英文法","difficulty":1,"question":"「副詞節の時制」で注意が必要なのは？","choices":["時・条件の副詞節では未来のことも現在形","過去のことも現在形","主節と常に同じ","仮定法を常に使う"],"answer":"時・条件の副詞節では未来のことも現在形","explanation":"When he comes, I'll tell him.（comes = 現在形、未来のこと）"},{"id":7221,"subject":"英文法","difficulty":2,"question":"「be worth + 動名詞」の使い方は？","choices":["The book is worth reading.（読む価値がある）","The book is worth to read.","The book is worthy reading.","The book is worthwhile to read."],"answer":"The book is worth reading.（読む価値がある）","explanation":"worth の後は動名詞。worthy of + 名詞/動名詞も同様の意味"},{"id":7222,"subject":"英文法","difficulty":2,"question":"「倒置構文 no sooner / scarcely / hardly」の位置が文頭に来ると？","choices":["倒置（助動詞/be動詞が主語の前）","通常語順","主語が文末","動詞が省略"],"answer":"倒置（助動詞/be動詞が主語の前）","explanation":"Hardly had I arrived when it started.（Had Iが倒置）"},{"id":7223,"subject":"英文法","difficulty":2,"question":"「前置詞 through」の意味は？","choices":["通して・おかげで・一部始終","上に","下に","前に"],"answer":"通して・おかげで・一部始終","explanation":"through the window（通して）/ through his help（おかげで）/ through Monday to Friday（通じて）"},{"id":7224,"subject":"英文法","difficulty":2,"question":"「付帯状況の分詞」の例は？","choices":["She left, waving her hand.（手を振りながら去った）","She left waved her hand.","Waved her hand, she left.","She left for waving her hand."],"answer":"She left, waving her hand.（手を振りながら去った）","explanation":"付帯状況：主節と同時に起きている動作。with + O + 分詞も同じ意味"},{"id":7225,"subject":"英文法","difficulty":2,"question":"「原形不定詞」を取る慣用表現は？","choices":["would rather / had better / cannot but / do nothing but","want / expect","advise / encourage","tell / ask"],"answer":"would rather / had better / cannot but / do nothing but","explanation":"I would rather stay.（むしろ〜したい）/ You had better go.（〜した方がいい）"},{"id":7226,"subject":"英文法","difficulty":3,"question":"「文法化（grammaticalization）」とは？","choices":["語彙項目が文法的機能語になる変化","文法の学習","文法の規則","文章の構造"],"answer":"語彙項目が文法的機能語になる変化","explanation":"例：going to（行く予定→未来を表す助動詞的用法）。語彙→文法への変化"},{"id":7227,"subject":"英文法","difficulty":3,"question":"「メタファーと換喩（メトニミー）の違い」は？","choices":["メタファーは類似性・メトニミーは隣接性に基づく","同じもの","メタファーが広い","メトニミーが文学的"],"answer":"メタファーは類似性・メトニミーは隣接性に基づく","explanation":"時間はお金だ（メタファー・類似）/ ホワイトハウスが発表した（換喩・建物→権力の隣接）"},{"id":7228,"subject":"英文法","difficulty":3,"question":"「慣用表現（idiom）」の特徴は？","choices":["構成要素の意味の総和≠全体の意味","字義通りに理解できる","文法的に特殊","発音が特殊"],"answer":"構成要素の意味の総和≠全体の意味","explanation":"kick the bucket（バケツを蹴る≠死ぬ）。慣用句は分析的に意味を導けない"},{"id":7229,"subject":"英文法","difficulty":3,"question":"「テーマとレーマ」とは？","choices":["テーマは文頭の既知情報・レーマは述部の新情報","テーマが主語・レーマが述語","同じもの","テーマが名詞・レーマが動詞"],"answer":"テーマは文頭の既知情報・レーマは述部の新情報","explanation":"プラハ学派の機能的文分析。テーマ（話題）→レーマ（コメント）の情報の流れ"},{"id":7230,"subject":"英文法","difficulty":3,"question":"「格理論」でabsolutive（絶対格）が使われる言語は？","choices":["能格言語（バスク語・チベット語など）","英語","日本語","中国語"],"answer":"能格言語（バスク語・チベット語など）","explanation":"能格・絶対格言語：自動詞主語と他動詞目的語が同じ格（絶対格）"},{"id":7231,"subject":"英文法","difficulty":1,"question":"「関係代名詞の制限用法と非制限用法」の違いは？","choices":["制限用法は先行詞を限定・非制限用法（コンマあり）は情報を追加","どちらも同じ","制限用法のみ存在","非制限用法が正式"],"answer":"制限用法は先行詞を限定・非制限用法（コンマあり）は情報を追加","explanation":"the book which I read（制限）/ my mother, who is a teacher（非制限・追加情報）"},{"id":7232,"subject":"英文法","difficulty":1,"question":"「複合関係副詞 wherever」の意味は？","choices":["〜するところならどこでも","〜する時はいつでも","〜する方法で","〜するような"],"answer":"〜するところならどこでも","explanation":"wherever：〜するところならどこでも。Wherever you go, I'll follow."},{"id":7233,"subject":"英文法","difficulty":1,"question":"「感嘆文」の形は？","choices":["What + (a/an) + 形容詞 + 名詞 + S + V！ / How + 形容詞/副詞 + S + V！","疑問文と同じ","命令文と同じ","平叙文と同じ"],"answer":"What + (a/an) + 形容詞 + 名詞 + S + V！ / How + 形容詞/副詞 + S + V！","explanation":"What a beautiful day it is! / How beautiful she is!"},{"id":7234,"subject":"英文法","difficulty":1,"question":"「接頭辞 un- / dis- / in- 」の意味は？","choices":["否定・反対","強調","繰り返し","方向"],"answer":"否定・反対","explanation":"un-（unhappy）/ dis-（disagree）/ in-/im-/ir-/il-（impossible・irregular）"},{"id":7235,"subject":"英文法","difficulty":1,"question":"「have to と must」の否定形の違いは？","choices":["don't have to（不必要）/ mustn't（禁止）","どちらも禁止","どちらも不必要","同じ意味"],"answer":"don't have to（不必要）/ mustn't（禁止）","explanation":"You don't have to go.（行く必要がない）/ You mustn't go.（行ってはいけない）"},{"id":7236,"subject":"英文法","difficulty":2,"question":"「比較表現 as many as / as much as」の使い分けは？","choices":["as many asは可算名詞・as much asは不可算名詞","どちらも同じ","as many asが数値","同じ意味"],"answer":"as many asは可算名詞・as much asは不可算名詞","explanation":"as many as 100 people（100人もの）/ as much as 50kg（50kgもの）"},{"id":7237,"subject":"英文法","difficulty":2,"question":"「get + 過去分詞」の意味は？","choices":["受動・被害・自発（get hurt / get married）","能動的な行為","完了した行為","習慣的行為"],"answer":"受動・被害・自発（get hurt / get married）","explanation":"I got hurt.（怪我をした）/ They got married.（結婚した）。be動詞の代わりにget"},{"id":7238,"subject":"英文法","difficulty":2,"question":"「let + O + 動詞原形」の意味は？","choices":["Oが〜するままにする（放任の使役）","Oに〜させる（強制）","〜することを禁止する","〜するよう頼む"],"answer":"Oが〜するままにする（放任の使役）","explanation":"Let him speak.（彼に話させよう）/ Let it be.（そのままにしておけ）"},{"id":7239,"subject":"英文法","difficulty":2,"question":"「not...until...構文」を強調構文にすると？","choices":["It is not until A that B.","Not until A, B.","It is not A until B.","Until A, not B."],"answer":"It is not until A that B.","explanation":"Not until A does B. = It is not until A that B.（AになってはじめてBする）"},{"id":7240,"subject":"英文法","difficulty":2,"question":"「SVO + with + 名詞 + 分詞」の例は？","choices":["I saw him with his eyes closed.","I saw him with closed.","I saw him with close his eyes.","I saw him with to close his eyes."],"answer":"I saw him with his eyes closed.","explanation":"with 独立分詞構文：with + 名詞 + 分詞で付帯状況を表す"},{"id":7241,"subject":"英文法","difficulty":3,"question":"「統語論（syntax）」が研究するのは？","choices":["文・句の構造と文法規則","音の体系","語の意味","語の形成"],"answer":"文・句の構造と文法規則","explanation":"syntax：語の配列規則・句や文の構造（句構造規則・変換規則など）"},{"id":7242,"subject":"英文法","difficulty":3,"question":"「中間構文（middle construction）」の例は？","choices":["This book reads easily.（この本は読みやすい）","The book was read.","He reads the book.","Reading is easy."],"answer":"This book reads easily.（この本は読みやすい）","explanation":"中間構文：他動詞が自動詞的に使われ、主語が本来の目的語。副詞を伴うことが多い"},{"id":7243,"subject":"英文法","difficulty":1,"question":"「it is no wonder that」の意味は？","choices":["〜も無理はない・〜は当然だ","〜は驚くべきことだ","〜はありえない","〜は不思議だ"],"answer":"〜も無理はない・〜は当然だ","explanation":"It is no wonder that he failed.（彼が失敗したのも無理はない）"},{"id":7244,"subject":"英文法","difficulty":1,"question":"「前置詞 against」の意味は？","choices":["〜に反対して・〜に対抗して・〜に寄りかかって","〜と共に","〜のために","〜から"],"answer":"〜に反対して・〜に対抗して・〜に寄りかかって","explanation":"against the wall（壁にもたれて）/ against the law（法に反して）"},{"id":7245,"subject":"英文法","difficulty":1,"question":"「the + 形容詞」で複数の人を表す例は？","choices":["the rich / the poor / the elderly（富裕層・貧困層・高齢者）","個人を表す","単数の人を表す","物を表す"],"answer":"the rich / the poor / the elderly（富裕層・貧困層・高齢者）","explanation":"the + 形容詞でカテゴリーとしての人々を表す。複数扱い"},{"id":7246,"subject":"英文法","difficulty":1,"question":"「will be -ing（未来進行形）」の意味は？","choices":["未来のある時点で進行中・または予定された行為","単純な未来","完了した未来","仮定の未来"],"answer":"未来のある時点で進行中・または予定された行為","explanation":"I will be studying at 8 tomorrow.（明日8時には勉強しているだろう）"},{"id":7247,"subject":"英文法","difficulty":1,"question":"「since」の品詞と意味は？","choices":["接続詞（〜以来・〜だから）と前置詞（〜以来）","接続詞のみ","前置詞のみ","副詞のみ"],"answer":"接続詞（〜以来・〜だから）と前置詞（〜以来）","explanation":"Since he left.（以来）/ Since he was sick, he stayed.（だから）/ since 2020（前置詞）"},{"id":7248,"subject":"英文法","difficulty":1,"question":"「比較表現 superior / inferior / senior / junior」の注意点は？","choices":["to を使う（比較級ではない）","than を使う","as...asで使う","最上級のみ"],"answer":"to を使う（比較級ではない）","explanation":"superior to（〜より優れている）/ inferior to（〜より劣っている）。×more superior"},{"id":7249,"subject":"英文法","difficulty":1,"question":"「分詞の形容詞的用法」で前置と後置の違いは？","choices":["単独は前置・句は後置","常に後置","常に前置","語数に関係ない"],"answer":"単独は前置・句は後置","explanation":"a sleeping baby（前置）/ the baby sleeping in the crib（句→後置）"},{"id":7250,"subject":"英文法","difficulty":1,"question":"「V + O + 形容詞（SVOC）」の動詞は？","choices":["make / keep / find / leave / call","give / send / show","want / expect / allow","think / believe"],"answer":"make / keep / find / leave / call","explanation":"make him happy / keep her calm / find it useful / call it perfect"},{"id":7251,"subject":"英文法","difficulty":2,"question":"「完了進行形（have been -ing）」が表す意味は？","choices":["過去から現在まで継続している動作","完了した動作","進行中の動作のみ","習慣的行為"],"answer":"過去から現在まで継続している動作","explanation":"I have been studying for two hours.（2時間勉強し続けている）。継続性の強調"},{"id":7252,"subject":"英文法","difficulty":2,"question":"「be used to doing」と「get used to doing」の違いは？","choices":["be used toは状態・get used toは変化の過程","同じ意味","be used toが変化","どちらも同じ"],"answer":"be used toは状態・get used toは変化の過程","explanation":"be used to：（すでに）慣れている。get used to：慣れていく（変化を表す）"},{"id":7253,"subject":"英文法","difficulty":2,"question":"「despite / in spite of / notwithstanding」の意味は？","choices":["〜にもかかわらず（すべて同義）","〜のために","〜の代わりに","〜と共に"],"answer":"〜にもかかわらず（すべて同義）","explanation":"despite the rain / in spite of / notwithstanding。すべて同義の前置詞（句）"},{"id":7254,"subject":"英文法","difficulty":2,"question":"「助動詞 may / might の確信度」は？","choices":["mightの方がmayより可能性が低い","どちらも同じ","mayが過去・mightが現在","mightが現在・mayが過去"],"answer":"mightの方がmayより可能性が低い","explanation":"It may rain.（50%程度）/ It might rain.（30%程度）。mightはより低い可能性を表す"},{"id":7255,"subject":"英文法","difficulty":2,"question":"「so + 助動詞 + S」の意味は？","choices":["〜もそうだ（同意）","〜もそうでない","〜だけでなく","〜もまた"],"answer":"〜もそうだ（同意）","explanation":"She is happy. — So am I.（私もそうだ）。否定の同意はNor/Neither am I."},{"id":7256,"subject":"英文法","difficulty":3,"question":"「言語類型論」で「SOV型」の例は？","choices":["日本語・韓国語・トルコ語","英語・フランス語（SVO）","アラビア語（VSO）","どれも同じ"],"answer":"日本語・韓国語・トルコ語","explanation":"語順の類型：SOV（日本語など）/ SVO（英語・中国語）/ VSO（アラビア語）"},{"id":7257,"subject":"英文法","difficulty":3,"question":"「有標性（markedness）」とは？","choices":["より複雑・特殊な形式が有標・一般的な形式が無標","発音の難しさ","文法の複雑さ","語の頻度"],"answer":"より複雑・特殊な形式が有標・一般的な形式が無標","explanation":"lions（有標・複数）/ lion（無標・単数）。有標形は無標形に何らかの要素が加わった形"},{"id":7258,"subject":"英文法","difficulty":3,"question":"「最適性理論（Optimality Theory）」とは？","choices":["制約の階層によって最適な出力を選択する音韻・文法理論","最適な文法規則を探す理論","最短の文を選ぶ理論","最も頻繁な形式を選ぶ理論"],"answer":"制約の階層によって最適な出力を選択する音韻・文法理論","explanation":"プリンスとスモレンスキーが提唱。普遍的制約の言語ごとの階層化で文法を説明"},{"id":7259,"subject":"英文法","difficulty":3,"question":"「語用論的障害（pragmatic failure）」とは？","choices":["言語構造は正しいが文脈・慣習が適切でない使用","文法的誤り","発音の誤り","語彙の誤り"],"answer":"言語構造は正しいが文脈・慣習が適切でない使用","explanation":"Thomas（1983）が提唱。文法的には正しいが文化的・社会的に不適切な言語使用"},{"id":7260,"subject":"英文法","difficulty":3,"question":"「コーパス言語学」の特徴は？","choices":["大量の実際の言語使用データを分析","内省・直感による分析","実験による分析","歴史的分析"],"answer":"大量の実際の言語使用データを分析","explanation":"コーパス：実際に使われた言語の大規模データベース。頻度・共起などの定量的分析"},{"id":7261,"subject":"英文法","difficulty":1,"question":"「前置詞 for の用法」のうち「期間」を表す例は？","choices":["I studied for three hours.","I have studied since 2020.","I studied when I was young.","I studied during the holiday."],"answer":"I studied for three hours.","explanation":"for + 期間：3時間勉強した。during + 特定期間 / since + 起点"},{"id":7262,"subject":"英文法","difficulty":1,"question":"「関係詞 whose」は誰に使える？","choices":["人・物・動物（所有格を表す）","人のみ","物のみ","動物のみ"],"answer":"人・物・動物（所有格を表す）","explanation":"the man whose car is red / the building whose roof is damaged（人・物どちらにも使える）"},{"id":7263,"subject":"英文法","difficulty":1,"question":"「前置詞 of 」の「分離」用法の例は？","choices":["deprive A of B（AからBを奪う）","think of","be proud of","consist of"],"answer":"deprive A of B（AからBを奪う）","explanation":"rob A of B / clear A of B / remind A of B / cure A of B。分離・除去の意味のof"},{"id":7264,"subject":"英文法","difficulty":1,"question":"「前置詞 by の用法」のうち「手段」を表す例は？","choices":["by bus / by email / by hand","by the river（場所）","by Monday（期限）","by far（強調）"],"answer":"by bus / by email / by hand","explanation":"by + 交通手段・方法：by car / by phone / by hand。冠詞なしで使う点に注意"},{"id":7265,"subject":"英文法","difficulty":1,"question":"「副詞のlyが付かない副詞」の例は？","choices":["hard（懸命に）/ late（遅く）/ fast（速く）","good","the","very"],"answer":"hard（懸命に）/ late（遅く）/ fast（速く）","explanation":"hardとhardly（ほとんど〜ない）・late/lately（最近）は意味が異なるので要注意"},{"id":7266,"subject":"英文法","difficulty":2,"question":"「no matter what/who/when/where/how」の書き換えは？","choices":["whatever/whoever/whenever/wherever/however","which/who/when/where/how","anything/anyone/anytime","no matter + 疑問詞"],"answer":"whatever/whoever/whenever/wherever/however","explanation":"No matter what you do = Whatever you do.（何をしても）"},{"id":7267,"subject":"英文法","difficulty":2,"question":"「S + V + O + as + 補語」の構文の動詞は？","choices":["regard / see / describe / define / view / treat","make / let / have","find / feel / think","give / send / show"],"answer":"regard / see / describe / define / view / treat","explanation":"regard A as B（AをBと見なす）/ describe A as B（AをBと説明する）"},{"id":7268,"subject":"英文法","difficulty":2,"question":"「It seems that / It appears that」の書き換えは？","choices":["S + seem/appear + to不定詞","S + be + to不定詞","S + must + 動詞原形","S + have + 過去分詞"],"answer":"S + seem/appear + to不定詞","explanation":"It seems that he is tired. = He seems to be tired.（主語を取り出してto不定詞に）"},{"id":7269,"subject":"英文法","difficulty":2,"question":"「受動態の進行形」はどう作る？","choices":["be being Vpp（例：is being built）","being Vpp","been Vpp","be Vpp"],"answer":"be being Vpp（例：is being built）","explanation":"The bridge is being built.（橋は建設中だ）。be動詞 + being + 過去分詞"},{"id":7270,"subject":"英文法","difficulty":2,"question":"「主語と動詞の一致（SVA）」の難しいケースは？","choices":["集合名詞（単複両用）/ 不定代名詞（everyone=単数）など","常に単数","常に複数","語順による"],"answer":"集合名詞（単複両用）/ 不定代名詞（everyone=単数）など","explanation":"The team is/are playing.（集合名詞）/ Everyone has.（不定代名詞は単数）"},{"id":7271,"subject":"英文法","difficulty":3,"question":"「コンマスプライス（comma splice）」とは？","choices":["2つの文をコンマだけで結ぶ誤り","文頭のand","受動態","否定文"],"answer":"2つの文をコンマだけで結ぶ誤り","explanation":"I came, I saw, I conquered.（文学的で許容されるが学術文では×）"},{"id":7272,"subject":"英文法","difficulty":3,"question":"「会話分析（conversation analysis）」の主な関心は？","choices":["話者交代・隣接対・修復など日常会話の組織化","文の文法","語の意味","音の体系"],"answer":"話者交代・隣接対・修復など日常会話の組織化","explanation":"エスノメソドロジーに基づく。実際の会話の順番取り・修復・会話の終了などを分析"},{"id":7273,"subject":"英文法","difficulty":3,"question":"「プロトタイプ理論」とは？","choices":["カテゴリーの典型例が存在し、周辺例があるという語の意味理論","古典的カテゴリー理論","形式意味論","音韻理論"],"answer":"カテゴリーの典型例が存在し、周辺例があるという語の意味理論","explanation":"ロッシュが提唱。「鳥」のプロトタイプはスズメ。ペンギンは典型から遠い周辺例"},{"id":7274,"subject":"英文法","difficulty":3,"question":"「第二言語習得でインプット仮説を提唱したのは？","choices":["クラッシェン（Krashen）","チョムスキー","グライス","ヴィゴツキー"],"answer":"クラッシェン（Krashen）","explanation":"クラッシェンのi+1仮説：現在の能力（i）より少し上のインプットが最も効果的"},{"id":7275,"subject":"英文法","difficulty":3,"question":"「転移（transfer）」が第二言語習得で起きるとは？","choices":["母語の知識・習慣が第二言語に影響する","忘れること","記憶の定着","文法の習得"],"answer":"母語の知識・習慣が第二言語に影響する","explanation":"正の転移（母語が助ける）と負の転移（干渉・母語の誤用）がある"},{"id":7276,"subject":"英文法","difficulty":1,"question":"「do動詞の強調用法」が使えるのは？","choices":["肯定の平叙文・命令文","疑問文","否定文","仮定法"],"answer":"肯定の平叙文・命令文","explanation":"I do believe you.（本当に信じる）/ Do come!（ぜひ来て）"},{"id":7277,"subject":"英文法","difficulty":1,"question":"「接続詞although/thoughとhoweverの違い」は？","choices":["although/thoughは節を導く接続詞・howeverは副詞","同じ品詞","howeverが接続詞","どちらも副詞"],"answer":"although/thoughは節を導く接続詞・howeverは副詞","explanation":"Although it rained, we went.（接続詞）/ It rained. However, we went.（副詞）"},{"id":7278,"subject":"英文法","difficulty":1,"question":"「関係代名詞whatの特徴」は？","choices":["先行詞を含む（the thing whichと同義）","先行詞が必要","人のみに使える","場所に使える"],"answer":"先行詞を含む（the thing whichと同義）","explanation":"What I want is peace.（私が望むものは平和だ）。先行詞を含む名詞節を作る"},{"id":7279,"subject":"英文法","difficulty":2,"question":"「名詞節を導くif」と「副詞節を導くif」の違いは？","choices":["名詞節：かどうか・副詞節：もし","どちらも同じ","どちらも「もし」","時制で判断"],"answer":"名詞節：かどうか・副詞節：もし","explanation":"I wonder if he'll come.（名詞節・かどうか）/ If he comes, tell him.（副詞節・もし）"},{"id":7280,"subject":"英文法","difficulty":2,"question":"「仮定法 as if / as though」の時制は？","choices":["現在の事実に反→仮定法過去・過去の事実に反→仮定法過去完了","常に現在形","常に過去完了","直説法と同じ"],"answer":"現在の事実に反→仮定法過去・過去の事実に反→仮定法過去完了","explanation":"She talks as if she knew.（仮定法過去）/ as if she had known.（仮定法過去完了）"},{"id":7281,"subject":"英文法","difficulty":3,"question":"「関連性理論（Relevance Theory）」とは？","choices":["スペルベルとウィルソンが提唱。最大の文脈効果と最小の処理努力で解釈","グライスの協調原則","発話行為理論","談話分析"],"answer":"スペルベルとウィルソンが提唱。最大の文脈効果と最小の処理努力で解釈","explanation":"relevance = cognitive effect / processing effort。コミュニケーションを認知科学的に説明"},{"id":7282,"subject":"英文法","difficulty":3,"question":"「転用（zero derivation）」とは？","choices":["語形の変化なしに品詞が変わる語形成","接辞による派生","複合語形成","頭字語形成"],"answer":"語形の変化なしに品詞が変わる語形成","explanation":"Google → to google（名詞→動詞）/ run（動詞）→ a run（名詞）"},{"id":7283,"subject":"英文法","difficulty":3,"question":"「言語の相対性仮説（Sapir-Whorf hypothesis）」とは？","choices":["言語が思考・認知に影響する","言語は思考と無関係","すべての言語は同じ","文法が思考を決定する"],"answer":"言語が思考・認知に影響する","explanation":"言語の構造が話者の世界認識・思考パターンに影響する（強/弱バージョンがある）"},{"id":7284,"subject":"英文法","difficulty":3,"question":"「談話分析（discourse analysis）」が対象とするのは？","choices":["文を超えた言語単位（会話・文章・談話）","文内部","語内部","音内部"],"answer":"文を超えた言語単位（会話・文章・談話）","explanation":"談話分析：テクスト・会話の構造・機能・文脈を研究"},{"id":7285,"subject":"英文法","difficulty":3,"question":"「内包（intension）」と「外延（extension）」の違いは？","choices":["内包は語の意味・性質・外延は指示する対象の集合","同じもの","内包が広い","外延が意味"],"answer":"内包は語の意味・性質・外延は指示する対象の集合","explanation":"「犬」の内包：四足・哺乳類・吠えるなど。外延：世界中のすべての犬"},{"id":7286,"subject":"英文法","difficulty":1,"question":"「現在完了形」が使えない場合はどれ？","choices":["yesterday（過去を表す副詞と共に）","already","yet","ever"],"answer":"yesterday（過去を表す副詞と共に）","explanation":"現在完了はyesterday/last year/ago/whenなど過去の一時点を示す語と使えない"},{"id":7287,"subject":"英文法","difficulty":1,"question":"「比較の対象の一致」で正しいのは？","choices":["Her voice is better than mine.（所有代名詞）","Her voice is better than me.","Her voice is better than her sister.","Her voice is better than she."],"answer":"Her voice is better than mine.（所有代名詞）","explanation":"比較する対象を一致させる。Her voice vs. mine（my voice）"},{"id":7288,"subject":"英文法","difficulty":2,"question":"「時制の一致の例外」は？","choices":["普遍的真理・現在の事実は現在形のまま","例外なし","すべて一致","動詞の種類による"],"answer":"普遍的真理・現在の事実は現在形のまま","explanation":"She said that the earth is round.（普遍的真理→現在形のまま）"},{"id":7289,"subject":"英文法","difficulty":2,"question":"「be to 構文」で「運命」を表す例は？","choices":["He was never to see her again.（二度と会えない運命だった）","He is to come at 3.（予定）","You are to obey.（義務）","Are we to go?（意図）"],"answer":"He was never to see her again.（二度と会えない運命だった）","explanation":"be to + 不定詞の運命用法は過去形でしばしばneverと共に使われる"},{"id":7290,"subject":"英文法","difficulty":2,"question":"「倒置が起きる条件」はどれ？","choices":["否定の副詞・副詞句が文頭に来る場合","疑問文","感嘆文","命令文"],"answer":"否定の副詞・副詞句が文頭に来る場合","explanation":"Never/Rarely/Not only/Hardlyなどが文頭→倒置。Never have I seen such a thing."},{"id":7291,"subject":"英文法","difficulty":3,"question":"「生成文法（Generative Grammar）」を提唱したのは？","choices":["チョムスキー","ソシュール","サピア","ウォーフ"],"answer":"チョムスキー","explanation":"ノーム・チョムスキーが1957年「統語構造」で提唱。人間には生得的な言語能力があるという理論"},{"id":7292,"subject":"英文法","difficulty":3,"question":"「語用論（pragmatics）」が扱うのは？","choices":["文脈における言語の使用・意味","音の体系","語の形成","文の構造"],"answer":"文脈における言語の使用・意味","explanation":"語用論：文脈・状況における言語使用の意味（含意・発話行為など）を研究する言語学の分野"},{"id":7293,"subject":"英文法","difficulty":3,"question":"「音素（phoneme）」とは？","choices":["意味の違いを生む最小の音の単位","音節","形態素","語"],"answer":"意味の違いを生む最小の音の単位","explanation":"音素：/p/と/b/のように意味の区別に関わる最小の音の単位"},{"id":7294,"subject":"英文法","difficulty":3,"question":"「形態素（morpheme）」の例は？","choices":["un- / -ness / -ing（最小の意味を持つ単位）","音節","文","語用論"],"answer":"un- / -ness / -ing（最小の意味を持つ単位）","explanation":"形態素：意味を持つ最小単位。unhappy = un（否定）＋happy（幸せ）の2形態素"},{"id":7295,"subject":"英文法","difficulty":3,"question":"「直示（deixis）」とは？","choices":["文脈・状況に依存する言語表現（this/here/now等）","否定表現","比較表現","受動態"],"answer":"文脈・状況に依存する言語表現（this/here/now等）","explanation":"直示：this（これ）・here（ここ）・now（今）・I（私）など、文脈がないと解釈できない語"},{"id":7296,"subject":"英文法","difficulty":3,"question":"「会話の含意（implicature）を提唱したのは？","choices":["グライス（Grice）","チョムスキー","オースティン","サール"],"answer":"グライス（Grice）","explanation":"グライスの協調の原則（量・質・関係・様式）から導かれる含意理論"},{"id":7297,"subject":"英文法","difficulty":1,"question":"「助動詞+V原形」で「能力」を表す助動詞は？","choices":["can/could（能力・可能性）","must/have to","shall/will","may/might"],"answer":"can/could（能力・可能性）","explanation":"I can swim.（泳げる）/ I could swim.（泳げた・丁寧）。be able toと書き換え可"},{"id":7298,"subject":"英文法","difficulty":1,"question":"「get + 過去分詞」の意味は？","choices":["〜される（受動）/ 〜してもらう","〜する","〜なる","〜させる"],"answer":"〜される（受動）/ 〜してもらう","explanation":"get hurt（怪我する）/ get paid（給料をもらう）/ get things done（物事を片付ける）"},{"id":7299,"subject":"英文法","difficulty":1,"question":"「only to V」の意味は？","choices":["〜したが、結局（失望的な結果）","〜するために","〜してよかった","〜することができる"],"answer":"〜したが、結局（失望的な結果）","explanation":"She went to the station only to find the train had left.（行ったが電車はもう出ていた）"},{"id":7300,"subject":"英文法","difficulty":1,"question":"「not A but B」の言い換えは？","choices":["B rather than A / B instead of A","A as well as B","A and B","neither A nor B"],"answer":"B rather than A / B instead of A","explanation":"not A but B = B rather than A（AではなくB）。I want not coffee but tea. = I want tea rather than coffee."},{"id":7301,"subject":"英文法","difficulty":1,"question":"「第1文型（SV）」の例は？","choices":["The sun rises.（自動詞のみ）","She is happy.","I play tennis.","She gave me a book."],"answer":"The sun rises.（自動詞のみ）","explanation":"第1文型SV：主語と自動詞のみ。The bird sang./ He died.など"},{"id":7302,"subject":"英文法","difficulty":1,"question":"「第2文型（SVC）」の補語には何が来る？","choices":["名詞または形容詞（主語＝補語の関係）","副詞","動詞","前置詞句"],"answer":"名詞または形容詞（主語＝補語の関係）","explanation":"She is happy.（形容詞）/ He became a doctor.（名詞）。S＝Cの関係が成立する"},{"id":7303,"subject":"英文法","difficulty":2,"question":"「不定詞のみ取る動詞」と「動名詞のみ取る動詞」で意味が変わるものは？","choices":["remember/forget/try/stop（toVとVingで意味が違う）","want/hope","enjoy/finish","make/let"],"answer":"remember/forget/try/stop（toVとVingで意味が違う）","explanation":"remember to do（忘れずにする）/ remember doing（したことを覚えている）。stopも同様"},{"id":7304,"subject":"英文法","difficulty":2,"question":"「倒置のパターン」でOnlyが文頭のとき は？","choices":["Only then did I realize.（倒置が起きる）","Only then I realized.","Only then realized I.","倒置なし"],"answer":"Only then did I realize.（倒置が起きる）","explanation":"Only+副詞/副詞句が文頭→倒置。Only after he left did she cry.なども同様"},{"id":7305,"subject":"英文法","difficulty":3,"question":"「語彙的アスペクト（Aktionsart）」で「瞬間動詞（achievement）」の例は？","choices":["arrive/notice/win（瞬間的に完了）","run/swim（活動動詞）","believe/know（状態動詞）","build/draw（達成動詞）"],"answer":"arrive/notice/win（瞬間的に完了）","explanation":"Vendler分類：状態（know）・活動（run）・達成（build）・瞬間（arrive）。アスペクトの記述に使用"},{"id":7306,"subject":"英文法","difficulty":3,"question":"「コーパスから見た英語の特徴」でよく誤解されることは？","choices":["ネイティブも文法的に「不完全」な発話をよくする（口語では特に）","ネイティブは常に文法的に正しい","文法書の規則を全て守る","受動態はほとんど使わない"],"answer":"ネイティブも文法的に「不完全」な発話をよくする（口語では特に）","explanation":"実際の会話コーパスでは省略・言い直し・非文法的発話が多い。文法書は理想を記述している"},{"id":8001,"subject":"化学","difficulty":1,"question":"水(H₂O)の分子量は？（H=1、O=16）","choices":["18","16","20","34"],"answer":"18","explanation":"H₂O：H×2＋O×1＝1×2＋16＝18。分子量＝各原子の原子量の和"},{"id":8002,"subject":"化学","difficulty":1,"question":"塩化ナトリウム(NaCl)の化学結合は？","choices":["イオン結合","共有結合","金属結合","水素結合"],"answer":"イオン結合","explanation":"NaCl：Na⁺とCl⁻のイオン結合。金属と非金属の間に形成されることが多い"},{"id":8003,"subject":"化学","difficulty":1,"question":"元素の周期表で最も原子番号が小さい貴ガスは？","choices":["He（ヘリウム）","Ne（ネオン）","Ar（アルゴン）","Kr（クリプトン）"],"answer":"He（ヘリウム）","explanation":"貴ガス（希ガス）：He(2)、Ne(10)、Ar(18)、Kr(36)、Xe(54)。Heが最小"},{"id":8004,"subject":"化学","difficulty":1,"question":"アボガドロ定数はおよそ？","choices":["6.02×10²³/mol","6.02×10²⁰/mol","6.02×10²⁶/mol","1.67×10⁻²⁷/mol"],"answer":"6.02×10²³/mol","explanation":"アボガドロ定数NA＝6.02×10²³/mol。1molの粒子数はこの数"},{"id":8005,"subject":"化学","difficulty":1,"question":"pH7の水溶液は？","choices":["中性","酸性","塩基性","どちらでもない"],"answer":"中性","explanation":"pH7＝中性（25℃）。pH7未満＝酸性、pH7超＝塩基性"},{"id":8006,"subject":"化学","difficulty":1,"question":"「酸化数」が0になるのは？","choices":["単体（H₂、Fe等）","化合物中の原子","イオン","水素化合物"],"answer":"単体（H₂、Fe等）","explanation":"単体の酸化数＝0。化合物中のH＝+1（通常）、O＝-2（通常）"},{"id":8007,"subject":"化学","difficulty":1,"question":"メタン(CH₄)の炭素の混成軌道は？","choices":["sp³（正四面体形）","sp²（三角平面形）","sp（直線形）","sp³d"],"answer":"sp³（正四面体形）","explanation":"CH₄：炭素がsp³混成。4つのC-H結合が正四面体形に配置"},{"id":8008,"subject":"化学","difficulty":1,"question":"「電気陰性度」が最も大きい元素は？","choices":["F（フッ素）","O（酸素）","N（窒素）","Cl（塩素）"],"answer":"F（フッ素）","explanation":"電気陰性度：F>O>N>Cl。フッ素が最大。電気陰性度は周期表で右上ほど大きい"},{"id":8009,"subject":"化学","difficulty":1,"question":"水の沸点が100℃と高い理由は？","choices":["水素結合","共有結合が強い","分子量が大きい","イオン結合"],"answer":"水素結合","explanation":"H₂OはO-H…Oの水素結合が分子間に多数形成され、沸点が異常に高い"},{"id":8010,"subject":"化学","difficulty":1,"question":"「触媒」とは？","choices":["反応速度を変えるが自身は変化しない物質","反応物の一つ","生成物の一つ","エネルギーを供給する物質"],"answer":"反応速度を変えるが自身は変化しない物質","explanation":"触媒は活性化エネルギーを下げて反応速度を大きくする。自身は反応前後で変化しない"},{"id":8011,"subject":"化学","difficulty":1,"question":"「モル濃度」の単位は？","choices":["mol/L","mol/kg","g/L","mol/m³"],"answer":"mol/L","explanation":"モル濃度：溶液1Lに溶けている溶質のmol数。単位はmol/L（＝M）"},{"id":8012,"subject":"化学","difficulty":1,"question":"「ルシャトリエの原理」とは？","choices":["平衡系に変化を加えると、その変化を和らげる方向に平衡が移動する","反応速度と触媒の関係","酸塩基の強さの基準","酸化還元の基準"],"answer":"平衡系に変化を加えると、その変化を和らげる方向に平衡が移動する","explanation":"平衡移動の原理。濃度・温度・圧力の変化に対して平衡が移動する方向を予測できる"},{"id":8013,"subject":"化学","difficulty":1,"question":"「電池」の負極での反応は？","choices":["酸化（電子を放出）","還元（電子を受け取る）","中和","加水分解"],"answer":"酸化（電子を放出）","explanation":"電池の負極＝酸化（酸化剤が還元・還元剤が酸化）。正極＝還元"},{"id":8014,"subject":"化学","difficulty":1,"question":"「ヘスの法則」とは？","choices":["反応熱は反応経路によらず始状態と終状態のみで決まる","反応速度の法則","ル・シャトリエの法則","質量保存の法則"],"answer":"反応熱は反応経路によらず始状態と終状態のみで決まる","explanation":"ヘスの法則（総熱量保存の法則）：エネルギーの経路に無関係な保存則"},{"id":8015,"subject":"化学","difficulty":1,"question":"「芳香族化合物」の代表は？","choices":["ベンゼン(C₆H₆)","エタン","エチレン","アセチレン"],"answer":"ベンゼン(C₆H₆)","explanation":"ベンゼン環（6員環の共役π電子系）を持つ化合物が芳香族。特有の安定性がある"},{"id":8016,"subject":"化学","difficulty":2,"question":"「ボイルの法則」とは？","choices":["一定温度でPV＝一定","一定圧力でV∝T","PV＝nRT","一定体積でP∝T"],"answer":"一定温度でPV＝一定","explanation":"ボイルの法則：T一定でP₁V₁＝P₂V₂。圧力と体積は反比例する"},{"id":8017,"subject":"化学","difficulty":2,"question":"「シャルルの法則」とは？","choices":["一定圧力でV∝T（絶対温度）","一定温度でPV＝一定","PV＝nRT","一定体積でP∝T"],"answer":"一定圧力でV∝T（絶対温度）","explanation":"シャルルの法則：P一定でV/T＝一定。体積は絶対温度に比例"},{"id":8018,"subject":"化学","difficulty":2,"question":"「理想気体の状態方程式」は？","choices":["PV＝nRT","PV＝一定","PV＝RT","P＝nRT/V"],"answer":"PV＝nRT","explanation":"PV＝nRT：P＝圧力、V＝体積、n＝mol数、R＝気体定数(8.31J/mol·K)、T＝絶対温度"},{"id":8019,"subject":"化学","difficulty":2,"question":"「酸の強さ」の順番で正しいのは？","choices":["HCl > CH₃COOH > HCN","HCN > HCl > CH₃COOH","CH₃COOH > HCl > HCN","HCl = CH₃COOH > HCN"],"answer":"HCl > CH₃COOH > HCN","explanation":"強酸：HCl、HNO₃、H₂SO₄。弱酸：CH₃COOH(酢酸)、HCN（シアン化水素）など"},{"id":8020,"subject":"化学","difficulty":2,"question":"「ファラデーの法則」とは？","choices":["電気分解で析出する物質の量は流れた電気量に比例","電磁誘導の法則","熱量と電気量の関係","電気分解の速度"],"answer":"電気分解で析出する物質の量は流れた電気量に比例","explanation":"電気分解：Q[C]＝I[A]×t[s]。1mol析出に必要な電気量＝96500C（ファラデー定数）×電子数"},{"id":8021,"subject":"化学","difficulty":2,"question":"「緩衝液」の働きは？","choices":["少量の酸や塩基を加えてもpHがほとんど変わらない","酸と塩基を中和する","pHを7に保つ","電解質を中和する"],"answer":"少量の酸や塩基を加えてもpHがほとんど変わらない","explanation":"緩衝液：弱酸＋その塩（例：酢酸＋酢酸ナトリウム）。生体内pH調節に重要"},{"id":8022,"subject":"化学","difficulty":2,"question":"「沸点上昇」の原因は？","choices":["溶質を溶かすと蒸気圧が下がり沸点が上がる","溶質の加熱","溶媒の量が増える","分子量が大きくなる"],"answer":"溶質を溶かすと蒸気圧が下がり沸点が上がる","explanation":"希薄溶液の沸点上昇：ΔTb＝Kb×m（m＝質量モル濃度）。束一的性質の一つ"},{"id":8023,"subject":"化学","difficulty":2,"question":"「光学異性体（鏡像異性体）」が存在する条件は？","choices":["不斉炭素原子が存在する","二重結合がある","環状構造がある","ベンゼン環がある"],"answer":"不斉炭素原子が存在する","explanation":"不斉炭素：4つの異なる基が結合した炭素。鏡像異性体は物理的性質は同じだが旋光性が異なる"},{"id":8024,"subject":"化学","difficulty":2,"question":"「アミノ酸」の構造的特徴は？","choices":["アミノ基(-NH₂)とカルボキシル基(-COOH)を持つ","アミノ基のみ","カルボキシル基のみ","ヒドロキシル基を持つ"],"answer":"アミノ基(-NH₂)とカルボキシル基(-COOH)を持つ","explanation":"α-アミノ酸：同一炭素（α炭素）にNH₂とCOOHが結合。タンパク質の構成単位"},{"id":8025,"subject":"化学","difficulty":2,"question":"「単糖類」の代表は？","choices":["グルコース(C₆H₁₂O₆)","スクロース","デンプン","セルロース"],"answer":"グルコース(C₆H₁₂O₆)","explanation":"単糖類：グルコース・フルクトース・ガラクトースなど。二糖はスクロース（グルコース＋フルクトース）"},{"id":8026,"subject":"化学","difficulty":2,"question":"「ダイヤモンド」と「グラファイト（黒鉛）」はどちらも炭素の単体。結合の違いは？","choices":["ダイヤモンドはsp³共有結合・グラファイトはsp²共有結合＋π結合","どちらも同じ","ダイヤモンドはイオン結合","グラファイトは金属結合"],"answer":"ダイヤモンドはsp³共有結合・グラファイトはsp²共有結合＋π結合","explanation":"ダイヤモンド：sp³正四面体の立体網目。グラファイト：sp²平面六員環の層状構造＋π電子"},{"id":8027,"subject":"化学","difficulty":2,"question":"「ハーバー・ボッシュ法」で製造するのは？","choices":["アンモニア(NH₃)","硫酸","塩酸","エタノール"],"answer":"アンモニア(NH₃)","explanation":"N₂＋3H₂⇌2NH₃（高温高圧・Fe触媒）。窒素肥料・爆薬の原料。20世紀最大の発明の一つ"},{"id":8028,"subject":"化学","difficulty":2,"question":"「接触法」で製造するのは？","choices":["硫酸(H₂SO₄)","硝酸","アンモニア","塩酸"],"answer":"硫酸(H₂SO₄)","explanation":"SO₂→SO₃（V₂O₅触媒）→H₂SO₄。工業的硫酸製造法。「接触」はSO₂とO₂が触媒表面に接触するため"},{"id":8029,"subject":"化学","difficulty":2,"question":"「オストワルト法」で製造するのは？","choices":["硝酸(HNO₃)","硫酸","アンモニア","食塩"],"answer":"硝酸(HNO₃)","explanation":"NH₃→NO（Pt触媒・酸化）→NO₂→HNO₃。肥料・火薬の原料"},{"id":8030,"subject":"化学","difficulty":2,"question":"「ソルベー法（アンモニアソーダ法）」で製造するのは？","choices":["炭酸ナトリウム(Na₂CO₃)","水酸化ナトリウム","塩化ナトリウム","炭酸カルシウム"],"answer":"炭酸ナトリウム(Na₂CO₃)","explanation":"食塩水にNH₃とCO₂を通してNaHCO₃を析出→加熱でNa₂CO₃。ガラス・石鹸の原料"},{"id":8031,"subject":"化学","difficulty":3,"question":"「分子軌道理論」でO₂が常磁性を示す理由は？","choices":["反結合性π*軌道に不対電子が2つある","σ結合のみを持つ","分子が無極性","電子対がある"],"answer":"反結合性π*軌道に不対電子が2つある","explanation":"O₂の電子配置：πu2p軌道に不対電子2つ→常磁性（磁石に引き寄せられる）。ルイス構造では説明できない"},{"id":8032,"subject":"化学","difficulty":3,"question":"「遷移状態（活性化状態）」とは？","choices":["反応物が生成物に変わる途中の最もエネルギーが高い状態","中間体","触媒","平衡状態"],"answer":"反応物が生成物に変わる途中の最もエネルギーが高い状態","explanation":"活性化エネルギー＝遷移状態と反応物のエネルギー差。触媒はこれを下げる"},{"id":8033,"subject":"化学","difficulty":3,"question":"「キラル（chiral）」とは？","choices":["分子が鏡像と重ね合わせられない性質","光を回転する性質","結晶の形","分子の対称性"],"answer":"分子が鏡像と重ね合わせられない性質","explanation":"キラル分子は右手と左手のように鏡像が重ならない。不斉炭素が存在するとキラルになりやすい"},{"id":8034,"subject":"化学","difficulty":3,"question":"「NMR（核磁気共鳴）」は何を調べる分析法？","choices":["分子内の各原子の化学環境・結合の様子","分子量","元素組成","結晶構造"],"answer":"分子内の各原子の化学環境・結合の様子","explanation":"NMR：核スピンの共鳴を利用して分子構造を解析。有機化合物の構造決定に必須"},{"id":8035,"subject":"化学","difficulty":3,"question":"「質量スペクトル（MS）」から何がわかる？","choices":["分子量・フラグメントイオンの質量（構造推定）","元素組成のみ","結合の種類","沸点"],"answer":"分子量・フラグメントイオンの質量（構造推定）","explanation":"マススペクトル：M⁺（分子イオンピーク）から分子量、フラグメントパターンから構造を推定"},{"id":8036,"subject":"化学","difficulty":1,"question":"「共有結合」とは？","choices":["電子対を共有する結合","電子の完全移動による結合","自由電子による結合","静電引力による結合"],"answer":"電子対を共有する結合","explanation":"共有結合：2原子が電子対を共有する。H₂、H₂O、CH₄などの分子に見られる"},{"id":8037,"subject":"化学","difficulty":1,"question":"「イオン化エネルギー」とは？","choices":["原子から電子1個を取り除くのに必要なエネルギー","原子が電子を受け取るときのエネルギー","結合を切るエネルギー","化学反応のエネルギー"],"answer":"原子から電子1個を取り除くのに必要なエネルギー","explanation":"イオン化エネルギーが大きい＝電子を失いにくい。貴ガスが最大、アルカリ金属が最小"},{"id":8038,"subject":"化学","difficulty":1,"question":"「電子親和力」とは？","choices":["原子が電子1個を受け取るときに放出するエネルギー","電子を取り除くエネルギー","結合エネルギー","イオン化エネルギー"],"answer":"原子が電子1個を受け取るときに放出するエネルギー","explanation":"電子親和力が大きい＝電子を受け取りやすい。ハロゲン（特にCl）が大きい"},{"id":8039,"subject":"化学","difficulty":1,"question":"「周期表の第2族元素」は？","choices":["アルカリ土類金属（Be、Mg、Ca等）","アルカリ金属（Li、Na、K等）","ハロゲン（F、Cl等）","貴ガス"],"answer":"アルカリ土類金属（Be、Mg、Ca等）","explanation":"第2族：アルカリ土類金属。Ca（カルシウム）は骨・歯の成分。Mgは葉緑素の中心金属"},{"id":8040,"subject":"化学","difficulty":1,"question":"「共役ジエン」の例は？","choices":["1,3-ブタジエン（CH₂＝CH-CH＝CH₂）","1,2-ブタジエン","プロピレン","アセチレン"],"answer":"1,3-ブタジエン（CH₂＝CH-CH＝CH₂）","explanation":"共役ジエン：二重結合が交互に並んだ構造。ディールス・アルダー反応の反応剤"},{"id":8041,"subject":"化学","difficulty":2,"question":"「サリチル酸」からできる薬品は？","choices":["アスピリン（アセチルサリチル酸）","アセトアミノフェン","イブプロフェン","ペニシリン"],"answer":"アスピリン（アセチルサリチル酸）","explanation":"サリチル酸＋無水酢酸→アスピリン（アセチルサリチル酸）。解熱・鎮痛・抗血小板作用"},{"id":8042,"subject":"化学","difficulty":2,"question":"「エステル化反応」は何と何を反応させる？","choices":["カルボン酸とアルコール","酸と塩基","アルデヒドとケトン","アミノ酸とアミノ酸"],"answer":"カルボン酸とアルコール","explanation":"エステル化：RCOOH＋R'OH⇌RCOOR'＋H₂O（酸触媒・可逆反応）"},{"id":8043,"subject":"化学","difficulty":2,"question":"「ナイロン66」の合成反応は？","choices":["ヘキサメチレンジアミン＋アジピン酸の縮合重合","付加重合","ジエン合成","ラジカル重合"],"answer":"ヘキサメチレンジアミン＋アジピン酸の縮合重合","explanation":"ナイロン66：アミド結合（-CO-NH-）で結合した縮合ポリマー。最初の合成繊維"},{"id":8044,"subject":"化学","difficulty":2,"question":"「ポリエチレン」の原料は？","choices":["エチレン(CH₂＝CH₂)","エタン","プロピレン","スチレン"],"answer":"エチレン(CH₂＝CH₂)","explanation":"ポリエチレン：エチレンの付加重合。-(CH₂-CH₂)n-。最も生産量の多いプラスチック"},{"id":8045,"subject":"化学","difficulty":2,"question":"「質量数」とは？","choices":["陽子数＋中性子数","陽子数のみ","中性子数のみ","陽子数＋電子数"],"answer":"陽子数＋中性子数","explanation":"質量数＝陽子数（原子番号）＋中性子数。¹²C：陽子6＋中性子6＝12"},{"id":8046,"subject":"化学","difficulty":2,"question":"「同位体（アイソトープ）」とは？","choices":["原子番号が同じで質量数が異なる原子","電子数が異なる原子","結合の種類が異なる","同じ分子量の異なる分子"],"answer":"原子番号が同じで質量数が異なる原子","explanation":"同位体：陽子数同じ・中性子数異なる。¹H・²H（重水素）・³H（三重水素）など"},{"id":8047,"subject":"化学","difficulty":2,"question":"「電気分解」で陽極に起きる反応は？","choices":["酸化（電子を放出）","還元（電子を受け取る）","中和","加水分解"],"answer":"酸化（電子を放出）","explanation":"電気分解の陽極＝酸化。陰極＝還元。電池と逆（電池：陽極で還元）"},{"id":8048,"subject":"化学","difficulty":2,"question":"「高分子化合物」の分子量はおよそ？","choices":["10,000以上","1,000前後","100前後","100万以上のみ"],"answer":"10,000以上","explanation":"高分子（ポリマー）は分子量が10,000以上の化合物。天然・合成ポリマーが含まれる"},{"id":8049,"subject":"化学","difficulty":2,"question":"「加水分解」とは？","choices":["水との反応で化合物が分解する","水を分解する","水を合成する","熱で分解する"],"answer":"水との反応で化合物が分解する","explanation":"加水分解：エステルや塩などが水と反応して分解する。酸・塩基・酵素が触媒になる"},{"id":8050,"subject":"化学","difficulty":2,"question":"「クロマトグラフィー」の原理は？","choices":["成分の吸着・溶解度の差を利用した分離","蒸留","ろ過","再結晶"],"answer":"成分の吸着・溶解度の差を利用した分離","explanation":"クロマトグラフィー：固定相と移動相への親和性の差で成分を分離する分析法"},{"id":8051,"subject":"化学","difficulty":3,"question":"「フロンティア軌道理論」とは？","choices":["HOMO-LUMO相互作用で反応性を説明する理論","電子軌道の数を求める理論","遷移状態の理論","ハードソフト酸塩基理論"],"answer":"HOMO-LUMO相互作用で反応性を説明する理論","explanation":"福井謙一が提唱（ノーベル賞）。HOMO（最高被占軌道）とLUMO（最低空軌道）の相互作用で反応性を予測"},{"id":8052,"subject":"化学","difficulty":3,"question":"「ウッドワード・ホフマン則」とは？","choices":["軌道対称性によって熱・光反応の選択性を説明する規則","酸化還元の規則","触媒反応の規則","高分子反応の規則"],"answer":"軌道対称性によって熱・光反応の選択性を説明する理論","explanation":"電子環状反応・シグマトロピー転位・付環化反応の立体選択性を分子軌道の対称性から予測"},{"id":8053,"subject":"化学","difficulty":3,"question":"「NMRの化学シフト（δ）」で低磁場（大きいδ）に現れるのは？","choices":["電子密度が低い水素（遮蔽効果が小さい）","電子密度が高い水素","重水素","酸素に結合した炭素"],"answer":"電子密度が低い水素（遮蔽効果が小さい）","explanation":"化学シフト：周辺電子が少ない→遮蔽効果小→低磁場（大きいδ）。-CHO（アルデヒド）が最大値域"},{"id":8054,"subject":"化学","difficulty":3,"question":"「ランタノイド収縮」とは？","choices":["4f電子の遮蔽効果が小さく原子半径が予想より小さくなる現象","ランタノイドの核融合","ランタノイドの酸化反応","電子配置の変化"],"answer":"4f電子の遮蔽効果が小さく原子半径が予想より小さくなる現象","explanation":"4f軌道の遮蔽効果が小さいため原子番号増加に伴い原子半径が急激に増大せず収
