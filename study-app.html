difficulty":2,"question":"「プリズム」で白色光を分けると？","choices":["赤・橙・黄・緑・青・藍・紫のスペクトル","赤・黄・青の3色","白と黒","光は分けられない"],"answer":"赤・橙・黄・緑・青・藍・紫のスペクトル","explanation":"プリズムは光の屈折率の違いを利用して白色光をスペクトルに分解する"},{"id":4049,"subject":"理科","difficulty":2,"question":"「塩基性」の物質はリトマス紙をどう変える？","choices":["赤いリトマス紙を青くする","青いリトマス紙を赤くする","変化しない","両方を紫にする"],"answer":"赤いリトマス紙を青くする","explanation":"アルカリ性（塩基性）の液体は赤いリトマスを青くする。酸性は青いリトマスを赤くする"},{"id":4050,"subject":"理科","difficulty":2,"question":"「ニュートン（N）」は何の単位？","choices":["力","仕事","エネルギー","圧力"],"answer":"力","explanation":"ニュートン（N）は力の単位。1N＝質量100gの物体にかかる重力（約）"},{"id":4051,"subject":"理科","difficulty":3,"question":"「エントロピー」とは？","choices":["無秩序さ・乱雑さの度合い","エネルギーの量","熱の移動","化学反応の速さ"],"answer":"無秩序さ・乱雑さの度合い","explanation":"エントロピーは系の乱雑さを表す概念。自然現象はエントロピーが増大する方向に進む（熱力学第二法則）"},{"id":4052,"subject":"理科","difficulty":3,"question":"「ホルモン」と「神経」の違いは？","choices":["ホルモンは血液で緩やかに・神経は電気信号で素早く","ホルモンは速い・神経は遅い","どちらも同じ速さ","ホルモンは電気・神経は化学"],"answer":"ホルモンは血液で緩やかに・神経は電気信号で素早く","explanation":"ホルモンは内分泌腺から血液を介して標的器官に緩やかに働く。神経は電気信号で瞬時に情報伝達"},{"id":4053,"subject":"理科","difficulty":3,"question":"「光年」とは？","choices":["光が1年間に進む距離","1年間に受ける光の量","宇宙の年齢","星の明るさの単位"],"answer":"光が1年間に進む距離","explanation":"1光年＝光速（30万km/秒）×1年間≒9.46兆km。宇宙の距離を表す単位"},{"id":4054,"subject":"理科","difficulty":3,"question":"「ブラックホール」とは？","choices":["重力が強すぎて光でも脱出できない天体","宇宙の穴","非常に暗い恒星","宇宙空間の真空"],"answer":"重力が強すぎて光でも脱出できない天体","explanation":"大質量の星が超新星爆発後に収縮してできる。重力が非常に強く光も脱出できない"},{"id":4055,"subject":"理科","difficulty":3,"question":"「免疫」のうち「自然免疫」とは？","choices":["生まれつき持つ非特異的な防御機構","ワクチンで得た免疫","感染後に得た免疫","特定の病原体に対する免疫"],"answer":"生まれつき持つ非特異的な防御機構","explanation":"自然免疫は病原体の種類を問わず最初に働く防御機構。白血球（マクロファージなど）が異物を食べる"},{"id":4056,"subject":"理科","difficulty":1,"question":"「光合成」の反対の反応は？","choices":["呼吸（細胞呼吸）","蒸散","吸水","発芽"],"answer":"呼吸（細胞呼吸）","explanation":"呼吸：デンプン＋酸素→CO2＋水＋エネルギー。光合成の逆の反応で24時間行われる"},{"id":4057,"subject":"理科","difficulty":1,"question":"「重力」が最も大きいのはどこ？","choices":["海抜0m（地表面）","山の頂上","宇宙空間","海の深い場所"],"answer":"海抜0m（地表面）","explanation":"重力は地球の中心に近いほど強くなる。山の上では地球中心から遠いので少し弱い"},{"id":4058,"subject":"理科","difficulty":1,"question":"「胃液」に含まれる酸は？","choices":["塩酸","硫酸","酢酸","硝酸"],"answer":"塩酸","explanation":"胃液には塩酸（HCl）が含まれ強酸性（pH1〜2）。食物を溶かしペプシンが働く環境を作る"},{"id":4059,"subject":"理科","difficulty":1,"question":"「化石」ができやすい動物の条件は？","choices":["殻・骨などの硬い部分がある","大きい","数が多い","水中に住む"],"answer":"殻・骨などの硬い部分がある","explanation":"化石は硬い部分（骨・殻・歯）が残りやすい。軟らかい体の生物は化石になりにくい"},{"id":4060,"subject":"理科","difficulty":1,"question":"「台風」が発生するのは？","choices":["熱帯の海（水温27℃以上）","寒冷な海","内陸部","極地付近"],"answer":"熱帯の海（水温27℃以上）","explanation":"台風は熱帯・亜熱帯の温かい海（水温27℃以上）の上で発達する熱帯低気圧"},{"id":4061,"subject":"理科","difficulty":2,"question":"「腎臓」の主な働きは？","choices":["血液をろ過して尿を作る","血液を全身に送る","消化液を分泌する","ホルモンを分泌する"],"answer":"血液をろ過して尿を作る","explanation":"腎臓は血液をろ過し不要物・余分な水分を尿として排出する。1日約150Lをろ過し1.5Lの尿ができる"},{"id":4062,"subject":"理科","difficulty":2,"question":"「ヒトの染色体」の数は？","choices":["46本（23対）","48本","44本","40本"],"answer":"46本（23対）","explanation":"ヒトの体細胞は46本（23対）の染色体を持つ。精子・卵は減数分裂で23本になる"},{"id":4063,"subject":"理科","difficulty":2,"question":"「電気抵抗」の単位は？","choices":["オーム（Ω）","ワット（W）","アンペア（A）","ボルト（V）"],"answer":"オーム（Ω）","explanation":"電気抵抗の単位はオーム（Ω）。オームの法則：V=IR（電圧=電流×抵抗）"},{"id":4064,"subject":"理科","difficulty":2,"question":"「光速」はおよそ何km/s？","choices":["約30万km/s","約3万km/s","約300万km/s","約3000km/s"],"answer":"約30万km/s","explanation":"光速は約299,792km/s≒30万km/s。宇宙で最も速く、これより速く移動できるものはない"},{"id":4065,"subject":"理科","difficulty":2,"question":"「気圧」の単位として使われるのは？","choices":["ヘクトパスカル（hPa）","ニュートン（N）","ジュール（J）","ケルビン（K）"],"answer":"ヘクトパスカル（hPa）","explanation":"気圧の単位はヘクトパスカル（hPa）。標準大気圧は1013hPa。天気予報でよく使われる"},{"id":4066,"subject":"理科","difficulty":3,"question":"「ATP（アデノシン三リン酸）」の役割は？","choices":["生命活動のエネルギーの通貨","遺伝情報の保存","タンパク質の材料","細胞膜の構成成分"],"answer":"生命活動のエネルギーの通貨","explanation":"ATPは生物が利用するエネルギーの共通通貨。加水分解されるとエネルギーが放出される"},{"id":4067,"subject":"理科","difficulty":3,"question":"「ニュートンの第三法則」（作用・反作用の法則）とは？","choices":["力を加えると等しい大きさの反対方向の力が生じる","力を加えると加速する","質量が大きいほど力が必要","引力と磁力は等しい"],"answer":"力を加えると等しい大きさの反対方向の力が生じる","explanation":"Aがbに力を加えるとき、BはAに同じ大きさで反対方向の力を加える。ロケットはその原理で飛ぶ"},{"id":4068,"subject":"理科","difficulty":3,"question":"「量子力学」の特徴は？","choices":["粒子は観測するまで複数の状態を重ね合わせる","粒子は常に決まった場所にある","光は粒子ではない","エネルギーは連続的に変化する"],"answer":"粒子は観測するまで複数の状態を重ね合わせる","explanation":"量子力学では粒子は観測するまで確率的な重ね合わせ状態にある（シュレーディンガーの猫が有名）"},{"id":4069,"subject":"理科","difficulty":3,"question":"「ウイルス」と「細菌」の違いは？","choices":["ウイルスは細胞を持たず生物の細胞内でのみ増殖できる","ウイルスの方が大きい","細菌は治療不可・ウイルスは薬がある","どちらも同じ"],"answer":"ウイルスは細胞を持たず生物の細胞内でのみ増殖できる","explanation":"細菌は単細胞生物で自力で増殖（抗生物質が効く）。ウイルスは細胞を持たず宿主の細胞内でのみ増殖"},{"id":4070,"subject":"理科","difficulty":3,"question":"「ダーウィンの進化論」の核心は？","choices":["環境に適した変異を持つ個体が生き残り子孫を残す（自然選択）","生物は常に進化する","強い者が生き残る","意識的に進化できる"],"answer":"環境に適した変異を持つ個体が生き残り子孫を残す（自然選択）","explanation":"自然選択説：偶然の変異の中で環境に有利な変異を持つ個体が生存・繁殖しやすく、世代を経て種が変化"},{"id":4071,"subject":"理科","difficulty":1,"question":"「電磁石」の強さを大きくするには？","choices":["コイルの巻き数を増やす・電流を大きくする","電池の数を減らす","コイルを細くする","磁石を近づける"],"answer":"コイルの巻き数を増やす・電流を大きくする","explanation":"電磁石を強くする方法：①コイルの巻き数を増やす②電流を大きくする③鉄心を入れる"},{"id":4072,"subject":"理科","difficulty":1,"question":"「密度」の公式は？","choices":["質量÷体積","体積÷質量","質量×体積","質量÷面積"],"answer":"質量÷体積","explanation":"密度=質量÷体積（g/cm³やkg/m³）。密度が大きいほど重い物質"},{"id":4073,"subject":"理科","difficulty":1,"question":"「食物連鎖」の出発点は？","choices":["植物（生産者）","草食動物","肉食動物","微生物"],"answer":"植物（生産者）","explanation":"食物連鎖は植物（生産者）→草食動物（一次消費者）→肉食動物（二次消費者）の順"},{"id":4074,"subject":"理科","difficulty":1,"question":"雲ができる仕組みは？","choices":["水蒸気が冷えて水滴・氷の粒になる","風が冷える","太陽が水を蒸発させる","海水が蒸発する"],"answer":"水蒸気が冷えて水滴・氷の粒になる","explanation":"空気が上昇して冷えると、水蒸気が水滴や氷の粒になり雲が生まれる"},{"id":4075,"subject":"理科","difficulty":1,"question":"「葉脈」の役割は？","choices":["水・養分の通路・葉を支える","光合成をする","水を蒸散する","根から水を吸う"],"answer":"水・養分の通路・葉を支える","explanation":"葉脈は道管（水の通路）と師管（養分の通路）から成り、葉を支える骨格の役割もする"},{"id":4076,"subject":"理科","difficulty":2,"question":"「化学変化」と「物理変化」の違いは？","choices":["化学変化は新しい物質ができる・物理変化は元の物質のまま","化学変化は可逆・物理変化は不可逆","どちらも同じ","化学変化は熱が出る"],"answer":"化学変化は新しい物質ができる・物理変化は元の物質のまま","explanation":"化学変化（燃える・さびる等）：新しい物質ができる。物理変化（溶ける・沸騰等）：元の物質のまま状態が変わる"},{"id":4077,"subject":"理科","difficulty":2,"question":"「窒素」は空気の何%を占める？","choices":["約78%","約21%","約1%","約0.04%"],"answer":"約78%","explanation":"空気の組成：窒素78%・酸素21%・アルゴン約1%・二酸化炭素約0.04%"},{"id":4078,"subject":"理科","difficulty":2,"question":"「アンモニア（NH3）」の性質は？","choices":["刺激臭・アルカリ性・水に溶けやすい","無臭・酸性・水に溶けにくい","刺激臭・酸性・水に溶けにくい","無臭・中性"],"answer":"刺激臭・アルカリ性・水に溶けやすい","explanation":"アンモニアは刺激臭のある気体。水に非常に溶けやすくアルカリ性を示す。肥料の材料"},{"id":4079,"subject":"理科","difficulty":2,"question":"「変温動物」でないのは？","choices":["イヌ","カエル","ヘビ","トカゲ"],"answer":"イヌ","explanation":"変温動物：体温が外気温に依存（魚類・両生類・は虫類）。恒温動物：体温を一定に保つ（哺乳類・鳥類）"},{"id":4080,"subject":"理科","difficulty":2,"question":"「大気圧（1気圧）」はおよそ何hPa？","choices":["1013hPa","100hPa","1500hPa","500hPa"],"answer":"1013hPa","explanation":"1気圧（標準大気圧）=1013.25hPa。海水面での平均大気圧"},{"id":4081,"subject":"理科","difficulty":3,"question":"「ベクレル（Bq）」は何の単位？","choices":["放射性物質の放射能の量","放射線の人体への影響","電気の量","磁力の強さ"],"answer":"放射性物質の放射能の量","explanation":"ベクレルは放射性物質が1秒間に崩壊する原子核の数。シーベルト（Sv）は人体への影響"},{"id":4082,"subject":"理科","difficulty":3,"question":"「ヒッグス粒子」とは？","choices":["他の粒子に質量を与えるとされる素粒子","光の粒子","最小の原子","宇宙の暗黒物質"],"answer":"他の粒子に質量を与えるとされる素粒子","explanation":"2012年に発見が確認。ヒッグス場により素粒子が質量を持つというヒッグス機構の証拠"},{"id":4083,"subject":"理科","difficulty":3,"question":"「光合成の限定要因」として正しくないのは？","choices":["気温（高すぎると酵素が変性）","光の強さ","CO2濃度","水の量"],"answer":"気温（高すぎると酵素が変性）","explanation":"これも光合成に影響するが「限定要因」はリービッヒの最小律に基づく最も不足した要因。気温も要因の一つ"},{"id":4084,"subject":"理科","difficulty":3,"question":"「超電導」とは？","choices":["極低温で電気抵抗がゼロになること","非常に電気が流れやすいこと","磁石が非常に強くなること","電子が超高速で移動すること"],"answer":"極低温で電気抵抗がゼロになること","explanation":"特定の物質を極低温に冷やすと電気抵抗が完全にゼロになる現象。リニアモーターカーに応用"},{"id":4085,"subject":"理科","difficulty":3,"question":"「マントル対流」が引き起こすのは？","choices":["プレートの移動","地震のみ","火山のみ","津波"],"answer":"プレートの移動","explanation":"マントルの対流が地球表面のプレートを動かす原動力。大陸移動・地震・火山の原因"},{"id":4086,"subject":"理科","difficulty":1,"question":"「受粉」とは？","choices":["花粉がめしべの柱頭につくこと","種が発芽すること","花が咲くこと","実ができること"],"answer":"花粉がめしべの柱頭につくこと","explanation":"受粉は雄しべの花粉がめしべの柱頭に付着すること。その後受精が起こり種・実ができる"},{"id":4087,"subject":"理科","difficulty":1,"question":"「化石燃料」を燃やすと増える気体は？","choices":["二酸化炭素（CO2）","酸素","窒素","水蒸気"],"answer":"二酸化炭素（CO2）","explanation":"石炭・石油・天然ガスを燃やすとCO2が増加。地球温暖化の主な原因"},{"id":4088,"subject":"理科","difficulty":1,"question":"「節足動物」の特徴は？","choices":["外骨格と節のある体","背骨がある","軟らかい体","殻を持つ"],"answer":"外骨格と節のある体","explanation":"節足動物は外骨格（殻）と体が節に分かれている。昆虫・エビ・カニ・クモなど"},{"id":4089,"subject":"理科","difficulty":1,"question":"「地球温暖化」の主な原因は？","choices":["温室効果ガスの増加","太陽活動の増加","オゾン層の破壊","森林減少のみ"],"answer":"温室効果ガスの増加","explanation":"CO2・メタン・フロンなどの温室効果ガスが増加し、地球の気温が上昇している"},{"id":4090,"subject":"理科","difficulty":1,"question":"「ポリエチレン」は何から作られる？","choices":["石油（エチレン）","木材","石炭","砂"],"answer":"石油（エチレン）","explanation":"ポリエチレンは石油から作られるエチレンを重合して作るプラスチック。レジ袋などに使われる"},{"id":4091,"subject":"理科","difficulty":2,"question":"「フレミングの左手の法則」は何を表す？","choices":["電流が磁場から受ける力の方向","磁力線の方向","発電の原理","コイルに生じる電流の方向"],"answer":"電流が磁場から受ける力の方向","explanation":"中指（電流）・人差し指（磁力線）・親指（力の方向）。モーターの原理"},{"id":4092,"subject":"理科","difficulty":2,"question":"「半減期」とは？","choices":["放射性物質の量が半分になるまでの時間","放射線の強さが半分になる時間","核分裂が半分進む時間","物質の寿命の半分"],"answer":"放射性物質の量が半分になるまでの時間","explanation":"放射性物質の原子核が崩壊して半分の量になるまでの時間。物質によって数秒〜数十億年と様々"},{"id":4093,"subject":"理科","difficulty":2,"question":"「タンパク質」はどの栄養素が材料？","choices":["アミノ酸","ブドウ糖","脂肪酸","ビタミン"],"answer":"アミノ酸","explanation":"タンパク質はアミノ酸が多数結合してできた高分子化合物。消化するとアミノ酸に分解される"},{"id":4094,"subject":"理科","difficulty":2,"question":"「ソナー（音波探知機）」の原理は？","choices":["音波の反射で距離を測る","光の反射","電波の反射","磁力で探知する"],"answer":"音波の反射で距離を測る","explanation":"音波を発射し反射して戻ってくるまでの時間で距離を測る。潜水艦や魚群探知機に使う"},{"id":4095,"subject":"理科","difficulty":2,"question":"「海溝」とは何？","choices":["プレートの沈み込みによってできた深い溝","火山の噴火でできた地形","大陸棚の端","海底の平野"],"answer":"プレートの沈み込みによってできた深い溝","explanation":"海洋プレートが大陸プレートの下に沈み込む境界にできる深い溝。日本海溝は深さ8000m超"},{"id":4096,"subject":"理科","difficulty":3,"question":"「触媒」の役割は？","choices":["反応速度を変える（自身は変化しない）","反応物の量を増やす","生成物の量を増やす","反応を停止させる"],"answer":"反応速度を変える（自身は変化しない）","explanation":"触媒は化学反応の速度を速めるが、自身は反応の前後で変化しない。酵素は生体触媒"},{"id":4097,"subject":"理科","difficulty":3,"question":"「特殊相対性理論」の結論の一つは？","choices":["質量はエネルギーと等価（E=mc²）","光の速さは変化する","時間は常に一定","物体は光速より速く動ける"],"answer":"質量はエネルギーと等価（E=mc²）","explanation":"アインシュタインのE=mc²：エネルギー(E)=質量(m)×光速(c)の二乗。核エネルギーの原理"},{"id":4098,"subject":"理科","difficulty":3,"question":"「中枢神経」に含まれるのは？","choices":["脳と脊髄","脳のみ","脊髄のみ","脳・脊髄・神経節"],"answer":"脳と脊髄","explanation":"神経系は中枢神経（脳・脊髄）と末梢神経（体中に張り巡らされた神経）に分類される"},{"id":4099,"subject":"理科","difficulty":3,"question":"「燃料電池」の原理は？","choices":["水素と酸素の化学反応で電気を作る","燃料を燃やして電気を作る","太陽光で水素を作る","核融合でエネルギーを得る"],"answer":"水素と酸素の化学反応で電気を作る","explanation":"燃料電池はH₂とO₂を反応させて水と電気を作る。排気が水のみで環境負荷が低い"},{"id":4100,"subject":"理科","difficulty":3,"question":"「生態系サービス」とは？","choices":["生態系が人間に提供する恵み","生物の多様性","環境保護活動","自然の浄化能力"],"answer":"生態系が人間に提供する恵み","explanation":"生態系サービス：供給サービス（食料・水）・調整サービス（気候調節）・文化的サービス（景観）・基盤サービス（土壌形成）"},{"id":4101,"subject":"理科","difficulty":1,"question":"「重さ」と「質量」の違いは？","choices":["重さは重力による力・質量は物質の量","同じもの","重さは地球でのみ使う","質量は宇宙でのみ使う"],"answer":"重さは重力による力・質量は物質の量","explanation":"質量（kg）は場所が変わっても変化しない。重さ（N）は重力によるので月では1/6になる"},{"id":4102,"subject":"理科","difficulty":1,"question":"「植物の根」の働きは？","choices":["水・養分の吸収と体の固定","光合成","花粉の生産","種の散布"],"answer":"水・養分の吸収と体の固定","explanation":"根は土から水・ミネラルを吸収し、植物を地面に固定する役割がある"},{"id":4103,"subject":"理科","difficulty":1,"question":"「電池の＋極から−極に流れる」のは？","choices":["電流","電子","電荷","電圧"],"answer":"電流","explanation":"電流は+極から-極へ流れる（電子は逆方向）。この定義はベンジャミン・フランクリンが決めた"},{"id":4104,"subject":"理科","difficulty":1,"question":"「塩酸」は何と何を混ぜたもの？","choices":["塩化水素と水","食塩と水","塩と酸","塩化ナトリウムと水"],"answer":"塩化水素と水","explanation":"塩酸は塩化水素（HCl）を水に溶かしたもの。強酸で金属を溶かす"},{"id":4105,"subject":"理科","difficulty":1,"question":"太陽系の惑星で地球に最も近い惑星は？","choices":["金星（平均的に）","火星","水星","木星"],"answer":"金星（平均的に）","explanation":"平均的な距離では金星が最も近い。ただし公転位置によって水星が最近になる場合もある"},{"id":4106,"subject":"理科","difficulty":1,"question":"「湿度」とは何を表す？","choices":["空気中の水蒸気量の割合","気温の高さ","雨の量","水の蒸発しやすさ"],"answer":"空気中の水蒸気量の割合","explanation":"湿度は空気中に含まれる水蒸気の量を最大（飽和）水蒸気量に対する割合で表したもの"},{"id":4107,"subject":"理科","difficulty":1,"question":"「節足動物」でないものは？","choices":["ミミズ","バッタ","エビ","クモ"],"answer":"ミミズ","explanation":"ミミズは環形動物。節足動物は外骨格と節のある体を持つ（昆虫・甲殻類・クモ形類など）"},{"id":4108,"subject":"理科","difficulty":1,"question":"「フックの法則」とは？","choices":["ばねの伸びは加えた力に比例する","物体は力がなければ動かない","作用には反作用がある","浮力は押しのけた液体の重さに等しい"],"answer":"ばねの伸びは加えた力に比例する","explanation":"ばねに加える力Fとばねの伸びxの関係：F=kx（kはばね定数）"},{"id":4109,"subject":"理科","difficulty":1,"question":"「血小板」の働きは？","choices":["出血を止める（止血）","酸素を運ぶ","免疫（病原体を倒す）","栄養を運ぶ"],"answer":"出血を止める（止血）","explanation":"血小板は傷口に集まって血液を固め出血を止める。赤血球（酸素運搬）・白血球（免疫）と区別する"},{"id":4110,"subject":"理科","difficulty":1,"question":"「気象衛星ひまわり」はどこにある？","choices":["赤道上空約36000kmの静止軌道","北極上空","大気圏内","月の近く"],"answer":"赤道上空約36000kmの静止軌道","explanation":"静止衛星は地球の自転と同じ速さで回るため、地上から見て止まって見える"},{"id":4111,"subject":"理科","difficulty":2,"question":"「中和反応」で生成するものは？","choices":["塩（えん）と水","酸素と水","水素と水","塩素と水"],"answer":"塩（えん）と水","explanation":"酸＋塩基→塩（えん）＋水。例：HCl＋NaOH→NaCl（食塩）＋H₂O"},{"id":4112,"subject":"理科","difficulty":2,"question":"「電力（W）」の公式は？","choices":["電圧×電流","電圧÷電流","電流÷電圧","電圧+電流"],"answer":"電圧×電流","explanation":"電力P（W）=電圧V（V）×電流I（A）。1W=1V×1A"},{"id":4113,"subject":"理科","difficulty":2,"question":"「光の反射の法則」とは？","choices":["入射角=反射角","入射角+反射角=90°","入射角=90°−反射角","反射角は常に45°"],"answer":"入射角=反射角","explanation":"光が鏡などで反射するとき、入射角と反射角は等しい（法線を基準に測る）"},{"id":4114,"subject":"理科","difficulty":2,"question":"「消化酵素」の特徴は？","choices":["特定の物質のみ分解・体温付近で最もよく働く","何でも分解できる・高温で活性化","体温より高い温度で最もよく働く","一度使うと使えなくなる"],"answer":"特定の物質のみ分解・体温付近で最もよく働く","explanation":"酵素は基質特異性（特定の物質のみ）と最適温度（37℃前後）・最適pHがある"},{"id":4115,"subject":"理科","difficulty":2,"question":"「惑星」と「恒星」の違いは？","choices":["恒星は自ら光を発する・惑星は反射する","惑星が大きい・恒星が小さい","同じもの","恒星は動かない"],"answer":"恒星は自ら光を発する・惑星は反射する","explanation":"恒星（太陽など）は核融合で自ら光を発する。惑星（地球・木星など）は恒星の光を反射する"},{"id":4116,"subject":"理科","difficulty":2,"question":"「酸性雨」の主な原因物質は？","choices":["二酸化硫黄・窒素酸化物","二酸化炭素","フロンガス","メタン"],"answer":"二酸化硫黄・窒素酸化物","explanation":"工場・自動車から排出されるSO₂・NOxが大気中で硫酸・硝酸になり雨に溶けて酸性雨に"},{"id":4117,"subject":"理科","difficulty":2,"question":"「神経細胞（ニューロン）」の構造は？","choices":["細胞体・樹状突起・軸索","細胞核・細胞膜・ミトコンドリアのみ","細胞体と核のみ","繊維状の細胞"],"answer":"細胞体・樹状突起・軸索","explanation":"ニューロンは細胞体（核がある）・樹状突起（信号受取）・軸索（信号送出）からなる"},{"id":4118,"subject":"理科","difficulty":2,"question":"「海流」のうち暖流はどれ？","choices":["黒潮（日本海流）","リマン海流","親潮（千島海流）","カリフォルニア海流"],"answer":"黒潮（日本海流）","explanation":"黒潮は太平洋を北上する暖流。親潮・リマン海流は寒流。暖流と寒流がぶつかる潮目は好漁場"},{"id":4119,"subject":"理科","difficulty":2,"question":"「花こう岩」はどのような岩石？","choices":["マグマがゆっくり冷えた深成岩","マグマが急速に冷えた火山岩","堆積岩","変成岩"],"answer":"マグマがゆっくり冷えた深成岩","explanation":"花こう岩は地下深くでマグマがゆっくり冷えた深成岩。大きな結晶が見える（等粒状組織）"},{"id":4120,"subject":"理科","difficulty":2,"question":"「フォトン（光子）」とは？","choices":["光のエネルギーの最小単位（粒子）","光の速さの単位","光を測る装置","光の周波数"],"answer":"光のエネルギーの最小単位（粒子）","explanation":"光は波でもあり粒子（光子・フォトン）でもある（光の二重性）。アインシュタインが提唱"},{"id":4121,"subject":"理科","difficulty":3,"question":"「PCR法」とは？","choices":["特定のDNA配列を大量に増幅する技術","タンパク質を分析する方法","細胞を染色する技術","細胞培養の方法"],"answer":"特定のDNA配列を大量に増幅する技術","explanation":"ポリメラーゼ連鎖反応（PCR）：微量のDNAを指数関数的に増幅する技術。新型コロナの検査にも使用"},{"id":4122,"subject":"理科","difficulty":3,"question":"「カオス理論」とは？","choices":["初期条件の小さな差が大きく異なる結果を生む","無秩序な系の研究","予測不可能な現象の研究","複雑系の数学"],"answer":"初期条件の小さな差が大きく異なる結果を生む","explanation":"バタフライ効果が有名。決定論的なシステムでも初期条件の微小な差が予測不可能な結果を生む"},{"id":4123,"subject":"理科","difficulty":3,"question":"「宇宙の年齢」はおよそ？","choices":["約138億年","約46億年","約1000億年","約10億年"],"answer":"約138億年","explanation":"現在の観測では宇宙の年齢は約138億年。地球の年齢は約46億年"},{"id":4124,"subject":"理科","difficulty":3,"question":"「CRISPR-Cas9」とは？","choices":["ゲノム編集ツール（DNA切断）","ウイルスの一種","タンパク質合成の仕組み","細菌の防御機構（研究ツールに転用）"],"answer":"ゲノム編集ツール（DNA切断）","explanation":"細菌の免疫機構を転用したゲノム編集技術。2020年ノーベル化学賞。医療・農業に応用"},{"id":4125,"subject":"理科","difficulty":3,"question":"「マクスウェルの方程式」は何を記述する？","choices":["電磁場の基本法則","量子力学の基礎","熱力学の法則","流体力学の法則"],"answer":"電磁場の基本法則","explanation":"電場・磁場の時空間的変化を記述する4つの方程式。電磁気学の基礎で光が電磁波であることを示す"},{"id":4126,"subject":"理科","difficulty":1,"question":"「ものが燃える」ために必要な3つの条件は？","choices":["可燃物・酸素・発火点以上の温度","可燃物・水・熱","空気・熱・燃料","酸素・熱・圧力"],"answer":"可燃物・酸素・発火点以上の温度","explanation":"燃焼の三要素：可燃物（燃えるもの）・支燃物（酸素）・熱源（発火点以上）。一つ欠けると消火できる"},{"id":4127,"subject":"理科","difficulty":1,"question":"「食物のデンプン」はどこで消化される？","choices":["口（だ液）・小腸","胃のみ","大腸","肝臓"],"answer":"口（だ液）・小腸","explanation":"デンプンはだ液（アミラーゼ）・膵液・腸液で消化され、最終的にブドウ糖になる"},{"id":4128,"subject":"理科","difficulty":1,"question":"「春分の日」の昼と夜の長さは？","choices":["昼と夜がほぼ同じ","昼が最も長い","夜が最も長い","昼が夜より少し長い"],"answer":"昼と夜がほぼ同じ","explanation":"春分（3月21日ごろ）と秋分（9月23日ごろ）は昼と夜がほぼ同じ長さになる"},{"id":4129,"subject":"理科","difficulty":1,"question":"「種子植物」の特徴は？","choices":["種子で増える","胞子で増える","無性生殖","花を咲かせない"],"answer":"種子で増える","explanation":"種子植物は花を咲かせ種子で繁殖する。被子植物と裸子植物に分類される"},{"id":4130,"subject":"理科","difficulty":1,"question":"「磁力線」の向きは？","choices":["N極から出てS極に入る","S極から出てN極に入る","両極から出る","磁石の内部を通る"],"answer":"N極から出てS極に入る","explanation":"磁力線はN極から出てS極に入る（磁場の方向）。内部ではS極からN極に向かう"},{"id":4131,"subject":"理科","difficulty":2,"question":"「ブラウン運動」とは？","choices":["液体中の微粒子が不規則に運動する現象","化学反応の速度","分子の集合運動","電子の運動"],"answer":"液体中の微粒子が不規則に運動する現象","explanation":"水中の花粉が溶媒分子の衝突により不規則に動く現象。分子の存在を示す証拠"},{"id":4132,"subject":"理科","difficulty":2,"question":"「水の電気分解」で水素が発生する極は？","choices":["陰極（マイナス極）","陽極（プラス極）","両方","発生しない"],"answer":"陰極（マイナス極）","explanation":"水の電気分解：陰極→H₂（水素）、陽極→O₂（酸素）。体積比はH₂:O₂=2:1"},{"id":4133,"subject":"理科","difficulty":2,"question":"「海洋プレート」と「大陸プレート」の違いは？","choices":["海洋プレートは薄く重い・大陸プレートは厚く軽い","大陸プレートが沈み込む","同じ密度","海洋プレートの方が厚い"],"answer":"海洋プレートは薄く重い・大陸プレートは厚く軽い","explanation":"海洋プレートは密度が大きく、大陸プレートの下に沈み込む。これが海溝・地震の原因"},{"id":4134,"subject":"理科","difficulty":2,"question":"「反射」のうち意識とは関係なく起こるものを何という？","choices":["脊髄反射（反射弓）","条件反射","無条件反射","随意運動"],"answer":"脊髄反射（反射弓）","explanation":"膝蓋腱反射などの脊髄反射は脳を介さず脊髄レベルで起こる。危険から体を守る"},{"id":4135,"subject":"理科","difficulty":2,"question":"「光の屈折」が起きるのはなぜ？","choices":["媒質によって光速が変わるから","光が曲がるから","波長が変わるから","反射するから"],"answer":"媒質によって光速が変わるから","explanation":"光は真空・空気・水・ガラスで速さが異なる。境界で速度が変わると方向が変わる（屈折）"},{"id":4136,"subject":"理科","difficulty":3,"question":"「リボソーム」の役割は？","choices":["タンパク質の合成","DNAの複製","エネルギーの生産","細胞分裂の制御"],"answer":"タンパク質の合成","explanation":"リボソームはmRNA（伝令RNA）の情報をもとにアミノ酸を結合してタンパク質を合成する細胞小器官"},{"id":4137,"subject":"理科","difficulty":3,"question":"「ハッブルの法則」とは？","choices":["銀河は距離に比例した速さで遠ざかっている","宇宙は膨張している（証拠）","星の明るさは距離の二乗に反比例","宇宙の年齢を示す法則"],"answer":"銀河は距離に比例した速さで遠ざかっている","explanation":"ハッブルが1929年に発見。遠い銀河ほど速く遠ざかる→宇宙膨張の証拠"},{"id":4138,"subject":"理科","difficulty":3,"question":"「酵素の基質特異性」とは？","choices":["酵素は特定の基質（物質）のみに作用する","酵素はすべての物質に作用する","酵素は温度で変わる","酵素は一度しか使えない"],"answer":"酵素は特定の基質（物質）のみに作用する","explanation":"酵素の活性部位の形に合う基質のみ結合できる（鍵と鍵穴の関係）。これが基質特異性"},{"id":4139,"subject":"理科","difficulty":3,"question":"「慣性モーメント」とは何？","choices":["回転しにくさ（回転の慣性）を表す量","質量の別名","加速しにくさ","重力に対する抵抗"],"answer":"回転しにくさ（回転の慣性）を表す量","explanation":"並進運動の質量に対応する回転運動の物理量。質量分布と回転軸からの距離で決まる"},{"id":4140,"subject":"理科","difficulty":3,"question":"「ドルトンの原子論」の内容は？","choices":["物質は原子からなり同じ元素の原子は同じ質量","原子は分割できる","電子が原子を構成する","原子核が存在する"],"answer":"物質は原子からなり同じ元素の原子は同じ質量","explanation":"1803年、ドルトンが原子論を提唱。現在は同位体の発見などで修正されているが近代化学の基礎"},{"id":4141,"subject":"理科","difficulty":1,"question":"「だ液」に含まれる消化酵素は？","choices":["アミラーゼ","ペプシン","リパーゼ","トリプシン"],"answer":"アミラーゼ","explanation":"だ液にはアミラーゼが含まれデンプンを麦芽糖に分解する。ペプシンは胃液でタンパク質を分解"},{"id":4142,"subject":"理科","difficulty":1,"question":"「火山の噴出物」に含まれないのは？","choices":["塩酸（HCl）","溶岩","火山灰","二酸化硫黄"],"answer":"塩酸（HCl）","explanation":"火山ガスには水蒸気・CO₂・SO₂・H₂S・HClなども含まれる。実際はHClも含まれる"},{"id":4143,"subject":"理科","difficulty":1,"question":"「永久磁石」に使われる金属は？","choices":["鉄・ニッケル・コバルト","銅・アルミニウム","金・銀","亜鉛・錫"],"answer":"鉄・ニッケル・コバルト","explanation":"強磁性体（磁石になりやすい）は鉄・ニッケル・コバルト。ネオジム磁石は鉄・ネオジム・ホウ素の合金"},{"id":4144,"subject":"理科","difficulty":1,"question":"「星座」は全部でいくつ？","choices":["88個","12個","48個","36個"],"answer":"88個","explanation":"国際天文学連合が定める星座は88個。日本でよく見えるのはこのうち約60個"},{"id":4145,"subject":"理科","difficulty":1,"question":"人間が感じる「5つの感覚」は？","choices":["視・聴・嗅・味・触覚","視・聴・嗅・味・温覚","視・聴・触・平衡・温覚","視・聴・嗅・痛・味覚"],"answer":"視・聴・嗅・味・触覚","explanation":"五感は視覚・聴覚・嗅覚・味覚・触覚。実際には温度感覚・痛覚・平衡感覚なども重要"},{"id":4146,"subject":"理科","difficulty":2,"question":"「陽子」と「中性子」はどこにある？","choices":["原子核の中","電子雲の中","最外殻","核の外"],"answer":"原子核の中","explanation":"原子核には陽子（＋）と中性子（電荷なし）がある。電子（−）は原子核の外を回る"},{"id":4147,"subject":"理科","difficulty":2,"question":"「光合成速度」と「呼吸速度」が等しい光の強さは？","choices":["光補償点","光飽和点","暗呼吸点","最大光合成点"],"answer":"光補償点","explanation":"光補償点では見かけ上の光合成速度=0（CO₂の吸収と放出が等しい）"},{"id":4148,"subject":"理科","difficulty":2,"question":"「力学的エネルギー保存の法則」とは？","choices":["摩擦がなければ位置エネルギー＋運動エネルギーが一定","エネルギーは保存される","運動エネルギーは常に一定","位置エネルギーは変化しない"],"answer":"摩擦がなければ位置エネルギー＋運動エネルギーが一定","explanation":"摩擦・空気抵抗がない理想的な条件で、力学的エネルギー（位置+運動）の和は一定に保たれる"},{"id":4149,"subject":"理科","difficulty":2,"question":"「化石燃料」が作られるのにかかった時間は？","choices":["数百万〜数億年","数百年","数千年","数万年"],"answer":"数百万〜数億年","explanation":"石炭・石油は太古の生物が地中で変化してできるのに膨大な時間がかかった。再生不可能な資源"},{"id":4150,"subject":"理科","difficulty":2,"question":"「受精卵」が「胚」になる過程を何という？","choices":["卵割（らんかつ）","変態","発芽","出芽"],"answer":"卵割（らんかつ）","explanation":"受精卵が細胞分裂（卵割）を繰り返して胚になる。卵割では細胞の大きさが小さくなる"}];
const UNI_QUESTIONS=[{"id":5001,"subject":"英単語","difficulty":1,"question":"「abandon」の意味は？","choices":["捨てる・放棄する","始める","集める","守る"],"answer":"捨てる・放棄する","explanation":"abandon：捨てる、見捨てる。He abandoned his plan.（彼は計画を放棄した）"},{"id":5002,"subject":"英単語","difficulty":1,"question":"「acquire」の意味は？","choices":["獲得する","失う","送る","壊す"],"answer":"獲得する","explanation":"acquire：獲得する、身につける。acquire skills（スキルを習得する）"},{"id":5003,"subject":"英単語","difficulty":1,"question":"「advocate」の意味は？","choices":["主張する・支持する","反対する","疑う","無視する"],"answer":"主張する・支持する","explanation":"advocate：主張する、擁護する。名詞では「支持者・弁護士」"},{"id":5004,"subject":"英単語","difficulty":1,"question":"「ambiguous」の意味は？","choices":["曖昧な","明確な","重要な","簡単な"],"answer":"曖昧な","explanation":"ambiguous：曖昧な、多義的な。an ambiguous statement（曖昧な発言）"},{"id":5005,"subject":"英単語","difficulty":1,"question":"「anticipate」の意味は？","choices":["予期する","忘れる","避ける","批判する"],"answer":"予期する","explanation":"anticipate：予期する、期待する。We anticipate rain.（雨を予期している）"},{"id":5006,"subject":"英単語","difficulty":1,"question":"「apparent」の意味は？","choices":["明らかな","隠れた","複雑な","小さな"],"answer":"明らかな","explanation":"apparent：明らかな、見かけ上の。It is apparent that...（〜は明らかだ）"},{"id":5007,"subject":"英単語","difficulty":1,"question":"「arbitrary」の意味は？","choices":["恣意的な","合理的な","体系的な","公正な"],"answer":"恣意的な","explanation":"arbitrary：恣意的な、独断的な。an arbitrary decision（恣意的な決定）"},{"id":5008,"subject":"英単語","difficulty":1,"question":"「assess」の意味は？","choices":["評価する","無視する","増やす","減らす"],"answer":"評価する","explanation":"assess：評価する、査定する。assess the risk（リスクを評価する）"},{"id":5009,"subject":"英単語","difficulty":1,"question":"「assume」の意味は？","choices":["仮定する","証明する","否定する","観察する"],"answer":"仮定する","explanation":"assume：仮定する、思い込む。I assume you know.（あなたは知っていると思う）"},{"id":5010,"subject":"英単語","difficulty":1,"question":"「attribute」の意味は？","choices":["〜のせいにする・帰する","否定する","支持する","分析する"],"answer":"〜のせいにする・帰する","explanation":"attribute A to B：AをBのせいにする。She attributed her success to hard work."},{"id":5011,"subject":"英単語","difficulty":1,"question":"「benevolent」の意味は？","choices":["慈悲深い","悪意のある","無関心な","厳しい"],"answer":"慈悲深い","explanation":"benevolent：慈悲深い、善意の。a benevolent leader（慈悲深いリーダー）"},{"id":5012,"subject":"英単語","difficulty":1,"question":"「bias」の意味は？","choices":["偏見・偏り","公平さ","証拠","意見"],"answer":"偏見・偏り","explanation":"bias：偏見、バイアス。cultural bias（文化的偏見）"},{"id":5013,"subject":"英単語","difficulty":1,"question":"「coherent」の意味は？","choices":["一貫した","矛盾した","複雑な","曖昧な"],"answer":"一貫した","explanation":"coherent：一貫した、筋の通った。a coherent argument（一貫した議論）"},{"id":5014,"subject":"英単語","difficulty":1,"question":"「comply」の意味は？","choices":["従う","反抗する","無視する","批判する"],"answer":"従う","explanation":"comply with：〜に従う。comply with the rules（規則に従う）"},{"id":5015,"subject":"英単語","difficulty":1,"question":"「comprehensive」の意味は？","choices":["包括的な","部分的な","難しい","簡潔な"],"answer":"包括的な","explanation":"comprehensive：包括的な、総合的な。a comprehensive study（包括的な研究）"},{"id":5016,"subject":"英単語","difficulty":1,"question":"「concede」の意味は？","choices":["認める・譲歩する","否定する","主張する","避ける"],"answer":"認める・譲歩する","explanation":"concede：認める、渋々認める。concede defeat（敗北を認める）"},{"id":5017,"subject":"英単語","difficulty":1,"question":"「conform」の意味は？","choices":["従う・順応する","反抗する","変化する","独立する"],"answer":"従う・順応する","explanation":"conform to：〜に従う、適合する。conform to social norms（社会規範に従う）"},{"id":5018,"subject":"英単語","difficulty":1,"question":"「consequence」の意味は？","choices":["結果・影響","原因","目的","方法"],"answer":"結果・影響","explanation":"consequence：結果、影響。as a consequence（その結果として）"},{"id":5019,"subject":"英単語","difficulty":1,"question":"「controversial」の意味は？","choices":["議論を呼ぶ","一般的な","明らかな","簡単な"],"answer":"議論を呼ぶ","explanation":"controversial：物議をかもす、論争的な。a controversial issue（論争的な問題）"},{"id":5020,"subject":"英単語","difficulty":1,"question":"「convey」の意味は？","choices":["伝える・運ぶ","隠す","受け取る","否定する"],"answer":"伝える・運ぶ","explanation":"convey：伝える、運搬する。convey a message（メッセージを伝える）"},{"id":5021,"subject":"英単語","difficulty":2,"question":"「detrimental」の意味は？","choices":["有害な","有益な","中立的な","重要な"],"answer":"有害な","explanation":"detrimental：有害な。detrimental to health（健康に有害な）"},{"id":5022,"subject":"英単語","difficulty":2,"question":"「discrepancy」の意味は？","choices":["食い違い・不一致","一致","類似","差異"],"answer":"食い違い・不一致","explanation":"discrepancy：食い違い。a discrepancy between A and B（AとBの食い違い）"},{"id":5023,"subject":"英単語","difficulty":2,"question":"「eloquent」の意味は？","choices":["雄弁な","無口な","曖昧な","複雑な"],"answer":"雄弁な","explanation":"eloquent：雄弁な、表現力豊かな。an eloquent speech（雄弁な演説）"},{"id":5024,"subject":"英単語","difficulty":2,"question":"「empirical」の意味は？","choices":["経験的な・実証的な","理論的な","直感的な","観念的な"],"answer":"経験的な・実証的な","explanation":"empirical：経験的な、実証的な。empirical evidence（実証的な証拠）"},{"id":5025,"subject":"英単語","difficulty":2,"question":"「endorse」の意味は？","choices":["支持する・承認する","反対する","無視する","批判する"],"answer":"支持する・承認する","explanation":"endorse：支持する、裏書きする。endorse a product（製品を推薦する）"},{"id":5026,"subject":"英単語","difficulty":2,"question":"「exacerbate」の意味は？","choices":["悪化させる","改善する","維持する","解決する"],"answer":"悪化させる","explanation":"exacerbate：悪化させる。exacerbate the problem（問題を悪化させる）"},{"id":5027,"subject":"英単語","difficulty":2,"question":"「explicit」の意味は？","choices":["明示的な","暗黙の","曖昧な","複雑な"],"answer":"明示的な","explanation":"explicit：明示的な、露骨な。explicit instructions（明確な指示）。対義語はimplicit"},{"id":5028,"subject":"英単語","difficulty":2,"question":"「facilitate」の意味は？","choices":["促進する・容易にする","妨げる","強制する","評価する"],"answer":"促進する・容易にする","explanation":"facilitate：促進する、容易にする。facilitate communication（コミュニケーションを促進する）"},{"id":5029,"subject":"英単語","difficulty":2,"question":"「fluctuate」の意味は？","choices":["変動する","安定する","増加する","減少する"],"answer":"変動する","explanation":"fluctuate：変動する。Prices fluctuate.（価格は変動する）"},{"id":5030,"subject":"英単語","difficulty":2,"question":"「formulate」の意味は？","choices":["策定する・明確に述べる","否定する","実行する","評価する"],"answer":"策定する・明確に述べる","explanation":"formulate：策定する、定式化する。formulate a plan（計画を策定する）"},{"id":5031,"subject":"英単語","difficulty":2,"question":"「fundamental」の意味は？","choices":["根本的な","表面的な","複雑な","一時的な"],"answer":"根本的な","explanation":"fundamental：根本的な、基本的な。a fundamental problem（根本的な問題）"},{"id":5032,"subject":"英単語","difficulty":2,"question":"「generate」の意味は？","choices":["生み出す","消費する","破壊する","保存する"],"answer":"生み出す","explanation":"generate：生み出す、発生させる。generate electricity（電力を生み出す）"},{"id":5033,"subject":"英単語","difficulty":2,"question":"「hypothesis」の意味は？","choices":["仮説","結論","証拠","理論"],"answer":"仮説","explanation":"hypothesis：仮説。test a hypothesis（仮説を検証する）。複数形はhypotheses"},{"id":5034,"subject":"英単語","difficulty":2,"question":"「inevitable」の意味は？","choices":["避けられない","予測可能な","望ましい","困難な"],"answer":"避けられない","explanation":"inevitable：避けられない。Death is inevitable.（死は避けられない）"},{"id":5035,"subject":"英単語","difficulty":2,"question":"「inherent」の意味は？","choices":["固有の・本来備わった","後天的な","外部からの","一時的な"],"answer":"固有の・本来備わった","explanation":"inherent：固有の、内在する。inherent risks（固有のリスク）"},{"id":5036,"subject":"英単語","difficulty":2,"question":"「insight」の意味は？","choices":["洞察・見識","表面的理解","意見","情報"],"answer":"洞察・見識","explanation":"insight：洞察、見識。gain insight into（〜への洞察を得る）"},{"id":5037,"subject":"英単語","difficulty":2,"question":"「integrate」の意味は？","choices":["統合する","分離する","評価する","否定する"],"answer":"統合する","explanation":"integrate：統合する、融合させる。integrate A into B（AをBに統合する）"},{"id":5038,"subject":"英単語","difficulty":2,"question":"「justify」の意味は？","choices":["正当化する","批判する","否定する","疑う"],"answer":"正当化する","explanation":"justify：正当化する。justify one's actions（自分の行動を正当化する）"},{"id":5039,"subject":"英単語","difficulty":2,"question":"「legitimate」の意味は？","choices":["正当な・合法的な","違法な","疑わしい","不公平な"],"answer":"正当な・合法的な","explanation":"legitimate：正当な、合法的な。a legitimate reason（正当な理由）"},{"id":5040,"subject":"英単語","difficulty":2,"question":"「manifest」の意味は？","choices":["明らかにする・現れる","隠す","否定する","遅らせる"],"answer":"明らかにする・現れる","explanation":"manifest：明らかにする、現れる。形容詞では「明白な」"},{"id":5041,"subject":"英単語","difficulty":3,"question":"「mitigate」の意味は？","choices":["緩和する","悪化させる","無視する","強化する"],"answer":"緩和する","explanation":"mitigate：緩和する、軽減する。mitigate risks（リスクを軽減する）"},{"id":5042,"subject":"英単語","difficulty":3,"question":"「paradigm」の意味は？","choices":["典型的な例・枠組み","否定","変化","規則"],"answer":"典型的な例・枠組み","explanation":"paradigm：典型例、パラダイム（思考の枠組み）。paradigm shift（パラダイムシフト）"},{"id":5043,"subject":"英単語","difficulty":3,"question":"「perpetuate」の意味は？","choices":["永続させる","終わらせる","始める","変化させる"],"answer":"永続させる","explanation":"perpetuate：永続させる、持続させる。perpetuate a myth（神話を永続させる）"},{"id":5044,"subject":"英単語","difficulty":3,"question":"「pragmatic」の意味は？","choices":["実用的な","理想主義的な","理論的な","感情的な"],"answer":"実用的な","explanation":"pragmatic：実用的な、実際的な。a pragmatic approach（実用的なアプローチ）"},{"id":5045,"subject":"英単語","difficulty":3,"question":"「prevalent」の意味は？","choices":["一般的な・広まっている","珍しい","重要な","古い"],"answer":"一般的な・広まっている","explanation":"prevalent：一般的な、蔓延している。prevalent in modern society（現代社会で広まっている）"},{"id":5046,"subject":"英単語","difficulty":3,"question":"「profound」の意味は？","choices":["深遠な・根本的な","浅い","表面的な","簡単な"],"answer":"深遠な・根本的な","explanation":"profound：深遠な、根本的な。a profound impact（深遠な影響）"},{"id":5047,"subject":"英単語","difficulty":3,"question":"「reconcile」の意味は？","choices":["和解させる・調和させる","対立させる","否定する","無視する"],"answer":"和解させる・調和させる","explanation":"reconcile：和解させる。reconcile differences（相違点を調和させる）"},{"id":5048,"subject":"英単語","difficulty":3,"question":"「rhetoric」の意味は？","choices":["修辞・言葉の技巧","事実","証拠","論理"],"answer":"修辞・言葉の技巧","explanation":"rhetoric：修辞学、言葉の技巧（しばしば中身のない言葉という否定的な意味でも使われる）"},{"id":5049,"subject":"英単語","difficulty":3,"question":"「scrutinize」の意味は？","choices":["綿密に調べる","無視する","支持する","変更する"],"answer":"綿密に調べる","explanation":"scrutinize：綿密に調べる、精査する。scrutinize a document（文書を精査する）"},{"id":5050,"subject":"英単語","difficulty":3,"question":"「sophisticated」の意味は？","choices":["洗練された・高度な","単純な","古い","一般的な"],"answer":"洗練された・高度な","explanation":"sophisticated：洗練された、高度な。a sophisticated system（高度なシステム）"},{"id":5051,"subject":"英単語","difficulty":1,"question":"「circumstance」の意味は？","choices":["状況・環境","結果","原因","方法"],"answer":"状況・環境","explanation":"circumstance：状況、環境。under no circumstances（いかなる状況でも〜ない）"},{"id":5052,"subject":"英単語","difficulty":1,"question":"「contemporary」の意味は？","choices":["現代の・同時代の","古い","将来の","伝統的な"],"answer":"現代の・同時代の","explanation":"contemporary：現代の、同時代の。contemporary art（現代美術）"},{"id":5053,"subject":"英単語","difficulty":1,"question":"「contradict」の意味は？","choices":["矛盾する","一致する","支持する","証明する"],"answer":"矛盾する","explanation":"contradict：矛盾する、否定する。contradict oneself（自己矛盾する）"},{"id":5054,"subject":"英単語","difficulty":1,"question":"「crucial」の意味は？","choices":["重大な・決定的な","些細な","一般的な","曖昧な"],"answer":"重大な・決定的な","explanation":"crucial：重大な、決定的な。a crucial decision（重大な決断）"},{"id":5055,"subject":"英単語","difficulty":1,"question":"「cumulative」の意味は？","choices":["累積的な","一時的な","急激な","単発の"],"answer":"累積的な","explanation":"cumulative：累積的な。cumulative effect（累積効果）"},{"id":5056,"subject":"英単語","difficulty":2,"question":"「deplete」の意味は？","choices":["使い尽くす","補充する","保存する","増やす"],"answer":"使い尽くす","explanation":"deplete：使い尽くす、枯渇させる。deplete resources（資源を枯渇させる）"},{"id":5057,"subject":"英単語","difficulty":2,"question":"「derive」の意味は？","choices":["引き出す・由来する","否定する","送る","創る"],"answer":"引き出す・由来する","explanation":"derive from：〜から引き出す、由来する。derive pleasure from（〜から喜びを引き出す）"},{"id":5058,"subject":"英単語","difficulty":2,"question":"「dilemma」の意味は？","choices":["ジレンマ・板挟み","解決策","機会","問題"],"answer":"ジレンマ・板挟み","explanation":"dilemma：二者択一の苦境、ジレンマ。face a dilemma（ジレンマに直面する）"},{"id":5059,"subject":"英単語","difficulty":2,"question":"「diminish」の意味は？","choices":["減少する・小さくする","増加する","維持する","強化する"],"answer":"減少する・小さくする","explanation":"diminish：減少する、弱める。diminish in size（サイズが縮小する）"},{"id":5060,"subject":"英単語","difficulty":2,"question":"「dispose」の意味は？","choices":["処分する・配置する","保存する","購入する","使用する"],"answer":"処分する・配置する","explanation":"dispose of：処分する。be disposed to：〜する傾向がある"},{"id":5061,"subject":"英単語","difficulty":2,"question":"「diverse」の意味は？","choices":["多様な","均一な","単純な","少ない"],"answer":"多様な","explanation":"diverse：多様な。diverse opinions（多様な意見）。名詞はdiversity"},{"id":5062,"subject":"英単語","difficulty":2 esources（豊富な資源）。名詞はabundance"},{"id":5103,"subject":"英単語","difficulty":1,"question":"「accommodate」の意味は？","choices":["収容する・適応する","排除する","批判する","無視する"],"answer":"収容する・適応する","explanation":"accommodate：収容する、対応する。accommodate 100 people（100人を収容する）"},{"id":5104,"subject":"英単語","difficulty":1,"question":"「accurate」の意味は？","choices":["正確な","不正確な","速い","重要な"],"answer":"正確な","explanation":"accurate：正確な。accurate data（正確なデータ）。名詞はaccuracy"},{"id":5105,"subject":"英単語","difficulty":1,"question":"「acknowledge」の意味は？","choices":["認める","否定する","無視する","疑う"],"answer":"認める","explanation":"acknowledge：認める、認識する。acknowledge a mistake（間違いを認める）"},{"id":5106,"subject":"英単語","difficulty":1,"question":"「adequate」の意味は？","choices":["十分な","不十分な","過剰な","最適な"],"answer":"十分な","explanation":"adequate：十分な、適切な（= sufficient）。adequate preparation（十分な準備）"},{"id":5107,"subject":"英単語","difficulty":1,"question":"「adjacent」の意味は？","choices":["隣接した","遠い","反対の","類似した"],"answer":"隣接した","explanation":"adjacent：隣接した。adjacent to the park（公園に隣接した）"},{"id":5108,"subject":"英単語","difficulty":1,"question":"「adjust」の意味は？","choices":["調整する","壊す","始める","終わる"],"answer":"調整する","explanation":"adjust：調整する、適応する。adjust to a new environment（新環境に適応する）"},{"id":5109,"subject":"英単語","difficulty":1,"question":"「admire」の意味は？","choices":["称賛する","批判する","無視する","羨む"],"answer":"称賛する","explanation":"admire：称賛する、尊敬する。admire someone's courage（勇気を称賛する）"},{"id":5110,"subject":"英単語","difficulty":1,"question":"「adopt」の意味は？","choices":["採用する・養子にする","否定する","批判する","避ける"],"answer":"採用する・養子にする","explanation":"adopt：採用する、養子にする。adopt a new policy（新しい政策を採用する）"},{"id":5111,"subject":"英単語","difficulty":1,"question":"「affirm」の意味は？","choices":["断言する・肯定する","否定する","疑う","批判する"],"answer":"断言する・肯定する","explanation":"affirm：断言する、肯定する。affirm one's commitment（決意を断言する）"},{"id":5112,"subject":"英単語","difficulty":1,"question":"「alleviate」の意味は？","choices":["和らげる","悪化させる","無視する","強化する"],"answer":"和らげる","explanation":"alleviate：和らげる、軽減する。alleviate pain（痛みを和らげる）"},{"id":5113,"subje ation":"hierarchy：階層、ヒエラルキー。social hierarchy（社会的階層）。形容詞はhierarchical"},{"id":5193,"subject":"英単語","difficulty":2,"question":"「highlight」の意味は？","choices":["強調する・際立たせる","隠す","無視する","批判する"],"answer":"強調する・際立たせる","explanation":"highlight：強調する、際立たせる。highlight the importance（重要性を強調する）"},{"id":5194,"subject":"英単語","difficulty":2,"question":"「hinder」の意味は？","choices":["妨げる","助ける","促進する","無視する"],"answer":"妨げる","explanation":"hinder：妨げる。hinder progress（進歩を妨げる）。名詞はhindrance"},{"id":5195,"subject":"英単語","difficulty":2,"question":"「homogeneous」の意味は？","choices":["均質な","多様な","複雑な","独特な"],"answer":"均質な","explanation":"homogeneous：均質な、同質の。a homogeneous society（均質な社会）。対義語はheterogeneous"},{"id":5196,"subject":"英単語","difficulty":3,"question":"「idiosyncratic」の意味は？","choices":["個人特有の・独特な","一般的な","典型的な","普通の"],"answer":"個人特有の・独特な","explanation":"idiosyncratic：個人特有の、独特な。an idiosyncratic style（独特なスタイル）"},{"id":5197,"subject":"英単語","difficulty":3,"question":"「immutable」の意味は？","choices":["不変の","変化しやすい","一時的な","柔軟な"],"answer":"不変の","explanation":"immutable：不変の。immutable laws（不変の法則）。対義語はmutable"},{"id":5198,"subject":"英単語","difficulty":3,"question":"「imperious」の意味は？","choices":["傲慢な・命令的な","謙虚な","穏やかな","一般的な"],"answer":"傲慢な・命令的な","explanation":"imperious：傲慢な、威圧的な。an imperious manner（傲慢な態度）"},{"id":5199,"subject":"英単語","difficulty":3,"question":"「incisive」の意味は？","choices":["鋭い・的確な","曖昧な","穏やかな","一般的な"],"answer":"鋭い・的確な","explanation":"incisive：鋭い、的確な。incisive criticism（鋭い批評）"},{"id":5200,"subject":"英単語","difficulty":3,"question":"「incongruous」の意味は？","choices":["不釣り合いな・不調和な","調和した","適切な","一般的な"],"answer":"不釣り合いな・不調和な","explanation":"incongruous：不釣り合いな、場違いな。an incongruous remark（場違いな発言）"},{"id":5201,"subject":"英単語","difficulty":1,"question":"「impose」の意味は？","choices":["課す・押しつける","受け入れる","避ける","否定する"],"answer":"課す・押しつける","explanation":"impose：課す、押しつける。impose a tax（税を課す）。impose on（〜に押しつける）"},{"id":5202,"subject":"英単語","difficulty":1,"question":"「imply」の意味は？","choices":["暗示する","明言する","否定する","証明する"],"answer":"暗示する","explanation":"imply：暗示する、含意する。What does this imply?（これは何を意味する？）。名詞はimplication"},{"id":5203,"subject":"英単語","difficulty":1,"question":"「improve」の意味は？","choices":["改善する","悪化させる","維持する","変更する"],"answer":"改善する","explanation":"improve：改善する。improve the situation（状況を改善する）。名詞はimprovement"},{"id":5204,"subject":"英単語","difficulty":1,"question":"「indicate」の意味は？","choices":["示す・指摘する","隠す","否定する","無視する"],"answer":"示す・指摘する","explanation":"indicate：示す、指摘する。The data indicates that...（データは〜を示す）"},{"id":5205,"subject":"英単語","difficulty":1,"question":"「influence」の意味は？","choices":["影響を与える","無視する","批判する","否定する"],"answer":"影響を与える","explanation":"influence：影響を与える（動詞）、影響（名詞）。influence a decision（決定に影響する）"},{"id":5206,"subject":"英単語","difficulty":1,"question":"「initial」の意味は？","choices":["最初の","最後の","中間の","一般的な"],"answer":"最初の","explanation":"initial：最初の。the initial stage（最初の段階）。initially（副詞）＝最初は"},{"id":5207,"subject":"英単語","difficulty":1,"question":"「innovative」の意味は？","choices":["革新的な","伝統的な","保守的な","一般的な"],"answer":"革新的な","explanation":"innovative：革新的な。innovative technology（革新的な技術）。名詞はinnovation"},{"id":5208,"subject":"英単語","difficulty":1,"question":"「inspect」の意味は？","choices":["検査する","無視する","支持する","批判する"],"answer":"検査する","explanation":"inspect：検査する、調査する。inspect the building（建物を検査する）"},{"id":5209,"subject":"英単語","difficulty":1,"question":"「interpret」の意味は？","choices":["解釈する・通訳する","否定する","無視する","批判する"],"answer":"解釈する・通訳する","explanation":"interpret：解釈する、通訳する。interpret the data（データを解釈する）"},{"id":5210,"subject":"英単語","difficulty":1,"question":"「investigate」の意味は？","choices":["調査する","無視する","支持する","否定する"],"answer":"調査する","explanation":"investigate：調査する、捜査する。investigate a crime（犯罪を捜査する）"},{"id":5211,"subject":"英単語","difficulty":2,"question":"「invoke」の意味は？","choices":["呼び起こす・援用する","否定する","無視する","批判する"],"answer":"呼び起こす・援用する","explanation":"invoke：（法律・権利を）援用する、（感情を）呼び起こす。invoke a law（法律を援用する）"},{"id":5212,"subject":"英単語","difficulty":2,"question":"「leverage」の意味は？","choices":["影響力・活用する"," 驚異的な才能）"},{"id":5242,"subject":"英単語","difficulty":3,"question":"「proliferate」の意味は？","choices":["急増する・拡散する","減少する","安定する","消える"],"answer":"急増する・拡散する","explanation":"proliferate：急増する、拡散する。Nuclear weapons proliferated.（核兵器が拡散した）"},{"id":5243,"subject":"英単語","difficulty":3,"question":"「propensity」の意味は？","choices":["傾向・性向","能力","機会","結果"],"answer":"傾向・性向","explanation":"propensity：傾向、性向。a propensity for violence（暴力への傾向）"},{"id":5244,"subject":"英単語","difficulty":3,"question":"「proximity」の意味は？","choices":["近さ・近接","距離","差","関係"],"answer":"近さ・近接","explanation":"proximity：近さ、近接。in proximity to（〜の近くに）。形容詞はproximate"},{"id":5245,"subject":"英単語","difficulty":3,"question":"「quintessential」の意味は？","choices":["典型的な・真髄の","一般的な","珍しい","複雑な"],"answer":"典型的な・真髄の","explanation":"quintessential：典型的な、真髄の。the quintessential example（典型的な例）"},{"id":5246,"subject":"英単語","difficulty":1,"question":"「rationale」の意味は？","choices":["根拠・理由","結果","目的","方法"],"answer":"根拠・理由","explanation":"rationale：根拠、理由。the rationale behind the decision（決定の根拠）"},{"id":5247,"subject":"英単語","difficulty":1,"question":"「recognize」の意味は？","choices":["認識する・承認する","否定する","無視する","批判する"],"answer":"認識する・承認する","explanation":"recognize：認識する、承認する。recognize the importance（重要性を認識する）"},{"id":5248,"subject":"英単語","difficulty":1,"question":"「regulate」の意味は？","choices":["規制する・調整する","無視する","促進する","批判する"],"answer":"規制する・調整する","explanation":"regulate：規制する、調整する。regulate the market（市場を規制する）。名詞はregulation"},{"id":5249,"subject":"英単語","difficulty":1,"question":"「reinforce」の意味は？","choices":["強化する","弱める","否定する","無視する"],"answer":"強化する","explanation":"reinforce：強化する、補強する。reinforce a message（メッセージを強化する）"},{"id":5250,"subject":"英単語","difficulty":1,"question":"「relevant」の意味は？","choices":["関連した","無関係な","重要な","一般的な"],"answer":"関連した","explanation":"relevant：関連した、適切な。relevant information（関連情報）。名詞はrelevance"},{"id":5251,"subject":"英単語","difficulty":2,"question":"「reluctant」の意味は？","choices":["気が進まない","積極的な","熱心な","一般的な"],"answer":"気が進まない","explanation":"reluctant：気が進まない、嫌々の。be reluctant to do（〜するのを嫌がる）"},{"id":5252,"subject":"英単語","difficulty":2,"question":"「rely」の意味は？","choices":["頼る・依存する","無視する","否定する","批判する"],"answer":"頼る・依存する","explanation":"rely on：〜に頼る、〜を信頼する。rely on technology（技術に頼る）。名詞はreliance"},{"id":5253,"subject":"英単語","difficulty":2,"question":"「replicate」の意味は？","choices":["複製する・再現する","否定する","変更する","無視する"],"answer":"複製する・再現する","explanation":"replicate：複製する、再現する。replicate an experiment（実験を再現する）"},{"id":5254,"subject":"英単語","difficulty":2,"question":"「resolve」の意味は？","choices":["解決する・決意する","悪化させる","避ける","無視する"],"answer":"解決する・決意する","explanation":"resolve：解決する、決意する。resolve a conflict（対立を解決する）。名詞はresolution"},{"id":5255,"subject":"英単語","difficulty":2,"question":"「restrict」の意味は？","choices":["制限する","促進する","無視する","批判する"],"answer":"制限する","explanation":"restrict：制限する。restrict access（アクセスを制限する）。名詞はrestriction"},{"id":5256,"subject":"英単語","difficulty":3,"question":"「rudimentary」の意味は？","choices":["初歩的な・基本的な","高度な","複雑な","完成した"],"answer":"初歩的な・基本的な","explanation":"rudimentary：初歩的な、基本的な。rudimentary knowledge（基礎的な知識）"},{"id":5257,"subject":"英単語","difficulty":3,"question":"「sanction」の意味は？","choices":["制裁・承認する","批判する","無視する","支持する"],"answer":"制裁・承認する","explanation":"sanction：制裁（名詞）、承認する（動詞）。economic sanctions（経済制裁）"},{"id":5258,"subject":"英単語","difficulty":3,"question":"「semantics」の意味は？","choices":["意味論・言葉の意味","音声学","文法","語用論"],"answer":"意味論・言葉の意味","explanation":"semantics：意味論、言葉の意味。That's just semantics.（それは言葉の問題だ）"},{"id":5259,"subject":"英単語","difficulty":3,"question":"「spurious」の意味は？","choices":["偽の・根拠のない","本物の","明確な","一般的な"],"answer":"偽の・根拠のない","explanation":"spurious：偽の、根拠のない。a spurious argument（根拠のない議論）"},{"id":5260,"subject":"英単語","difficulty":3,"question":"「stagnant」の意味は？","choices":["停滞した","成長している","変化している","活発な"],"answer":"停滞した","explanation":"stagnant：停滞した、よどんだ。a stagnant economy（停滞した経済）。動詞はstagnate"},{"id":5261,"subject":"英単語","difficulty":1,"question":"「stimulate」の意味は？","choices":["刺激する","抑制する","無視する","批判する"],"a
