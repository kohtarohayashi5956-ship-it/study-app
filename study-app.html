・短命な","永続的な","重要な","大きな"],"answer":"一時的な・短命な","explanation":"transient：一時的な、短命な。a transient phenomenon（一時的な現象）"},{"id":5272,"subject":"英単語","difficulty":3,"question":"「trivial」の意味は？","choices":["些細な","重要な","複雑な","一般的な"],"answer":"些細な","explanation":"trivial：些細な、取るに足らない。a trivial matter（些細な問題）"},{"id":5273,"subject":"英単語","difficulty":3,"question":"「truncate」の意味は？","choices":["切り詰める","拡大する","強化する","変更する"],"answer":"切り詰める","explanation":"truncate：切り詰める、短縮する。truncate a sentence（文を切り詰める）"},{"id":5274,"subject":"英単語","difficulty":3,"question":"「unanimous」の意味は？","choices":["全員一致の","意見が分かれた","一般的な","重要な"],"answer":"全員一致の","explanation":"unanimous：全員一致の。a unanimous decision（全員一致の決定）"},{"id":5275,"subject":"英単語","difficulty":3,"question":"「underlie」の意味は？","choices":["〜の根底にある","〜を超える","〜を支持する","〜を否定する"],"answer":"〜の根底にある","explanation":"underlie：〜の根底にある、〜を基礎とする。the values that underlie our society（社会の根底にある価値観）"},{"id":5276,"subject":"英単語","difficulty":1,"question":"「unique」の意味は？","choices":["独自の・唯一の","一般的な","普通の","よくある"],"answer":"独自の・唯一の","explanation":"unique：独自の、唯一の。a unique approach（独自のアプローチ）。名詞はuniqueness"},{"id":5277,"subject":"英単語","difficulty":1,"question":"「utilize」の意味は？","choices":["活用する","無視する","否定する","批判する"],"answer":"活用する","explanation":"utilize：活用する（= use）。utilize resources（資源を活用する）。名詞はutilization"},{"id":5278,"subject":"英単語","difficulty":1,"question":"「vary」の意味は？","choices":["異なる・変化する","同じ","維持する","無視する"],"answer":"異なる・変化する","explanation":"vary：異なる、変化する。vary by region（地域によって異なる）。名詞はvariation"},{"id":5279,"subject":"英単語","difficulty":1,"question":"「verify」の意味は？","choices":["確認する・検証する","否定する","無視する","批判する"],"answer":"確認する・検証する","explanation":"verify：確認する、検証する。verify the information（情報を確認する）。名詞はverification"},{"id":5280,"subject":"英単語","difficulty":1,"question":"「widespread」の意味は？","choices":["広まった","局所的な","珍しい","一時的な"],"answer":"広まった","explanation":"widespread：広まった、広範な。widespread poverty（広範な貧困）"},{"id":5281,"subject":"英単語","difficulty":2,"question":"「yield」の意味は？","choices":["産出する・譲る","無視する","否定する","批判する"],"answer":"産出する・譲る","explanation":"yield：産出する、譲る、降伏する。yield results（結果をもたらす）"},{"id":5282,"subject":"英単語","difficulty":2,"question":"「abstract」の意味は？","choices":["抽象的な・要旨","具体的な","重要な","一般的な"],"answer":"抽象的な・要旨","explanation":"abstract：抽象的な（形容詞）、要旨・アブストラクト（名詞）。対義語はconcrete"},{"id":5283,"subject":"英単語","difficulty":2,"question":"「analogous」の意味は？","choices":["類似した","異なる","反対の","無関係な"],"answer":"類似した","explanation":"analogous：類似した、類推による。analogous to（〜に類似した）。名詞はanalogy"},{"id":5284,"subject":"英単語","difficulty":2,"question":"「comprise」の意味は？","choices":["構成する","分解する","否定する","無視する"],"answer":"構成する","explanation":"comprise：構成する、含む。The team comprises 10 members.（チームは10名で構成される）"},{"id":5285,"subject":"英単語","difficulty":2,"question":"「consolidate」の意味は？","choices":["統合する・強固にする","分離する","弱める","変更する"],"answer":"統合する・強固にする","explanation":"consolidate：統合する、強固にする。consolidate power（権力を強固にする）"},{"id":5286,"subject":"英単語","difficulty":3,"question":"「contentious」の意味は？","choices":["議論を呼ぶ・争いを好む","一般的な","穏やかな","明確な"],"answer":"議論を呼ぶ・争いを好む","explanation":"contentious：議論を呼ぶ、論争的な。a contentious issue（議論を呼ぶ問題）"},{"id":5287,"subject":"英単語","difficulty":3,"question":"「corroborate」の意味は？","choices":["裏付ける","否定する","無視する","批判する"],"answer":"裏付ける","explanation":"corroborate：裏付ける、確証する。corroborate the evidence（証拠を裏付ける）"},{"id":5288,"subject":"英単語","difficulty":3,"question":"「counterintuitive」の意味は？","choices":["直感に反する","直感的な","明確な","一般的な"],"answer":"直感に反する","explanation":"counterintuitive：直感に反する。a counterintuitive result（直感に反する結果）"},{"id":5289,"subject":"英単語","difficulty":3,"question":"「cursory」の意味は？","choices":["ざっとした・大雑把な","綿密な","詳細な","重要な"],"answer":"ざっとした・大雑把な","explanation":"cursory：ざっとした、大雑把な。a cursory glance（ざっとした一瞥）"},{"id":5290,"subject":"英単語","difficulty":3,"question":"「cynical」の意味は？","choices":["皮肉的な・冷笑的な","楽観的な","積極的な","一般的な"],"answer":"皮肉的な・冷笑的な","explanation":"cynical：皮肉的な、冷笑的な。a cynical view（皮肉な見方）。名詞はcynicism"},{"id":5291,"subject":"英単語","difficulty":1,"question":"「debate」の意味は？","choices":["討論する・議論","無視する","批判する","支持する"],"answer":"討論する・議論","explanation":"debate：議論する（動詞）、討論（名詞）。debate an issue（問題を議論する）"},{"id":5292,"subject":"英単語","difficulty":1,"question":"「decline」の意味は？","choices":["低下する・断る","増加する","支持する","始まる"],"answer":"低下する・断る","explanation":"decline：低下する（自動詞）、断る（他動詞）。decline an invitation（招待を断る）"},{"id":5293,"subject":"英単語","difficulty":1,"question":"「define」の意味は？","choices":["定義する","無視する","否定する","変更する"],"answer":"定義する","explanation":"define：定義する。define the term（用語を定義する）。名詞はdefinition"},{"id":5294,"subject":"英単語","difficulty":1,"question":"「demand」の意味は？","choices":["要求する・需要","提供する","無視する","批判する"],"answer":"要求する・需要","explanation":"demand：要求する（動詞）、需要（名詞）。supply and demand（需要と供給）"},{"id":5295,"subject":"英単語","difficulty":1,"question":"「deny」の意味は？","choices":["否定する","認める","支持する","証明する"],"answer":"否定する","explanation":"deny：否定する、拒否する。deny the accusation（告発を否定する）。名詞はdenial"},{"id":5296,"subject":"英単語","difficulty":2,"question":"「deprive」の意味は？","choices":["奪う・剥奪する","与える","強化する","支持する"],"answer":"奪う・剥奪する","explanation":"deprive A of B：AからBを奪う。deprive someone of their rights（権利を奪う）"},{"id":5297,"subject":"英単語","difficulty":2,"question":"「designate」の類義語は？","choices":["appoint / specify","ignore","create","destroy"],"answer":"appoint / specify","explanation":"designate（指定する・任命する）の類義語はappoint（任命する）・specify（明記する）"},{"id":5298,"subject":"英単語","difficulty":2,"question":"「discern」の意味は？","choices":["識別する・見分ける","無視する","否定する","批判する"],"answer":"識別する・見分ける","explanation":"discern：識別する、見分ける。discern a pattern（パターンを見分ける）。形容詞はdiscerning"},{"id":5299,"subject":"英単語","difficulty":2,"question":"「discrete」の意味は？","choices":["別個の・不連続の","連続した","同じ","類似した"],"answer":"別個の・不連続の","explanation":"discrete：別個の、不連続の。discrete categories（別個のカテゴリー）。discreteとdiscreet（慎重な）を混同しない"},{"id":5300,"subject":"英単語","difficulty":2,"question":"「discriminate」の意味は？","choices":["識別する・差別する","支持する","無視する","統合する"],"answer":"識別する・差別する","explanation":"discriminate：識別する、差別する。discriminate against（〜を差別する）。名詞はdiscrimination"},{"id":6001,"subject":"英熟語","difficulty":1,"question":"「account for」の意味は？","choices":["説明する・占める","無視する","反対する","支持する"],"answer":"説明する・占める","explanation":"account for：〜を説明する、〜を占める。This accounts for 30% of the total.（これが全体の30%を占める）"},{"id":6002,"subject":"英熟語","difficulty":1,"question":"「be aware of」の意味は？","choices":["〜を知っている","〜を無視する","〜を心配する","〜を避ける"],"answer":"〜を知っている","explanation":"be aware of：〜を知っている、気づいている。Are you aware of the risk?（リスクに気づいていますか）"},{"id":6003,"subject":"英熟語","difficulty":1,"question":"「break down」の意味は？","choices":["故障する・崩壊する","始める","強化する","成功する"],"answer":"故障する・崩壊する","explanation":"break down：故障する、崩壊する、感情的に崩れる。The car broke down.（車が故障した）"},{"id":6004,"subject":"英熟語","difficulty":1,"question":"「bring about」の意味は？","choices":["引き起こす","終わらせる","避ける","無視する"],"answer":"引き起こす","explanation":"bring about：引き起こす、もたらす。bring about change（変化をもたらす）"},{"id":6005,"subject":"英熟語","difficulty":1,"question":"「call for」の意味は？","choices":["要求する・必要とする","呼ぶ","電話する","訪問する"],"answer":"要求する・必要とする","explanation":"call for：要求する、必要とする。This calls for immediate action.（これは即時行動を要する）"},{"id":6006,"subject":"英熟語","difficulty":1,"question":"「carry out」の意味は？","choices":["実行する","中止する","計画する","評価する"],"answer":"実行する","explanation":"carry out：実行する、実施する。carry out an experiment（実験を実施する）"},{"id":6007,"subject":"英熟語","difficulty":1,"question":"「come across」の意味は？","choices":["偶然出会う","通り過ぎる","乗り越える","近づく"],"answer":"偶然出会う","explanation":"come across：偶然出会う、見つける。I came across an interesting article.（面白い記事を偶然見つけた）"},{"id":6008,"subject":"英熟語","difficulty":1,"question":"「cope with」の意味は？","choices":["対処する","避ける","無視する","楽しむ"],"answer":"対処する","explanation":"cope with：〜に対処する。cope with stress（ストレスに対処する）"},{"id":6009,"subject":"英熟語","difficulty":1,"question":"「deal with」の意味は？","choices":["扱う・対処する","避ける","無視する","支持する"],"answer":"扱う・対処する","explanation":"deal with：扱う、対処する。deal with a problem（問題に対処する）"},{"id":6010,"subject":"英熟語","difficulty":1,"question":"「depend on」の意味は？","choices":["〜に頼る・〜次第である","〜を無視する","〜を批判する","〜を支持する"],"answer":"〜に頼る・〜次第である","explanation":"depend on：〜に頼る、〜次第である。It depends on the situation.（状況次第だ）"},{"id":6011,"subject":"英熟語","difficulty":1,"question":"「figure out」の意味は？","choices":["理解する・解決する","無視する","作る","壊す"],"answer":"理解する・解決する","explanation":"figure out：理解する、解決する。I can't figure out this problem.（この問題が解けない）"},{"id":6012,"subject":"英熟語","difficulty":1,"question":"「give up」の意味は？","choices":["諦める","始める","成功する","試みる"],"answer":"諦める","explanation":"give up：諦める、放棄する。Don't give up!（諦めないで！）"},{"id":6013,"subject":"英熟語","difficulty":1,"question":"「go through」の意味は？","choices":["経験する・通り抜ける","避ける","無視する","始める"],"answer":"経験する・通り抜ける","explanation":"go through：経験する、通り抜ける。go through hardship（苦難を経験する）"},{"id":6014,"subject":"英熟語","difficulty":1,"question":"「keep in mind」の意味は？","choices":["心に留める","無視する","忘れる","変える"],"answer":"心に留める","explanation":"keep in mind：心に留める。Keep in mind that...（〜ということを心に留めておいて）"},{"id":6015,"subject":"英熟語","difficulty":1,"question":"「look into」の意味は？","choices":["調査する","無視する","避ける","支持する"],"answer":"調査する","explanation":"look into：調査する、検討する。look into the matter（件を調査する）"},{"id":6016,"subject":"英熟語","difficulty":1,"question":"「make up for」の意味は？","choices":["埋め合わせる","無視する","批判する","準備する"],"answer":"埋め合わせる","explanation":"make up for：埋め合わせる。make up for lost time（失った時間を取り戻す）"},{"id":6017,"subject":"英熟語","difficulty":1,"question":"「point out」の意味は？","choices":["指摘する","無視する","否定する","支持する"],"answer":"指摘する","explanation":"point out：指摘する。point out a mistake（間違いを指摘する）"},{"id":6018,"subject":"英熟語","difficulty":1,"question":"「put off」の意味は？","choices":["延期する","早める","始める","終わらせる"],"answer":"延期する","explanation":"put off：延期する。put off a meeting（会議を延期する）。≒postpone"},{"id":6019,"subject":"英熟語","difficulty":1,"question":"「result in」の意味は？","choices":["〜という結果になる","〜から生じる","〜を避ける","〜を引き起こす"],"answer":"〜という結果になる","explanation":"result in：〜という結果になる。（cf. result from：〜から生じる）"},{"id":6020,"subject":"英熟語","difficulty":1,"question":"「take for granted」の意味は？","choices":["当然と思う","感謝する","疑う","評価する"],"answer":"当然と思う","explanation":"take for granted：当然と思う、ありがたみを忘れる。Don't take it for granted.（当然と思うな）"},{"id":6021,"subject":"英熟語","difficulty":2,"question":"「be attributed to」の意味は？","choices":["〜に起因する","〜を支持する","〜を否定する","〜と一致する"],"answer":"〜に起因する","explanation":"be attributed to：〜に起因する、〜のおかげである。His success is attributed to hard work."},{"id":6022,"subject":"英熟語","difficulty":2,"question":"「be consistent with」の意味は？","choices":["〜と一致している","〜と矛盾している","〜に反している","〜を無視する"],"answer":"〜と一致している","explanation":"be consistent with：〜と一致している。This is consistent with the data.（これはデータと一致している）"},{"id":6023,"subject":"英熟語","difficulty":2,"question":"「be subject to」の意味は？","choices":["〜を受ける・〜に従う","〜を避ける","〜を無視する","〜に反対する"],"answer":"〜を受ける・〜に従う","explanation":"be subject to：〜を受けやすい、〜に従う。subject to change（変更になる場合がある）"},{"id":6024,"subject":"英熟語","difficulty":2,"question":"「by virtue of」の意味は？","choices":["〜のおかげで・〜によって","〜にもかかわらず","〜の代わりに","〜に反して"],"answer":"〜のおかげで・〜によって","explanation":"by virtue of：〜のおかげで。He got the job by virtue of his experience.（経験のおかげで仕事を得た）"},{"id":6025,"subject":"英熟語","difficulty":2,"question":"「come to terms with」の意味は？","choices":["〜を受け入れる","〜に反対する","〜を避ける","〜を無視する"],"answer":"〜を受け入れる","explanation":"come to terms with：〜を受け入れる、〜に折り合いをつける"},{"id":6026,"subject":"英熟語","difficulty":2,"question":"「draw on」の意味は？","choices":["〜を活用する","描く","引っ張る","避ける"],"answer":"〜を活用する","explanation":"draw on：〜を活用する、利用する。draw on one's experience（経験を活用する）"},{"id":6027,"subject":"英熟語","difficulty":2,"question":"「fall short of」の意味は？","choices":["〜に達しない","〜を超える","〜と一致する","〜を避ける"],"answer":"〜に達しない","explanation":"fall short of：〜に達しない。fall short of expectations（期待に達しない）"},{"id":6028,"subject":"英熟語","difficulty":2,"question":"「give rise to」の意味は？","choices":["〜を引き起こす","〜を解決する","〜を否定する","〜を支持する"],"answer":"〜を引き起こす","explanation":"give rise to：〜を引き起こす。give rise to controversy（論争を引き起こす）"},{"id":6029,"subject":"英熟語","difficulty":2,"question":"「in conjunction with」の意味は？","choices":["〜と共に","〜に反して","〜の代わりに","〜にもかかわらず"],"answer":"〜と共に","explanation":"in conjunction with：〜と共に、〜と組み合わせて"},{"id":6030,"subject":"英熟語","difficulty":2,"question":"「in light of」の意味は？","choices":["〜を考慮して","〜にもかかわらず","〜の代わりに","〜に反して"],"answer":"〜を考慮して","explanation":"in light of：〜を考慮して、〜に照らして。in light of the evidence（証拠を考慮して）"},{"id":6031,"subject":"英熟語","difficulty":2,"question":"「in terms of」の意味は？","choices":["〜の観点から","〜にもかかわらず","〜の代わりに","〜に加えて"],"answer":"〜の観点から","explanation":"in terms of：〜の観点から、〜に関して。in terms of cost（コストの観点から）"},{"id":6032,"subject":"英熟語","difficulty":2,"question":"「insofar as」の意味は？","choices":["〜する限り","〜にもかかわらず","〜のために","〜の代わりに"],"answer":"〜する限り","explanation":"insofar as：〜する限りにおいて。Insofar as I know...（私の知る限り）"},{"id":6033,"subject":"英熟語","difficulty":2,"question":"「make sense of」の意味は？","choices":["〜を理解する","〜を無視する","〜を批判する","〜を支持する"],"answer":"〜を理解する","explanation":"make sense of：〜を理解する。I can't make sense of this.（これが理解できない）"},{"id":6034,"subject":"英熟語","difficulty":2,"question":"「on the grounds that」の意味は？","choices":["〜という理由で","〜にもかかわらず","〜の結果として","〜の代わりに"],"answer":"〜という理由で","explanation":"on the grounds that：〜という理由で。He was dismissed on the grounds that he was absent."},{"id":6035,"subject":"英熟語","difficulty":2,"question":"「prior to」の意味は？","choices":["〜の前に","〜の後に","〜と同時に","〜にもかかわらず"],"answer":"〜の前に","explanation":"prior to：〜の前に。prior to the meeting（会議の前に）。≒before"},{"id":6036,"subject":"英熟語","difficulty":2,"question":"「regardless of」の意味は？","choices":["〜にかかわらず","〜のために","〜の代わりに","〜と共に"],"answer":"〜にかかわらず","explanation":"regardless of：〜にかかわらず。regardless of age（年齢にかかわらず）"},{"id":6037,"subject":"英熟語","difficulty":2,"question":"「stem from」の意味は？","choices":["〜から生じる","〜を引き起こす","〜を避ける","〜を解決する"],"answer":"〜から生じる","explanation":"stem from：〜から生じる、〜に起因する。The problem stems from a lack of communication."},{"id":6038,"subject":"英熟語","difficulty":2,"question":"「with regard to」の意味は？","choices":["〜に関して","〜にもかかわらず","〜の代わりに","〜と共に"],"answer":"〜に関して","explanation":"with regard to：〜に関して。≒regarding, concerning"},{"id":6039,"subject":"英熟語","difficulty":2,"question":"「shed light on」の意味は？","choices":["〜を明らかにする","〜を隠す","〜を批判する","〜を無視する"],"answer":"〜を明らかにする","explanation":"shed light on：〜を明らかにする、〜に光を当てる。shed light on the issue（問題を明らかにする）"},{"id":6040,"subject":"英熟語","difficulty":2,"question":"「take into account」の意味は？","choices":["考慮する","無視する","批判する","支持する"],"answer":"考慮する","explanation":"take into account：考慮する。≒take into consideration。take the cost into account（コストを考慮する）"},{"id":6041,"subject":"英熟語","difficulty":3,"question":"「by no means」の意味は？","choices":["決して〜でない","必ず","おそらく","時々"],"answer":"決して〜でない","explanation":"by no means：決して〜でない（= not at all）。It is by no means easy.（決して簡単ではない）"},{"id":6042,"subject":"英熟語","difficulty":3,"question":"「come to grips with」の意味は？","choices":["〜に真剣に取り組む","〜を無視する","〜を避ける","〜を批判する"],"answer":"〜に真剣に取り組む","explanation":"come to grips with：〜に真剣に取り組む、〜を理解しようとする"},{"id":6043,"subject":"英熟語","difficulty":3,"question":"「cut to the chase」の意味は？","choices":["本題に入る","逃げる","諦める","急ぐ"],"answer":"本題に入る","explanation":"cut to the chase：本題に入る、要点を言う。Let's cut to the chase.（本題に入りましょう）"},{"id":6044,"subject":"英熟語","difficulty":3,"question":"「be at odds with」の意味は？","choices":["〜と対立している","〜と一致している","〜を支持している","〜を無視している"],"answer":"〜と対立している","explanation":"be at odds with：〜と対立している。His views are at odds with mine.（彼の見解は私と対立している）"},{"id":6045,"subject":"英熟語","difficulty":3,"question":"「far from」の意味は？","choices":["〜どころではない","〜に近い","〜のために","〜にもかかわらず"],"answer":"〜どころではない","explanation":"far from：〜どころではない。far from perfect（完璧どころではない）"},{"id":6046,"subject":"英熟語","difficulty":3,"question":"「in the wake of」の意味は？","choices":["〜に続いて・〜の後で","〜の前に","〜にもかかわらず","〜のために"],"answer":"〜に続いて・〜の後で","explanation":"in the wake of：〜の結果として、〜に続いて。in the wake of the disaster（災害の後で）"},{"id":6047,"subject":"英熟語","difficulty":3,"question":"「make inroads into」の意味は？","choices":["〜に進出する・侵食する","〜から撤退する","〜を無視する","〜を支持する"],"answer":"〜に進出する・侵食する","explanation":"make inroads into：〜に進出する、〜を侵食する。make inroads into the market（市場に進出する）"},{"id":6048,"subject":"英熟語","difficulty":3,"question":"「run counter to」の意味は？","choices":["〜に反する","〜を支持する","〜と一致する","〜を無視する"],"answer":"〜に反する","explanation":"run counter to：〜に反する。This runs counter to common sense.（これは常識に反する）"},{"id":6049,"subject":"英熟語","difficulty":3,"question":"「speak volumes」の意味は？","choices":["多くを物語る","大声で話す","長々と話す","黙っている"],"answer":"多くを物語る","explanation":"speak volumes：多くを物語る。Her silence spoke volumes.（彼女の沈黙は多くを物語っていた）"},{"id":6050,"subject":"英熟語","difficulty":3,"question":"「stand to reason」の意味は？","choices":["当然である","証明する","無視する","批判する"],"answer":"当然である","explanation":"it stands to reason that：〜は当然である。It stands to reason that hard work leads to success."},{"id":6051,"subject":"英熟語","difficulty":1,"question":"「set out to」の意味は？","choices":["〜しようとする・着手する","〜をやめる","〜を避ける","〜を評価する"],"answer":"〜しようとする・着手する","explanation":"set out to do：〜しようとする、着手する。She set out to prove her theory.（彼女は理論を証明しようとした）"},{"id":6052,"subject":"英熟語","difficulty":1,"question":"「show up」の意味は？","choices":["現れる","消える","輝く","成功する"],"answer":"現れる","explanation":"show up：現れる、姿を見せる。He didn't show up.（彼は現れなかった）"},{"id":6053,"subject":"英熟語","difficulty":1,"question":"「stand for」の意味は？","choices":["〜を表す・〜を支持する","〜に反対する","〜を無視する","〜を批判する"],"answer":"〜を表す・〜を支持する","explanation":"stand for：〜を表す、〜を支持する。UN stands for United Nations.（UNは国連を表す）"},{"id":6054,"subject":"英熟語","difficulty":1,"question":"「take up」の意味は？","choices":["始める・占める","やめる","無視する","批判する"],"answer":"始める・占める","explanation":"take up：（趣味などを）始める、（空間・時間を）占める。take up running（ランニングを始める）"},{"id":6055,"subject":"英熟語","difficulty":1,"question":"「turn out」の意味は？","choices":["判明する・結果的に〜になる","始まる","失敗する","成功する"],"answer":"判明する・結果的に〜になる","explanation":"turn out：判明する。It turned out to be false.（それは偽りだと判明した）"},{"id":6056,"subject":"英熟語","difficulty":2,"question":"「as opposed to」の意味は？","choices":["〜とは対照的に","〜と同様に","〜に加えて","〜のために"],"answer":"〜とは対照的に","explanation":"as opposed to：〜とは対照的に、〜ではなく。Quality as opposed to quantity（量より質）"},{"id":6057,"subject":"英熟語","difficulty":2,"question":"「at the expense of」の意味は？","choices":["〜を犠牲にして","〜のおかげで","〜にもかかわらず","〜の代わりに"],"answer":"〜を犠牲にして","explanation":"at the expense of：〜を犠牲にして。success at the expense of health（健康を犠牲にした成功）"},{"id":6058,"subject":"英熟語","difficulty":2,"question":"「be bound to」の意味は？","choices":["必ず〜する","〜する可能性がある","〜すべきだ","〜してはいけない"],"answer":"必ず〜する","explanation":"be bound to：必ず〜する。She is bound to succeed.（彼女は必ず成功する）"},{"id":6059,"subject":"英熟語","difficulty":2,"question":"「be inclined to」の意味は？","choices":["〜する傾向がある","〜をしなければならない","〜することができる","〜すべきである"],"answer":"〜する傾向がある","explanation":"be inclined to：〜する傾向がある、〜したい気持ちがある"},{"id":6060,"subject":"英熟語","difficulty":2,"question":"「come up with」の意味は？","choices":["思いつく","諦める","批判する","無視する"],"answer":"思いつく","explanation":"come up with：思いつく、考え出す。come up with a solution（解決策を思いつく）"},{"id":6061,"subject":"英熟語","difficulty":2,"question":"「go hand in hand」の意味は？","choices":["密接に関連している","対立している","独立している","無関係である"],"answer":"密接に関連している","explanation":"go hand in hand：密接に関連している。Freedom and responsibility go hand in hand."},{"id":6062,"subject":"英熟語","difficulty":2,"question":"「have a bearing on」の意味は？","choices":["〜に関係する","〜を無視する","〜に反する","〜を支持する"],"answer":"〜に関係する","explanation":"have a bearing on：〜に関係する、〜に影響を及ぼす"},{"id":6063,"subject":"英熟語","difficulty":2,"question":"「keep pace with」の意味は？","choices":["〜に追いつく","〜を超える","〜を無視する","〜から離れる"],"answer":"〜に追いつく","explanation":"keep pace with：〜に追いつく、〜と並んで進む。keep pace with change（変化についていく）"},{"id":6064,"subject":"英熟語","difficulty":2,"question":"「lose sight of」の意味は？","choices":["〜を見失う","〜を発見する","〜を記憶する","〜を無視する"],"answer":"〜を見失う","explanation":"lose sight of：〜を見失う。lose sight of the goal（目標を見失う）"},{"id":6065,"subject":"英熟語","difficulty":2,"question":"「make the most of」の意味は？","choices":["〜を最大限に活用する","〜を無視する","〜を批判する","〜を避ける"],"answer":"〜を最大限に活用する","explanation":"make the most of：〜を最大限に活用する。make the most of the opportunity（機会を最大限に活用する）"},{"id":6066,"subject":"英熟語","difficulty":3,"question":"「beg the question」の意味は？","choices":["問題を回避する・循環論法を使う","質問する","問題を提起する","答えを求める"],"answer":"問題を回避する・循環論法を使う","explanation":"beg the question：論点先取（証明すべき事を前提にする）。口語では「疑問を呼ぶ」の意味でも使われる"},{"id":6067,"subject":"英熟語","difficulty":3,"question":"「go without saying」の意味は？","choices":["言うまでもない","黙っている","言えない","話す必要がない"],"answer":"言うまでもない","explanation":"it goes without saying that：〜は言うまでもない。It goes without saying that honesty is important."},{"id":6068,"subject":"英熟語","difficulty":3,"question":"「on the face of it」の意味は？","choices":["一見したところ","実際には","証拠によれば","論理的には"],"answer":"一見したところ","explanation":"on the face of it：一見したところ、表面上は。On the face of it, the plan seems good."},{"id":6069,"subject":"英熟語","difficulty":3,"question":"「take issue with」の意味は？","choices":["〜に異議を唱える","〜を支持する","〜を無視する","〜に同意する"],"answer":"〜に異議を唱える","explanation":"take issue with：〜に異議を唱える。I take issue with your conclusion.（あなたの結論に異議を唱える）"},{"id":6070,"subject":"英熟語","difficulty":3,"question":"「to no avail」の意味は？","choices":["効果なく","大いに効果があって","予想通りに","結果的に"],"answer":"効果なく","explanation":"to no avail：効果なく、無駄に。She tried hard, but to no avail.（彼女は頑張ったが、効果がなかった）"},{"id":6071,"subject":"英熟語","difficulty":1,"question":"「up to date」の意味は？","choices":["最新の","古い","正確な","不正確な"],"answer":"最新の","explanation":"up to date：最新の。keep up to date（最新の状態を保つ）"},{"id":6072,"subject":"英熟語","difficulty":1,"question":"「work out」の意味は？","choices":["解決する・うまくいく","失敗する","始める","終わる"],"answer":"解決する・うまくいく","explanation":"work out：解決する、うまくいく、運動する。Everything worked out.（すべてうまくいった）"},{"id":6073,"subject":"英熟語","difficulty":1,"question":"「in the long run」の意味は？","choices":["長期的には","短期的には","即座に","最終的には"],"answer":"長期的には","explanation":"in the long run：長期的には。In the long run, it will pay off.（長期的には報われるだろう）"},{"id":6074,"subject":"英熟語","difficulty":1,"question":"「at a loss」の意味は？","choices":["途方に暮れて","損をして","成功して","急いで"],"answer":"途方に暮れて","explanation":"at a loss：途方に暮れて、困惑して。I was at a loss for words.（言葉に詰まった）"},{"id":6075,"subject":"英熟語","difficulty":1,"question":"「take place」の意味は？","choices":["起こる・開催される","場所を取る","始まる","終わる"],"answer":"起こる・開催される","explanation":"take place：起こる、開催される。The event took place last week.（イベントは先週開催された）"},{"id":6076,"subject":"英熟語","difficulty":2,"question":"「be known as」の意味は？","choices":["〜として知られている","〜を知っている","〜に有名である","〜と呼ぶ"],"answer":"〜として知られている","explanation":"be known as：〜として知られている。He is known as a great scientist.（彼は偉大な科学者として知られている）"},{"id":6077,"subject":"英熟語","difficulty":2,"question":"「in accordance with」の意味は？","choices":["〜に従って","〜にもかかわらず","〜の代わりに","〜に加えて"],"answer":"〜に従って","explanation":"in accordance with：〜に従って。in accordance with the law（法律に従って）"},{"id":6078,"subject":"英熟語","difficulty":2,"question":"「to a certain extent」の意味は？","choices":["ある程度","完全に","全く","ほとんど"],"answer":"ある程度","explanation":"to a certain extent：ある程度。I agree to a certain extent.（ある程度同意する）"},{"id":6079,"subject":"英熟語","difficulty":2,"question":"「refrain from」の意味は？","choices":["〜を控える","〜をする","〜を楽しむ","〜を強制する"],"answer":"〜を控える","explanation":"refrain from：〜を控える。refrain from smoking（喫煙を控える）"},{"id":6080,"subject":"英熟語","difficulty":2,"question":"「be responsible for」の意味は？","choices":["〜に責任がある","〜を無視する","〜を批判する","〜を支持する"],"answer":"〜に責任がある","explanation":"be responsible for：〜に責任がある。Who is responsible for this?（これは誰の責任ですか）"},{"id":6081,"subject":"英熟語","difficulty":3,"question":"「all but」の意味は？","choices":["ほとんど〜","〜を除いてすべて","〜のすべて","〜だけでなく"],"answer":"ほとんど〜","explanation":"all but：ほとんど〜（= almost）。The project is all but finished.（プロジェクトはほとんど終わった）"},{"id":6082,"subject":"英熟語","difficulty":3,"question":"「nothing short of」の意味は？","choices":["〜に他ならない","〜以上の","〜以下の","〜とは違う"],"answer":"〜に他ならない","explanation":"nothing short of：〜に他ならない。It was nothing short of a miracle.（それは奇跡に他ならなかった）"},{"id":6083,"subject":"英熟語","difficulty":3,"question":"「be contingent on」の意味は？","choices":["〜次第である","〜に反する","〜と関係ない","〜を超える"],"answer":"〜次第である","explanation":"be contingent on：〜次第である、〜を条件とする。The deal is contingent on approval."},{"id":6084,"subject":"英熟語","difficulty":3,"question":"「lend itself to」の意味は？","choices":["〜に適している","〜を妨げる","〜に反する","〜を支持する"],"answer":"〜に適している","explanation":"lend itself to：〜に適している。This material lends itself to recycling.（この素材はリサイクルに適している）"},{"id":6085,"subject":"英熟語","difficulty":3,"question":"「more often than not」の意味は？","choices":["多くの場合","まれに","決して","常に"],"answer":"多くの場合","explanation":"more often than not：多くの場合、大抵は。More often than not, he's right.（多くの場合、彼は正しい）"},{"id":6086,"subject":"英熟語","difficulty":1,"question":"「as far as ... is concerned」の意味は？","choices":["〜に関する限り","〜にもかかわらず","〜のために","〜の代わりに"],"answer":"〜に関する限り","explanation":"as far as ... is concerned：〜に関する限り。As far as I'm concerned, it's fine.（私に関する限り、問題ない）"},{"id":6087,"subject":"英熟語","difficulty":1,"question":"「be familiar with」の意味は？","choices":["〜をよく知っている","〜を無視する","〜を批判する","〜を恐れる"],"answer":"〜をよく知っている","explanation":"be familiar with：〜をよく知っている、〜に精通している"},{"id":6088,"subject":"英熟語","difficulty":1,"question":"「in favor of」の意味は？","choices":["〜を支持して","〜に反対して","〜を無視して","〜を批判して"],"answer":"〜を支持して","explanation":"in favor of：〜を支持して。be in favor of the plan（計画を支持する）"},{"id":6089,"subject":"英熟語","difficulty":1,"question":"「no longer」の意味は？","choices":["もはや〜でない","まだ〜","いつも","ときどき"],"answer":"もはや〜でない","explanation":"no longer：もはや〜でない。She no longer works here.（彼女はもうここで働いていない）"},{"id":6090,"subject":"英熟語","difficulty":1,"question":"「on behalf of」の意味は？","choices":["〜を代表して","〜のために","〜と共に","〜に反して"],"answer":"〜を代表して","explanation":"on behalf of：〜を代表して、〜のために。on behalf of the company（会社を代表して）"},{"id":6091,"subject":"英熟語","difficulty":2,"question":"「be liable to」の意味は？","choices":["〜しがちである・責任がある","〜が得意である","〜が苦手である","〜を避ける"],"answer":"〜しがちである・責任がある","explanation":"be liable to：〜しがちである、〜の責任がある。be liable to make mistakes（間違いをしがちである）"},{"id":6092,"subject":"英熟語","difficulty":2,"question":"「by all accounts」の意味は？","choices":["誰に聞いても","会計によれば","すべての点で","全員の合意で"],"answer":"誰に聞いても","explanation":"by all accounts：誰に聞いても、あらゆる点から見て。By all accounts, she is brilliant."},{"id":6093,"subject":"英熟語","difficulty":2,"question":"「for the sake of」の意味は？","choices":["〜のために","〜のせいで","〜にもかかわらず","〜の代わりに"],"answer":"〜のために","explanation":"for the sake of：〜のために。for the sake of peace（平和のために）"},{"id":6094,"subject":"英熟語","difficulty":2,"question":"「get the better of」の意味は？","choices":["〜に勝る・〜を打ち負かす","〜に劣る","〜と協力する","〜を無視する"],"answer":"〜に勝る・〜を打ち負かす","explanation":"get the better of：〜に勝る。His curiosity got the better of him.（好奇心が彼に勝った）"},{"id":6095,"subject":"英熟語","difficulty":2,"question":"「have an effect on」の意味は？","choices":["〜に影響を与える","〜を無視する","〜を批判する","〜を支持する"],"answer":"〜に影響を与える","explanation":"have an effect on：〜に影響を与える。have a positive effect on（〜に良い影響を与える）"},{"id":6096,"subject":"英熟語","difficulty":3,"question":"「at the forefront of」の意味は？","choices":["〜の最前線に","〜の後方に","〜の中心に","〜の外側に"],"answer":"〜の最前線に","explanation":"at the forefront of：〜の最前線に。at the forefront of technology（技術の最前線に）"},{"id":6097,"subject":"英熟語","difficulty":3,"question":"「cast doubt on」の意味は？","choices":["〜に疑問を投げかける","〜を支持する","〜を証明する","〜を無視する"],"answer":"〜に疑問を投げかける","explanation":"cast doubt on：〜に疑問を投げかける。cast doubt on the theory（理論に疑問を投げかける）"},{"id":6098,"subject":"英熟語","difficulty":3,"question":"「hold sway over」の意味は？","choices":["〜を支配する","〜に従う","〜を無視する","〜を支持する"],"answer":"〜を支配する","explanation":"hold sway over：〜を支配する、〜に大きな影響力を持つ"},{"id":6099,"subject":"英熟語","difficulty":3,"question":"「put forward」の意味は？","choices":["提案する・提起する","否定する","撤回する","無視する"],"answer":"提案する・提起する","explanation":"put forward：提案する、提起する。put forward a theory（理論を提唱する）"},{"id":6100,"subject":"英熟語","difficulty":3,"question":"「weigh up」の意味は？","choices":["比較検討する","重さを量る","決断する","無視する"],"answer":"比較検討する","explanation":"weigh up：比較検討する、利害得失を考える。weigh up the pros and cons（長所と短所を比較検討する）"},{"id":6101,"subject":"英熟語","difficulty":1,"question":"「be apt to」の意味は？","choices":["〜しがちだ","〜が得意だ","〜すべきだ","〜できる"],"answer":"〜しがちだ","explanation":"be apt to：〜しがちだ、〜する傾向がある（= be likely to / be prone to）"},{"id":6102,"subject":"英熟語","difficulty":1,"question":"「be accustomed to」の意味は？","choices":["〜に慣れている","〜を知っている","〜が好きだ","〜を避ける"],"answer":"〜に慣れている","explanation":"be accustomed to：〜に慣れている（= be used to）。to の後は名詞か動名詞"},{"id":6103,"subject":"英熟語","difficulty":1,"question":"「be eager to」の意味は？","choices":["〜したがっている","〜することができる","〜すべきだ","〜を恐れている"],"answer":"〜したがっている","explanation":"be eager to：〜したがっている、熱心に〜したい。eager for（〜を切望している）"},{"id":6104,"subject":"英熟語","difficulty":1,"question":"「be supposed to」の意味は？","choices":["〜することになっている","〜したい","〜できる","〜しなければならない"],"answer":"〜することになっている","explanation":"be supposed to：〜することになっている、〜すべきとされている"},{"id":6105,"subject":"英熟語","difficulty":1,"question":"「be willing to」の意味は？","choices":["〜する気がある","〜したくない","〜できない","〜すべきだ"],"answer":"〜する気がある","explanation":"be willing to：〜する気がある、喜んで〜する。be unwilling to（〜するのを嫌がる）"},{"id":6106,"subject":"英熟語","difficulty":1,"question":"「by means of」の意味は？","choices":["〜によって","〜にもかかわらず","〜の代わりに","〜のために"],"answer":"〜によって","explanation":"by means of：〜によって、〜を用いて（= through, via）"},{"id":6107,"subject":"英熟語","difficulty":1,"question":"「come into being」の意味は？","choices":["生まれる・存在し始める","消える","変化する","成長する"],"answer":"生まれる・存在し始める","explanation":"come into being：生まれる、存在し始める（= come into existence）"},{"id":6108,"subject":"英熟語","difficulty":1,"question":"「drop out of」の意味は？","choices":["〜を中退する","〜に参加する","〜を卒業する","〜を続ける"],"answer":"〜を中退する","explanation":"drop out of：〜を中退する、脱落する。drop out of school（学校を中退する）"},{"id":6109,"subject":"英熟語","difficulty":1,"question":"「end up」の意味は？","choices":["結局〜になる","始まる","成功する","失敗する"],"answer":"結局〜になる","explanation":"end up：結局〜になる。end up doing（結局〜することになる）"},{"id":6110,"subject":"英熟語","difficulty":1,"question":"「fall apart」の意味は？","choices":["崩壊する","成功する","始まる","成長する"],"answer":"崩壊する","explanation":"fall apart：崩壊する、バラバラになる。The plan fell apart.（計画が崩壊した）"},{"id":6111,"subject":"英熟語","difficulty":2,"question":"「by and large」の意味は？","choices":["概して・全体的に見て","常に","部分的に","時々"],"answer":"概して・全体的に見て","explanation":"by and large：概して、全体的に見て（= on the whole, generally speaking）"},{"id":6112,"subject":"英熟語","difficulty":2,"question":"「come to the fore」の意味は？","choices":["重要になる・前面に出る","消える","無視される","批判される"],"answer":"重要になる・前面に出る","explanation":"come to the fore：重要になる、前面に出る。come to the forefront と同義"},{"id":6113,"subject":"英熟語","difficulty":2,"question":"「conform to expectations」の意味は？","choices":["期待に応える","期待を超える","期待を裏切る","期待を無視する"],"answer":"期待に応える","explanation":"conform to expectations：期待に応える、期待どおりになる"},{"id":6114,"subject":"英熟語","difficulty":2,"question":"「contribute to」の意味は？","choices":["〜に貢献する","〜を批判する","〜を無視する","〜に反対する"],"answer":"〜に貢献する","explanation":"contribute to：〜に貢献する、〜の一因となる。contribute to society（社会に貢献する）"},{"id":6115,"subject":"英熟語","difficulty":2,"question":"「devote A to B」の意味は？","choices":["AをBに捧げる","AをBから奪う","AをBに反する","AをBに無視する"],"answer":"AをBに捧げる","explanation":"devote A to B：AをBに捧げる。devote time to research（研究に時間を捧げる）"},{"id":6116,"subject":"英熟語","difficulty":2,"question":"「dispense with」の意味は？","choices":["〜なしで済ます","〜を使う","〜を批判する","〜を無視する"],"answer":"〜なしで済ます","explanation":"dispense with：〜なしで済ます、〜を省く。dispense with formalities（形式張らずに済ます）"},{"id":6117,"subject":"英熟語","difficulty":2,"question":"「do away with」の意味は？","choices":["廃止する","始める","強化する","維持する"],"answer":"廃止する","explanation":"do away with：廃止する、取り除く。do away with the rule（規則を廃止する）"},{"id":6118,"subject":"英熟語","difficulty":2,"question":"「draw a distinction between」の意味は？","choices":["〜の間に区別をつける","〜を比較する","〜を統合する","〜を無視する"],"answer":"〜の間に区別をつける","explanation":"draw a distinction between A and B：AとBの間に区別をつける"},{"id":6119,"subject":"英熟語","difficulty":2,"question":"「fall into place」の意味は？","choices":["うまくまとまる","崩壊する","変化する","始まる"],"answer":"うまくまとまる","explanation":"fall into place：うまくまとまる、（物事が）うまくいく"},{"id":6120,"subject":"英熟語","difficulty":2,"question":"「for the time being」の意味は？","choices":["当分の間","永遠に","すぐに","最終的に"],"answer":"当分の間","explanation":"for the time being：当分の間（= for now, temporarily）"},{"id":6121,"subject":"英熟語","difficulty":3,"question":"「give credence to」の意味は？","choices":["〜を信用する・〜に信憑性を与える","〜を否定する","〜を批判する","〜を無視する"],"answer":"〜を信用する・〜に信憑性を与える","explanation":"give credence to：〜を信用する、〜に信憑性を与える"},{"id":6122,"subject":"英熟語","difficulty":3,"question":"「go to great lengths」の意味は？","choices":["大変な努力をする","無駄な努力をする","急いで行動する","諦める"],"answer":"大変な努力をする","explanation":"go to great lengths：大変な努力をする。go to great lengths to do（〜するために大変な努力をする）"},{"id":6123,"subject":"英熟語","difficulty":3,"question":"「hinge on」の意味は？","choices":["〜にかかっている","〜に反する","〜を支持する","〜を無視する"],"answer":"〜にかかっている","explanation":"hinge on：〜にかかっている。The outcome hinges on this decision.（結果はこの決断にかかっている）"},{"id":6124,"subject":"英熟語","difficulty":3,"question":"「in retrospect」の意味は？","choices":["振り返ってみると","将来を見ると","現時点では","一般的には"],"answer":"振り返ってみると","explanation":"in retrospect：振り返ってみると。In retrospect, it was a mistake.（振り返ると、それは間違いだった）"},{"id":6125,"subject":"英熟語","difficulty":3,"question":"「lay bare」の意味は？","choices":["露わにする","隠す","批判する","無視する"],"answer":"露わにする","explanation":"lay bare：露わにする。lay bare the truth（真実を露わにする）"},{"id":6126,"subject":"英熟語","difficulty":1,"question":"「look back on」の意味は？","choices":["振り返る","前を向く","無視する","批判する"],"answer":"振り返る","explanation":"look back on：振り返る。look back on one's life（人生を振り返る）"},{"id":6127,"subject":"英熟語","difficulty":1,"question":"「make sense」の意味は？","choices":["意味をなす","無意味だ","正しい","重要だ"],"answer":"意味をなす","explanation":"make sense：意味をなす、道理にかなう。That doesn't make sense.（それは意味をなさない）"},{"id":6128,"subject":"英熟語","difficulty":1,"question":"「on the contrary」の意味は？","choices":["それどころか","さらに","要するに","したがって"],"answer":"それどころか","explanation":"on the contrary：それどころか（逆接・反論）。I'm not tired; on the contrary, I feel great."},{"id":6129,"subject":"英熟語","difficulty":1,"question":"「on the other hand」の意味は？","choices":["一方では","同様に","さらに","したがって"],"answer":"一方では","explanation":"on the other hand：一方では（= conversely）。対比を示す"},{"id":6130,"subject":"英熟語","difficulty":1,"question":"「out of the question」の意味は？","choices":["問題外・不可能な","議論の余地がある","重要な","一般的な"],"answer":"問題外・不可能な","explanation":"out of the question：問題外、不可能な。cf. out of question（疑いなく）"},{"id":6131,"subject":"英熟語","difficulty":2,"question":"「over and above」の意味は？","choices":["〜に加えて・〜を超えて","〜の代わりに","〜にもかかわらず","〜のために"],"answer":"〜に加えて・〜を超えて","explanation":"over and above：〜に加えて（= in addition to, beyond）"},{"id":6132,"subject":"英熟語","difficulty":2,"question":"「pass for」の意味は？","choices":["〜で通る・〜として認められる","〜を避ける","〜を批判する","〜を支持する"],"answer":"〜で通る・〜として認められる","explanation":"pass for：〜で通る。He could pass for a native speaker.（ネイティブで通ることができる）"},{"id":6133,"subject":"英熟語","difficulty":2,"question":"「play a role in」の意味は？","choices":["〜において役割を果たす","〜を無視する","〜を批判する","〜を支持する"],"answer":"〜において役割を果たす","explanation":"play a role in：〜において役割を果たす。play a key role in（〜において重要な役割を果たす）"},{"id":6134,"subject":"英熟語","difficulty":2,"question":"「point to」の意味は？","choices":["〜を示す・〜を指し示す","〜を無視する","〜を批判する","〜を支持する"],"answer":"〜を示す・〜を指し示す","explanation":"point to：〜を示す、〜を指し示す。The data points to a trend.（データはトレンドを示している）"},{"id":6135,"subject":"英熟語","difficulty":2,"question":"「put forward a view」の意味は？","choices":["見解を示す","見解を否定する","見解を変える","見解を無視する"],"answer":"見解を示す","explanation":"put forward a view：見解を示す、主張する"},{"id":6136,"subject":"英熟語","difficulty":2,"question":"「reach a conclusion」の意味は？","choices":["結論に達する","結論を避ける","結論を変える","結論を無視する"],"answer":"結論に達する","explanation":"reach a conclusion：結論に達する（= come to a conclusion, draw a conclusion）"},{"id":6137,"subject":"英熟語","difficulty":2,"question":"「refer to」の意味は？","choices":["言及する・参照する","無視する","批判する","支持する"],"answer":"言及する・参照する","explanation":"refer to：言及する、参照する。refer to a dictionary（辞書を参照する）"},{"id":6138,"subject":"英熟語","difficulty":2,"question":"「run out of」の意味は？","choices":["〜を使い果たす","〜を集める","〜を無視する","〜を批判する"],"answer":"〜を使い果たす","explanation":"run out of：〜を使い果たす。run out of time（時間がなくなる）"},{"id":6139,"subject":"英熟語","difficulty":2,"question":"「set a precedent」の意味は？","choices":["前例を作る","前例を否定する","前例を変える","前例を無視する"],"answer":"前例を作る","explanation":"set a precedent：前例を作る。set a precedent for（〜の前例を作る）"},{"id":6140,"subject":"英熟語","difficulty":2,"question":"「shed light on」は以下のどの表現に言い換えられる？","choices":["illuminate / clarify","confuse","ignore","deny"],"answer":"illuminate / clarify","explanation":"shed light on の言い換え：illuminate（照らし出す）・clarify（明らかにする）・elucidate"},{"id":6141,"subject":"英熟語","difficulty":3,"question":"「stand in stark contrast to」の意味は？","choices":["〜と鮮明なコントラストをなす","〜と一致する","〜を支持する","〜に従う"],"answer":"〜と鮮明なコントラストをなす","explanation":"stand in stark contrast to：〜と鮮明なコントラストをなす"},{"id":6142,"subject":"英熟語","difficulty":3,"question":"「subscribe to」の意味は？","choices":["〜に賛同する・〜を購読する","〜に反対する","〜を無視する","〜を批判する"],"answer":"〜に賛同する・〜を購読する","explanation":"subscribe to：〜に賛同する、〜を購読する。subscribe to a view（見解に賛同する）"},{"id":6143,"subject":"英熟語","difficulty":3,"question":"「take precedence over」の意味は？","choices":["〜より優先する","〜に従う","〜を無視する","〜を支持する"],"answer":"〜より優先する","explanation":"take precedence over：〜より優先する。Safety takes precedence over speed.（安全が速度より優先する）"},{"id":6144,"subject":"英熟語","difficulty":3,"question":"「to put it another way」の意味は？","choices":["言い換えると","要するに","したがって","それどころか"],"answer":"言い換えると","explanation":"to put it another way：言い換えると（= in other words, that is to say）"},{"id":6145,"subject":"英熟語","difficulty":3,"question":"「turn the tide」の意味は？","choices":["形勢を逆転させる","状況を悪化させる","何もしない","批判する"],"answer":"形勢を逆転させる","explanation":"turn the tide：形勢を逆転させる。turn the tide of the war（戦争の形勢を逆転させる）"},{"id":6146,"subject":"英熟語","difficulty":1,"question":"「used to V」との違いで「would V」は何を表す？","choices":["過去の習慣（反復動作）","過去の状態","現在の習慣","未来の行動"],"answer":"過去の習慣（反復動作）","explanation":"would V（過去の習慣）：We would go fishing every summer.（毎夏釣りに行ったものだ）。状態動詞には使えない"},{"id":6147,"subject":"英熟語","difficulty":1,"question":"「what is more」の意味は？","choices":["さらに・その上","要するに","したがって","それどころか"],"answer":"さらに・その上","explanation":"what is more：さらに、その上（= moreover, furthermore）。追加情報を加える"},{"id":6148,"subject":"英熟語","difficulty":1,"question":"「with a view to」の意味は？","choices":["〜を目的として","〜にもかかわらず","〜の代わりに","〜の結果として"],"answer":"〜を目的として","explanation":"with a view to：〜を目的として（= for the purpose of）。to の後は名詞か動名詞"},{"id":6149,"subject":"英熟語","difficulty":1,"question":"「without exception」の意味は？","choices":["例外なく","時々","部分的に","条件によって"],"answer":"例外なく","explanation":"without exception：例外なく。All students, without exception, must attend.（全生徒は例外なく出席すること）"},{"id":6150,"subject":"英熟語","difficulty":1,"question":"「worth while / worthwhile」の意味は？","choices":["価値がある・やりがいのある","無駄な","重要な","一般的な"],"answer":"価値がある・やりがいのある","explanation":"worthwhile：価値がある、やりがいのある。a worthwhile experience（価値ある経験）"},{"id":6151,"subject":"英熟語","difficulty":2,"question":"「account for a large proportion」の意味は？","choices":["大きな割合を占める","少ない割合を占める","増加する","減少する"],"answer":"大きな割合を占める","explanation":"account for a large proportion：大きな割合を占める"},{"id":6152,"subject":"英熟語","difficulty":2,"question":"「address an issue」の意味は？","choices":["問題に取り組む","問題を無視する","問題を批判する","問題を避ける"],"answer":"問題に取り組む","explanation":"address an issue：問題に取り組む（address a problem / concern も同じ用法）"},{"id":6153,"subject":"英熟語","difficulty":2,"question":"「as a result of」の意味は？","choices":["〜の結果として","〜にもかかわらず","〜の代わりに","〜と同時に"],"answer":"〜の結果として","explanation":"as a result of：〜の結果として（= as a consequence of）"},{"id":6154,"subject":"英熟語","difficulty":2,"question":"「at the core of」の意味は？","choices":["〜の核心に","〜の外側に","〜の上に","〜の下に"],"answer":"〜の核心に","explanation":"at the core of：〜の核心に、〜の中心に。at the core of the problem（問題の核心に）"},{"id":6155,"subject":"英熟語","difficulty":2,"question":"「be derived from」の意味は？","choices":["〜に由来する","〜を否定する","〜を支持する","〜に反する"],"answer":"〜に由来する","explanation":"be derived from：〜に由来する。The word is derived from Latin.（その語はラテン語に由来する）"},{"id":6156,"subject":"英熟語","difficulty":2,"question":"「be exposed to」の意味は？","choices":["〜にさらされる","〜を避ける","〜を無視する","〜を批判する"],"answer":"〜にさらされる","explanation":"be exposed to：〜にさらされる。be exposed to risks（リスクにさらされる）"},{"id":6157,"subject":"英熟語","difficulty":2,"question":"「be geared toward」の意味は？","choices":["〜に向けられている","〜から離れている","〜に反する","〜を無視する"],"answer":"〜に向けられている","explanation":"be geared toward：〜に向けられている、〜を目標にしている"},{"id":6158,"subject":"英熟語","difficulty":2,"question":"「be rooted in」の意味は？","choices":["〜に根ざしている","〜と無関係","〜に反する","〜を無視する"],"answer":"〜に根ざしている","explanation":"be rooted in：〜に根ざしている。be rooted in tradition（伝統に根ざしている）"},{"id":6159,"subject":"英熟語","difficulty":2,"question":"「be tied to」の意味は？","choices":["〜と密接に結びついている","〜から離れている","〜に反する","〜を無視する"],"answer":"〜と密接に結びついている","explanation":"be tied to：〜と密接に結びついている。be tied to economic growth（経済成長と結びついている）"},{"id":6160,"subject":"英熟語","difficulty":2,"question":"「beyond doubt」の意味は？","choices":["疑いなく","疑わしく","おそらく","ときに"],"answer":"疑いなく","explanation":"beyond doubt：疑いなく（= without doubt, undoubtedly）。beyond reasonable doubt（合理的な疑いを超えて）"},{"id":6161,"subject":"英熟語","difficulty":3,"question":"「bring to light」の意味は？","choices":["明らかにする","隠す","批判する","無視する"],"answer":"明らかにする","explanation":"bring to light：明らかにする（= reveal, expose）。bring to light new evidence（新しい証拠を明らかにする）"},{"id":6162,"subject":"英熟語","difficulty":3,"question":"「call into question」の意味は？","choices":["〜に疑問を呈する","〜を支持する","〜を無視する","〜を証明する"],"answer":"〜に疑問を呈する","explanation":"call into question：〜に疑問を呈する（= cast doubt on）"},{"id":6163,"subject":"英熟語","difficulty":3,"question":"「carry weight」の意味は？","choices":["重要性・説得力を持つ","重い","批判する","無視する"],"answer":"重要性・説得力を持つ","explanation":"carry weight：重要性・説得力を持つ。His opinion carries a lot of weight.（彼の意見には重みがある）"},{"id":6164,"subject":"英熟語","difficulty":3,"question":"「come at a cost」の意味は？","choices":["犠牲を伴う","無料だ","簡単だ","自動的に起こる"],"answer":"犠牲を伴う","explanation":"come at a cost：犠牲を伴う。Every choice comes at a cost.（すべての選択には代償がある）"},{"id":6165,"subject":"英熟語","difficulty":3,"question":"「cut across」の意味は？","choices":["〜を超えて関係する","〜を無視する","〜に反する","〜を支持する"],"answer":"〜を超えて関係する","explanation":"cut across：〜を横断する、〜を超えて関係する。This issue cuts across political lines.（この問題は政治的境界を超える）"},{"id":6166,"subject":"英熟語","difficulty":1,"question":"「fall behind」の意味は？","choices":["遅れる","追いつく","成功する","始まる"],"answer":"遅れる","explanation":"fall behind：遅れる。fall behind schedule（スケジュールに遅れる）"},{"id":6167,"subject":"英熟語","difficulty":1,"question":"「find fault with」の意味は？","choices":["〜を非難する・欠点を見つける","〜を支持する","〜を無視する","〜を証明する"],"answer":"〜を非難する・欠点を見つける","explanation":"find fault with：〜を非難する、欠点を見つける"},{"id":6168,"subject":"英熟語","difficulty":1,"question":"「get rid of」の意味は？","choices":["〜を取り除く","〜を集める","〜を支持する","〜を批判する"],"answer":"〜を取り除く","explanation":"get rid of：〜を取り除く、〜を処分する。get rid of bad habits（悪習を取り除く）"},{"id":6169,"subject":"英熟語","difficulty":1,"question":"「give way to」の意味は？","choices":["〜に取って代わられる・〜に譲る","〜を支持する","〜に反対する","〜を無視する"],"answer":"〜に取って代わられる・〜に譲る","explanation":"give way to：〜に取って代わられる、〜に譲る。Sadness gave way to joy.（悲しみが喜びに変わった）"},{"id":6170,"subject":"英熟語","difficulty":1,"question":"「hand in hand」の意味は？","choices":["密接に関連して","反対に","独立して","無関係に"],"answer":"密接に関連して","explanation":"hand in hand：密接に関連して（= closely connected）。go hand in hand（密接に関連している）"},{"id":6171,"subject":"英熟語","difficulty":2,"question":"「have implications for」の意味は？","choices":["〜に意味を持つ・〜に影響を及ぼす","〜を無視する","〜を批判する","〜に反する"],"answer":"〜に意味を持つ・〜に影響を及ぼす","explanation":"have implications for：〜に意味を持つ、〜に影響を及ぼす"},{"id":6172,"subject":"英熟語","difficulty":2,"question":"「hold true」の意味は？","choices":["当てはまる・真実である","偽りである","変化する","無視される"],"answer":"当てはまる・真実である","explanation":"hold true：当てはまる。This holds true in many cases.（これは多くの場合に当てはまる）"},{"id":6173,"subject":"英熟語","difficulty":2,"question":"「in a nutshell」の意味は？","choices":["要するに","詳しく言うと","逆に","さらに"],"answer":"要するに","explanation":"in a nutshell：要するに（= in brief, to sum up）。簡潔にまとめる表現"},{"id":6174,"subject":"英熟語","difficulty":2,"question":"「in essence」の意味は？","choices":["本質的に","表面的に","部分的に","形式的に"],"answer":"本質的に","explanation":"in essence：本質的に（= essentially, fundamentally, at the core）"},{"id":6175,"subject":"英熟語","difficulty":2,"question":"「in proportion to」の意味は？","choices":["〜に比例して","〜に反比例して","〜にかかわらず","〜の代わりに"],"answer":"〜に比例して","explanation":"in proportion to：〜に比例して。Reward is in proportion to effort.（報酬は努力に比例する）"},{"id":6176,"subject":"英熟語","difficulty":2,"question":"「in the absence of」の意味は？","choices":["〜がない場合に","〜がある場合に","〜にもかかわらず","〜のために"],"answer":"〜がない場合に","explanation":"in the absence of：〜がない場合に。in the absence of evidence（証拠がない場合に）"},{"id":6177,"subject":"英熟語","difficulty":2,"question":"「lend support to」の意味は？","choices":["〜を支持する","〜に反対する","〜を無視する","〜を批判する"],"answer":"〜を支持する","explanation":"lend support to：〜を支持する。The data lends support to this theory.（データはこの理論を支持する）"},{"id":6178,"subject":"英熟語","difficulty":2,"question":"「look at sth from a different angle」の意味は？","choices":["別の視点から見る","同じ視点から見る","無視する","批判する"],"answer":"別の視点から見る","explanation":"look at sth from a different angle：別の視点・角度から見る"},{"id":6179,"subject":"英熟語","difficulty":2,"question":"「make a case for」の意味は？","choices":["〜の根拠を示す・〜を主張する","〜を否定する","〜を批判する","〜を無視する"],"answer":"〜の根拠を示す・〜を主張する","explanation":"make a case for：〜の根拠を示す、〜を主張する（= argue for）"},{"id":6180,"subject":"英熟語","difficulty":2,"question":"「meet the needs of」の意味は？","choices":["〜のニーズを満たす","〜のニーズを否定する","〜のニーズを無視する","〜のニーズを批判する"],"answer":"〜のニーズを満たす","explanation":"meet the needs of：〜のニーズを満たす（= satisfy the needs of）"},{"id":6181,"subject":"英熟語","difficulty":3,"question":"「mitigate against」の意味は？（注意：誤用に関する問題）","choices":["正しくは「militate against」（〜に反する）","〜を和らげる","〜を支持する","〜を批判する"],"answer":"正しくは「militate against」（〜に反する）","explanation":"mitigate against は誤用。正しくは militate against（〜に反する）か mitigate（〜を和らげる）を使う"},{"id":6182,"subject":"英熟語","difficulty":3,"question":"「of one's own accord」の意味は？","choices":["自発的に","強制されて","偶然に","急いで"],"answer":"自発的に","explanation":"of one's own accord：自発的に（= voluntarily, on one's own initiative）"},{"id":6183,"subject":"英熟語","difficulty":3,"question":"「on the premise that」の意味は？","choices":["〜という前提で","〜にもかかわらず","〜の結果として","〜の代わりに"],"answer":"〜という前提で","explanation":"on the premise that：〜という前提で（= on the assumption that）"},{"id":6184,"subject":"英熟語","difficulty":3,"question":"「outweigh」の意味は？","choices":["〜を上回る","〜を下回る","〜と同等である","〜を無視する"],"answer":"〜を上回る","explanation":"outweigh：〜を上回る。The benefits outweigh the risks.（利点がリスクを上回る）"},{"id":6185,"subject":"英熟語","difficulty":3,"question":"「override」の意味は？","choices":["〜より優先する・〜を覆す","〜に従う","〜を支持する","〜を無視する"],"answer":"〜より優先する・〜を覆す","explanation":"override：〜より優先する、〜を覆す。override a decision（決定を覆す）"},{"id":6186,"subject":"英熟語","difficulty":1,"question":"「pay attention to」の意味は？","choices":["〜に注意を払う","〜を無視する","〜を批判する","〜を支持する"],"answer":"〜に注意を払う","explanation":"pay attention to：〜に注意を払う。pay attention to detail（細部に注意を払う）"},{"id":6187,"subject":"英熟語","difficulty":1,"question":"「play a part in」の意味は？","choices":["〜において役割を果たす","〜を無視する","〜を批判する","〜を支持する"],"answer":"〜において役割を果たす","explanation":"play a part in：〜において役割を果たす（= play a role in）"},{"id":6188,"subject":"英熟語","difficulty":1,"question":"「pose a threat to」の意味は？","choices":["〜に脅威をもたらす","〜を支持する","〜を無視する","〜を批判する"],"answer":"〜に脅威をもたらす","explanation":"pose a threat to：〜に脅威をもたらす。pose a threat to national security（国家安全保障に脅威をもたらす）"},{"id":6189,"subject":"英熟語","difficulty":1,"question":"「put into practice」の意味は？","choices":["実践する","計画する","批判する","無視する"],"answer":"実践する","explanation":"put into practice：実践する。put the plan into practice（計画を実践する）"},{"id":6190,"subject":"英熟語","difficulty":1,"question":"「set the stage for」の意味は？","choices":["〜のための舞台を整える","〜を批判する","〜を無視する","〜に反する"],"answer":"〜のための舞台を整える","explanation":"set the stage for：〜のための舞台を整える、〜の準備をする"},{"id":6191,"subject":"英熟語","difficulty":2,"question":"「shape the course of」の意味は？","choices":["〜の行方を決める","〜を無視する","〜を批判する","〜に従う"],"answer":"〜の行方を決める","explanation":"shape the course of：〜の行方を決める。shape the course of history（歴史の流れを決める）"},{"id":6192,"subject":"英熟語","difficulty":2,"question":"「shift the focus to」の意味は？","choices":["〜に焦点を移す","〜から焦点を外す","〜を無視する","〜を批判する"],"answer":"〜に焦点を移す","explanation":"shift the focus to：〜に焦点を移す。shift the focus to sustainability（持続可能性に焦点を移す）"},{"id":6193,"subject":"英熟語","difficulty":2,"question":"「so as to」の意味は？","choices":["〜するために","〜にもかかわらず","〜の代わりに","〜の結果として"],"answer":"〜するために","explanation":"so as to：〜するために（= in order to）。I left early so as to avoid traffic.（渋滞を避けるために早く出た）"},{"id":6194,"subject":"英熟語","difficulty":2,"question":"「stir up」の意味は？","choices":["かき立てる・引き起こす","鎮める","無視する","批判する"],"answer":"かき立てる・引き起こす","explanation":"stir up：かき立てる、引き起こす。stir up controversy（論争を引き起こす）"},{"id":6195,"subject":"英熟語","difficulty":2,"question":"「struggle with」の意味は？","choices":["〜に苦労する","〜を無視する","〜を批判する","〜を支持する"],"answer":"〜に苦労する","explanation":"struggle with：〜に苦労する。struggle with a problem（問題に苦労する）"},{"id":6196,"subject":"英熟語","difficulty":3,"question":"「take a toll on」の意味は？","choices":["〜に悪影響を与える","〜を支持する","〜を無視する","〜を批判する"],"answer":"〜に悪影響を与える","explanation":"take a toll on：〜に悪影響を与える。Stress takes a toll on health.（ストレスは健康に悪影響を与える）"},{"id":6197,"subject":"英熟語","difficulty":3,"question":"「transcend the boundaries of」の意味は？","choices":["〜の境界を超える","〜の境界に従う","〜を無視する","〜を批判する"],"answer":"〜の境界を超える","explanation":"transcend the boundaries of：〜の境界を超える"},{"id":6198,"subject":"英熟語","difficulty":3,"question":"「turn on its head」の意味は？","choices":["〜をひっくり返す","〜を支持する","〜を無視する","〜を批判する"],"answer":"〜をひっくり返す","explanation":"turn on its head：〜をひっくり返す、逆転させる。turn conventional wisdom on its head（通念をひっくり返す）"},{"id":6199,"subject":"英熟語","difficulty":3,"question":"「with the benefit of hindsight」の意味は？","choices":["後知恵で・振り返ってみると","将来を見越して","現時点では","一般的には"],"answer":"後知恵で・振り返ってみると","explanation":"with the benefit of hindsight：後知恵で、振り返ってみると（= in retrospect）"},{"id":6200,"subject":"英熟語","difficulty":3,"question":"「yield to」の意味は？","choices":["〜に従う・〜に屈する","〜に反抗する","〜を支持する","〜を無視する"],"answer":"〜に従う・〜に屈する","explanation":"yield to：〜に従う、〜に屈する。yield to pressure（圧力に屈する）"},{"id":6201,"subject":"英熟語","difficulty":1,"question":"「above all」の意味は？","choices":["とりわけ・何よりも","要するに","一方では","さらに"],"answer":"とりわけ・何よりも","explanation":"above all：とりわけ、何よりも（= most importantly, first and foremost）"},{"id":6202,"subject":"英熟語","difficulty":1,"question":"「after all」の意味は？","choices":["結局・やはり","まず","したがって","それどころか"],"answer":"結局・やはり","explanation":"after all：結局、やはり。He came after all.（結局彼は来た）"},{"id":6203,"subject":"英熟語","difficulty":1,"question":"「ahead of time」の意味は？","choices":["前もって","時間通りに","遅れて","急いで"],"answer":"前もって","explanation":"ahead of time：前もって（= in advance）。Prepare ahead of time.（前もって準備しなさい）"},{"id":6204,"subject":"英熟語","difficulty":1,"question":"「all in all」の意味は？","choices":["全体的に見て","部分的に","例外なく","最終的に"],"answer":"全体的に見て","explanation":"all in all：全体的に見て（= on the whole, taking everything into account）"},{"id":6205,"subject":"英熟語","difficulty":1,"question":"「at any rate」の意味は？","choices":["いずれにせよ","常に","部分的に","一般的に"],"answer":"いずれにせよ","explanation":"at any rate：いずれにせよ（= anyway, in any case）。前述を認めつつ結論へ"},{"id":6206,"subject":"英熟語","difficulty":2,"question":"「be contingent upon」の意味は？","choices":["〜次第である","〜に反する","〜を無視する","〜と一致する"],"answer":"〜次第である","explanation":"be contingent upon：〜次第である（= depend on）"},{"id":6207,"subject":"英熟語","difficulty":2,"question":"「be in line with」の意味は？","choices":["〜と一致している","〜に反している","〜を無視する","〜を批判する"],"answer":"〜と一致している","explanation":"be in line with：〜と一致している（= be consistent with, conform to）"},{"id":6208,"subject":"英熟語","difficulty":2,"question":"「be on the rise」の意味は？","choices":["増加している","減少している","安定している","変動している"],"answer":"増加している","explanation":"be on the rise：増加している（= be increasing）。Crime is on the rise.（犯罪が増加している）"},{"id":6209,"subject":"英熟語","difficulty":2,"question":"「call attention to」の意味は？","choices":["〜に注目を集める","〜を無視する","〜を批判する","〜を支持する"],"answer":"〜に注目を集める","explanation":"call attention to：〜に注目を集める。call attention to the problem（問題に注目を集める）"},{"id":6210,"subject":"英熟語","difficulty":2,"question":"「catch up with」の意味は？","choices":["〜に追いつく","〜から離れる","〜を無視する","〜を批判する"],"answer":"〜に追いつく","explanation":"catch up with：〜に追いつく。catch up with the latest trends（最新トレンドに追いつく）"},{"id":6211,"subject":"英熟語","difficulty":3,"question":"「come to the conclusion that」の意味は？","choices":["〜という結論に達する","〜を避ける","〜を無視する","〜を批判する"],"answer":"〜という結論に達する","explanation":"come to the conclusion that：〜という結論に達する"},{"id":6212,"subject":"英熟語","difficulty":3,"question":"「draw parallels between」の意味は？","choices":["〜の間に類似点を見出す","〜の違いを強調する","〜を無視する","〜を批判する"],"answer":"〜の間に類似点を見出す","explanation":"draw parallels between A and B：AとBの間に類似点を見出す"},{"id":6213,"subject":"英熟語","difficulty":3,"question":"「drive a wedge between」の意味は？","choices":["〜の間に不和を生む","〜を統一する","〜を支持する","〜を無視する"],"answer":"〜の間に不和を生む","explanation":"drive a wedge between：〜の間に不和を生む"},{"id":6214,"subject":"英熟語","difficulty":3,"question":"「fall prey to」の意味は？","choices":["〜の犠牲になる","〜を無視する","〜を批判する","〜を支持する"],"answer":"〜の犠牲になる","explanation":"fall prey to：〜の犠牲になる。fall prey to deception（詐欺の犠牲になる）"},{"id":6215,"subject":"英熟語","difficulty":3,"question":"「gain ground」の意味は？","choices":["勢力を伸ばす","後退する","安定する","批判される"],"answer":"勢力を伸ばす","explanation":"gain ground：勢力を伸ばす、支持を広げる。The idea is gaining ground.（そのアイデアが広まっている）"},{"id":6216,"subject":"英熟語","difficulty":1,"question":"「hand over」の意味は？","choices":["引き渡す","受け取る","無視する","批判する"],"answer":"引き渡す","explanation":"hand over：引き渡す。hand over responsibility（責任を引き渡す）"},{"id":6217,"subject":"英熟語","difficulty":1,"question":"「hold back」の意味は？","choices":["抑制する・引き留める","促進する","始める","終わらせる"],"answer":"抑制する・引き留める","explanation":"hold back：抑制する、引き留める。hold back tears（涙を抑える）"},{"id":6218,"subject":"英熟語","difficulty":1,"question":"「in contrast to」の意味は？","choices":["〜とは対照的に","〜と同様に","〜に加えて","〜のために"],"answer":"〜とは対照的に","explanation":"in contrast to：〜とは対照的に（= as opposed to, unlike）"},{"id":6219,"subject":"英熟語","difficulty":1,"question":"「in spite of」の意味は？","choices":["〜にもかかわらず","〜のために","〜の代わりに","〜と共に"],"answer":"〜にもかかわらず","explanation":"in spite of：〜にもかかわらず（= despite, notwithstanding）"},{"id":6220,"subject":"英熟語","difficulty":1,"question":"「keep track of」の意味は？","choices":["〜を把握する","〜を無視する","〜を批判する","〜を支持する"],"answer":"〜を把握する","explanation":"keep track of：〜を把握する、記録する。keep track of expenses（支出を記録する）"},{"id":6221,"subject":"英熟語","difficulty":2,"question":"「leave room for」の意味は？","choices":["〜の余地を残す","〜を排除する","〜を無視する","〜を批判する"],"answer":"〜の余地を残す","explanation":"leave room for：〜の余地を残す。leave room for improvement（改善の余地を残す）"},{"id":6222,"subject":"英熟語","difficulty":2,"question":"「live up to」の意味は？","choices":["〜に応える・〜を実現する","〜を無視する","〜を批判する","〜に反する"],"answer":"〜に応える・〜を実現する","explanation":"live up to：〜に応える。live up to expectations（期待に応える）"},{"id":6223,"subject":"英熟語","difficulty":2,"question":"「make allowances for」の意味は？","choices":["〜を考慮する","〜を無視する","〜を批判する","〜を支持する"],"answer":"〜を考慮する","explanation":"make allowances for：〜を考慮する。make allowances for differences（違いを考慮する）"},{"id":6224,"subject":"英熟語","difficulty":2,"question":"「narrow down」の意味は？","choices":["絞り込む","広げる","無視する","批判する"],"answer":"絞り込む","explanation":"narrow down：絞り込む。narrow down the options（選択肢を絞り込む）"},{"id":6225,"subject":"英熟語","difficulty":2,"question":"「on the assumption that」の意味は？","choices":["〜という仮定で","〜の結果として","〜にもかかわらず","〜の代わりに"],"answer":"〜という仮定で","explanation":"on the assumption that：〜という仮定で（= assuming that）"},{"id":6226,"subject":"英熟語","difficulty":3,"question":"「come full circle」の意味は？","choices":["元の状態に戻る","大きく発展する","崩壊する","変化する"],"answer":"元の状態に戻る","explanation":"come full circle：元の状態に戻る、一巡する。The argument has come full circle."},{"id":6227,"subject":"英熟語","difficulty":3,"question":"「give the benefit of the doubt」の意味は？","choices":["疑わしいが信じてあげる","疑いをかける","証拠を集める","批判する"],"answer":"疑わしいが信じてあげる","explanation":"give the benefit of the doubt：疑わしいが信じてあげる"},{"id":6228,"subject":"英熟語","difficulty":3,"question":"「move the goalposts」の意味は？","choices":["後から条件を変える","目標を設定する","目標を達成する","批判する"],"answer":"後から条件を変える","explanation":"move the goalposts：後から条件・ルールを変える（不公平に）"},{"id":6229,"subject":"英熟語","difficulty":3,"question":"「push the envelope」の意味は？","choices":["限界に挑戦する","ルールに従う","無視する","批判する"],"answer":"限界に挑戦する","explanation":"push the envelope：限界に挑戦する、既成概念を超える"},{"id":6230,"subject":"英熟語","difficulty":3,"question":"「read between the lines」の意味は？","choices":["行間を読む・真意を理解する","文字通りに読む","批判する","無視する"],"answer":"行間を読む・真意を理解する","explanation":"read between the lines：行間を読む、暗示を読み取る"},{"id":6231,"subject":"英熟語","difficulty":1,"question":"「rule out」の意味は？","choices":["除外する","含める","支持する","批判する"],"answer":"除外する","explanation":"rule out：除外する、排除する。rule out the possibility（可能性を排除する）"},{"id":6232,"subject":"英熟語","difficulty":1,"question":"「scale up」の意味は？","choices":["拡大する","縮小する","無視する","批判する"],"answer":"拡大する","explanation":"scale up：拡大する（= expand）。scale up production（生産を拡大する）"},{"id":6233,"subject":"英熟語","difficulty":1,"question":"「seek to」の意味は？","choices":["〜しようとする","〜を避ける","〜を無視する","〜を批判する"],"answer":"〜しようとする","explanation":"seek to：〜しようとする（= try to, aim to）。seek to improve（改善しようとする）"},{"id":6234,"subject":"英熟語","difficulty":1,"question":"「take advantage of」の意味は？","choices":["〜を活用する・〜を利用する","〜を無視する","〜を批判する","〜に反する"],"answer":"〜を活用する・〜を利用する","explanation":"take advantage of：〜を活用する、〜を利用する（良い意味でも悪い意味でも）"},{"id":6235,"subject":"英熟語","difficulty":1,"question":"「tend to」の意味は？","choices":["〜する傾向がある","〜を避ける","〜を支持する","〜を批判する"],"answer":"〜する傾向がある","explanation":"tend to：〜する傾向がある（= be inclined to, be apt to）"},{"id":6236,"subject":"英熟語","difficulty":2,"question":"「think outside the box」の意味は？","choices":["既成概念にとらわれない発想をする","ルールに従う","批判する","無視する"],"answer":"既成概念にとらわれない発想をする","explanation":"think outside the box：既成概念にとらわれない発想をする"},{"id":6237,"subject":"英熟語","difficulty":2,"question":"「throw light on」の意味は？","choices":["〜を明らかにする","〜を隠す","〜を批判する","〜を無視する"],"answer":"〜を明らかにする","explanation":"throw light on：〜を明らかにする（= shed light on）"},{"id":6238,"subject":"英熟語","difficulty":2,"question":"「to a great extent」の意味は？","choices":["大いに・大 uestion」の意味は？","choices":["疑いなく","多分","時々","条件によって"],"answer":"疑いなく","explanation":"without question：疑いなく（= undoubtedly, unquestionably）"},{"id":6248,"subject":"英熟語","difficulty":1,"question":"「work against」の意味は？","choices":["〜に不利に働く","〜を支持する","〜を無視する","〜と協力する"],"answer":"〜に不利に働く","explanation":"work against：〜に不利に働く。Time works against us.（時間が私たちに不利に働く）"},{"id":6249,"subject":"英熟語","difficulty":1,"question":"「work toward」の意味は？","choices":["〜に向けて取り組む","〜を避ける","〜を批判する","〜を無視する"],"answer":"〜に向けて取り組む","explanation":"work toward：〜に向けて取り組む。work toward a solution（解決策に向けて取り組む）"},{"id":6250,"subject":"英熟語","difficulty":1,"question":"「zero in on」の意味は？","choices":["〜に的を絞る","〜から離れる","〜を無視する","〜を批判する"],"answer":"〜に的を絞る","explanation":"zero in on：〜に的を絞る。zero in on the key issue（核心的な問題に的を絞る）"},{"id":6251,"subject":"英熟語","difficulty":2,"question":"「acknowledge the fact that」の意味は？","choices":["〜という事実を認める","〜を否定する","〜を無視する","〜を批判する"],"answer":"〜という事実を認める","explanation":"acknowledge the fact that：〜という事実を認める"},{"id":6252,"subject":"英熟語","difficulty":2,"question":"「adhere to」の意味は？","choices":["〜に固執する・〜を守る","〜を無視する","〜に反する","〜を批判する"],"answer":"〜に固執する・〜を守る","explanation":"adhere to：〜に固執する、〜を守る。adhere to the rules（規則を守る）"},{"id":6253,"subject":"英熟語","difficulty":2,"question":"「at stake」の意味は？","choices":["危機にさらされて","安全に","成功して","無関係に"],"answer":"危機にさらされて","explanation":"at stake：危機にさらされて、問題になって。What is at stake?（何が問題か？）"},{"id":6254,"subject":"英熟語","difficulty":2,"question":"「back up」の意味は？","choices":["裏付ける・支援する","批判する","無視する","否定する"],"answer":"裏付ける・支援する","explanation":"back up：裏付ける、支援する。back up a claim（主張を裏付ける）"},{"id":6255,"subject":"英熟語","difficulty":2,"question":"「bear in mind」の意味は？","choices":["心に留める","無視する","批判する","否定する"],"answer":"心に留める","explanation":"bear in mind：心に留める（= keep in mind）。Bear in mind that...（〜を心に留めておいて）"},{"id":6256,"subject":"英熟語","difficulty":2,"question":"「boil down to」の意味は？","choices":["結局〜になる","複雑になる","無視する","批判する"],"answer":"結局〜になる","explanation":"boil down to：結局〜になる。It all boils down to trust.（結局は信頼の問題だ）"},{"id":6257,"subject":"英熟語","difficulty":2,"question":"「bring into question」の意味は？","choices":["〜に疑問を投げかける","〜を証明する","〜を支持する","〜を無視する"],"answer":"〜に疑問を投げかける","explanation":"bring into question：〜に疑問を投げかける（= call into question）"},{"id":6258,"subject":"英熟語","difficulty":2,"question":"「capitalize on」の意味は？","choices":["〜を活用する・利用する","〜を無視する","〜を批判する","〜に反する"],"answer":"〜を活用する・利用する","explanation":"capitalize on：〜を活用する、〜を利益に変える。capitalize on an opportunity（機会を活かす）"},{"id":6259,"subject":"英熟語","difficulty":2,"question":"「challenge the assumption that」の意味は？","choices":["〜という前提に疑問を呈する","〜を支持する","〜を無視する","〜を証明する"],"answer":"〜という前提に疑問を呈する","explanation":"challenge the assumption that：〜という前提に疑問を呈する"},{"id":6260,"subject":"英熟語","difficulty":2,"question":"「characterize A as B」の意味は？","choices":["AをBと特徴づける","AをBから区別する","AをBに変える","AをBと比較する"],"answer":"AをBと特徴づける","explanation":"characterize A as B：AをBと特徴づける。characterize the problem as serious（問題を深刻と特徴づける）"},{"id":6261,"subject":"英熟語","difficulty":3,"question":"「cloud the issue」の意味は？","choices":["問題を曖昧にする","問題を明確にする","問題を解決する","問題を無視する"],"answer":"問題を曖昧にする","explanation":"cloud the issue：問題を曖昧にする、本質を見えにくくする"},{"id":6262,"subject":"英熟語","difficulty":3,"question":"「collapse under scrutiny」の意味は？","choices":["精査すると崩れる","精査に耐える","批判される","無視される"],"answer":"精査すると崩れる","explanation":"collapse under scrutiny：精査すると崩れる。The argument collapses under scrutiny."},{"id":6263,"subject":"英熟語","difficulty":3,"question":"「command a majority」の意味は？","choices":["過半数を占める","少数派である","批判される","無視される"],"answer":"過半数を占める","explanation":"command a majority：過半数を占める。command a majority in parliament（議会で過半数を占める）"},{"id":6264,"subject":"英熟語","difficulty":3,"question":"「conflate A with B」の意味は？","choices":["AとBを混同する","AとBを区別する","AとBを統合する","AとBを比較する"],"answer":"AとBを混同する","explanation":"conflate A with B：AとBを混同する。conflate correlation with causation（相関と因果を混同する）"},{"id":6265,"subject":"英熟語","difficulty":3,"question":"「constitute a threat to」の意味は？","choices":["〜に対する脅威となる","〜を支持する","〜を無視する","〜を批判する"],"answer":"〜に対する脅威となる","explanation":"constitute a threat to：〜に対する脅威となる（= pose a threat to）"},{"id":6266,"subject":"英熟語","difficulty":1,"question":"「cope with adversity」の意味は？","choices":["逆境に対処する","逆境を無視する","逆境を批判する","逆境を楽しむ"],"answer":"逆境に対処する","explanation":"cope with adversity：逆境に対処する。cope with difficulties（困難に対処する）"},{"id":6267,"subject":"英熟語","difficulty":1,"question":"「cut corners」の意味は？","choices":["手を抜く","努力する","批判する","無視する"],"answer":"手を抜く","explanation":"cut corners：手を抜く、近道をする（悪い意味）。Don't cut corners on safety.（安全で手を抜くな）"},{"id":6268,"subject":"英熟語","difficulty":1,"question":"「do more harm than good」の意味は？","choices":["利より害が大きい","利が大きい","同じくらいだ","無関係だ"],"answer":"利より害が大きい","explanation":"do more harm than good：利より害が大きい。This policy does more harm than good."},{"id":6269,"subject":"英熟語","difficulty":1,"question":"「draw on one's experience」の意味は？","choices":["経験を活かす","経験を無視する","経験を批判する","経験を否定する"],"answer":"経験を活かす","explanation":"draw on one's experience：経験を活かす。draw on past experience（過去の経験を活かす）"},{"id":6270,"subject":"英熟語","difficulty":1,"question":"「drive home a point」の意味は？","choices":["要点を強調する","要点を隠す","批判する","無視する"],"answer":"要点を強調する","explanation":"drive home a point：要点を強調する、しっかりと伝える"},{"id":6271,"subject":"英熟語","difficulty":2,"question":"「fall under the category of」の意味は？","choices":["〜のカテゴリーに入る","〜から除外される","〜を批判する","〜を無視する"],"answer":"〜のカテゴリーに入る","explanation":"fall under the category of：〜のカテゴリーに入る（= belong to the category of）"},{"id":6272,"subject":"英熟語","difficulty":2,"question":"「frame the debate」の意味は？","choices":["議論の枠組みを設定する","議論を終わらせる","議論を批判する","議論を無視する"],"answer":"議論の枠組みを設定する","explanation":"frame the debate：議論の枠組みを設定する。Who frames the debate controls the outcome."},{"id":6273,"subject":"英熟語","difficulty":2,"question":"「fuel the debate」の意味は？","choices":["議論を加熱させる","議論を終わらせる","議論を解決する","議論を無視する"],"answer":"議論を加熱させる","explanation":"fuel the debate：議論を加熱させる。fuel the controversy（論争を煽る）"},{"id":6274,"subject":"英熟語","difficulty":2,"question":"「gain traction」の意味は？","choices":["支持・注目を集める","失う","批判される","無視される"],"answer":"支持・注目を集める","explanation":"gain traction：支持・注目を集める。The idea is gaining traction.（そのアイデアが注目を集めている）"},{"id":6275,"subject":"英熟語","difficulty":2,"question":"「get to grips with」の意味は？","choices":["〜をしっかり理解する・取り組む","〜を無視する","〜を批判する","〜から逃げる"],"answer":"〜をしっかり理解する・取り組む","explanation":"get to grips with：〜をしっかり理解する、取り組む（= come to grips with）"},{"id":6276,"subject":"英熟語","difficulty":3,"question":"「have a vested interest in」の意味は？","choices":["〜に既得権益がある","〜に無関心だ","〜を批判する","〜を無視する"],"answer":"〜に既得権益がある","explanation":"have a vested interest in：〜に既得権益がある。have a vested interest in the outcome"},{"id":6277,"subject":"英熟語","difficulty":3,"question":"「hold up to scrutiny」の意味は？","choices":["精査に耐える","精査で崩れる","批判される","無視される"],"answer":"精査に耐える","explanation":"hold up to scrutiny：精査に耐える。Does this argument hold up to scrutiny?"},{"id":6278,"subject":"英熟語","difficulty":3,"question":"「hone in on」の意味は？","choices":["〜に的を絞る","〜から離れる","〜を無視する","〜を批判する"],"answer":"〜に的を絞る","explanation":"hone in on：〜に的を絞る（= zero in on）。hone in on the key issue（核心に的を絞る）"},{"id":6279,"subject":"英熟語","difficulty":3,"question":"「in the broader context of」の意味は？","choices":["〜より広い文脈で","〜の詳細で","〜とは無関係に","〜を批判する文脈で"],"answer":"〜より広い文脈で","explanation":"in the broader context of：〜より広い文脈で。in the broader context of globalization"},{"id":6280,"subject":"英熟語","difficulty":3,"question":"「invoke a principle」の意味は？","choices":["原則を援用する","原則を否定する","原則を批判する","原則を無視する"],"answer":"原則を援用する","explanation":"invoke a principle：原則を援用する。invoke the principle of equality（平等の原則を援用する）"},{"id":6281,"subject":"英熟語","difficulty":1,"question":"「keep an open mind」の意味は？","choices":["先入観を持たない","固定観念を持つ","批判する","無視する"],"answer":"先入観を持たない","explanation":"keep an open mind：先入観を持たない、柔軟に考える"},{"id":6282,"subject":"英熟語","difficulty":1,"question":"「lay the groundwork for」の意味は？","choices":["〜の土台を築く","〜を批判する","〜を無視する","〜に反する"],"answer":"〜の土台を築く","explanation":"lay the groundwork for：〜の土台を築く。lay the groundwork for future success"},{"id":6283,"subject":"英熟語","difficulty":1,"question":"「lead to」の意味は？","choices":["〜につながる","〜から離れる","〜を無視する","〜を批判する"],"answer":"〜につながる","explanation":"lead to：〜につながる（= result in）。lead to a conclusion（結論につながる）"},{"id":6284,"subject":"英熟語","difficulty":1,"question":"「look beyond」の意味は？","choices":["〜を超えて見る","〜に集中する","〜を無視する","〜を批判する"],"answer":"〜を超えて見る","explanation":"look beyond：〜を超えて見る。look beyond the surface（表面を超えて見る）"},{"id":6285,"subject":"英熟語","difficulty":1,"question":"「make headway」の意味は？","choices":["進歩する","後退する","停滞する","批判する"],"answer":"進歩する","explanation":"make headway：進歩する、前進する。make headway on a project（プロジェクトを進める）"},{"id":6286,"subject":"英熟語","difficulty":2,"question":"「mitigate the impact of」の意味は？","choices":["〜の影響を和らげる","〜の影響を悪化させる","〜を無視する","〜を批判する"],"answer":"〜の影響を和らげる","explanation":"mitigate the impact of：〜の影響を和らげる。mitigate the impact of climate change"},{"id":6287,"subject":"英熟語","difficulty":2,"question":"「nuance the argument」の意味は？","choices":["議論に微妙な違いを加える","議論を単純化する","議論を批判する","議論を無視する"],"answer":"議論に微妙な違いを加える","explanation":"nuance the argument：議論に微妙な違い・ニュアンスを加える"},{"id":6288,"subject":"英熟語","difficulty":2,"question":"「offer a counterargument」の意味は？","choices":["反論を提示する","同意する","無視する","批判する"],"answer":"反論を提示する","explanation":"offer a counterargument：反論を提示する（= rebut, refute）"},{"id":6289,"subject":"英熟語","difficulty":2,"question":"「operate under the assumption that」の意味は？","choices":["〜という前提で行動する","〜を否定する","〜を批判する","〜を無視する"],"answer":"〜という前提で行動する","explanation":"operate under the assumption that：〜という前提で行動する"},{"id":6290,"subject":"英熟語","difficulty":2,"question":"「pay dividends」の意味は？","choices":["成果をもたらす","損失をもたらす","無関係だ","批判する"],"answer":"成果をもたらす","explanation":"pay dividends：成果をもたらす。Hard work pays dividends.（努力は成果をもたらす）"},{"id":6291,"subject":"英熟語","difficulty":3,"question":"「perpetuate a cycle」の意味は？","choices":["サイクルを永続させる","サイクルを止める","批判する","無視する"],"answer":"サイクルを永続させる","explanation":"perpetuate a cycle：サイクルを永続させる。perpetuate a cycle of poverty（貧困のサイクルを永続させる）"},{"id":6292,"subject":"英熟語","difficulty":3,"question":"「presuppose a shared understanding」の意味は？","choices":["共通理解を前提とする","共通理解を否定する","批判する","無視する"],"answer":"共通理解を前提とする","explanation":"presuppose a shared understanding：共通理解を前提とする"},{"id":6293,"subject":"英熟語","difficulty":3,"question":"「probe the limits of」の意味は？","choices":["〜の限界を探る","〜の限界を超える","〜を批判する","〜を無視する"],"answer":"〜の限界を探る","explanation":"probe the limits of：〜の限界を探る。probe the limits of human knowledge"},{"id":6294,"subject":"英熟語","difficulty":3,"question":"「question the validity of」の意味は？","choices":["〜の妥当性に疑問を呈する","〜を証明する","〜を支持する","〜を無視する"],"answer":"〜の妥当性に疑問を呈する","explanation":"question the validity of：〜の妥当性に疑問を呈する"},{"id":6295,"subject":"英熟語","difficulty":3,"question":"「reconcile competing claims」の意味は？","choices":["競合する主張を調整する","競合する主張を無視する","批判する","支持する"],"answer":"競合する主張を調整する","explanation":"reconcile competing claims：競合する主張を調整する"},{"id":6296,"subject":"英熟語","difficulty":1,"question":"「run the risk of」の意味は？","choices":["〜のリスクを冒す","〜を避ける","〜を無視する","〜を批判する"],"answer":"〜のリスクを冒す","explanation":"run the risk of：〜のリスクを冒す。run the risk of failure（失敗のリスクを冒す）"},{"id":6297,"subject":"英熟語","difficulty":1,"question":"「shed new light on」の意味は？","choices":["〜に新たな光を当てる","〜を隠す","〜を批判する","〜を無視する"],"answer":"〜に新たな光を当てる","explanation":"shed new light on：〜に新たな光を当てる（= shed light on の強調形）"},{"id":6298,"subject":"英熟語","difficulty":1,"question":"「take a stand on」の意味は？","choices":["〜について立場を取る","〜を無視する","〜を批判する","〜に反する"],"answer":"〜について立場を取る","explanation":"take a stand on：〜について立場を取る。take a stand on climate change（気候変動について立場を表明する）"},{"id":6299,"subject":"英熟語","difficulty":1,"question":"「to one's credit」の意味は？","choices":["〜の手柄として","〜のせいで","〜にもかかわらず","〜の代わりに"],"answer":"〜の手柄として","explanation":"to one's credit：〜の手柄として、〜の評価として。To her credit, she admitted the mistake."},{"id":6300,"subject":"英熟語","difficulty":1,"question":"「up to the mark」の意味は？","choices":["水準に達している","水準以下だ","批判される","無視される"],"answer":"水準に達している","explanation":"up to the mark：水準に達している（= up to standard）"},{"id":7001,"subject":"英文法","difficulty":1,"question":"「I have been studying for 3 hours.」の時制は？","choices":["現在完了進行形","現在進行形","過去完了","現在完了"],"answer":"現在完了進行形","explanation":"have been + -ing = 現在完了進行形。過去から今まで継続している動作を表す"},{"id":7002,"subject":"英文法","difficulty":1,"question":"「It is essential that he be present.」のbeは何？","choices":["仮定法現在（原形）","be動詞の現在形","仮定法過去","不定詞"],"answer":"仮定法現在（原形）","explanation":"It is essential/important/necessary that + S + 動詞の原形（仮定法現在）。アメリカ英語で多用"},{"id":7003,"subject":"英文法","difficulty":1,"question":"「The book was written by him.」の文型は？","choices":["受動態（第3文型）","第5文型","第2文型","能動態"],"answer":"受動態（第3文型）","explanation":"受動態はbe動詞＋過去分詞。能動態ではHe wrote the book."},{"id":7004,"subject":"英文法","difficulty":1,"question":"「She made me wait.」の文型は？","choices":["第5文型（SVOC）","第4文型（SVOO）","第3文型（SVO）","第2文型（SVC）"],"answer":"第5文型（SVOC）","explanation":"make＋O＋動詞原形（知覚動詞・使役動詞）。me=O、wait=C（補語）"},{"id":7005,"subject":"英文法","difficulty":1,"question":"「If I were you, I would accept the offer.」は？","choices":["仮定法過去（現在の事実に反する仮定）","仮定法現在","直説法","仮定法過去完了"],"answer":"仮定法過去（現在の事実に反する仮定）","explanation":"If＋S＋動詞の過去形, S＋would/could/might＋動詞原形 = 仮定法過去"},{"id":7006,"subject":"英文法","difficulty":1,"question":"「Having finished the work, he went home.」の構文は？","choices":["分詞構文（完了形）","不定詞構文","関係節","名詞句"],"answer":"分詞構文（完了形）","explanation":"Having＋過去分詞 = 分詞構文の完了形。主節の動作より前に完了した動作を表す"},{"id":7007,"subject":"英文法","difficulty":1,"question":"「It is not until ... that 〜」の意味は？","choices":["...して初めて〜する","...するときに〜する","...するまえに〜する","...するあいだに〜する"],"answer":"...して初めて〜する","explanation":"It is not until A that B：AになってはじめてBする。強調構文の一種"},{"id":7008,"subject":"英文法","difficulty":1,"question":"「The man who I thought was honest lied.」の構造は？","choices":["関係代名詞の挿入節","関係副詞","複合関係代名詞","疑問詞"],"answer":"関係代名詞の挿入節","explanation":"The man (who I thought) was honest：I thoughtが挿入。主格のwhoが使われる"},{"id":7009,"subject":"英文法","difficulty":1,"question":"「He is, so to speak, a walking dictionary.」のso to speakは？","choices":["挿入句（いわば）","接続詞","副詞","形容詞"],"answer":"挿入句（いわば）","explanation":"so to speak：いわば（= as it were）。文の途中に挿入されるコメント節"},{"id":7010,"subject":"英文法","difficulty":1,"question":"「No sooner had he left than it began to rain.」の意味は？","choices":["彼が去るやいなや雨が降り始めた","彼が去る前に雨が降り始めた","彼が去った後に雨が降り始めた","彼が去るときに雨が降っていた"],"answer":"彼が去るやいなや雨が降り始めた","explanation":"No sooner A than B：AするやいなやBする。倒置が起きる（No sooner had he...）"},{"id":7011,"subject":"英文法","difficulty":2,"question":"「The more you study, the better you get.」の構文は？","choices":["The 比較級 ..., the 比較級 〜","比較の強調","仮定法","譲歩節"],"answer":"The 比較級 ..., the 比較級 〜","explanation":"The + 比較級 + S + V, the + 比較級 + S + V：〜すればするほど…"},{"id":7012,"subject":"英文法","difficulty":2,"question":"「I wish I had studied harder.」は何を表す？","choices":["過去に勉強しなかったことへの後悔（仮定法過去完了）","現在の願望","未来の希望","現在のできごと"],"answer":"過去に勉強しなかったことへの後悔（仮定法過去完了）","explanation":"I wish＋仮定法過去完了（had＋過去分詞）：過去の事実に反する後悔"},{"id":7013,"subject":"英文法","difficulty":2,"question":"「Hardly had she arrived when the phone rang.」の意味は？","choices":["彼女が到着するやいなや電話が鳴った","彼女はほとんど到着しなかった","彼女が到着する前に電話が鳴った","彼女が到着した後に電話が鳴った"],"answer":"彼女が到着するやいなや電話が鳴った","explanation":"Hardly/Scarcely had S Vpp when/before S V：〜するやいなや。倒置に注意"},{"id":7014,"subject":"英文法","difficulty":2,"question":"「It was not until she left that I realized I loved her.」は何の構文？","choices":["強調構文（cleft sentence）","仮定法","受動態","間接疑問文"],"answer":"強調構文（cleft sentence）","explanation":"It is/was ... that〜：強調構文。not until she leftを強調している"},{"id":7015,"subject":"英文法","difficulty":2,"question":"「However hard he tries, he cannot succeed.」のhoweverは？","choices":["譲歩の副詞節を作る（どれほど〜でも）","疑問副詞","関係副詞","接続詞"],"answer":"譲歩の副詞節を作る（どれほど〜でも）","explanation":"however＋形容詞/副詞＋S＋V：どれほど〜でも（= no matter how）"},{"id":7016,"subject":"英文法","difficulty":2,"question":"「What with A and B」の意味は？","choices":["AやBのせいで（原因・理由）","AとBについて","AとBの間で","AまたはBを選んで"],"answer":"AやBのせいで（原因・理由）","explanation":"What with A and (what with) B：AやBのせいで。複数の原因を列挙する表現"},{"id":7017,"subject":"英文法","difficulty":2,"question":"「He is said to have been a genius.」の意味は？","choices":["彼はかつて天才だったと言われている","彼は天才だと言われている","彼は天才だったかもしれない","彼は天才だと思われる"],"answer":"彼はかつて天才だったと言われている","explanation":"be said to have been：〜だったと言われている（完了不定詞で過去を表す）"},{"id":7018,"subject":"英文法","difficulty":2,"question":"「S + V + O + to 不定詞」の構文で使えない動詞は？","choices":["discuss","want","allow","expect"],"answer":"discuss","explanation":"discuss（議論する）はdiscuss doingの形をとる。want/allow/expectはwant him to goのように使える"},{"id":7019,"subject":"英文法","difficulty":2,"question":"「It is time you went to bed.」のwentは？","choices":["仮定法過去（〜すべき時間だ）","過去形","仮定法現在","条件節"],"answer":"仮定法過去（〜すべき時間だ）","explanation":"It is time S + 仮定法過去：〜すべき時間だ（まだしていないことへの促し）"},{"id":7020,"subject":"英文法","difficulty":2,"question":"「間接疑問文」の語順は？","choices":["疑問詞＋S＋V","疑問詞＋V＋S","疑問詞＋助動詞＋S","疑問詞＋be＋S"],"answer":"疑問詞＋S＋V","explanation":"間接疑問文は平叙文の語順。I know where he lives.（×where does he live）"},{"id":7021,"subject":"英文法","difficulty":3,"question":"「Had I known, I would have told you.」は何を省略した形？","choices":["If I had known（仮定法過去完了の倒置）","I had known so","Because I had known","When I had known"],"answer":"If I had known（仮定法過去完了の倒置）","explanation":"Ifを省略して助動詞を文頭に。Had/Were/Shouldが文頭に来る倒置形の仮定法"},{"id":7022,"subject":"英文法","difficulty":3,"question":"「The girl (who/whom) I met yesterday is a doctor.」どちらが正しい？","choices":["どちらも可（目的格の関係代名詞）","whoのみ正しい","whomのみ正しい","どちらも不正しい"],"answer":"どちらも可（目的格の関係代名詞）","explanation":"目的格の関係代名詞はwhom（正式）またはwho（口語）。省略も可能"},{"id":7023,"subject":"英文法","difficulty":3,"question":"「He denied having stolen the money.」のhaving stolenは？","choices":["動名詞の完了形（述語動詞より前の動作）","現在分詞","過去分詞","不定詞"],"answer":"動名詞の完了形（述語動詞より前の動作）","explanation":"having＋過去分詞 = 動名詞の完了形。denyより前にお金を盗んだことを否定"},{"id":7024,"subject":"英文法","difficulty":3,"question":"「It is not so much A as B」の意味は？","choices":["AというよりむしろB","AもBもどちらでもない","AとBは同等","AはBより重要"],"answer":"AというよりむしろB","explanation":"not so much A as B：AというよりむしろB（= B rather than A）"},{"id":7025,"subject":"英文法","difficulty":3,"question":"「分裂文（cleft sentence）」の種類でないのは？","choices":["There構文","It-cleft（It is X that...）","wh-cleft（What I want is...）","pseudo-cleft"],"answer":"There構文","explanation":"分裂文は情報構造を制御する構文。It-cleft・wh-cleft（pseudo-cleftとも）が代表的"},{"id":7026,"subject":"英文法","difficulty":1,"question":"「能動態」を「受動態」に変換する際、必要なものは？","choices":["be動詞＋過去分詞","have＋過去分詞","do＋動詞原形","will＋動詞原形"],"answer":"be動詞＋過去分詞","explanation":"受動態 = be動詞（時制に対応）＋過去分詞＋（by 行為者）"},{"id":7027,"subject":"英文法","difficulty":1,"question":"「関係代名詞that」が使えない場合は？","choices":["前置詞の直後","先行詞が人の場合","主格の場合","限定用法"],"answer":"前置詞の直後","explanation":"前置詞＋関係代名詞の形では thatは使えない。the house in which（○）/ the house in that（×）"},{"id":7028,"subject":"英文法","difficulty":1,"question":"「付加疑問文」で「Let's go, ...?」の付加疑問は？","choices":["shall we","will we","do we","would we"],"answer":"shall we","explanation":"Let's〜の付加疑問はshall we?。Let's go, shall we?（行きましょう、ね？）"},{"id":7029,"subject":"英文法","difficulty":1,"question":"「used to」と「be used to」の違いは？","choices":["used toは過去の習慣・be used toは〜に慣れている","どちらも同じ","used toは現在・be used toは過去","used toは好み・be used toは習慣"],"answer":"used toは過去の習慣・be used toは〜に慣れている","explanation":"used to do：かつて〜した（今はしない）。be used to doing：〜することに慣れている"},{"id":7030,"subject":"英文法","difficulty":1,"question":"「so that」の意味は？","choices":["〜するために（目的）・〜なので（結果）","〜にもかかわらず","〜という条件で","〜のあとで"],"answer":"〜するために（目的）・〜なので（結果）","explanation":"so that S can/may V：〜するために（目的）。S Vso that S V：〜なので（結果・程度）"},{"id":7031,"subject":"英文法","difficulty":2,"question":"「懸垂分詞（dangling participle）」とは？","choices":["意味上の主語が主節の主語と一致しない分詞構文","独立分詞構文","完了分詞構文","否定の分詞構文"],"answer":"意味上の主語が主節の主語と一致しない分詞構文","explanation":"Walking down the street, the building caught my eye.（建物が歩いていることになる誤り）"},{"id":7032,"subject":"英文法","difficulty":2,"question":"「as if/as though」の後の時制は？","choices":["仮定法（現在なら過去形・過去なら過去完了）","直説法（事実通り）","常に現在形","常に過去形"],"answer":"仮定法（現在なら過去形・過去なら過去完了）","explanation":"She speaks as if she knew everything.（まるで何でも知っているかのように）仮定法過去を使う"},{"id":7033,"subject":"英文法","difficulty":2,"question":"「should have 過去分詞」の意味は？","choices":["〜すべきだったのに（しなかった）","〜したはずだ","〜すべきだ","〜してもよかった"],"answer":"〜すべきだったのに（しなかった）","explanation":"should have Vpp：〜すべきだったのに（過去の後悔・非難）。You should have told me earlier."},{"id":7034,"subject":"英文法","difficulty":2,"question":"「倒置」が起きる条件はどれ？","choices":["否定の副詞・副詞句が文頭に来る場合","疑問文","感嘆文","命令文"],"answer":"否定の副詞・副詞句が文頭に来る場合","explanation":"Never/Rarely/Not only/Hardlyなどが文頭→倒置。Never have I seen such a thing."},{"id":7035,"subject":"英文法","difficulty":2,"question":"「It is + 形容詞 + of O to 不定詞」で使う形容詞は？","choices":["kind/wise/foolish（人の性質を表す形容詞）","easy/difficult（行為の難易を表す形容詞）","likely","important"],"answer":"kind/wise/foolish（人の性質を表す形容詞）","explanation":"It is kind of you to help.（助けてくれてありがとう）。人の性質を表す形容詞はofを使う"},{"id":7036,"subject":"英文法","difficulty":3,"question":"「関係詞の非制限用法（継続用法）」の特徴は？","choices":["先行詞の情報を追加する・thatは使えない","先行詞を限定する","コンマなしで使える","thatのみ使える"],"answer":"先行詞の情報を追加する・thatは使えない","explanation":", which/who：前の内容に補足情報を加える。コンマがつきthatは使えない"},{"id":7037,"subject":"英文法","difficulty":3,"question":"「with 独立分詞構文」の意味は？","choices":["〜しながら・〜した状態で（付帯状況）","〜するために","〜した後で","〜したとき"],"answer":"〜しながら・〜した状態で（付帯状況）","explanation":"with＋O＋分詞（現在/過去）：〜しながら。She sat with her eyes closed.（目を閉じて座っていた）"},{"id":7038,"subject":"英文法","difficulty":3,"question":"「shall」の用法でないのは？","choices":["過去の習慣","申し出（Shall I help?）","義務（You shall obey）","提案（Shall we dance?）"],"answer":"過去の習慣","explanation":"過去の習慣はused toやwould。shallは申し出・提案・（法律文書で）義務などに使う"},{"id":7039,"subject":"英文法","difficulty":3,"question":"「後置修飾」の例として正しいのは？","choices":["the book written by him（過去分詞による後置修飾）","the tall man","very important","his recent work"],"answer":"the book written by him（過去分詞による後置修飾）","explanation":"後置修飾：名詞の後から修飾する形容詞的表現。分詞・前置詞句・関係節・不定詞など"},{"id":7040,"subject":"英文法","difficulty":3,"question":"「接続詞としてのas」の用法でないものは？","choices":["比較の基準（as t
