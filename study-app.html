縮する"},{"id":8055,"subject":"化学","difficulty":3,"question":"「Marcus理論」は何を説明する？","choices":["電子移動反応の速度・活性化エネルギー","酸塩基反応","有機置換反応","触媒反応"],"answer":"電子移動反応の速度・活性化エネルギー","explanation":"Marcus理論：電子移動反応の活性化エネルギーを再配置エネルギーと駆動力から計算する理論"},{"id":8056,"subject":"化学","difficulty":1,"question":"「炎色反応」でナトリウムは何色？","choices":["黄色","赤色","緑色","青紫色"],"answer":"黄色","explanation":"炎色反応：Na＝黄、K＝紫、Li＝赤、Cu＝緑、Ba＝黄緑、Ca＝橙赤、Sr＝深赤"},{"id":8057,"subject":"化学","difficulty":1,"question":"「アルカン」の一般式は？","choices":["CnH₂n+2","CnH₂n","CnH₂n-2","CnHn"],"answer":"CnH₂n+2","explanation":"アルカン（飽和炭化水素）：CnH₂n+2。メタンCH₄、エタンC₂H₆、プロパンC₃H₈"},{"id":8058,"subject":"化学","difficulty":1,"question":"「アルケン」の一般式は？","choices":["CnH₂n","CnH₂n+2","CnH₂n-2","CnH₂n+1"],"answer":"CnH₂n","explanation":"アルケン（一つの二重結合）：CnH₂n。エチレンC₂H₄、プロピレンC₃H₆"},{"id":8059,"subject":"化学","difficulty":1,"question":"「アルキン」の一般式は？","choices":["CnH₂n-2","CnH₂n","CnH₂n+2","CnH₂n-1"],"answer":"CnH₂n-2","explanation":"アルキン（一つの三重結合）：CnH₂n-2。アセチレン（エチン）C₂H₂"},{"id":8060,"subject":"化学","difficulty":1,"question":"「酸化銅(II)（CuO）」の色は？","choices":["黒色","赤色","青色","白色"],"answer":"黒色","explanation":"CuO（酸化銅Ⅱ）：黒色。Cu₂O（酸化銅Ⅰ）：赤色。Cu（銅）：赤褐色"},{"id":8061,"subject":"化学","difficulty":2,"question":"「ベンゼンの求電子置換反応」に分類されるのは？","choices":["ニトロ化・スルホン化・ハロゲン化・フリーデルクラフツ反応","付加反応","脱離反応","求核置換反応"],"answer":"ニトロ化・スルホン化・ハロゲン化・フリーデルクラフツ反応","explanation":"ベンゼン環のπ電子が求電子剤を攻撃する反応。ベンゼン環の安定性を保つため置換反応が優先"},{"id":8062,"subject":"化学","difficulty":2,"question":"「ケトン」と「アルデヒド」の違いは？","choices":["アルデヒドは-CHO（末端）・ケトンは-CO-（中間）","同じもの","ケトンが末端・アルデヒドが中間","分子量の違い"],"answer":"アルデヒドは-CHO（末端）・ケトンは-CO-（中間）","explanation":"アルデヒド：R-CHO（炭素末端にカルボニル基）。ケトン：R-CO-R'（中間にカルボニル基）"},{"id":8063,"subject":"化学","difficulty":2,"question":"「フェーリング液」で検出できる官能基は？","choices":["アルデヒド基(-CHO)","ケトン基","カルボキシル基","ヒドロキシル基"],"answer":"アルデヒド基(-CHO)","explanation":"フェーリング液（Cu²⁺含む青色）：アルデヒドと反応して赤色のCu₂Oが沈殿。ケトンは不反応"},{"id":8064,"subject":"化学","difficulty":2,"question":"「銀鏡反応」で検出できるのは？","choices":["アルデヒド（還元性あり）","ケトン","カルボン酸","エステル"],"answer":"アルデヒド（還元性あり）","explanation":"銀鏡反応：アンモニア性硝酸銀溶液にアルデヒドを加えると銀が析出する。糖の検出にも使用"},{"id":8065,"subject":"化学","difficulty":2,"question":"「ヨードホルム反応」で検出できる構造は？","choices":["CH₃CO-（メチルケトン）またはCH₃CH(OH)-","アルデヒド基","カルボキシル基","ベンゼン環"],"answer":"CH₃CO-（メチルケトン）またはCH₃CH(OH)-","explanation":"ヨードホルム反応：I₂＋NaOHでCH₃CO-またはCH₃CH(OH)-の構造を検出。黄色沈殿（CHI₃）"},{"id":8066,"subject":"化学","difficulty":3,"question":"「立体化学のR/S配置」を決める規則は？","choices":["CIP則（原子番号の大小で優先順位を決める）","電気陰性度の順","結合の種類","分子量の順"],"answer":"CIP則（原子番号の大小で優先順位を決める）","explanation":"CIP則（カーン・インゴールド・プレローグ則）：原子番号の大きい順に優先順位を付けてR/S配置を決定"},{"id":8067,"subject":"化学","difficulty":3,"question":"「E/Z異性体」が生じる条件は？","choices":["二重結合の各炭素に異なる2つの基が結合","不斉炭素の存在","環状構造","芳香族化合物"],"answer":"二重結合の各炭素に異なる2つの基が結合","explanation":"E/Z（シス/トランス）異性体：二重結合の回転が制限されることで生じる立体異性体"},{"id":8068,"subject":"化学","difficulty":3,"question":"「SN1反応」と「SN2反応」の違いは？","choices":["SN1は段階的（カルボカチオン中間体）・SN2は協奏的（ワルデン転位）","SN1は速い・SN2は遅い","どちらも同じ機構","SN1は二次・SN2は一次反応"],"answer":"SN1は段階的（カルボカチオン中間体）・SN2は協奏的（ワルデン転位）","explanation":"SN1：第三級基質で有利・カルボカチオン経由・ラセミ化。SN2：第一級基質で有利・背面攻撃・立体反転"},{"id":8069,"subject":"化学","difficulty":3,"question":"「ポーリングの電気陰性度」スケールで基準となる元素は？","choices":["F（フッ素）を4.0に設定","水素を基準","炭素を基準","酸素を基準"],"answer":"F（フッ素）を4.0に設定","explanation":"ポーリングはFを4.0に固定して電気陰性度を定義。H＝2.1、C＝2.5、N＝3.0、O＝3.5、F＝4.0"},{"id":8070,"subject":"化学","difficulty":3,"question":"「ディールス・アルダー反応」とは？","choices":["共役ジエン＋ジエノフィルの[4+2]付環化反応","ラジカル反応","イオン反応","酸化還元反応"],"answer":"共役ジエン＋ジエノフィルの[4+2]付環化反応","explanation":"熱反応で進む協奏的付環化反応。シクロヘキセン環を合成。ウッドワード・ホフマン則に従う"},{"id":8071,"subject":"化学","difficulty":1,"question":"「陽イオン」は電子を「得る・失う」どちら？","choices":["失う","得る","どちらでもない","変化しない"],"answer":"失う","explanation":"陽イオン：電子を失って正の電荷を持つ。Na→Na⁺＋e⁻。陰イオンは電子を得る"},{"id":8072,"subject":"化学","difficulty":1,"question":"「ルイス酸」とは？","choices":["電子対を受け取る物質","電子対を与える物質","H⁺を放出する物質","OH⁻を放出する物質"],"answer":"電子対を受け取る物質","explanation":"ルイス酸：電子対受容体。ルイス塩基：電子対供与体。BF₃・Al³⁺などがルイス酸"},{"id":8073,"subject":"化学","difficulty":1,"question":"「酸化還元反応」の定義は？","choices":["電子の授受を伴う反応","プロトンの授受を伴う反応","エネルギーの変化","物質の溶解"],"answer":"電子の授受を伴う反応","explanation":"酸化：電子を失う。還元：電子を得る。酸化剤は還元され、還元剤は酸化される"},{"id":8074,"subject":"化学","difficulty":1,"question":"「ファンデルワールス力」はどのような結合か？","choices":["分子間の弱い引力（分散力・双極子力など）","共有結合","イオン結合","金属結合"],"answer":"分子間の弱い引力（分散力・双極子力など）","explanation":"ファンデルワールス力：分子間に働く弱い引力の総称。分子量が大きいほど強くなる"},{"id":8075,"subject":"化学","difficulty":1,"question":"「周期表の第1族元素（水素を除く）」は？","choices":["アルカリ金属（Li、Na、K等）","アルカリ土類金属","ハロゲン","貴ガス"],"answer":"アルカリ金属（Li、Na、K等）","explanation":"第1族：アルカリ金属（Li・Na・K・Rb・Cs・Fr）。水と激しく反応しH₂を発生"},{"id":8076,"subject":"化学","difficulty":2,"question":"「第一イオン化エネルギー」が最も大きい元素の族は？","choices":["18族（貴ガス）","1族（アルカリ金属）","7族（ハロゲン）","2族"],"answer":"18族（貴ガス）","explanation":"貴ガスは閉殻構造で非常に安定。イオン化エネルギーが最大。同周期ではアルカリ金属が最小"},{"id":8077,"subject":"化学","difficulty":2,"question":"「反応速度定数k」と「温度」の関係は？","choices":["アレニウス式：k＝Ae^(-Ea/RT)で温度上昇とともに増大","温度と無関係","温度上昇で減少","直線関係"],"answer":"アレニウス式：k＝Ae^(-Ea/RT)で温度上昇とともに増大","explanation":"アレニウス式：Ea＝活性化エネルギー、R＝気体定数、T＝絶対温度。温度が高いほどkが大"},{"id":8078,"subject":"化学","difficulty":2,"question":"「浸透圧（van't Hoff式）」は？","choices":["π＝cRT（c：モル濃度、R：気体定数、T：絶対温度）","π＝nRT/V","π＝PV/nT","π＝cRT/n"],"answer":"π＝cRT（c：モル濃度、R：気体定数、T：絶対温度）","explanation":"Van't Hoff式：π＝cRT（希薄溶液）。電解質は解離度を考慮してi（Van't Hoff因子）を掛ける"},{"id":8079,"subject":"化学","difficulty":2,"question":"「コロイド溶液」の特性でないのは？","choices":["個々の粒子が肉眼で見える","チンダル現象","ブラウン運動","透析で精製できる"],"answer":"個々の粒子が肉眼で見える","explanation":"コロイド粒子（1〜100nm）は肉眼では見えない。チンダル現象（光散乱）・ブラウン運動・透析が特性"},{"id":8080,"subject":"化学","difficulty":2,"question":"「糖の還元性」があるのはどれ？","choices":["グルコース（アルデヒド基を持つ）","スクロース","セルロース","デンプンのみ"],"answer":"グルコース（アルデヒド基を持つ）","explanation":"還元糖：アルデヒド基またはα-ヒドロキシケトン基を持つ糖（グルコース・マルトースなど）。スクロースは非還元糖"},{"id":8081,"subject":"化学","difficulty":3,"question":"「ニンヒドリン反応」で検出できるのは？","choices":["アミノ酸（アミノ基）","糖","DNA","タンパク質の二次構造"],"answer":"アミノ酸（アミノ基）","explanation":"ニンヒドリン：アミノ酸のα-アミノ基と反応して青紫色に呈色。タンパク質の加水分解物検出"},{"id":8082,"subject":"化学","difficulty":3,"question":"「酵素の Michaelis-Menten式」の意味は？","choices":["基質濃度と反応速度の関係を表す式（KmとVmax）","酵素の合成速度","酵素の分解速度","酵素の最適pH"],"answer":"基質濃度と反応速度の関係を表す式（KmとVmax）","explanation":"v＝Vmax[S]/(Km＋[S])。Km（ミカエリス定数）は酵素と基質の親和性の指標"},{"id":8083,"subject":"化学","difficulty":3,"question":"「ポルフィリン環」の中心金属としてヘモグロビンにあるのは？","choices":["Fe（鉄）","Mg（マグネシウム）","Cu（銅）","Zn（亜鉛）"],"answer":"Fe（鉄）","explanation":"ヘモグロビン：ポルフィリン環にFe²⁺が配位。O₂運搬。葉緑素のポルフィリン環の中心はMg"},{"id":8084,"subject":"化学","difficulty":3,"question":"「DNAの二重らせん」を安定化させる結合は？","choices":["水素結合（塩基間）と疎水性相互作用（塩基のスタッキング）","共有結合","イオン結合","金属結合"],"answer":"水素結合（塩基間）と疎水性相互作用（塩基のスタッキング）","explanation":"DNA二重らせん：A-T（2本の水素結合）・G-C（3本）の塩基対と塩基スタッキングで安定化"},{"id":8085,"subject":"化学","difficulty":3,"question":"「クロスカップリング反応」（Suzuki-Miyaura等）で使う触媒は？","choices":["パラジウム（Pd）触媒","ロジウム（Rh）触媒","ルテニウム（Ru）触媒","ニッケル（Ni）触媒"],"answer":"パラジウム（Pd）触�Params媒","explanation":"鈴木・宮浦カップリング（ノーベル賞）はPd触媒を用いたアリールボロン酸とハロゲン化アリールの結合反応"},{"id":8086,"subject":"化学","difficulty":1,"question":"「硫酸（H₂SO₄）」は何価の酸？","choices":["2価","1価","3価","4価"],"answer":"2価","explanation":"H₂SO₄は2つのH⁺を放出できる2価の酸（二塩基酸）。H₂SO₄→2H⁺＋SO₄²⁻"},{"id":8087,"subject":"化学","difficulty":1,"question":"「炭酸カルシウム（CaCO₃）」を塩酸に溶かすと？","choices":["CO₂が発生","H₂が発生","O₂が発生","変化しない"],"answer":"CO₂が発生","explanation":"CaCO₃＋2HCl→CaCl₂＋H₂O＋CO₂。石灰石・大理石が塩酸で溶ける反応"},{"id":8088,"subject":"化学","difficulty":1,"question":"「質量保存の法則」とは？","choices":["化学反応前後で物質の総質量は変化しない","エネルギーは保存される","原子数は変化しない","分子数は変化しない"],"answer":"化学反応前後で物質の総質量は変化しない","explanation":"ラボアジェが提唱。化学反応では原子の組み合わせが変わるだけで原子の数は変わらない"},{"id":8089,"subject":"化学","difficulty":1,"question":"「定比例の法則」とは？","choices":["化合物は一定の質量比で元素が結合する","反応速度が一定","触媒量が一定","温度が一定"],"answer":"化合物は一定の質量比で元素が結合する","explanation":"プルーストが提唱。例えばH₂Oは常にH:O＝1:8の質量比で結合している"},{"id":8090,"subject":"化学","difficulty":1,"question":"「倍数比例の法則」を提唱したのは？","choices":["ドルトン","ラボアジェ","プルースト","アボガドロ"],"answer":"ドルトン","explanation":"ドルトンの倍数比例の法則：同じ2元素が複数の化合物を作るとき、一方の元素の量が整数比になる"},{"id":8091,"subject":"化学","difficulty":2,"question":"「電気化学列（標準電極電位）」でAu（金）のE⁰は？","choices":["大きい（貴金属・酸化されにくい）","小さい（酸化されやすい）","ゼロ","負の値"],"answer":"大きい（貴金属・酸化されにくい）","explanation":"標準電極電位E⁰が大きいほど還元されやすい（酸化されにくい）。Au・Pt・Agなど貴金属はE⁰が大"},{"id":8092,"subject":"化学","difficulty":2,"question":"「ギブズの自由エネルギー」ΔG<0の意味は？","choices":["反応が自発的に進む","反応が進まない","平衡状態","エネルギーが増加"],"answer":"反応が自発的に進む","explanation":"ΔG＝ΔH－TΔS。ΔG＜0：自発反応。ΔG＞0：非自発。ΔG＝0：平衡"},{"id":8093,"subject":"化学","difficulty":2,"question":"「配位結合」とは？","choices":["一方の原子が電子対を提供して形成する共有結合","イオン間の結合","金属原子間の結合","水素結合の一種"],"answer":"一方の原子が電子対を提供して形成する共有結合","explanation":"配位結合：電子対供与体（ルイス塩基）が一方的に電子対を提供。錯体・NH₄⁺の形成など"},{"id":8094,"subject":"化学","difficulty":2,"question":"「分子の極性」を決めるのは？","choices":["結合の極性＋分子の形（対称性）","電気陰性度のみ","分子量","結合の種類"],"answer":"結合の極性＋分子の形（対称性）","explanation":"CO₂は極性結合があるが直線形で対称→無極性。H₂Oは折れ線形→極性あり"},{"id":8095,"subject":"化学","difficulty":2,"question":"「α線・β線・γ線」の透過力の順は？","choices":["γ＞β＞α（γ線が最も透過力が高い）","α＞β＞γ","β＞γ＞α","すべて同じ"],"answer":"γ＞β＞α（γ線が最も透過力が高い）","explanation":"透過力：γ（電磁波）＞β（電子線）＞α（He核）。電離作用は逆：α＞β＞γ"},{"id":8096,"subject":"化学","difficulty":3,"question":"「MOT（分子軌道理論）」でH₂の結合次数は？","choices":["1（結合性軌道2電子・反結合性0電子）","2","0","3"],"answer":"1（結合性軌道2電子・反結合性0電子）","explanation":"結合次数＝（結合性軌道の電子数－反結合性軌道の電子数）÷2＝（2－0）÷2＝1"},{"id":8097,"subject":"化学","difficulty":3,"question":"「アレニウスの酸塩基」と「ブレンステッド-ローリーの酸塩基」の違いは？","choices":["アレニウスはH⁺/OH⁻の授受・ブレンステッドはプロトン（H⁺）の授受","どちらも同じ","アレニウスが広い概念・ブレンステッドが狭い","どちらも電子対の授受"],"answer":"アレニウスはH⁺/OH⁻の授受・ブレンステッドはプロトン（H⁺）の授受","explanation":"アレニウス（水溶液）→ブレンステッド（非水溶媒も対応）→ルイス（最も広い：電子対の授受）"},{"id":8098,"subject":"化学","difficulty":3,"question":"「超分子化学」とは？","choices":["分子間相互作用を利用した機能性集合体の化学","超高分子量の化合物","核化学","量子化学"],"answer":"分子間相互作用を利用した機能性集合体の化学","explanation":"ノーベル賞（1987年）。水素結合・疎水性・ファンデルワールス力等を利用したホスト-ゲスト化学・自己組織化"},{"id":8099,"subject":"化学","difficulty":3,"question":"「触媒の不均一系触媒」の例は？","choices":["自動車の三元触媒（Pt・Pd・Rh）","酵素","酸触媒","塩基触媒"],"answer":"自動車の三元触媒（Pt・Pd・Rh）","explanation":"不均一系触媒：固体触媒表面で反応が起きる。自動車排ガス浄化用三元触媒・Fe触媒（ハーバー法）など"},{"id":8100,"subject":"化学","difficulty":3,"question":"「分子間力の強さ」の順番は？","choices":["水素結合＞双極子-双極子力＞分散力","分散力＞水素結合＞双極子力","すべて同等","イオン結合より強い"],"answer":"水素結合＞双極子-双極子力＞分散力","explanation":"分子間力の強さ（目安）：水素結合（10-40 kJ/mol）＞双極子力（5-25）＞分散力（2-10）"},{"id":8101,"subject":"化学","difficulty":1,"question":"「原子番号」とは何か？","choices":["陽子の数（＝通常の原子の電子数）","質量数","中性子数","分子量"],"answer":"陽子の数（＝通常の原子の電子数）","explanation":"原子番号＝陽子数＝中性子を持たない水素では1。元素の種類を決める"},{"id":8102,"subject":"化学","difficulty":1,"question":"「化学結合のエネルギー」で最も強いのは？","choices":["共有結合","ファンデルワールス力","水素結合","金属結合"],"answer":"共有結合","explanation":"共有結合（200〜900kJ/mol）>イオン結合>金属結合>水素結合>ファンデルワールス力"},{"id":8103,"subject":"化学","difficulty":1,"question":"「エタノール（CH₃CH₂OH）」の官能基は？","choices":["ヒドロキシル基（-OH）","カルボキシル基","アミノ基","カルボニル基"],"answer":"ヒドロキシル基（-OH）","explanation":"アルコールの特性基は-OH（ヒドロキシル基）。エタノール：C₂H₅OH"},{"id":8104,"subject":"化学","difficulty":1,"question":"「酢酸（CH₃COOH）」の官能基は？","choices":["カルボキシル基（-COOH）","ヒドロキシル基","アミノ基","ニトロ基"],"answer":"カルボキシル基（-COOH）","explanation":"カルボン酸の特性基は-COOH（カルボキシル基）。弱酸で酢のにおい"},{"id":8105,"subject":"化学","difficulty":1,"question":"「周期表の第17族（ハロゲン）」の例は？","choices":["F・Cl・Br・I・At","Li・Na・K","He・Ne・Ar","O・S・Se"],"answer":"F・Cl・Br・I・At","explanation":"ハロゲン：フッ素・塩素・臭素・ヨウ素・アスタチン。-1価のイオンになりやすい"},{"id":8106,"subject":"化学","difficulty":1,"question":"「分留（分別蒸留）」で石油から分離できるものは？","choices":["ガソリン・灯油・軽油・重油・アスファルト","純粋な水","金属元素","単糖類"],"answer":"ガソリン・灯油・軽油・重油・アスファルト","explanation":"沸点の違いを利用した混合物の分離。沸点の低い順に分離する"},{"id":8107,"subject":"化学","difficulty":1,"question":"「炭素の同素体」として正しいのは？","choices":["ダイヤモンド・黒鉛・フラーレン","酸素とオゾン","白リンと赤リン","斜方硫黄と単斜硫黄"],"answer":"ダイヤモンド・黒鉛・フラーレン","explanation":"炭素の同素体：ダイヤモンド（sp³）・黒鉛（sp²）・フラーレン・グラフェン"},{"id":8108,"subject":"化学","difficulty":1,"question":"「鉄の製錬（高炉法）」でコークスが作るのは？","choices":["CO（一酸化炭素・還元剤）","CO₂のみ","O₂","H₂"],"answer":"CO（一酸化炭素・還元剤）","explanation":"コークス（C）が燃えてCO₂になり、さらにCOが生成してFe₂O₃を還元してFeにする"},{"id":8109,"subject":"化学","difficulty":1,"question":"「水の電気分解」の全反応式は？","choices":["2H₂O→2H₂＋O₂","H₂O→H₂＋O","H₂O→H⁺＋OH⁻","2H₂O→H₂O₂＋H₂"],"answer":"2H₂O→2H₂＋O₂","explanation":"水の電気分解：陰極でH₂が2mol・陽極でO₂が1mol生成（体積比2:1）"},{"id":8110,"subject":"化学","difficulty":1,"question":"「昇華」とは？","choices":["固体が直接気体になる状態変化","気体が液体になる","液体が固体になる","液体が気体になる"],"answer":"固体が直接気体になる状態変化","explanation":"昇華：ドライアイス・ナフタレン・ヨウ素などが直接気体になる。逆は凝華"},{"id":8111,"subject":"化学","difficulty":2,"question":"「電気陰性度の差」とイオン性の関係は？","choices":["差が大きいほどイオン性が高い","差が小さいほどイオン性が高い","差と無関係","差が1.7以下でイオン結合"],"answer":"差が大きいほどイオン性が高い","explanation":"電気陰性度差>1.7程度でイオン結合的、<0.5で無極性共有結合。連続的に変化する"},{"id":8112,"subject":"化学","difficulty":2,"question":"「ルシャトリエの原理」で圧力を上げると平衡はどちらに移動する？","choices":["気体分子数が少なくなる方向","気体分子数が多くなる方向","温度が上がる方向","変化しない"],"answer":"気体分子数が少なくなる方向","explanation":"圧力↑→気体mol数が少ない方向に移動。N₂＋3H₂⇌2NH₃なら右に移動"},{"id":8113,"subject":"化学","difficulty":2,"question":"「錯体（配位化合物）」の例は？","choices":["[Cu(NH₃)₄]²⁺（テトラアンミン銅イオン）","NaCl","H₂O","CO₂"],"answer":"[Cu(NH₃)₄]²⁺（テトラアンミン銅イオン）","explanation":"錯体：中心金属イオン＋配位子。Cu²⁺にNH₃が4つ配位→深青色の錯イオン"},{"id":8114,"subject":"化学","difficulty":2,"question":"「オゾン（O₃）」の性質は？","choices":["強い酸化力・特有の臭い・常温で気体","還元力が強い","水に溶けない","燃える"],"answer":"強い酸化力・特有の臭い・常温で気体","explanation":"オゾンは強酸化剤。殺菌・漂白に使われる。成層圏オゾン層がUV-Bを吸収"},{"id":8115,"subject":"化学","difficulty":2,"question":"「アルミニウムの製錬」の方法は？","choices":["酸化アルミニウムを溶融塩電解（Hall法）","化学還元","水熱合成","精留"],"answer":"酸化アルミニウムを溶融塩電解（Hall法）","explanation":"アルミニウムはボーキサイト（Al₂O₃主成分）を溶融塩電解（Hall-Héroult法）で製造"},{"id":8116,"subject":"化学","difficulty":2,"question":"「フェノール（C₆H₅OH）」の性質は？","choices":["弱酸性・ベンゼン環＋-OH・水に少し溶ける","強酸性","アルカリ性","水に不溶"],"answer":"弱酸性・ベンゼン環＋-OH・水に少し溶ける","explanation":"フェノール：芳香族アルコールとは異なり弱酸性（pKa≒10）。石炭酸とも呼ぶ"},{"id":8117,"subject":"化学","difficulty":2,"question":"「アニリン（C₆H₅NH₂）」の合成方法は？","choices":["ニトロベンゼンをスズと塩酸で還元","ベンゼンを直接アミン化","フェノールを変換","酢酸と反応"],"answer":"ニトロベンゼンをスズと塩酸で還元","explanation":"C₆H₅NO₂→C₆H₅NH₂（Sn＋HClで還元）。アニリンは染料・医薬品の原料"},{"id":8118,"subject":"化学","difficulty":2,"question":"「ベンゼン環の置換反応」で-OH・-NH₂は？","choices":["オルト/パラ配向性（電子供与基）","メタ配向性","反応しない","どこでも均等"],"answer":"オルト/パラ配向性（電子供与基）","explanation":"-OH/-NH₂等は電子供与性でo/p配向性。-NO₂/-COOH等は電子吸引性でm配向性"},{"id":8119,"subject":"化学","difficulty":2,"question":"「セッケン（石鹸）」の乳化作用の仕組みは？","choices":["疎水性の尾部が油を包み親水性の頭部が水に向くミセルを形成","水に溶かすだけ","油を分解する","泡を作るだけ"],"answer":"疎水性の尾部が油を包み親水性の頭部が水に向くミセルを形成","explanation":"セッケン分子は両親媒性。油をミセルで包んで水中に分散させる（乳化）"},{"id":8120,"subject":"化学","difficulty":2,"question":"「ハーバー・ボッシュ法」の触媒は？","choices":["鉄（Fe）","白金（Pt）","パラジウム（Pd）","ニッケル（Ni）"],"answer":"鉄（Fe）","explanation":"N₂＋3H₂⇌2NH₃（高温高圧・Fe触媒）。K₂O・Al₂O₃を助触媒として使用"},{"id":8121,"subject":"化学","difficulty":3,"question":"「VSEPR理論」とは？","choices":["電子対の反発から分子の立体構造を予測する理論","軌道の混成を説明する理論","分子軌道論","結晶場理論"],"answer":"電子対の反発から分子の立体構造を予測する理論","explanation":"電子対間の反発を最小にするよう空間配置が決まる。H₂O→折れ線形・NH₃→三角錐形"},{"id":8122,"subject":"化学","difficulty":3,"question":"「溶解度積（Ksp）」とは？","choices":["難溶性塩の飽和溶液でのイオン濃度の積","溶解度の最大値","溶解速度","溶液の濃度"],"answer":"難溶性塩の飽和溶液でのイオン濃度の積","explanation":"AgCl⇌Ag⁺＋Cl⁻のKsp＝[Ag⁺][Cl⁻]。Kspより積が大きくなると沈殿"},{"id":8123,"subject":"化学","difficulty":3,"question":"「フロンティア軌道理論」でHOMO-LUMOが重要な理由は？","choices":["反応性・選択性を軌道エネルギーレベルで説明できる","分子の重さを決める","溶解性を決める","色を決める"],"answer":"反応性・選択性を軌道エネルギーレベルで説明できる","explanation":"フロンティア軌道理論（福井謙一）：HOMO（最高被占軌道）とLUMO（最低空軌道）の相互作用で反応を説明"},{"id":8124,"subject":"化学","difficulty":3,"question":"「超臨界流体（SCF）」とは？","choices":["臨界点以上の温度・圧力にある状態（液体と気体の中間的性質）","非常に高圧の液体","非常に高温の気体","プラズマ状態"],"answer":"臨界点以上の温度・圧力にある状態（液体と気体の中間的性質）","explanation":"超臨界CO₂はカフェインの抽出・半導体洗浄に利用。液体の溶解力と気体の拡散力を持つ"},{"id":8125,"subject":"化学","difficulty":3,"question":"「熱力学第三法則」とは？","choices":["絶対零度（0K）で完全な結晶のエントロピーはゼロ","エネルギーは保存される","熱は高温から低温へ流れる","内部エネルギーの定義"],"answer":"絶対零度（0K）で完全な結晶のエントロピーはゼロ","explanation":"第三法則：S(0K)＝0。これにより絶対エントロピーを計算できる"},{"id":8126,"subject":"化学","difficulty":1,"question":"「指示薬フェノールフタレイン」が赤色になるのは？","choices":["塩基性（アルカリ性）で赤色〜桃色","酸性で赤色","中性で赤色","全ての条件"],"answer":"塩基性（アルカリ性）で赤色〜桃色","explanation":"フェノールフタレイン：pH8.2以下は無色・pH8.2〜10.0は桃色〜赤色。酸性では無色"},{"id":8127,"subject":"化学","difficulty":1,"question":"「塩化アンモニウム（NH₄Cl）」水溶液は？","choices":["酸性（弱塩基の塩が加水分解）","塩基性","中性","強酸性"],"answer":"酸性（弱塩基の塩が加水分解）","explanation":"NH₄Cl：NH₄⁺が加水分解してH⁺を出す（弱塩基＋強酸の塩→酸性）"},{"id":8128,"subject":"化学","difficulty":1,"question":"「酢酸ナトリウム（CH₃COONa）」水溶液は？","choices":["塩基性（弱酸の塩が加水分解）","酸性","中性","強酸性"],"answer":"塩基性（弱酸の塩が加水分解）","explanation":"CH₃COO⁻が加水分解してOH⁻を出す（弱酸＋強塩基の塩→塩基性）"},{"id":8129,"subject":"化学","difficulty":1,"question":"「過酸化水素（H₂O₂）」の特性は？","choices":["酸化剤にも還元剤にもなる","酸化剤のみ","還元剤のみ","触媒のみ"],"answer":"酸化剤にも還元剤にもなる","explanation":"H₂O₂：酸化剤（KMnO₄に対して）・還元剤（O₃に対して）の両方。漂白・消毒に利用"},{"id":8130,"subject":"化学","difficulty":1,"question":"「白金触媒」が使われる代表的な反応は？","choices":["水素添加・酸化・アンモニア酸化（オストワルト法）","エステル化","ニトロ化","スルホン化"],"answer":"水素添加・酸化・アンモニア酸化（オストワルト法）","explanation":"白金（Pt）：不均一系触媒として活性が高い。水素添加・オストワルト法の触媒"},{"id":8131,"subject":"化学","difficulty":2,"question":"「NMRでの積分（integration）」から何がわかる？","choices":["各ピークに対応するプロトン数の比","化学シフトの絶対値","結合定数","分子量"],"answer":"各ピークに対応するプロトン数の比","explanation":"¹H NMR：積分値の比＝各ピークのプロトン数の比。化学シフトで環境・積分で数を決める"},{"id":8132,"subject":"化学","difficulty":2,"question":"「IRスペクトル」でO-H伸縮が現れる波数は？","choices":["3200〜3600cm⁻¹","1650〜1850cm⁻¹","600〜900cm⁻¹","2000〜2300cm⁻¹"],"answer":"3200〜3600cm⁻¹","explanation":"O-H伸縮：3200-3600cm⁻¹。C=O伸縮：1650-1850cm⁻¹。官能基同定に重要"},{"id":8133,"subject":"化学","difficulty":2,"question":"「ハロゲンの反応性」の順序は？","choices":["F₂>Cl₂>Br₂>I₂（酸化力・反応性の順）","I₂>Br₂>Cl₂>F₂","Cl₂>F₂>Br₂>I₂","全て同じ"],"answer":"F₂>Cl₂>Br₂>I₂（酸化力・反応性の順）","explanation":"ハロゲンの反応性：F₂が最も強い酸化剤。Cl₂はBr⁻・I⁻を酸化できるが逆は不可"},{"id":8134,"subject":"化学","difficulty":2,"question":"「ホルマリン」とは何か？","choices":["ホルムアルデヒド（HCHO）の水溶液（37%）","エタノールの水溶液","酢酸の水溶液","フェノールの水溶液"],"answer":"ホルムアルデヒド（HCHO）の水溶液（37%）","explanation":"ホルマリン：HCHO水溶液。防腐剤・消毒剤として使用。有毒で発がん性がある"},{"id":8135,"subject":"化学","difficulty":2,"question":"「セルロース」と「デンプン」の違いは？","choices":["セルロースはβ-グルコース・デンプンはα-グルコースのポリマー","同じ物質","デンプンが繊維・セルロースが栄養","分子量のみ違う"],"answer":"セルロースはβ-グルコース・デンプンはα-グルコースのポリマー","explanation":"α-1,4結合：デンプン（人が消化可）。β-1,4結合：セルロース（人は消化不可）"},{"id":8136,"subject":"化学","difficulty":2,"question":"「ゴムの加硫」とは？","choices":["天然ゴムに硫黄を添加して架橋させ弾性・強度を高める処理","ゴムを柔らかくする処理","ゴムを漂白する処理","ゴムを溶かす処理"],"answer":"天然ゴムに硫黄を添加して架橋させ弾性・強度を高める処理","explanation":"加硫：S原子でポリイソプレン鎖を架橋。弾性・耐久性が向上。グッドイヤーが発見"},{"id":8137,"subject":"化学","difficulty":2,"question":"「イオン交換樹脂」の主な用途は？","choices":["純水製造・硬水軟化・廃液処理・クロマトグラフィー","触媒のみ","フィルターのみ","医薬品製造のみ"],"answer":"純水製造・硬水軟化・廃液処理・クロマトグラフィー","explanation":"陽イオン交換樹脂（H⁺型）と陰イオン交換樹脂（OH⁻型）を組み合わせて純水を作る"},{"id":8138,"subject":"化学","difficulty":2,"question":"「ニトロ化」の試薬は？","choices":["混酸（濃硝酸＋濃硫酸）","希塩酸","濃硫酸のみ","希硝酸"],"answer":"混酸（濃硝酸＋濃硫酸）","explanation":"混酸：濃H₂SO₄がH₂O吸収剤・NO₂⁺（ニトロニウムイオン）の生成剤として働く"},{"id":8139,"subject":"化学","difficulty":2,"question":"「酸化還元滴定」の例は？","choices":["過マンガン酸カリウム（KMnO₄）によるシュウ酸の滴定","塩酸と水酸化ナトリウムの中和滴定","炭酸の滴定","ヨードの沈殿滴定"],"answer":"過マンガン酸カリウム（KMnO₄）によるシュウ酸の滴定","explanation":"KMnO₄（紫）が透明になる点が終点。MnO₄⁻（酸化剤）＋H₂C₂O₄（還元剤）→Mn²⁺"},{"id":8140,"subject":"化学","difficulty":2,"question":"「縮合重合」の代表例は？","choices":["ナイロン・ポリエステル・フェノール樹脂","ポリエチレン・PVC（付加重合）","天然ゴム","ポリスチレン"],"answer":"ナイロン・ポリエステル・フェノール樹脂","explanation":"縮合重合：官能基間の反応でH₂O等を脱離しながら重合。付加重合：二重結合が開環"},{"id":8141,"subject":"化学","difficulty":3,"question":"「密度汎関数理論（DFT）」とは？","choices":["電子密度を変数として電子状態を計算する量子化学計算法","分子の密度を測定する方法","結晶の密度を計算する方法","流体の密度を計算する方法"],"answer":"電子密度を変数として電子状態を計算する量子化学計算法","explanation":"DFT（Kohn-Sham方程式）：大きな分子の電子構造計算に広く使われる。Kohnがノーベル賞"},{"id":8142,"subject":"化学","difficulty":3,"question":"「キラル分離」に使う技術は？","choices":["キラル固定相クロマトグラフィー・酵素分割・ジアステレオマー塩法","通常のGC","蒸留","再結晶のみ"],"answer":"キラル固定相クロマトグラフィー・酵素分割・ジアステレオマー塩法","explanation":"鏡像異性体（エナンチオマー）を分離する技術。医薬品の光学純度管理に重要"},{"id":8143,"subject":"化学","difficulty":3,"question":"「遷移金属の触媒活性」の理由は？","choices":["複数の酸化数をとれる・d軌道で基質を活性化できる","安定すぎる","安価","光を吸収する"],"answer":"複数の酸化数をとれる・d軌道で基質を活性化できる","explanation":"Fe・Ni・Pt・Pd等の遷移金属：酸化状態が変化できる→触媒サイクルが成立"},{"id":8144,"subject":"化学","difficulty":3,"question":"「ゼオライト」とは何か？","choices":["多孔質のアルミノケイ酸塩（分子ふるい・触媒・イオン交換剤）","有機高分子","炭素同素体","タンパク質の一種"],"answer":"多孔質のアルミノケイ酸塩（分子ふるい・触媒・イオン交換剤）","explanation":"ゼオライト：規則的な細孔構造を持つ結晶性アルミノケイ酸塩。触媒分解・吸着剤・乾燥剤として使用"},{"id":8145,"subject":"化学","difficulty":3,"question":"「ポリマーのガラス転移温度（Tg）」とは？","choices":["高分子がゴム状から硬いガラス状に変化する温度","融点","分解温度","反応温度"],"answer":"高分子がゴム状から硬いガラス状に変化する温度","explanation":"Tg以上：高分子鎖が運動→柔軟・ゴム状。Tg以下：運動が凍結→硬いガラス状。材料設計に重要"},{"id":8146,"subject":"化学","difficulty":1,"question":"「pH計算」で0.01mol/LのHClのpHは？","choices":["2","1","3","0"],"answer":"2","explanation":"HCl→H⁺＋Cl⁻（完全解離）。[H⁺]＝0.01＝10⁻²mol/L。pH＝-log[H⁺]＝2"},{"id":8147,"subject":"化学","difficulty":1,"question":"「蒸発熱（気化熱）」が特に大きい液体は？","choices":["水（約2260J/g）","エタノール","ベンゼン","アセトン"],"answer":"水（約2260J/g）","explanation":"水の蒸発熱は非常に大きい（水素結合のため）。皮膚から水が蒸発すると体温が下がる"},{"id":8148,"subject":"化学","difficulty":1,"question":"「光触媒」として有名な酸化チタン（TiO₂）の用途は？","choices":["光で汚染物質を分解・殺菌・セルフクリーニング","電池","肥料","担体のみ"],"answer":"光で汚染物質を分解・殺菌・セルフクリーニング","explanation":"TiO₂光触媒：UV照射で活性酸素を生成し有機物を分解。建材・空気清浄に応用"},{"id":8149,"subject":"化学","difficulty":1,"question":"「アルカリ金属」の水との反応は？","choices":["激しく反応してH₂を発生し水酸化物を生成","ゆっくり溶ける","反応しない","酸素を発生する"],"answer":"激しく反応してH₂を発生し水酸化物を生成","explanation":"2Na＋2H₂O→2NaOH＋H₂↑。Kはさらに激しく、Csは爆発的。Li以外はほぼ浮く"},{"id":8150,"subject":"化学","difficulty":1,"question":"「石灰石（CaCO₃）」を強く加熱すると？","choices":["CaO（生石灰）＋CO₂↑","CaO＋H₂O","Ca＋CO₂","変化しない"],"answer":"CaO（生石灰）＋CO₂↑","explanation":"CaCO₃→CaO＋CO₂（900℃以上）。生石灰に水を加えるとCa(OH)₂（消石灰）"},{"id":8151,"subject":"化学","difficulty":2,"question":"「スルホン化」の試薬と生成物は？","choices":["濃硫酸（発煙）→スルホン酸（-SO₃H）","混酸→ニトロ化合物","塩素ガス→ハロゲン化物","NaOH→フェノキシド"],"answer":"濃硫酸（発煙）→スルホン酸（-SO₃H）","explanation":"ベンゼン＋発煙H₂SO₄→ベンゼンスルホン酸（C₆H₅SO₃H）。可逆反応（水蒸気で逆転）"},{"id":8152,"subject":"化学","difficulty":2,"question":"「フリーデルクラフツ反応」の触媒は？","choices":["塩化アルミニウム（AlCl₃）・ルイス酸","白金","パラジウム","鉄"],"answer":"塩化アルミニウム（AlCl₃）・ルイス酸","explanation":"アルキル化・アシル化に使用。AlCl₃がルイス酸として求電子剤を活性化"},{"id":8153,"subject":"化学","difficulty":2,"question":"「アルコールの酸化」で第一級アルコールが最終的になるのは？","choices":["カルボン酸（第一級→アルデヒド→カルボン酸）","ケトン","変化しない","エーテル"],"answer":"カルボン酸（第一級→アルデヒド→カルボン酸）","explanation":"R-CH₂OH→RCHO→RCOOH（第一級）/ R₂CHOH→R₂CO（第二級）/ 第三級はα-H不在で困難"},{"id":8154,"subject":"化学","difficulty":2,"question":"「電気分解でのファラデーの法則」では1mol析出に必要な電気量は？","choices":["96500C×電子数（ファラデー定数×価数）","6.02×10²³C","1mol","96500J"],"answer":"96500C×電子数（ファラデー定数×価数）","explanation":"F＝96500C/mol（ファラデー定数）。Cu²⁺→Cuなら2mol e⁻が必要→2×96500C"},{"id":8155,"subject":"化学","difficulty":2,"question":"「ナトリウム（Na）」の保存方法は？","choices":["石油（灯油）中で保存","水中","空気中","冷蔵"],"answer":"石油（灯油）中で保存","explanation":"NaはH₂Oや空気（O₂・H₂O）と激しく反応するため石油中で保存。同じくK・Li"},{"id":8156,"subject":"化学","difficulty":3,"question":"「酵素触媒のkcat/Km（触媒効率）」とは？","choices":["酵素の触媒効率を表すパラメーター（理想は拡散制御限界）","反応速度定数","基質濃度","活性化エネルギー"],"answer":"酵素の触媒効率を表すパラメーター（理想は拡散制御限界）","explanation":"kcat（触媒回転数）÷Km（親和性の逆数）で触媒の効率を評価。10⁸-10⁹M⁻¹s⁻¹が理想"},{"id":8157,"subject":"化学","difficulty":3,"question":"「相図（phase diagram）」で三重点とは？","choices":["固・液・気の三相が共存する温度と圧力の点","臨界点","沸点","融点"],"answer":"固・液・気の三相が共存する温度と圧力の点","explanation":"水の三重点：273.16K・611.7Pa。温度の定義に使われた（現在は別の定義）"},{"id":8158,"subject":"化学","difficulty":3,"question":"「タンパク質の構造階層」で正しい説明は？","choices":["一次：アミノ酸配列・二次：αヘリックス等・三次：立体構造・四次：複数鎖の集合体","全部同じ","逆順","二次だけが重要"],"answer":"一次：アミノ酸配列・二次：αヘリックス等・三次：立体構造・四次：複数鎖の集合体","explanation":"タンパク質の階層構造。一次構造が決まれば自己集合して高次構造ができる"},{"id":8159,"subject":"化学","difficulty":3,"question":"「超分子の自己組織化（self-assembly）」の例は？","choices":["脂質二重膜・ウイルスカプシド","共有結合での合成","蒸留","電気分解"],"answer":"脂質二重膜・ウイルスカプシド","explanation":"分子間の非共有結合的相互作用（疎水性・水素結合等）により自発的に秩序構造が形成される"},{"id":8160,"subject":"化学","difficulty":3,"question":"「ポルフィリン」の構造的特徴は？","choices":["4つのピロール環がメチン橋で結合した平面的大環状共役系","鎖状構造","脂環式","炭化水素のみ"],"answer":"4つのピロール環がメチン橋で結合した平面的大環状共役系","explanation":"ポルフィリン：18π電子系の芳香族大環状化合物。Fe→ヘム・Mg→葉緑素の中心骨格"},{"id":8161,"subject":"化学","difficulty":1,"question":"「海水から取れる主な元素」は？","choices":["Na・Cl・Mg・K・Br等","Fe・Cu・Al","Si・Ca・Ti","Ni・Co・Cr"],"answer":"Na・Cl・Mg・K・Br等","explanation":"海水の主要溶存塩：NaCl・MgCl₂・Na₂SO₄。Mgは海水から電気分解で製造"},{"id":8162,"subject":"化学","difficulty":1,"question":"「アルミニウムが錆びにくい理由」は？","choices":["表面に酸化皮膜（Al₂O₃）が生成して内部を保護","アルミニウムが安定な金属","酸素と反応しない","水と反応しない"],"answer":"表面に酸化皮膜（Al₂O₃）が生成して内部を保護","explanation":"不動態化：Al・Fe・Ni等が表面酸化皮膜で保護される。アルマイトは人工的に厚くした皮膜"},{"id":8163,"subject":"化学","difficulty":1,"question":"「実験室でのCO₂の製法」は？","choices":["石灰石（CaCO₃）＋希塩酸","Zn＋希塩酸","Cu＋濃硝酸","KMnO₄加熱"],"answer":"石灰石（CaCO₃）＋希塩酸","explanation":"CaCO₃＋2HCl→CaCl₂＋H₂O＋CO₂。H₂製法：Zn＋HCl。O₂製法：KMnO₄加熱"},{"id":8164,"subject":"化学","difficulty":1,"question":"「塩化水素（HCl）ガス」の製法は？","choices":["NaCl＋濃H₂SO₄→HCl↑（加熱）","NaCl＋H₂O","NaCl電気分解","NaCl＋HNO₃"],"answer":"NaCl＋濃H₂SO₄→HCl↑（加熱）","explanation":"NaCl＋H₂SO₄→NaHSO₄＋HCl↑（低温）→Na₂SO₄＋2HCl↑（高温）"},{"id":8165,"subject":"化学","difficulty":1,"question":"「リン酸（H₃PO₄）」は何価の酸？","choices":["3価（三塩基酸）","1価","2価","4価"],"answer":"3価（三塩基酸）","explanation":"H₃PO₄は3つのH⁺を段階的に放出できる3価の酸。H₃PO₄→H₂PO₄⁻→HPO₄²⁻→PO₄³⁻"},{"id":8166,"subject":"化学","difficulty":2,"question":"「平衡定数K」と「温度」の関係は？","choices":["温度が変わるとKは変化する（ルシャトリエ原理で説明）","温度と無関係","濃度で変化する","圧力で変化する"],"answer":"温度が変わるとKは変化する（ルシャトリエ原理で説明）","explanation":"触媒・濃度・圧力を変えてもKは不変。温度を変えるとKが変化する"},{"id":8167,"subject":"化学","difficulty":2,"question":"「ガルバニ電池（ボルタ電池型）」の正極と負極は？","choices":["正極（銅側）で還元・負極（亜鉛側）で酸化","正極で酸化・負極で還元","どちらも還元","どちらも酸化"],"answer":"正極（銅側）で還元・負極（亜鉛側）で酸化","explanation":"ボルタ電池：Zn→Zn²⁺＋2e⁻（負極・酸化）/ 2H⁺＋2e⁻→H₂（正極・還元）"},{"id":8168,"subject":"化学","difficulty":2,"question":"「ポリテトラフルオロエチレン（PTFE・テフロン）」の特性は？","choices":["耐熱性・耐薬品性・非粘着性が高い","電気をよく通す","水に溶ける","燃えやすい"],"answer":"耐熱性・耐薬品性・非粘着性が高い","explanation":"テフロン（PTFE）：フッ素の強いC-F結合でほぼ全ての化学物質に対して安定。フライパンのコーティング"},{"id":8169,"subject":"化学","difficulty":2,"question":"「シリカゲル（SiO₂）」の用途は？","choices":["乾燥剤・クロマトグラフィーの固定相・吸着剤","触媒そのもの","食品添加物","医薬品原料"],"answer":"乾燥剤・クロマトグラフィーの固定相・吸着剤","explanation":"シリカゲル：多孔質SiO₂。表面のシラノール基（Si-OH）が水分や有機物を吸着"},{"id":8170,"subject":"化学","difficulty":2,"question":"「ドルトンの分圧の法則」とは？","choices":["混合気体の全圧＝各成分の分圧の和","各成分の圧力が等しい","分圧は温度に比例","分圧は体積に反比例"],"answer":"混合気体の全圧＝各成分の分圧の和","explanation":"Ptotal＝P₁＋P₂＋...。各成分は独立に理想気体の方程式に従うと仮定"},{"id":8171,"subject":"化学","difficulty":3,"question":"「量子ドット（quantum dot）」とは？","choices":["ナノサイズの半導体結晶（量子閉じ込め効果で発光色が変わる）","量子コンピュータの素子","磁性粒子","触媒粒子"],"answer":"ナノサイズの半導体結晶（量子閉じ込め効果で発光色が変わる）","explanation":"サイズを変えることで発光波長を制御できる。生体イメージング・ディスプレイへの応用"},{"id":8172,"subject":"化学","difficulty":3,"question":"「MOF（金属有機構造体）」とは？","choices":["金属イオンと有機配位子が配位結合した多孔性結晶","有機金属化合物の総称","金属触媒","無機塩"],"answer":"金属イオンと有機配位子が配位結合した多孔性結晶","explanation":"MOF：非常に大きな比表面積を持つ多孔性材料。ガス貯蔵・分離・薬物送達への応用"},{"id":8173,"subject":"化学","difficulty":3,"question":"「グラフェン」の特性は？","choices":["電気伝導性が高い・単原子層・六方格子","絶縁体","3次元構造","磁性体"],"answer":"電気伝導性が高い・単原子層・六方格子","explanation":"グラフェン：sp²炭素の2D材料。電子がディラックフェルミオンとして振る舞う特異なバンド構造"},{"id":8174,"subject":"化学","difficulty":3,"question":"「クリック反応（click chemistry）」の特徴は？","choices":["高収率・副生成物少・温和な条件で行える高選択的反応群","毒性が高い","収率が低い","高温高圧が必要"],"answer":"高収率・副生成物少・温和な条件で行える高選択的反応群","explanation":"Sharplessが提唱（2022年ノーベル賞）。生体直交化学（bioorthogonal chemistry）にも応用"},{"id":8175,"subject":"化学","difficulty":3,"question":"「核磁気共鳴（NMR）の原理」は？","choices":["核スピンが磁場中で共鳴周波数の電磁波を吸収・放出する","電子の振動","光の散乱","質量の違い"],"answer":"核スピンが磁場中で共鳴周波数の電磁波を吸収・放出する","explanation":"¹H・¹³C等の核スピンを持つ核が外部磁場中でラーモア周波数の電磁波を吸収する"},{"id":8176,"subject":"化学","difficulty":1,"question":"「リトマス紙の色変化」のまとめは？","choices":["青→赤で酸性確認・赤→青でアルカリ性確認","赤→赤・青→青","青→青で酸性","赤→赤でアルカリ性"],"answer":"青→赤で酸性確認・赤→青でアルカリ性確認","explanation":"酸性：青いリトマス→赤。アルカリ性：赤いリトマス→青。中性：変化なし"},{"id":8177,"subject":"化学","difficulty":1,"question":"「銅（Cu）の炎色反応」は何色？","choices":["青緑色","黄色","赤色","紫色"],"answer":"青緑色","explanation":"炎色反応：Cu＝青緑、Na＝黄、K＝紫、Li＝赤、Ba＝黄緑、Ca＝橙赤、Sr＝深赤"},{"id":8178,"subject":"化学","difficulty":1,"question":"「鉄（Fe）の赤錆」の化学式は？","choices":["Fe₂O₃・nH₂O（酸化鉄水和物）","Fe₃O₄","FeO","Fe(OH)₂"],"answer":"Fe₂O₃・nH₂O（酸化鉄水和物）","explanation":"赤錆：Fe₂O₃・nH₂O。黒錆：Fe₃O₄（保護的）。防錆塗料・亜鉛メッキで防止"},{"id":8179,"subject":"化学","difficulty":1,"question":"「ケン化」の定義は？","choices":["油脂（エステル）をアルカリ（NaOH等）で加水分解してセッケンを作ること","酸で加水分解","エステル化の逆反応のみ","酸化反応"],"answer":"油脂（エステル）をアルカリ（NaOH等）で加水分解してセッケンを作ること","explanation":"油脂＋NaOH→グリセリン＋高級脂肪酸ナトリウム（セッケン）"},{"id":8180,"subject":"化学","difficulty":1,"question":"「二酸化窒素（NO₂）」の色は？","choices":["赤褐色","無色","青色","黄色"],"answer":"赤褐色","explanation":"NO₂は赤褐色の有毒ガス。光化学スモッグの原因物質。COは無色・SO₂は無色・Cl₂は黄緑色"},{"id":8181,"subject":"化学","difficulty":2,"question":"「電解精錬（銅の精製）」の仕組みは？","choices":["粗銅を陽極に・純銅を陰極に・硫酸銅溶液中で電気分解","蒸留","化学還元","吸着分離"],"answer":"粗銅を陽極に・純銅を陰極に・硫酸銅溶液中で電気分解","explanation":"陽極の粗銅が溶解→Cu²⁺が陰極に析出（高純度Cu）。Ag・Au等の貴金属は陽極泥として沈殿"},{"id":8182,"subject":"化学","difficulty":2,"question":"「吸熱反応と発熱反応」の違いは？","choices":["吸熱：ΔH>0（エネルギーを吸収）・発熱：ΔH<0（エネルギーを放出）","ΔHの符号は逆","温度のみで判断","反応速度で判断"],"answer":"吸熱：ΔH>0（エネルギーを吸収）・発熱：ΔH<0（エネルギーを放出）","explanation":"化学熱力学の符号規則。燃焼は発熱（ΔH<0）・融解は吸熱（ΔH>0）"},{"id":8183,"subject":"化学","difficulty":2,"question":"「ルシャトリエ原理」で触媒を加えた場合の平衡は？","choices":["平衡の位置は変わらない（反応速度のみ変化）","右に移動","左に移動","温度が上がる"],"answer":"平衡の位置は変わらない（反応速度のみ変化）","explanation":"触媒は正・逆反応の両方を同じく加速するため、平衡定数Kは変化しない"},{"id":8184,"subject":"化学","difficulty":2,"question":"「無機高分子」の例は？","choices":["シリコーン（ポリシロキサン）・ポリリン酸・ガラス","ナイロン","ポリエチレン","デンプン"],"answer":"シリコーン（ポリシロキサン）・ポリリン酸・ガラス","explanation":"無機高分子：Si-O-Si骨格のシリコーン・SiO₂の網目構造のガラス等。有機高分子はC骨格"},{"id":8185,"subject":"化学","difficulty":2,"question":"「コロイドの凝析（凝集）」を起こす方法は？","choices":["電解質添加・電気泳動・加熱","純水を加える","冷却する","光を当てる"],"answer":"電解質添加・電気泳動・加熱","explanation":"コロイド粒子の表面電荷が中和されると凝集（凝析）。塩析はタンパク質に高濃度塩を加える"},{"id":8186,"subject":"化学","difficulty":3,"question":"「グリーンケミストリー（緑の化学）」の核心は？","choices":["廃棄物の防止・原子効率・毒性低減・再生可能原料の使用","コスト削減のみ","反応速度の最大化","収率の最大化のみ"],"answer":"廃棄物の防止・原子効率・毒性低減・再生可能原料の使用","explanation":"Anastas & Warner（1998）。反応設計段階から環境負荷を最小化する化学の考え方"},{"id":8187,"subject":"化学","difficulty":3,"question":"「液晶（liquid crystal）」とは？","choices":["液体の流動性と結晶の規則性を両方持つ状態","固体の一種","液体の一種","コロイド"],"answer":"液体の流動性と結晶の規則性を両方持つ状態","explanation":"液晶相：分子が方向秩序を持ちながら並進秩序がない。LCDディスプレイに応用"},{"id":8188,"subject":"化学","difficulty":3,"question":"「有機発光ダイオード（OLED）」の発光原理は？","choices":["有機分子の電気ルミネッセンス（電子と正孔の再結合）","熱発光","蛍光体による変換","反射"],"answer":"有機分子の電気ルミネッセンス（電子と正孔の再結合）","explanation":"有機薄膜に電圧をかけ電子と正孔を注入→再結合→励起分子→発光。スマートフォンに応用"},{"id":8189,"subject":"化学","difficulty":3,"question":"「圧電効果（piezoelectric effect）」に使われる化学物質は？","choices":["チタン酸バリウム（BaTiO₃）・水晶（SiO₂）","鉄","銅","金"],"answer":"チタン酸バリウム（BaTiO₃）・水晶（SiO₂）","explanation":"圧電体：圧力→電圧（圧電）・電圧→変形（逆圧電）。超音波トランスデューサ・ライターに利用"},{"id":8190,"subject":"化学","difficulty":3,"question":"「ネオジム磁石」の組成は？","choices":["Nd₂Fe₁₄B（ネオジム・鉄・ホウ素）","NdFeO","Nd₂O₃","Nd＋Fe"],"answer":"Nd₂Fe₁₄B（ネオジム・鉄・ホウ素）","explanation":"Nd₂Fe₁₄B：世界最強の永久磁石材料。EV・スピーカー・HDD等に使用"},{"id":8191,"subject":"化学","difficulty":1,"question":"「テルミット反応」とは？","choices":["Al＋Fe₂O₃→Al₂O₃＋Fe（高温・溶接に利用）","鉄の精錬","アルミの製造","Al＋H₂O反応"],"answer":"Al＋Fe₂O₃→Al₂O₃＋Fe（高温・溶接に利用）","explanation":"テルミット：Alの強い還元力でFe₂O₃を還元。非常に高温で融解した鉄を生成。溶接に利用"},{"id":8192,"subject":"化学","difficulty":1,"question":"「タンパク質の変性」の原因は？","choices":["熱・酸塩基・有機溶媒・重金属","一次構造の変化","アミノ酸配列の変化","共有結合の切断のみ"],"answer":"熱・酸塩基・有機溶媒・重金属","explanation":"変性：高次構造（二次〜四次）が壊れる。一次構造（ペプチド結合）は基本的に変化しない"},{"id":8193,"subject":"化学","difficulty":1,"question":"「王水」とは何か？","choices":["濃塩酸と濃硝酸の3:1混合液（金・白金を溶かす）","王様が飲む水","塩と水の混合","硫酸と水の混合"],"answer":"濃塩酸と濃硝酸の3:1混合液（金・白金を溶かす）","explanation":"王水：濃HCl:濃HNO₃＝3:1（体積比）。強酸化力＋配位子（Cl⁻）でAu・Ptが溶解"},{"id":8194,"subject":"化学","difficulty":1,"question":"「希ガス（貴ガス）の電子配置」の特徴は？","choices":["最外殻が閉殻（8電子または2電子のHe）","電子が一つ余分","電子が一つ不足","電子を持たない"],"answer":"最外殻が閉殻（8電子または2電子のHe）","explanation":"閉殻構造で非常に安定。通常化学結合を形成しない。XeとKrは特定条件で化合物を作る"},{"id":8195,"subject":"化学","difficulty":1,"question":"「塩素（Cl₂）」の実験室での製法は？","choices":["MnO₂＋濃塩酸（加熱）","NaCl電気分解","HClガスのみ","塩化物の酸化"],"answer":"MnO₂＋濃塩酸（加熱）","explanation":"MnO₂＋4HCl→MnCl₂＋2H₂O＋Cl₂↑。工業的にはイオン交換膜法電気分解"},{"id":8196,"subject":"化学","difficulty":2,"question":"「電気陰性度」が高い順に並んでいるのは？","choices":["F>O>N>Cl>Br","N>O>F>Cl>Br","O>F>N>Cl>Br","Cl>F>O>N"],"answer":"F>O>N>Cl>Br","explanation":"マリケンスケール・ポーリングスケールどちらでも概ね同様の順序。F（フッ素）が最大"},{"id":8197,"subject":"化学","difficulty":2,"question":"「旋光度（optical rotation）」は何を測定する？","choices":["キラル分子が偏光面を回転させる角度","分子量","融点","濃度"],"answer":"キラル分子が偏光面を回転させる角度","explanation":"旋光性：鏡像異性体はプラスマイナスが逆。比旋光度＝測定値/(濃度×セル長)"},{"id":8198,"subject":"化学","difficulty":2,"question":"「エナンチオマーとジアステレオマー」の違いは？","choices":["エナンチオマー：鏡像関係の異性体・ジアステレオマー：鏡像でない立体異性体","同じ","エナンチオマーの方が多い","ジアステレオマーが鏡像"],"answer":"エナンチオマー：鏡像関係の異性体・ジアステレオマー：鏡像でない立体異性体","explanation":"不斉炭素2個：最大4種。RR/SS（エナンチオマー）・RS/SR（エナンチオマー）がジアステレオマー関係"},{"id":8199,"subject":"化学","difficulty":2,"question":"「凝固点降下（ΔTf）」の用途は？","choices":["分子量の測定・不凍液の濃度管理","温度測定","密度測定","粘度測定"],"answer":"分子量の測定・不凍液の濃度管理","explanation":"ΔTf＝Kf×m。水のKf＝1.853K·kg/mol。不凍液（エチレングリコール）の濃度管理"},{"id":8200,"subject":"化学","difficulty":2,"question":"「沸点上昇・凝固点降下・浸透圧」の共通点は？","choices":["束一的性質（溶質の種類によらず粒子数に依存）","溶媒の性質","温度のみに依存","圧力のみに依存"],"answer":"束一的性質（溶質の種類によらず粒子数に依存）","explanation":"束一的性質（colligative properties）：沸点上昇・凝固点降下・浸透圧・蒸気圧降下"},{"id":8201,"subject":"化学","difficulty":3,"question":"「MRI（磁気共鳴画像法）」の化学的原理は？","choices":["体内の水分子の¹Hの核スピンを利用した非放射線断層撮影","X線の透過","放射性同位体の崩壊","超音波の反射"],"answer":"体内の水分子の¹Hの核スピンを利用した非放射線断層撮影","explanation":"NMRの医療応用。外部磁場中でのプロトンの緩和時間の差で組織を画像化"},{"id":8202,"subject":"化学","difficulty":3,"question":"「カーボンナノチューブ（CNT）」の特性は？","choices":["金属または半導体の電気特性・高強度・軽量","絶縁体のみ","柔軟性なし","3次元構造"],"answer":"金属または半導体の電気特性・高強度・軽量","explanation":"巻き方（カイラリティ）によって金属的・半導体的性質が変わる。鋼鉄より高強度"},{"id":8203,"subject":"化学","difficulty":3,"question":"「相平衡のギブスの相律」は？","choices":["F＝C−P＋2（F：自由度・C：成分数・P：相数）","F＝C×P","F＝C＋P−2","F＝P/C"],"answer":"F＝C−P＋2（F：自由度・C：成分数・P：相数）","explanation":"ギブスの相律：F（変えられる条件の数）＝C−P＋2。水の三重点：F＝1−3＋2＝0"},{"id":8204,"subject":"化学","difficulty":3,"question":"「ウッドワード・ホフマン則」が予測するのは？","choices":["熱・光反応の立体選択性（軌道対称性から）","収率","反応速度","触媒効果"],"answer":"熱・光反応の立体選択性（軌道対称性から）","explanation":"電子環状反応・シグマトロピー転位・付環化反応の立体選択性を分子軌道の対称性から予測"},{"id":8205,"subject":"化学","difficulty":3,"question":"「マテリアルズ・インフォマティクス（MI）」とは？","choices":["機械学習・AIを使って新材料探索を加速する研究分野","材料の情報のみ収集","材料の分類のみ","材料の価格評価"],"answer":"機械学習・AIを使って新材料探索を加速する研究分野","explanation":"材料科学にデータ科学・AIを融合。膨大な実験データから新材料候補を予測する"},{"id":8206,"subject":"化学","difficulty":1,"question":"「ビウレット反応」で検出できるのは？","choices":["タンパク質（ペプチド結合）","糖","脂質","核酸"],"answer":"タンパク質（ペプチド結合）","explanation":"ビウレット反応：ペプチド結合がCu²⁺と錯体形成→紫色。糖の検出はフェーリング液"},{"id":8207,"subject":"化学","difficulty":1,"question":"「ヨウ素デンプン反応」はなぜ青紫色になる？","choices":["デンプンのらせん状構造の内側にI₂が入り込むため","化学結合が生成するため","酸化還元反応のため","イオン化するため"],"answer":"デンプンのらせん状構造の内側にI₂が入り込むため","explanation":"デンプン（アミロース）はらせん構造を持ち、その内側にI₂分子が包接されて青紫色を呈する"},{"id":8208,"subject":"化学","difficulty":1,"question":"「塩化銀（AgCl）」の特性は？","choices":["白色沈殿・光で黒変（光分解）・水に難溶","可溶","黒色","安定"],"answer":"白色沈殿・光で黒変（光分解）・水に難溶","explanation":"AgCl：Ag⁺＋Cl⁻→AgCl↓（白色）。光→Ag（黒）。これが写真フィルムの原理"},{"id":8209,"subject":"化学","difficulty":1,"question":"「共役二重結合」がある化合物の色は？","choices":["長い共役ほど長波長の光を吸収し着色する","常に無色","短いほど色が濃い","着色と無関係"],"answer":"長い共役ほど長波長の光を吸収し着色する","explanation":"β-カロテン（11重の共役）→橙色。リコペン（13重）→赤色。共役長と色の関係"},{"id":8210,"subject":"化学","difficulty":1,"question":"「ニンヒドリン反応」で検出できるのは？","choices":["アミノ酸（アミノ基）","糖","DNA","タンパク質の二次構造"],"answer":"アミノ酸（アミノ基）","explanation":"ニンヒドリン：アミノ酸のα-アミノ基と反応して青紫色に呈色。タンパク質の加水分解物検出"},{"id":8211,"subject":"化学","difficulty":2,"question":"「ガスクロマトグラフィー（GC）」で分離できるものは？","choices":["揮発性の有機化合物の混合物","タンパク質","金属イオン","無機塩"],"answer":"揮発性の有機化合物の混合物","explanation":"GC：揮発性成分を気体状にして固定相との親和性の差で分離・検出。香料・農薬分析に利用"},{"id":8212,"subject":"化学","difficulty":2,"question":"「標準電極電位E°の基準」は？","choices":["標準水素電極（SHE）：E°＝0V","銅電極：E°＝0V","亜鉛電極：E°＝0V","白金電極：E°＝0V"],"answer":"標準水素電極（SHE）：E°＝0V","explanation":"H₂⇌2H⁺＋2e⁻のE°を0Vと定義。全ての電極電位はSHEとの相対値"},{"id":8213,"subject":"化学","difficulty":2,"question":"「ヘンリーの法則」とは？","choices":["一定温度で気体の溶解量は圧力に比例する","気体の体積は温度に比例する","溶解度は温度に比例する","圧力と体積は反比例"],"answer":"一定温度で気体の溶解量は圧力に比例する","explanation":"ヘンリーの法則：C＝kH×P（kH：ヘンリー定数）。炭酸飲料・潜水病に関連"},{"id":8214,"subject":"化学","difficulty":2,"question":"「ギブズの自由エネルギー（ΔG）」でΔG<0の意味は？","choices":["反応が自発的に進む","反応が進まない","平衡状態","エネルギーが増加"],"answer":"反応が自発的に進む","explanation":"ΔG＝ΔH－TΔS。ΔG＜0：自発反応。ΔG＞0：非自発。ΔG＝0：平衡"},{"id":8215,"subject":"化学","difficulty":2,"question":"「結晶の種類」で融点が最も高いのは？","choices":["共有結合性結晶（ダイヤモンド・SiO₂等）","イオン結晶","金属結晶","分子結晶"],"answer":"共有結合性結晶（ダイヤモンド・SiO₂等）","explanation":"ダイヤモンド：3550℃。共有結合が全方向に強固。分子結晶は分子間力（弱）で低融点"},{"id":8216,"subject":"化学","difficulty":3,"question":"「コンビナトリアルケミストリー」とは？","choices":["多数の化合物を並列合成・高速スクリーニングで効率的に探索する手法","一つの化合物を精密に合成","自然界から化合物を抽出","コンピュータシミュレーションのみ"],"answer":"多数の化合物を並列合成・高速スクリーニングで効率的に探索する手法","explanation":"医薬品・材料探索に利用。数千〜数万の化合物ライブラリから活性化合物を効率的に探索"},{"id":8217,"subject":"化学","difficulty":3,"question":"「超音波化学（sonochemistry）」の原理は？","choices":["超音波によるキャビテーション（気泡の崩壊）で局所的な高温高圧が生じる","音の振動が化学結合を切る","超音波が光として吸収される","磁場効果"],"answer":"超音波によるキャビテーション（気泡の崩壊）で局所的な高温高圧が生じる","explanation":"キャビテーション崩壊時に数千℃・数百気圧が瞬時に生じる。反応促進・ナノ粒子合成に利用"},{"id":8218,"subject":"化学","difficulty":3,"question":"「フロー化学（マイクロリアクター）」の利点は？","choices":["反応の精密制御・安全性向上・スケールアップが容易","バッチ反応より遅い","温度制御困難","危険物を大量に扱う"],"answer":"反応の精密制御・安全性向上・スケールアップが容易","explanation":"フロー化学：連続的に反応液を流す。危険な反応・発熱反応の安全な実施。製薬に応用"},{"id":8219,"subject":"化学","difficulty":3,"question":"「SN1反応」と「SN2反応」の違いは？","choices":["SN1は段階的（カルボカチオン中間体）・SN2は協奏的（ワルデン転位）","SN1は速い・SN2は遅い","どちらも同じ機構","SN1は二次・SN2は一次反応"],"answer":"SN1は段階的（カルボカチオン中間体）・SN2は協奏的（ワルデン転位）","explanation":"SN1：第三級基質で有利・カルボカチオン経由・ラセミ化。SN2：第一級基質で有利・背面攻撃・立体反転"},{"id":8220,"subject":"化学","difficulty":3,"question":"「ハモンドの仮説」とは？","choices":["吸熱的な反応ステップでは遷移状態が生成物に似た構造を取る","発熱反応でも同じ","全ての反応に同様","遷移状態は反応物と同じ"],"answer":"吸熱的な反応ステップでは遷移状態が生成物に似た構造を取る","explanation":"発熱：遷移状態は反応物に近い（early TS）。吸熱：遷移状態は生成物に近い（late TS）"},{"id":8221,"subject":"化学","difficulty":1,"question":"「気体定数R」の値は？","choices":["8.31 J/(mol·K)","6.02×10²³/mol","9.806 m/s²","22.4 L/mol"],"answer":"8.31 J/(mol·K)","explanation":"R＝8.314 J/(mol·K)＝8.314 Pa·m³/(mol·K)。PV＝nRTで使用"},{"id":8222,"subject":"化学","difficulty":1,"question":"「モル（mol）」の基本的な意味は？","choices":["6.02×10²³個の粒子の集まり（アボガドロ定数NA個）","1gに含まれる粒子数","1Lに含まれる粒子数","原子量と同じ"],"answer":"6.02×10²³個の粒子の集まり（アボガドロ定数NA個）","explanation":"1mol＝6.02×10²³個（アボガドロ定数）。12gの炭素12に含まれる原子数を基準に定義"},{"id":8223,"subject":"化学","difficulty":1,"question":"「硫酸（H₂SO₄）」の工業的製法は？","choices":["接触法（SO₂→SO₃→H₂SO₄）","ハーバー法","オストワルト法","ソルベー法"],"answer":"接触法（SO₂→SO₃→H₂SO₄）","explanation":"接触法：V₂O₅触媒でSO₂をSO₃に酸化→発煙硫酸→硫酸。工業化学の基幹プロセス"},{"id":8224,"subject":"化学","difficulty":1,"question":"「炭酸ナトリウム（Na₂CO₃）」の工業的製法は？","choices":["ソルベー法（アンモニアソーダ法）","接触法","ハーバー法","オストワルト法"],"answer":"ソルベー法（アンモニアソーダ法）","explanation":"食塩水にNH₃とCO₂を通してNaHCO₃を析出→加熱でNa₂CO₃。ガラス・石鹸の原料"},{"id":8225,"subject":"化学","difficulty":1,"question":"「アンモニア（NH₃）」の工業的製法は？","choices":["ハーバー・ボッシュ法（N₂＋3H₂→2NH₃）","接触法","ソルベー法","オストワルト法"],"answer":"ハーバー・ボッシュ法（N₂＋3H₂→2NH₃）","explanation":"N₂＋3H₂⇌2NH₃（高温高圧・Fe触媒）。窒素肥料・爆薬の原料。20世紀最大の発明の一つ"},{"id":8226,"subject":"化学","difficulty":2,"question":"「電気陰性度差」が大きいほどどうなる？","choices":["結合の極性（イオン性）が高くなる","共有結合性が高くなる","結合が弱くなる","分子量が大きくなる"],"answer":"結合の極性（イオン性）が高くなる","explanation":"電気陰性度差が大きい→電子が一方に偏る→極性・イオン性が大きい"},{"id":8227,"subject":"化学","difficulty":2,"question":"「アレニウスの式」で活性化エネルギーEaが大きいと？","choices":["反応速度が遅い（kが小さい）","反応速度が速い","温度と無関係","触媒が不要"],"answer":"反応速度が遅い（kが小さい）","explanation":"k＝Ae^(-Ea/RT)。Eaが大きい→e^(-Ea/RT)が小さい→kが小さい→反応が遅い"},{"id":8228,"subject":"化学","difficulty":2,"question":"「pH計算」で0.1mol/LのCH₃COOH（Ka＝1.8×10⁻⁵）のpHは？","choices":["約2.87（弱酸なので部分解離のみ）","1","7","14"],"answer":"約2.87（弱酸なので部分解離のみ）","explanation":"[H⁺]＝√(Ka×C)＝√(1.8×10⁻⁵×0.1)≈1.34×10⁻³。pH＝-log(1.34×10⁻³)≈2.87"},{"id":8229,"subject":"化学","difficulty":2,"question":"「酸化還元」でKMnO₄（酸性）の酸化数変化は？","choices":["Mn:+7→+2（MnO₄⁻→Mn²⁺、5電子受取）","Mn:+7→+4","Mn:+7→0","Mn:+2→+7"],"answer":"Mn:+7→+2（MnO₄⁻→Mn²⁺、5電子受取）","explanation":"酸性条件：MnO₄⁻＋8H⁺＋5e⁻→Mn²⁺＋4H₂O。強力な酸化剤"},{"id":8230,"subject":"化学","difficulty":2,"question":"「金属のイオン化傾向」でAuより左に位置するAgは？","choices":["AgはAuより先にイオン化しやすい（Agはより卑な金属）","AuはAgよりイオン化しやすい","同じ","Agはイオン化しない"],"answer":"AgはAuより先にイオン化しやすい（Agはより卑な金属）","explanation":"イオン化傾向：K>Ca>Na...Zn>Fe>Ni>Sn>Pb>H>Cu>Hg>Ag>Pt>Au"},{"id":8231,"subject":"化学","difficulty":3,"question":"「核磁気共鳴スピン-スピン結合（J結合）」から何がわかる？","choices":["結合している原子数・立体化学（ヴィシナル結合定数等）","電子密度","分子量","官能基の種類のみ"],"answer":"結合している原子数・立体化学（ヴィシナル結合定数等）","explanation":"3J（ヴィシナル）はHH間の二面角に依存（カープラス方程式）。立体配置決定に利用"},{"id":8232,"subject":"化学","difficulty":3,"question":"「エントロピー（S）」の意味は？","choices":["系の乱雑さ・無秩序さの指標（熱力学第二法則：自発変化でΔS宇宙≥0）","系のエネルギー","系の温度","系の体積"],"answer":"系の乱雑さ・無秩序さの指標（熱力学第二法則：自発変化でΔS宇宙≥0）","explanation":"ΔS＝q_rev/T。自発変化では宇宙全体のエントロピーが増大する"},{"id":8233,"subject":"化学","difficulty":3,"question":"「触媒設計の火山型プロット（volcano plot）」とは？","choices":["触媒の活性と吸着エネルギーの関係が火山型（最適点がある）","触媒の形状","反応温度と収率の関係","pH依存性"],"answer":"触媒の活性と吸着エネルギーの関係が火山型（最適点がある）","explanation":"吸着が弱すぎ→反応物が吸着できない。吸着が強すぎ→生成物が脱着できない。最適値が存在"},{"id":8234,"subject":"化学","difficulty":3,"question":"「グリニャール試薬（RMgX）」の用途は？","choices":["炭素-炭素結合形成（カルボニル化合物への求核付加）","酸化","還元のみ","触媒"],"answer":"炭素-炭素結合形成（カルボニル化合物への求核付加）","explanation":"RMgX：強力な求核剤・塩基。アルデヒド・ケトン・CO₂と反応して炭素骨格を伸長"},{"id":8235,"subject":"化学","difficulty":3,"question":"「水素結合の強さ」でO-H···O ≈ N-H···O > C-H···O の順の理由は？","choices":["O・Nの電気陰性度が大きくH⁺性が強い・Cは電気陰性度が低い","分子量の違い","原子半径の違い","溶解度の違い"],"answer":"O・Nの電気陰性度が大きくH⁺性が強い・Cは電気陰性度が低い","explanation":"水素結合の強さ：電気陰性度が大きい原子に結合したHほど強い。O-H・N-H>C-H"},{"id":8236,"subject":"化学","difficulty":1,"question":"「フラーレン（C₆₀）」の形は？","choices":["サッカーボール型（20個の正六角形と12個の正五角形）","正四面体","平面六角形","直鎖状"],"answer":"サッカーボール型（20個の正六角形と12個の正五角形）","explanation":"C₆₀（バックミンスターフラーレン）：sp²炭素60個が球状に配列。1985年発見・ノーベル賞"},{"id":8237,"subject":"化学","difficulty":1,"question":"「半透膜」を使う実験・現象は？","choices":["浸透圧・透析・逆浸透","蒸留","昇華","溶融"],"answer":"浸透圧・透析・逆浸透","explanation":"半透膜：溶媒分子は通過できるが溶質分子は通過できない膜。人工腎臓・水処理に利用"},{"id":8238,"subject":"化学","difficulty":1,"question":"「酸解離定数Ka」の大小と酸の強さの関係は？","choices":["Kaが大きいほど強酸（より多く解離する）","Kaが小さいほど強酸","Kaと酸の強さは無関係","Kaは酸の種類で変わらない"],"answer":"Kaが大きいほど強酸（より多く解離する）","explanation":"Ka＝[H⁺][A⁻]/[HA]。Ka大→解離度大→強酸。HClは完全解離（Ka→∞）・酢酸Ka＝1.8×10⁻⁵"},{"id":8239,"subject":"化学","difficulty":1,"question":"「燃料電池」のエネルギー変換は？","choices":["化学エネルギーを直接電気エネルギーに変換","熱→電気","機械エネルギー→電気","光→電気"],"answer":"化学エネルギーを直接電気エネルギーに変換","explanation":"燃料電池：H₂＋O₂→H₂O（反応の化学エネルギーを直接電気に変換）。熱機関より高効率"},{"id":8240,"subject":"化学","difficulty":1,"question":"「元素分析」でC・H・Nの定量に使う方法は？","choices":["有機元素分析（燃焼法）・CO₂とH₂Oを捕集定量","スペクトル分析","電気分解","沈殿法"],"answer":"有機元素分析（燃焼法）・CO₂とH₂Oを捕集定量","explanation":"有機物を完全燃焼→CO₂（C定量）・H₂O（H定量）を捕集。Nは別法で定量"},{"id":8241,"subject":"化学","difficulty":2,"question":"「配位結合」の特徴は？","choices":["一方の原子が電子対を提供して形成する共有結合（錯体・NH₄⁺等）","イオン間の結合","金属原子間の結合","水素結合の一種"],"answer":"一方の原子が電子対を提供して形成する共有結合（錯体・NH₄⁺等）","explanation":"配位結合：電子対供与体（ルイス塩基）が一方的に電子対を提供。錯体・NH₄⁺の形成など"},{"id":8242,"subject":"化学","difficulty":2,"question":"「理想溶液（ラウールの法則）」とは？","choices":["蒸気圧は各成分のモル分率に比例する（PA＝xA×PA°）","溶質の量に無関係","温度に無関係","濃度に無関係"],"answer":"蒸気圧は各成分のモル分率に比例する（PA＝xA×PA°）","explanation":"ラウールの法則：PA＝xA×PA°（理想溶液）。実際の溶液は正・負の偏差を示す"},{"id":8243,"subject":"化学","difficulty":2,"question":"「ルシャトリエの原理」で濃度を増やした場合は？","choices":["その物質を消費する方向に平衡が移動する","関係ない","濃度を増やした方向に移動","温度が上がる"],"answer":"その物質を消費する方向に平衡が移動する","explanation":"N₂＋3H₂⇌2NH₃でN₂を増やす→右（NH₃生成）方向に移動してN₂を消費"},{"id":8244,"subject":"化学","difficulty":2,"question":"「水素（H₂）」の実験室での製法は？","choices":["亜鉛（Zn）に希硫酸または希塩酸を反応させる","水の電気分解のみ","Na＋水","炭素の還元"],"answer":"亜鉛（Zn）に希硫酸または希塩酸を反応させる","explanation":"Zn＋H₂SO₄→ZnSO₄＋H₂↑。工業的には水蒸気改質（CH₄＋H₂O→CO＋3H₂）が主流"},{"id":8245,"subject":"化学","difficulty":2,"question":"「銅（Cu）が希硝酸と反応」すると何が発生する？","choices":["NO（一酸化窒素）","NO₂","H₂","O₂"],"answer":"NO（一酸化窒素）","explanation":"希硝酸：3Cu＋8HNO₃→3Cu(NO₃)₂＋4H₂O＋2NO↑。濃硝酸：Cu＋4HNO₃→2NO₂↑"},{"id":8246,"subject":"化学","difficulty":3,"question":"「核融合」で最も研究されている反応は？","choices":["D（重水素）＋T（三重水素）→He＋n（DT反応）","H＋H→He","U→Ba＋Kr（核分裂）","C＋O→CO₂"],"answer":"D（重水素）＋T（三重水素）→He＋n（DT反応）","explanation":"DT反応：最も低い温度（1億℃程度）で点火できる核融合反応。ITER（国際熱核融合実験炉）で研究"},{"id":8247,"subject":"化学","difficulty":3,"question":"「光合成の明反応・暗反応」の場所は？","choices":["明反応：チラコイド膜・暗反応：ストロマ","どちらもチラコイド","どちらもストロマ","葉緑体の外"],"answer":"明反応：チラコイド膜・暗反応：ストロマ","explanation":"明反応：光エネルギー→ATP・NADPH。暗反応（カルビン回路）：CO₂固定→糖"},{"id":8248,"subject":"化学","difficulty":3,"question":"「核磁気共鳴（¹³C NMR）」で検出するのは？","choices":["炭素骨格の種類と数（ただし天然存在比1.1%で感度低）","水素のみ","窒素のみ","全原子"],"answer":"炭素骨格の種類と数（ただし天然存在比1.1%で感度低）","explanation":"¹³C NMR：各炭素の化学的環境を反映したシグナル。炭素骨格の決定に重要"},{"id":8249,"subject":"化学","difficulty":3,"question":"「アレニウスの酸塩基」「ブレンステッドの酸塩基」「ルイスの酸塩基」の広さの順は？","choices":["ルイス>ブレンステッド>アレニウス（概念の広さ）","どれも同じ","アレニウスが最広","ブレンステッドが最広"],"answer":"ルイス>ブレンステッド>アレニウス（概念の広さ）","explanation":"アレニウス（水溶液のH⁺/OH⁻）→ブレンステッド（プロトン授受）→ルイス（電子対の授受）の順に広い"},{"id":8250,"subject":"化学","difficulty":3,"question":"「バイオマス（生物資源）」からのエタノール合成は？","choices":["セルロース・デンプンを糖化し酵母で発酵→エタノール","石油から合成","水の電気分解","CO₂から光合成"],"answer":"セルロース・デンプンを糖化し酵母で発酵→エタノール","explanation":"バイオエタノール：植物由来の糖をC₂H₅OH（エタノール）に発酵。カーボンニュートラル燃料"},{"id":8251,"subject":"化学","difficulty":1,"question":"「フェーリング液」の色変化でわかることは？","choices":["青色→赤色沈殿でアルデヒド（還元糖）を検出","青→緑でタンパク質を検出","赤→青で酸を検出","無色→黄でケトンを検出"],"answer":"青色→赤色沈殿でアルデヒド（還元糖）を検出","explanation":"フェーリング液（Cu²⁺含む青色液）がアルデヒドで還元されCu₂O（赤色沈殿）を生成"},{"id":8252,"subject":"化学","difficulty":1,"question":"「モル質量」の求め方は？","choices":["各元素の原子量×原子数の合計（g/mol）","質量÷モル数","密度×体積","分子量のみ"],"answer":"各元素の原子量×原子数の合計（g/mol)","explanation":"H₂O：H(1)×2+O(16)×1=18g/mol。モル質量（g/mol）＝分子量の数値に単位g/molをつけたもの"},{"id":8253,"subject":"化学","difficulty":1,"question":"「空気の組成」で最も多い気体は？","choices":["窒素（N₂）約78%","酸素（O₂）約21%","二酸化炭素（CO₂）","アルゴン（Ar）"],"answer":"窒素（N₂）約78%","explanation":"空気の組成：N₂約78%・O₂約21%・Ar約0.93%・CO₂約0.04%。"},{"id":8254,"subject":"化学","difficulty":1,"question":"「アミノ酸のペプチド結合」はどこで形成される？","choices":["一方のアミノ基（-NH₂）と他方のカルボキシル基（-COOH）の間","2つのアミノ基の間","2つのカルボキシル基の間","側鎖同士"],"answer":"一方のアミノ基（-NH₂）と他方のカルボキシル基（-COOH）の間","explanation":"ペプチド結合（-CO-NH-）：アミノ酸の縮合重合（H₂Oが脱離）で形成"},{"id":8255,"subject":"化学","difficulty":1,"question":"「ヘスの法則」の実用例は？","choices":["直接測定困難な反応熱を間接的に計算する","反応速度の計算","触媒の効果を予測する","平衡定数の計算"],"answer":"直接測定困難な反応熱を間接的に計算する","explanation":"ΔH＝ΔH₁＋ΔH₂＋...。反応経路が変わっても始終状態が同じならΔHは等しい"},{"id":8256,"subject":"化学","difficulty":2,"question":"「錯体の配位数」とは？","choices":["中心金属に配位する原子の数","配位子の分子量","中心金属の酸化数","反応速度"],"answer":"中心金属に配位する原子の数","explanation":"配位数：Feヘムは6配位（N×4＋軸配位子×2）・[Cu(NH₃)₄]²⁺は4配位"},{"id":8257,"subject":"化学","difficulty":2,"question":"「ネルンストの式」とは？","choices":["非標準条件での電極電位を濃度から計算する式（E＝E°－RT/nF×lnQ）","エントロピーの計算","平衡定数の計算","反応速度の計算"],"answer":"非標準条件での電極電位を濃度から計算する式（E＝E°－RT/nF×lnQ）","explanation":"ネルンスト式：実際の濃度・圧力条件での電池電圧を計算。生体内の膜電位計算にも利用"},{"id":8258,"subject":"化学","difficulty":2,"question":"「沈殿生成反応」でAgNO₃とNaClを混ぜると？","choices":["AgCl（白色沈殿）が生成する","溶液が青色になる","気体が発生する","変化しない"],"answer":"AgCl（白色沈殿）が生成する","explanation":"Ag⁺＋Cl⁻→AgCl↓（白色・難溶性）。沈殿が生成する条件：イオン濃度の積>Ksp"},{"id":8259,"subject":"化学","difficulty":2,"question":"「芳香族カルボン酸」の例と性質は？","choices":["安息香酸（C₆H₅COOH）：弱酸・水に難溶・昇華性","ギ酸（HCOOH）","酢酸（CH₃COOH）","シュウ酸（HOOCCOOH）"],"answer":"安息香酸（C₆H₅COOH）：弱酸・水に難溶・昇華性","explanation":"安息香酸：ベンゼン環＋COOH。食品防腐剤として使用。芳香族は脂肪族より酸性が強い"},{"id":8260,"subject":"化学","difficulty":2,"question":"「触媒の活性化エネルギー」への影響は？","choices":["活性化エネルギーを下げて反応速度を上げる（正・逆両方）","活性化エネルギーを上げる","反応熱（ΔH）を変える","平衡定数Kを変える"],"answer":"活性化エネルギーを下げて反応速度を上げる（正・逆両方）","explanation":"触媒はEaを下げて正・逆反応を等しく加速する。ΔHとKは変えない"},{"id":8261,"subject":"化学","difficulty":3,"question":"「X線結晶構造解析」の原理は？","choices":["結晶中の原子配列によるX線の回折パターンを解析して構造を決定","X線の吸収のみを利用","電子顕微鏡と同じ","NMRと同じ原理"],"answer":"結晶中の原子配列によるX線の回折パターンを解析して構造を決定","explanation":"ブラッグの法則：2dsinθ＝nλ。タンパク質・薬分子の3D構造決定に不可欠"},{"id":8262,"subject":"化学","difficulty":3,"question":"「有機合成の全合成（total synthesis）」とは？","choices":["複雑な天然物を出発原料から化学的に合成すること","部分的な合成","生合成経路の研究","コンピュータシミュレーション"],"answer":"複雑な天然物を出発原料から化学的に合成すること","explanation":"Woodwardのコレステロール・ビタミンB12合成等。有機化学の最高峰。逆合成分析が重要"},{"id":8263,"subject":"化学","difficulty":3,"question":"「アトム・エコノミー（原子効率）」とは？","choices":["目的生成物の分子量÷全反応物の分子量×100%（廃棄物ゼロが理想）","収率","反応速度","エネルギー効率"],"answer":"目的生成物の分子量÷全反応物の分子量×100%（廃棄物ゼロが理想）","explanation":"グリーンケミストリーの指標。付加反応はアトムエコノミー100%・置換反応は低い"},{"id":8264,"subject":"化学","difficulty":3,"question":"「ドーピング（半導体）」とは？","choices":["純粋な半導体に不純物を添加してキャリア密度を制御すること","汚染のこと","触媒の添加","医薬品添加"],"answer":"純粋な半導体に不純物を添加してキャリア密度を制御すること","explanation":"n型：V族元素（P・As）添加→電子過剰。p型：III族元素（B）添加→正孔過剰"},{"id":8265,"subject":"化学","difficulty":3,"question":"「均一系触媒」の例は？","choices":["酸・塩基触媒・錯体触媒（反応物と同一相）","白金触媒（固体）","Fe触媒（固体）","ゼオライト（固体）"],"answer":"酸・塩基触媒・錯体触媒（反応物と同一相）","explanation":"均一系：触媒と反応物が同一相（通常液相）。不均一系：異なる相（固体触媒等）"},{"id":8266,"subject":"化学","difficulty":1,"question":"「分子の極性」を決めるのは？","choices":["結合の極性＋分子の形（対称性）","電気陰性度のみ","分子量","結合の種類"],"answer":"結合の極性＋分子の形（対称性）","explanation":"CO₂は極性結合があるが直線形で対称→無極性。H₂Oは折れ線形→極性あり"},{"id":8267,"subject":"化学","difficulty":1,"question":"「ダイヤモンドと黒鉛（グラファイト）」で電気を通すのは？","choices":["黒鉛のみ（自由電子としてのπ電子がある）","ダイヤモンドのみ","両方","どちらも通さない"],"answer":"黒鉛のみ（自由電子としてのπ電子がある）","explanation":"黒鉛：sp²炭素の層状構造。非局在化したπ電子が層内を自由に移動→電気伝導性あり"},{"id":8268,"subject":"化学","difficulty":1,"question":"「化学式と組成式」の違いは？","choices":["組成式は最も簡単な整数比（NaCl・CuO等）・化学式は実際の分子の組成（H₂O・C₆H₁₂O₆等）","同じ","組成式は液体・化学式は気体","どちらも分子式"],"answer":"組成式は最も簡単な整数比（NaCl・CuO等）・化学式は実際の分子の組成（H₂O・C₆H₁₂O₆等）","explanation":"イオン結晶はNaCl（組成式）。共有結合分子は分子式（H₂O・CH₄等）"},{"id":8269,"subject":"化学","difficulty":1,"question":"「酸性雨」の主な原因物質は？","choices":["二酸化硫黄（SO₂）・窒素酸化物（NOx）","二酸化炭素（CO₂）","フロンガス","メタン（CH₄）"],"answer":"二酸化硫黄（SO₂）・窒素酸化物（NOx）","explanation":"工場・自動車から排出されるSO₂・NOxが大気中で硫酸・硝酸になり雨に溶けて酸性雨に"},{"id":8270,"subject":"化学","difficulty":1,"question":"「オゾン層を破壊する物質」は？","choices":["フロン（CFC：クロロフルオロカーボン）","CO₂","SO₂","N₂"],"answer":"フロン（CFC：クロロフルオロカーボン）","explanation":"CFCが成層圏でUVにより分解→Cl原子が触媒的にO₃を破壊。モントリオール議定書で規制"},{"id":8271,"subject":"化学","difficulty":2,"question":"「アスピリン（アセチルサリチル酸）」の合成は？","choices":["サリチル酸＋無水酢酸→アスピリン＋酢酸","サリチル酸＋エタノール","サリチル酸＋NaOH","フェノール＋CO₂"],"answer":"サリチル酸＋無水酢酸→アスピリン＋酢酸","explanation":"サリチル酸のOH基をアセチル化。解熱・鎮痛・抗血小板作用。医薬品化学の古典"},{"id":8272,"subject":"化学","difficulty":2,"question":"「エステルの水解」で酸と塩基の場合の違いは？","choices":["酸加水分解は可逆・塩基加水分解（ケン化）は不可逆（カルボン酸塩が生成）","どちらも可逆","どちらも不可逆","速度の違いのみ"],"answer":"酸加水分解は可逆・塩基加水分解（ケン化）は不可逆（カルボン酸塩が生成）","explanation":"塩基存在下：生成したカルボン酸がすぐ塩になるため反応が不可逆的に進む"},{"id":8273,"subject":"化学","difficulty":2,"question":"「食品保存」に使われる化学物質の例は？","choices":["安息香酸ナトリウム・ソルビン酸・亜硝酸ナトリウム・食塩","砂糖のみ","塩酸","NaOH"],"answer":"安息香酸ナトリウム・ソルビン酸・亜硝酸ナトリウム・食塩","explanation":"食品添加物：抗菌・酸化防止・発色剤として使用。安息香酸は飲料・ソルビン酸は清物"},{"id":8274,"subject":"化学","difficulty":2,"question":"「半減期（t₁/₂）」の定義は？","choices":["放射性核種の量が半分になる時間（一次反応で一定）","全量が半分になる時間","反応速度が半分になる時間","触媒量が半分になる時間"],"answer":"放射性核種の量が半分になる時間（一次反応で一定）","explanation":"t₁/₂＝ln2/k（一次反応）。炭素14のt₁/₂＝5730年→放射性炭素年代測定に利用"},{"id":8275,"subject":"化学","difficulty":2,"question":"「分子の平均運動エネルギー」と「温度」の関係は？","choices":["温度（絶対温度）に比例する（E＝3/2kT）","温度に反比例","温度の二乗に比例","関係ない"],"answer":"温度（絶対温度）に比例する（E＝3/2kT）","explanation":"気体分子の平均並進運動エネルギー＝(3/2)kBT（kB：ボルツマン定数）"},{"id":8276,"subject":"化学","difficulty":3,"question":"「ソフトとハードの酸塩基（HSAB理論）」とは？","choices":["硬い酸は硬い塩基と・柔らかい酸は柔らかい塩基と強く結合する","すべての酸塩基反応","強酸・強塩基のみ","中和反応のみ"],"answer":"硬い酸は硬い塩基と・柔らかい酸は柔らかい塩基と強く結合する","explanation":"Pearson：硬い（小さく電荷密度高）/柔らかい（大きく分極しやすい）で反応性を予測"},{"id":8277,"subject":"化学","difficulty":3,"question":"「コールターカウンター（電気的抵抗法）」の用途は？","choices":["粒子（細胞・コロイド）のサイズと数の計測","分光分析","元素分析","熱分析"],"answer":"粒子（細胞・コロイド）のサイズと数の計測","explanation":"電解液中の微粒子通過による電気抵抗変化で粒子サイズと数を測定。血球計測に利用"},{"id":8278,"subject":"化学","difficulty":3,"question":"「光電子分光法（XPS/ESCA）」で何がわかる？","choices":["表面元素組成・化学状態（酸化数・結合状態）","分子量","粘度","融点"],"answer":"表面元素組成・化学状態（酸化数・結合状態）","explanation":"X線照射で放出される光電子のエネルギーから表面5〜10nmの元素組成・化学状態を分析"},{"id":8279,"subject":"化学","difficulty":3,"question":"「熱分析（TGA・DSC）」で測定できるものは？","choices":["熱重量変化（TGA）・吸発熱変化（DSC）・融点・分解温度・相転移","分子量","元素組成","分子構造"],"answer":"熱重量変化（TGA）・吸発熱変化（DSC）・融点・分解温度・相転移","explanation":"TGA（熱重量分析）：温度vs質量変化。DSC（示差走査熱量計）：温度vs熱流"},{"id":8280,"subject":"化学","difficulty":3,"question":"「走査電子顕微鏡（SEM）」と「透過型電子顕微鏡（TEM）」の違いは？","choices":["SEM：表面形状を3D的に観察・TEM：内部構造・原子配列を観察","どちらも同じ","SEMが高分解能","TEMが表面観察"],"answer":"SEM：表面形状を3D的に観察・TEM：内部構造・原子配列を観察","explanation":"SEM：nm〜μmの表面形態。TEM：0.1nm以下の内部構造（原子分解能）"},{"id":8281,"subject":"化学","difficulty":1,"question":"「水素イオン指数（pH）」の定義は？","choices":["pH＝−log[H⁺]（水素イオン濃度の負の常用対数）","pH＝[H⁺]×10","pH＝[OH⁻]÷[H⁺]","pH＝log[H⁺]"],"answer":"pH＝−log[H⁺]（水素イオン濃度の負の常用対数）" s":["塩基・リン酸・糖（デオキシリボース/リボース）","アミノ酸","脂肪酸","単糖のみ"],"answer":"塩基・リン酸・糖（デオキシリボース/リボース）","explanation":"ヌクレオチド＝塩基＋糖＋リン酸。DNA：デオキシリボース＋ATGC。RNA：リボース＋AUGC"},{"id":8299,"subject":"化学","difficulty":1,"question":"「熱化学方程式」でΔHの符号の意味は？","choices":["ΔH<0：発熱反応（エネルギーを放出）・ΔH>0：吸熱反応（エネルギーを吸収）","ΔH<0が吸熱","符号と無関係","常にΔH>0"],"answer":"ΔH<0：発熱反応（エネルギーを放出）・ΔH>0：吸熱反応（エネルギーを吸収）","explanation":"CH₄＋2O₂→CO₂＋2H₂O ΔH＝-890kJ/mol（燃焼・発熱反応）"},{"id":8300,"subject":"化学","difficulty":1,"question":"「有効数字」の規則で「0.0350」の有効数字の数は？","choices":["3桁","4桁","2桁","5桁"],"answer":"3桁","explanation":"0.0350：先頭のゼロは有効でない（位取り）。3・5・0（末尾の0は有効）の3桁"}];

const JH_CONFIG={
  算数:{color:"#FF6B6B",icon:"🔢"},
  国語:{color:"#4ECDC4",icon:"📖"},
  社会:{color:"#FFD93D",icon:"🗾"},
  理科:{color:"#A29BFE",icon:"🔬"}
};
const UNI_CONFIG={
  英単語:{color:"#FF8C42",icon:"📝"},
  英熟語:{color:"#6C5CE7",icon:"🔗"},
  英文法:{color:"#00B894",icon:"✏️"},
  化学:{color:"#E17055",icon:"⚗️"}
};
const DIFF_LABEL={1:"基本",2:"標準",3:"発展"};
const DIFF_COLOR={1:"#4ECDC4",2:"#FFD93D",3:"#FF6B6B"};

// State
let state={
  appMode:loadS("appMode",null),
  screen:"home",
  selSubj:"すべて",
  questions:[],
  current:0,
  selected:null,
  answered:false,
  results:[],
  reviewBox:loadS("reviewBox_v2",{}),
  streak:loadS("streak_v2",{jh:0,uni:0}),
  stats:loadS("stats_v2",{})
};

function loadS(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}
function saveS(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

function getConfig(){return state.appMode==="jh"?JH_CONFIG:UNI_CONFIG;}
function getBank(){return state.appMode==="jh"?JH_QUESTIONS:UNI_QUESTIONS;}
function getModeKey(){return state.appMode||"jh";}
function getModeReview(){return state.reviewBox[getModeKey()]||[];}
function getModeStreak(){return state.streak[getModeKey()]||0;}

function getAdaptiveDiff(subj){
  const s=state.stats[subj];
  if(!s||s.total<3)return 2;
  const r=s.correct/s.total;
  return r>=0.8?3:r>=0.5?2:1;
}

function pickQuestions(subjectFilter,count){
  const BANK=getBank();
  const CONFIG=getConfig();
  const pickSubj=(subj,n)=>{
    const diff=getAdaptiveDiff(subj);
    const pool=BANK.filter(q=>q.subject===subj);
    const byDiff=pool.filter(q=>q.difficulty===diff);
    const src=byDiff.length>=n?byDiff:pool;
    return [...src].sort(()=>Math.random()-0.5).slice(0,n);
  };
  if(subjectFilter==="すべて"){
    const subjects=Object.keys(CONFIG);
    const n=Math.ceil(count/subjects.length);
    return subjects.flatMap(s=>pickSubj(s,n)).sort(()=>Math.random()-0.5).slice(0,count);
  }
  return pickSubj(subjectFilter,count);
}

function startQuiz(subj){
  state.selSubj=subj;
  state.questions=pickQuestions(subj,10);
  state.current=0;state.selected=null;state.answered=false;state.results=[];
  state.screen="quiz";
  render();
}

function startReview(){
  const review=getModeReview();
  if(!review.length)return;
  const BANK=getBank();
  const ids=review.map(r=>r.id);
  state.questions=BANK.filter(q=>ids.includes(q.id)).sort(()=>Math.random()-0.5);
  state.current=0;state.selected=null;state.answered=false;state.results=[];
  state.screen="quiz";
  render();
}

function handleChoice(c){
  if(state.answered)return;
  state.selected=c;state.answered=true;
  render();
}

function handleNext(){
  const q=state.questions[state.current];
  const ok=state.selected===q.answer;
  state.results=[...state.results,{...q,userAnswer:state.selected,correct:ok}];
  // stats
  if(!state.stats[q.subject])state.stats[q.subject]={correct:0,total:0};
  state.stats[q.subject].total++;
  if(ok)state.stats[q.subject].correct++;
  saveS("stats_v2",state.stats);
  // review box
  const mk=getModeKey();
  const box=[...(state.reviewBox[mk]||[])];
  if(!ok&&!box.find(r=>r.id===q.id)){box.push({id:q.id,count:0});}
  else if(ok){
    const idx=box.findIndex(r=>r.id===q.id);
    if(idx>=0){box[idx]={...box[idx],count:(box[idx].count||0)+1};if(box[idx].count>=2)box.splice(idx,1);}
  }
  state.reviewBox[mk]=box;
  saveS("reviewBox_v2",state.reviewBox);
  if(state.current+1<state.questions.length){
    state.current++;state.selected=null;state.answered=false;
  }else{
    state.streak[mk]=(state.streak[mk]||0)+1;
    saveS("streak_v2",state.streak);
    state.screen="result";
  }
  render();
}

function setMode(mode){
  state.appMode=mode;
  state.screen="home";
  saveS("appMode",mode);
  render();
}

function goHome(){state.screen="home";render();}
function goModeSelect(){state.appMode=null;saveS("appMode",null);render();}

// ===== RENDER =====
function el(tag,attrs,children){
  const e=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")e.className=v;
    else e.setAttribute(k,v);
  });
  if(children){
    (Array.isArray(children)?children:[children]).forEach(c=>{
      if(c==null)return;
      e.appendChild(typeof c==="string"?document.createTextNode(c):c);
    });
  }
  return e;
}

function render(){
  const app=document.getElementById("app");
  app.innerHTML="";

  if(!state.appMode){app.appendChild(renderModeSelect());return;}
  if(state.screen==="home"){app.appendChild(renderHome());return;}
  if(state.screen==="quiz"){app.appendChild(renderQuiz());return;}
  if(state.screen==="result"){app.appendChild(renderResult());return;}
}

function renderModeSelect(){
  const wrap=el("div",{style:{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"20px 16px"}});
  wrap.appendChild(el("div",{style:{textAlign:"center",marginBottom:"40px"}},[
    el("div",{style:{fontSize:"60px",marginBottom:"8px"}},"🎓"),
    el("div",{style:{fontFamily:"'Fredoka One',cursive",fontSize:"32px",background:"linear-gradient(90deg,#FFD93D,#FF6B6B,#A29BFE)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:"6px"}},"Study App"),
    el("div",{style:{color:"#666",fontSize:"13px"}},"学習モードを選んでください")
  ]));
  const cards=el("div",{style:{display:"flex",flexDirection:"column",gap:"16px",width:"100%",maxWidth:"380px"}});
  const mkCard=(mode,emoji,label,sub,cnt,grad,border,textColor)=>{
    const btn=el("button",{style:{background:grad,border:`2px solid ${border}`,borderRadius:"20px",padding:"24px 20px",cursor:"pointer",textAlign:"left",width:"100%"},onClick:()=>setMode(mode)},[
      el("div",{style:{fontSize:"32px",marginBottom:"8px"}},emoji),
      el("div",{style:{fontWeight:"900",fontSize:"20px",color:textColor,marginBottom:"4px"}},label),
      el("div",{style:{fontSize:"12px",color:"#aaa"}},sub),
      el("div",{style:{fontSize:"11px",color:"#666",marginTop:"2px"}},cnt)
    ]);
    return btn;
  };
  cards.appendChild(mkCard("jh","🏫","中学受験","算数・国語・社会・理科","全600問","linear-gradient(135deg,#FF6B6B22,#FFD93D22)","#FFD93D88","#FFD93D"));
  cards.appendChild(mkCard("uni","🎓","大学受験","英単語・英熟語・英文法・化学","全1200問","linear-gradient(135deg,#6C5CE722,#00B89422)","#6C5CE788","#6C5CE7"));
  wrap.appendChild(cards);
  return wrap;
}

function renderHome(){
  const CONFIG=getConfig();
  const BANK=getBank();
  const mk=getModeKey();
  const modeLabel=mk==="jh"?"中学受験":"大学受験";
  const modeColor=mk==="jh"?"#FFD93D":"#6C5CE7";
  const review=getModeReview();
  const streak=getModeStreak();

  const wrap=el("div",{className:"screen",style:{paddingTop:"20px"}});

  // ヘッダー
  const hdr=el("div",{style:{display:"flex",alignItems:"center",gap:"10px",marginBottom:"20px",width:"100%"}});
  const backBtn=el("button",{style:{background:"rgba(255,255,255,0.08)",border:"none",borderRadius:"99px",padding:"6px 14px",color:"#aaa",fontSize:"12px"},onClick:goModeSelect},"← 戻る");
  hdr.appendChild(backBtn);
  hdr.appendChild(el("span",{style:{color:modeColor,fontWeight:"700",fontSize:"16px"}},modeLabel));
  wrap.appendChild(hdr);

  // タイトル
  wrap.appendChild(el("div",{style:{textAlign:"center",marginBottom:"20px"}},[
    el("div",{style:{fontSize:"44px"}},mk==="jh"?"🏫":"🎓"),
    el("div",{style:{fontFamily:"'Fredoka One',cursive",fontSize:"28px",background:"linear-gradient(90deg,#FFD93D,#FF6B6B,#A29BFE)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginTop:"4px"}},"今日の10問"),
    el("div",{style:{color:"#666",fontSize:"11px",marginTop:"4px"}},`${BANK.length}問収録`)
  ]));

  // 連続記録
  wrap.appendChild(el("div",{style:{background:"rgba(255,255,255,0.05)",borderRadius:"14px",padding:"8px 32px",marginBottom:"20px",textAlign:"center"}},[
    el("div",{style:{fontSize:"11px",color:"#666"}},"🔥 連続学習"),
    el("div",{},[
      el("span",{style:{fontSize:"34px",fontWeight:"900",color:"#FFD93D"}},String(streak)),
      el("span",{style:{fontSize:"13px",color:"#555"}},"日")
    ])
  ]));

  // 科目カード
  const grid=el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",width:"100%",maxWidth:"380px",marginBottom:"20px"}});
  Object.entries(CONFIG).forEach(([subj,cfg])=>{
    const s=state.stats[subj];
    const rate=s?.total>0?Math.round(s.correct/s.total*100):null;
    const diff=getAdaptiveDiff(subj);
    const cnt=BANK.filter(q=>q.subject===subj).length;
    const card=el("div",{style:{background:cfg.color+"15",border:`1.5px solid ${cfg.color}44`,borderRadius:"14px",padding:"12px 14px",cursor:"pointer"},onClick:()=>startQuiz(subj)},[
      el("div",{style:{fontSize:"24px"}},cfg.icon),
      el("div",{style:{fontWeight:"700",fontSize:"14px",color:cfg.color,margin:"4px 0 2px"}},subj),
      el("span",{style:{fontSize:"11px",color:DIFF_COLOR[diff],background:DIFF_COLOR[diff]+"22",borderRadius:"99px",padding:"2px 8px"}},DIFF_LABEL[diff]),
      el("div",{style:{fontSize:"10px",color:"#555",marginTop:"3px"}},`${cnt}問`),
    ]);
    if(rate!==null)card.appendChild(el("div",{style:{fontSize:"11px",color:"#666"}},`正解率 ${rate}%`));
    grid.appendChild(card);
  });
  wrap.appendChild(grid);

  // ボタン
  const startBtn=el("button",{style:{background:"linear-gradient(90deg,#FF6B6B,#FFD93D)",border:"none",borderRadius:"999px",padding:"15px 0",fontSize:"16px",fontWeight:"700",color:"white",width:"100%",maxWidth:"420px"},onClick:()=>startQuiz("すべて")},"▶ 今日の10問スタート（全科目）");
  wrap.appendChild(startBtn);

  if(review.length>0){
    const revBtn=el("button",{style:{background:"rgba(162,155,254,0.12)",border:"2px solid #A29BFE",borderRadius:"999px",padding:"12px 0",fontSize:"14px",fontWeight:"700",color:"#A29BFE",width:"100%",maxWidth:"420px",marginTop:"10px"},onClick:startReview},`📝 間違い復習（${review.length}問）`);
    wrap.appendChild(revBtn);
  }

  wrap.appendChild(el("p",{style:{color:"#444",fontSize:"11px",marginTop:"16px",textAlign:"center"}},"科目カードをタップすると科目別練習ができます"));
  return wrap;
}

function renderQuiz(){
  const q=state.questions[state.current];
  if(!q)return el("div",{},"");
  const CONFIG=getConfig();
  const cfg=CONFIG[q.subject]||{color:"#888",icon:"❓"};
  const isOk=state.answered&&state.selected===q.answer;
  const wrap=el("div",{className:"screen",style:{paddingTop:"20px"}});

  // プログレスバー
  const pbar=el("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"14px",width:"100%"}});
  pbar.appendChild(el("button",{style:{background:"rgba(255,255,255,0.08)",border:"none",borderRadius:"99px",padding:"6px 14px",color:"#aaa",fontSize:"12px"},onClick:goHome},"← 戻る"));
  const track=el("div",{style:{flex:"1",background:"rgba(255,255,255,0.08)",borderRadius:"99px",height:"7px"}});
  const fill=el("div",{style:{background:`linear-gradient(90deg,${cfg.color},#A29BFE)`,borderRadius:"99px",height:"7px",width:`${((state.current+1)/state.questions.length)*100}%`,transition:"width 0.4s"}});
  track.appendChild(fill);
  pbar.appendChild(track);
  pbar.appendChild(el("span",{style:{fontSize:"12px",color:"#666"}},`${state.current+1}/${state.questions.length}`));
  wrap.appendChild(pbar);

  // バッジ
  const badges=el("div",{style:{display:"flex",gap:"8px",marginBottom:"14px"}});
  badges.appendChild(el("span",{style:{background:cfg.color+"28",border:`1px solid ${cfg.color}55`,borderRadius:"99px",padding:"4px 14px",fontSize:"12px",color:cfg.color,fontWeight:"700"}},`${cfg.icon} ${q.subject}`));
  badges.appendChild(el("span",{style:{background:DIFF_COLOR[q.difficulty]+"22",border:`1px solid ${DIFF_COLOR[q.difficulty]}55`,borderRadius:"99px",padding:"4px 12px",fontSize:"11px",color:DIFF_COLOR[q.difficulty],fontWeight:"700"}},DIFF_LABEL[q.difficulty]));
  wrap.appendChild(badges);

  // 問題文
  wrap.appendChild(el("div",{style:{background:"rgba(255,255,255,0.06)",borderRadius:"18px",padding:"22px 18px",textAlign:"center",fontSize:"16px",fontWeight:"700",marginBottom:"18px",width:"100%",lineHeight:"1.7"}},q.question));

  // 選択肢
  const choices=el("div",{style:{width:"100%",display:"flex",flexDirection:"column",gap:"9px"}});
  q.choices.forEach(c=>{
    let bg="rgba(255,255,255,0.07)",border="1px solid rgba(255,255,255,0.12)",col="white";
    if(state.answered){
      if(c===q.answer){bg="rgba(78,205,196,0.22)";border="2px solid #4ECDC4";col="#4ECDC4";}
      else if(c===state.selected){bg="rgba(255,107,107,0.22)";border="2px solid #FF6B6B";col="#FF6B6B";}
    }
    const prefix=state.answered?(c===q.answer?"✅ ":(c===state.selected&&c!==q.answer?"❌ ":"")):"";
    const btn=el("button",{style:{background:bg,border,borderRadius:"13px",padding:"13px 16px",fontSize:"14px",color:col,textAlign:"left",fontWeight:"600",width:"100%"},onClick:()=>handleChoice(c)},prefix+c);
    choices.appendChild(btn);
  });
  wrap.appendChild(choices);

  // 解説
  if(state.answered){
    wrap.appendChild(el("div",{style:{background:isOk?"rgba(78,205,196,0.1)":"rgba(255,107,107,0.1)",border:`1px solid ${isOk?"#4ECDC4":"#FF6B6B"}44`,borderRadius:"13px",padding:"12px 16px",marginTop:"14px",fontSize:"13px",color:"#ccc",width:"100%",lineHeight:"1.8"}},[
      el("div",{style:{fontWeight:"700",marginBottom:"3px",color:isOk?"#4ECDC4":"#FF6B6B"}},isOk?"🎉 正解！":"💡 解説"),
      document.createTextNode(q.explanation)
    ]));
    const nextBtn=el("button",{style:{background:"linear-gradient(90deg,#A29BFE,#4ECDC4)",border:"none",borderRadius:"999px",padding:"15px 0",fontSize:"16px",fontWeight:"700",color:"white",width:"100%",maxWidth:"420px",marginTop:"14px",boxShadow:"0 4px 20px #A29BFE55"},onClick:handleNext},state.current+1<state.questions.length?"次の問題 →":"結果を見る 🏁");
    wrap.appendChild(nextBtn);
  }
  return wrap;
}

function renderResult(){
  const CONFIG=getConfig();
  const ok=state.results.filter(r=>r.correct).length;
  const pct=Math.round(ok/state.results.length*100);
  const streak=getModeStreak();
  const review=getModeReview();
  const wrap=el("div",{className:"screen",style:{paddingTop:"36px"}});

  wrap.appendChild(el("div",{style:{fontSize:"52px",marginBottom:"6px"}},pct>=80?"🏆":pct>=60?"😊":"💪"));
  wrap.appendChild(el("div",{style:{fontFamily:"'Fredoka One',cursive",fontSize:"26px",color:"#FFD93D",marginBottom:"4px"}},pct>=80?"すごい！":pct>=60?"よくできました！":"もう少し！"));
  wrap.appendChild(el("div",{style:{fontSize:"40px",fontWeight:"900",margin:"6px 0 14px"}},[
    el("span",{},String(ok)),
    el("span",{style:{fontSize:"16px",color:"#555"}},`/${state.results.length}問 正解`)
  ]));
  wrap.appendChild(el("div",{style:{background:"rgba(255,215,61,0.08)",border:"1px solid #FFD93D33",borderRadius:"12px",padding:"8px 24px",marginBottom:"16px"}},[
    el("span",{style:{color:"#FFD93D",fontWeight:"700"}},`🔥 ${streak}日連続達成中！`)
  ]));

  // 難易度フィードバック
  const fb=el("div",{style:{background:"rgba(255,255,255,0.04)",borderRadius:"13px",padding:"12px 14px",marginBottom:"16px",width:"100%",fontSize:"12px",color:"#aaa",lineHeight:"2"}});
  fb.appendChild(el("div",{style:{fontWeight:"700",color:"#fff",marginBottom:"4px",fontSize:"13px"}},"📊 次回の難易度"));
  Object.keys(CONFIG).forEach(subj=>{
    const s=state.stats[subj];
    if(!s?.total)return;
    const rate=Math.round(s.correct/s.total*100);
    const diff=getAdaptiveDiff(subj);
    const row=el("div",{style:{display:"flex",justifyContent:"space-between"}});
    row.appendChild(el("span",{},`${CONFIG[subj].icon} ${subj}（正解率${rate}%）`));
    row.appendChild(el("span",{style:{color:DIFF_COLOR[diff],fontWeight:"700"}},`→ ${DIFF_LABEL[diff]}`));
    fb.appendChild(row);
  });
  wrap.appendChild(fb);

  // 問題リスト
  const list=el("div",{style:{width:"100%",marginBottom:"16px",display:"flex",flexDirection:"column",gap:"6px"}});
  state.results.forEach(r=>{
    const row=el("div",{style:{background:r.correct?"rgba(78,205,196,0.08)":"rgba(255,107,107,0.08)",border:`1px solid ${r.correct?"#4ECDC433":"#FF6B6B33"}`,borderRadius:"10px",padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}});
    row.appendChild(el("span",{style:{fontSize:"12px",color:"#bbb"}},`${CONFIG[r.subject]?.icon||""} ${r.question.length>22?r.question.slice(0,22)+"…":r.question}`));
    row.appendChild(el("span",{},r.correct?"✅":"❌"));
    list.appendChild(row);
  });
  wrap.appendChild(list);

  if(review.length>0)wrap.appendChild(el("div",{style:{color:"#A29BFE",fontSize:"12px",marginBottom:"12px"}},`📝 復習ボックス: ${review.length}問`));

  const btns=el("div",{style:{display:"flex",flexDirection:"column",gap:"10px",width:"100%",maxWidth:"420px"}});
  btns.appendChild(el("button",{style:{background:"linear-gradient(90deg,#A29BFE,#4ECDC4)",border:"none",borderRadius:"999px",padding:"15px 0",fontSize:"16px",fontWeight:"700",color:"white",width:"100%"},onClick:()=>startQuiz(state.selSubj)},"もう一度やる 🔄"));
  btns.appendChild(el("button",{style:{background:"linear-gradient(90deg,#FF6B6B,#FFD93D)",border:"none",borderRadius:"999px",padding:"15px 0",fontSize:"16px",fontWeight:"700",color:"white",width:"100%"},onClick:goHome},"ホームに戻る 🏠"));
  wrap.appendChild(btns);
  return wrap;
}

render();
</script>
